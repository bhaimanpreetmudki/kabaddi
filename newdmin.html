<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukhdeep TV - Full Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 650px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; }
        .header { background: #cc0000; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; }
        .btn-green { background: #238636; }
        .btn-blue { background: #1f6feb; }
        .btn-red { background: #da3633; }
        .btn-yellow { background: #f1c40f; color: black; }
        
        .score-ctrl { display: flex; align-items: center; justify-content: space-between; background: #0d1117; padding: 10px; border-radius: 8px; margin-top: 5px; }
        .score-val { font-size: 24px; font-weight: bold; color: gold; }
        
        .penalty-btns { display: flex; gap: 5px; margin-top: 10px; }
        .p-btn { flex: 1; padding: 8px; font-size: 18px; border-radius: 4px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 650px;">

    <!-- 1. MATCH INFO & SCORE -->
    <div class="card">
        <div class="header">Live Match & Score Control</div>
        <div class="grid-2">
            <div>
                <label>TEAM A NAME</label>
                <input type="text" id="nameA" class="std-input" oninput="updateMatch()">
                <div class="score-ctrl">
                    <button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button>
                    <span class="score-val" id="dispA">0</span>
                    <button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="color" id="colorA" style="width:100%; margin-top:5px;" onchange="updateMatch()">
            </div>
            <div>
                <label>TEAM B NAME</label>
                <input type="text" id="nameB" class="std-input" oninput="updateMatch()">
                <div class="score-ctrl">
                    <button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button>
                    <span class="score-val" id="dispB">0</span>
                    <button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="color" id="colorB" style="width:100%; margin-top:5px;" onchange="updateMatch()">
            </div>
        </div>
    </div>

    <!-- 2. TIMER & PENALTY -->
    <div class="card">
        <div class="header">Timer & Penalty Shootout</div>
        <div class="grid-2">
            <div style="text-align: center;">
                <label>MATCH TIMER</label>
                <div style="font-size: 30px; margin: 10px 0;" id="timerDisp">00:00</div>
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-green" onclick="toggleTimer()">Start/Stop</button>
                    <button class="btn btn-red" onclick="resetTimer()">Reset</button>
                </div>
            </div>
            <div>
                <label>PENALTY SYSTEM</label>
                <div class="penalty-btns">
                    <button class="p-btn" style="background:#2ecc71;" onclick="addPenalty('A', '✅')">A ✅</button>
                    <button class="p-btn" style="background:#e74c3c;" onclick="addPenalty('A', '❌')">A ❌</button>
                </div>
                <div class="penalty-btns">
                    <button class="p-btn" style="background:#2ecc71;" onclick="addPenalty('B', '✅')">B ✅</button>
                    <button class="p-btn" style="background:#e74c3c;" onclick="addPenalty('B', '❌')">B ❌</button>
                </div>
                <button class="btn btn-blue" style="width:100%; margin-top:10px;" onclick="clearPenalty()">Clear Penalty</button>
            </div>
        </div>
    </div>

    <!-- 3. CARD SYSTEM -->
    <div class="card">
        <div class="header">Card System</div>
        <div class="grid-2">
            <input type="text" id="pCardA" class="std-input" placeholder="Player Name/No (A)">
            <input type="text" id="pCardB" class="std-input" placeholder="Player Name/No (B)">
            <div style="display:flex; gap:5px;">
                <button class="btn btn-yellow" style="flex:1;" onclick="giveCard('A','yellow')">Yellow</button>
                <button class="btn btn-red" style="flex:1;" onclick="giveCard('A','red')">Red</button>
            </div>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-yellow" style="flex:1;" onclick="giveCard('B','yellow')">Yellow</button>
                <button class="btn btn-red" style="flex:1;" onclick="giveCard('B','red')">Red</button>
            </div>
        </div>
    </div>

    <!-- 4. TICKER & LIST -->
    <div class="card">
        <div class="header">Ticker & Match List</div>
        <div style="padding:15px;">
            <label>Match List (Team-Team)</label>
            <textarea id="matchListInput" class="std-input" style="height:80px;" oninput="formatMatchList()"></textarea>
            <div class="grid-2" style="padding:10px 0;">
                <textarea id="contactInput" class="std-input" placeholder="Contact Details" oninput="updateTicker()"></textarea>
                <textarea id="upcomingInput" class="std-input" placeholder="Upcoming Programs" oninput="updateTicker()"></textarea>
            </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let scores = { scoreA: 0, scoreB: 0 };
    let penA = "", penB = "";
    let timerInterval = null;
    let seconds = 0;

    // Score Logic
    function changeScore(team, val) {
        scores[team] = Math.max(0, scores[team] + val);
        db.ref("matchData").update(scores);
    }

    function updateMatch() {
        db.ref("matchData").update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value
        });
    }

    // Penalty Logic
    function addPenalty(team, char) {
        if(team === 'A') penA += char; else penB += char;
        db.ref("matchData").update({ penaltyA: penA, penaltyB: penB, penaltyVisible: true });
    }
    function clearPenalty() { penA = ""; penB = ""; db.ref("matchData").update({ penaltyA: "", penaltyB: "", penaltyVisible: false }); }

    // Timer Logic
    function toggleTimer() {
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        else {
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2,'0');
                let s = (seconds%60).toString().padStart(2,'0');
                let timeStr = m + ":" + s;
                document.getElementById('timerDisp').innerText = timeStr;
                db.ref("matchData").update({ matchTime: timeStr });
            }, 1000);
        }
    }
    function resetTimer() { seconds = 0; document.getElementById('timerDisp').innerText = "00:00"; db.ref("matchData").update({ matchTime: "00:00" }); }

    // Sync Everything
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        scores.scoreA = d.scoreA || 0; scores.scoreB = d.scoreB || 0;
        document.getElementById('dispA').innerText = scores.scoreA;
        document.getElementById('dispB').innerText = scores.scoreB;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
    });

    // ਪੁਰਾਣੇ ਫੰਕਸ਼ਨ (Card, Ticker, List) ਇੱਥੇ ਵੀ ਕੰਮ ਕਰਨਗੇ...
    function formatMatchList() { /* ਪਹਿਲਾਂ ਵਾਲਾ ਕੋਡ */ }
    function updateTicker() { /* ਪਹਿਲਾਂ ਵਾਲਾ ਕੋਡ */ }
</script>
</body>
</html>
