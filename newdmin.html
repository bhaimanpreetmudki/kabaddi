<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukhdeep TV - Professional Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .header { background: #21262d; color: #c9d1d9; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; border-bottom: 1px solid #30363d; }
        
        .teams-container { display: flex; padding: 15px; gap: 8px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 12px; border-radius: 8px; background: #161b22; border-top: 5px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .score-val { font-size: 42px; font-weight: 900; color: #2ecc71; margin: 5px 0; text-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
        .btn-pm { border: none; color: white; padding: 8px; border-radius: 6px; font-size: 22px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 3px; transition: 0.2s; }
        .btn-pm:active { transform: scale(0.9); }
        .card-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; width: 100%; transition: 0.3s; }

        .std-input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; outline: none; }
        .std-input:focus { border-color: #58a6ff; }
        .std-textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; min-height: 50px; resize: none; overflow: hidden; outline: none; }
        
        .label-title { font-size: 11px; color: #8b949e; display: block; margin: 8px 0 4px 0; text-align: left; text-transform: uppercase; font-weight: bold; }

        .content { padding: 15px; }
        .btn-update { background: #238636; color: white; padding: 14px; border-radius: 8px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-bottom: 12px; font-size: 14px; }
        .btn-ticker { background: #da3633; color: white; margin-bottom: 15px; height: 55px; font-size: 16px; border-radius: 8px; border:none; width:100%; font-weight:bold; cursor:pointer; box-shadow: 0 4px 0 #bd2c00; }
        .btn-ticker:active { transform: translateY(2px); box-shadow: 0 2px 0 #bd2c00; }
        
        .btn-mode { background: #30363d; color: white; font-size: 11px; padding: 12px; border: 1px solid #484f58; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-active { border: 2px solid #fff !important; background: #238636 !important; box-shadow: 0 0 10px rgba(35, 134, 54, 0.5); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-effects { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 12px; }
        .flex-row { display: flex; gap: 6px; margin-top: 10px; }
        
        #penaltyControlSection { display: none; background: #1c2128; padding: 15px; border-top: 3px solid #f39c12; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-trophy"></i> LIVE SCORE CONTROL</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:25px; border-radius:4px; border:none; cursor:pointer; margin-bottom:10px;">
                <input type="text" id="nameA" class="std-input" placeholder="HOME TEAM" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:8px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="PLAYER NO" style="border-color:#f1c40f; text-align:center;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('A', 'Red')">RC</button>
                </div>
            </div>

            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636; height: 45px;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <button class="card-btn" style="background:#30363d;" onclick="resetOnlyScore()">RESET</button>
                <div style="font-weight:900; color:#8b949e; font-size: 20px;">VS</div>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:25px; border-radius:4px; border:none; cursor:pointer; margin-bottom:10px;">
                <input type="text" id="nameB" class="std-input" placeholder="AWAY TEAM" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:8px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="PLAYER NO" style="border-color:#f1c40f; text-align:center;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('B', 'Red')">RC</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MATCH INFO -->
    <div class="card">
        <div class="header"><i class="fas fa-clock"></i> MATCH SETTINGS</div>
        <div style="padding:15px; background:#0d1117;">
            <div class="grid-2">
                <div style="text-align:center; border-right: 1px solid #30363d; padding-right:15px;">
                    <div id="timerShow" style="font-size:36px; color:#f1c40f; font-family: 'Courier New', monospace; font-weight:bold;">00:00</div>
                    <div class="flex-row">
                        <button class="card-btn" style="background:#238636;" onclick="startTimer()">START</button>
                        <button class="card-btn" style="background:#f39c12;" onclick="pauseTimer()">PAUSE</button>
                        <button class="card-btn" style="background:#30363d;" onclick="resetTimer()">00</button>
                    </div>
                    <span class="label-title" style="text-align:center;">Duration</span>
                    <input type="text" id="matchDuration" class="std-input" style="text-align:center;" placeholder="20m" oninput="updateMatchDB()">
                </div>
                <div style="padding-left:10px;">
                    <span class="label-title" style="color:#2ecc71;">Tournament Round</span>
                    <input type="text" id="matchRound" class="std-input" placeholder="Semi-Final" oninput="updateMatchDB()">
                    <span class="label-title" style="color:#f1c40f;">Current Status</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="1st Half" oninput="updateMatchDB()">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#30363d; font-size:9px;" onclick="setHalf('1st Half')">1st Half</button>
                        <button class="card-btn" style="background:#30363d; font-size:9px;" onclick="setHalf('2nd Half')">2nd Half</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. PENALTY SHOOTOUT (Unchanged as requested) -->
    <div class="card">
        <div class="header" style="background:#f39c12; color:#000;">PENALTY SHOOTOUT</div>
        <div style="padding:12px; display:flex; gap:8px;">
            <button id="pVisBtn" class="card-btn" style="background:#f39c12; color:#000;" onclick="togglePenaltyVis()">SHOW PENALTY</button>
            <button class="card-btn" style="background:#30363d;" onclick="resetPenaltyOnly()">RESET PENALTY</button>
        </div>
        <div id="penaltyControlSection">
            <div class="grid-2">
                <div>
                    <input type="text" id="pA" class="std-input" readonly style="text-align:center; font-size:18px;">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pA', '✅')">GOAL</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pA', '❌')">MISS</button>
                    </div>
                </div>
                <div>
                    <input type="text" id="pB" class="std-input" readonly style="text-align:center; font-size:18px;">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pB', '✅')">GOAL</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pB', '❌')">MISS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. TICKER INFO -->
    <div class="card">
        <div class="header" style="background:#30363d;"><i class="fas fa-broadcast-tower"></i> BROADCAST TICKER</div>
        <div class="content">
            <button id="tickerToggleBtn" class="btn-ticker" onclick="confirmTickerAction('vis')">TICKER: ON/OFF</button>
            
            <span class="label-title">Tournament Name</span>
            <input type="text" id="tourName" class="std-input" placeholder="e.g. Kabaddi Cup 2026">
            
            <span class="label-title">Prizes & Awards</span>
            <input type="text" id="prizeList" class="std-input" placeholder="1st: 51000, 2nd: 31000">
            
            <span class="label-title">Contact & Media</span>
            <input type="text" id="contactInfo" class="std-input" placeholder="Phone: +91 86996-40061">
            
            <span class="label-title" style="color:#2ecc71;">Participating Teams (List)</span>
            <textarea id="teamsList" class="std-textarea" placeholder="1. Team A, 2. Team B..." oninput="autoExpand(this)"></textarea>

            <span class="label-title" style="color:#e67e22;">Next Program</span>
            <input type="text" id="nextProg" class="std-input" placeholder="ਅਗਲਾ ਮੈਚ: ਪਿੰਡ ਮੁੱਦਕੀ ਬਨਾਮ ...">
            
            <button class="btn-update" onclick="confirmTickerAction('info')">UPDATE ALL TICKER INFO</button>
            
            <div class="label-title">Watermark / Branding</div>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <input type="text" id="wmText" class="std-input" placeholder="SUKHDEEP TV" style="margin:0;">
                <button class="btn-update" style="width:100px; margin:0;" onclick="confirmTickerAction('wm')">SET</button>
            </div>
            
            <div class="grid-effects">
                <button id="btn-scroll" class="btn-mode" onclick="confirmTickerAction('effect', 'scroll')">SCROLL</button>
                <button id="btn-blink" class="btn-mode" onclick="confirmTickerAction('effect', 'blink')">BLINK</button>
                <button id="btn-fullscreen" class="btn-mode" onclick="confirmTickerAction('effect', 'fullscreen')">F-SCREEN</button>
            </div>
        </div>
    </div>

    <!-- SYSTEM RESET -->
    <div class="card" style="border: 1px solid #da3633;">
        <div style="padding:12px;">
            <button class="card-btn" style="background:#da3633; padding:15px; font-size:12px;" onclick="fullReset()">⚠ FULL SYSTEM RESET</button>
        </div>
    </div>

</div>

<script>
    // Firebase Configuration
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, seconds = 0, timerInterval = null, sVis = true, pVis = false;
    let yellowCounts = {};
    let tickerStatus = true;
    let effectStates = { scroll: false, blink: false, fullscreen: false };

    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = (field.scrollHeight) + 'px';
    }

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value.toUpperCase(),
            nameB: document.getElementById('nameB').value.toUpperCase(),
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            matchRound: document.getElementById('matchRound').value,
            round: document.getElementById('roundInp').value,
            duration: document.getElementById('matchDuration').value,
            matchTime: document.getElementById('timerShow').innerText
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function handleCard(team, type) {
        let pDetail = document.getElementById('player' + team).value;
        if(!pDetail) { alert("Please Enter Player Number!"); return; }
        let key = team + "_" + pDetail;
        let eventMsg = "";
        if(type === 'Yellow') {
            yellowCounts[key] = (yellowCounts[key] || 0) + 1;
            eventMsg = (yellowCounts[key] >= 2 ? "RED (2nd Yellow): " : "Yellow Card: ") + pDetail;
        } else {
            eventMsg = "Red Card: " + pDetail;
        }
        matchRef.child('lastEvent').set(eventMsg);
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60), s = seconds % 60;
            let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            document.getElementById('timerShow').innerText = timeStr;
            matchRef.child('matchTime').set(timeStr);
        }, 1000);
    }
    
    function pauseTimer() { clearInterval(timerInterval); timerInterval = null; updateMatchDB(); }
    function resetTimer() { seconds = 0; document.getElementById('timerShow').innerText = "00:00"; matchRef.child('matchTime').set("00:00"); }
    function setHalf(val) { document.getElementById('roundInp').value = val; updateMatchDB(); }
    
    function addPenalty(id, icon) {
        let inp = document.getElementById(id);
        let count = (inp.value.match(/✅|❌/g) || []).length;
        if(count >= 5) { alert("Maximum 5 Penalties Allowed!"); return; }
        inp.value = inp.value + icon;
        updateMatchDB();
    }
    
    function togglePenaltyVis() { matchRef.child('penaltyVisible').set(!pVis); }
    function toggleVis(field) { matchRef.child(field).set(!sVis); }
    function resetPenaltyOnly() { if(confirm("Clear Penalties?")) matchRef.update({ penaltyA: "", penaltyB: "" }); }
    function resetOnlyScore() { if(confirm("Reset Current Scores?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }
    
    function fullReset() {
        if(confirm("DANGER: This will reset all match data. Continue?")) {
            yellowCounts = {}; seconds = 0; pauseTimer();
            matchRef.update({ 
                scoreA: 0, scoreB: 0, penaltyA: "", penaltyB: "", 
                matchTime: "00:00", penaltyVisible: false, lastEvent: "",
                nameA: "", nameB: "", matchRound: "", round: ""
            });
        }
    }

    function confirmTickerAction(type, subType = null) {
        if (type === 'info' || confirm("Confirm Update?")) {
            if (type === 'info') {
                tickerRef.update({ 
                    tournamentName: tourName.value, 
                    prizes: prizeList.value, 
                    contact: contactInfo.value,
                    nextProgram: nextProg.value,
                    participatingTeams: document.getElementById('teamsList').value
                });
                alert("Ticker Updated Successfully!");
            }
            else if (type === 'wm') tickerRef.update({ watermarkText: wmText.value });
            else if (type === 'vis') { tickerStatus = !tickerStatus; tickerRef.child('tickerVis').set(tickerStatus); }
            else if (type === 'effect') { effectStates[subType] = !effectStates[subType]; tickerRef.child('effects').child(subType).set(effectStates[subType]); }
        }
    }

    // Sync Data with Firebase
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible; pVis = !!data.penaltyVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('colorA').value = data.colorA || "#ffffff";
        document.getElementById('colorB').value = data.colorB || "#ffffff";
        document.getElementById('pA').value = data.penaltyA || "";
        document.getElementById('pB').value = data.penaltyB || "";
        document.getElementById('matchRound').value = data.matchRound || "";
        document.getElementById('roundInp').value = data.round || "";
        document.getElementById('matchDuration').value = data.duration || "";
        if(!timerInterval) document.getElementById('timerShow').innerText = data.matchTime || "00:00";
        document.getElementById('boxA').style.borderTopColor = data.colorA;
        document.getElementById('boxB').style.borderTopColor = data.colorB;
        
        const vBtn = document.getElementById('visBtn');
        vBtn.innerText = sVis ? "HIDE" : "SHOW";
        vBtn.style.background = sVis ? "#da3633" : "#238636";
        
        document.getElementById('penaltyControlSection').style.display = pVis ? "block" : "none";
        document.getElementById('pVisBtn').innerText = pVis ? "HIDE PENALTY" : "SHOW PENALTY";
        document.getElementById('pVisBtn').style.background = pVis ? "#30363d" : "#f39c12";
        document.getElementById('pVisBtn').style.color = pVis ? "#fff" : "#000";
    });

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        tourName.value = data.tournamentName || "";
        prizeList.value = data.prizes || "";
        contactInfo.value = data.contact || "";
        wmText.value = data.watermarkText || "";
        nextProg.value = data.nextProgram || "";
        
        const teamsInput = document.getElementById('teamsList');
        teamsInput.value = data.participatingTeams || "";
        autoExpand(teamsInput);

        tickerStatus = !!data.tickerVis;
        tickerToggleBtn.style.background = tickerStatus ? "#238636" : "#da3633";
        tickerToggleBtn.innerText = tickerStatus ? "TICKER: SHOWING" : "TICKER: HIDDEN";
        
        const effects = data.effects || {};
        ['scroll', 'blink', 'fullscreen'].forEach(e => {
            effectStates[e] = !!effects[e];
            document.getElementById('btn-' + e).className = effectStates[e] ? 'btn-mode btn-active' : 'btn-mode';
        });
    });
</script>
</body>
</html>
