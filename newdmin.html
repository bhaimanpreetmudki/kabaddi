<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }

        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .std-textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; min-height: 45px; resize: none; overflow: hidden; }
        
        .label-title { font-size: 10px; color: #8b949e; display: block; margin-top: 5px; text-align: left; text-transform: uppercase; font-weight: bold; }
        .content { padding: 15px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-bottom: 10px;}
        .btn-ticker { background: #ff5722; color: white; margin-bottom: 15px; height: 50px; font-size: 16px; border-radius: 6px; border:none; width:100%; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameA" class="std-input" placeholder="ਟੀਮ ਏ" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>

            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">ਦਿਖਾਓ</button>
                <button class="card-btn" style="background:#333;" onclick="resetOnlyScore()">ਰੀਸੈੱਟ</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameB" class="std-input" placeholder="ਟੀਮ ਬੀ" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. TICKER INFO -->
    <div class="card">
        <div class="header" style="background:#444;">ਟਿੱਕਰ ਕੰਟਰੋਲ ਪੈਨਲ</div>
        <div class="content">
            <button id="tickerToggleBtn" class="btn-ticker" onclick="confirmTickerAction('vis')">ਟਿੱਕਰ: ਚਾਲੂ/ਬੰਦ</button>
            
            <span class="label-title">ਟੂਰਨਾਮੈਂਟ ਦਾ ਨਾਮ</span>
            <input type="text" id="tourName" class="std-input" placeholder="ਟੂਰਨਾਮੈਂਟ ਲਿਖੋ">
            
            <span class="label-title">ਇਨਾਮ (Prize)</span>
            <input type="text" id="prizeList" class="std-input" placeholder="ਇਨਾਮਾਂ ਦੀ ਲਿਸਟ">
            
            <span class="label-title">ਸੰਪਰਕ ਨੰਬਰ</span>
            <input type="text" id="contactInfo" class="std-input" placeholder="ਮੋਬਾਇਲ ਨੰਬਰ">
            
            <span class="label-title" style="color:#2ecc71;">ਟੀਮਾਂ ਦੀ ਲਿਸਟ</span>
            <textarea id="teamsList" class="std-textarea" placeholder="ਟੀਮਾਂ ਦੇ ਨਾਮ ਇੱਥੇ ਲਿਖੋ..." oninput="autoExpand(this)"></textarea>

            <span class="label-title" style="color:#e67e22;">ਅਗਲਾ ਪ੍ਰੋਗਰਾਮ</span>
            <input type="text" id="nextProg" class="std-input" placeholder="ਅਗਲਾ ਮੈਚ ਜਾਂ ਪ੍ਰੋਗਰਾਮ...">
            
            <button class="btn-update" style="background: #238636;" onclick="confirmTickerAction('info')">ਸਾਰੀ ਜਾਣਕਾਰੀ ਅਪਡੇਟ ਕਰੋ</button>
        </div>
    </div>

    <!-- SYSTEM RESET -->
    <div class="card">
        <div style="padding:10px;">
            <button class="card-btn" style="background:#e74c3c; padding:12px; font-size:12px;" onclick="fullReset()">ਸਭ ਕੁਝ ਰੀਸੈੱਟ ਕਰੋ</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true;
    let tickerStatus = true;

    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = field.scrollHeight + 'px';
    }

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function toggleVis(field) { matchRef.child(field).set(!sVis); }
    function resetOnlyScore() { if(confirm("ਕੀ ਤੁਸੀਂ ਸਕੋਰ ਰੀਸੈੱਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }
    
    function fullReset() {
        if(confirm("ਕੀ ਤੁਸੀਂ ਸਭ ਕੁਝ ਰੀਸੈੱਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            matchRef.update({ scoreA: 0, scoreB: 0, scoreVisible: false });
        }
    }

    function confirmTickerAction(type) {
        if (confirm("ਕੀ ਤੁਸੀਂ ਅਪਡੇਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            if (type === 'info') {
                tickerRef.update({ 
                    tournamentName: tourName.value, 
                    prizes: prizeList.value, 
                    contact: contactInfo.value,
                    nextProgram: nextProg.value,
                    participatingTeams: document.getElementById('teamsList').value
                });
            }
            else if (type === 'vis') { 
                tickerStatus = !tickerStatus; 
                tickerRef.child('tickerVis').set(tickerStatus); 
            }
        }
    }

    // Sync Data
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('visBtn').innerText = sVis ? "ਲੁਕਾਓ" : "ਦਿਖਾਓ";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('tourName').value = data.tournamentName || "";
        document.getElementById('prizeList').value = data.prizes || "";
        document.getElementById('contactInfo').value = data.contact || "";
        document.getElementById('nextProg').value = data.nextProgram || "";
        document.getElementById('teamsList').value = data.participatingTeams || "";

        tickerStatus = !!data.tickerVis;
        tickerToggleBtn.style.background = tickerStatus ? "#238636" : "#da3633";
        tickerToggleBtn.innerText = tickerStatus ? "ਟਿੱਕਰ: ਚੱਲ ਰਿਹਾ ਹੈ" : "ਟਿੱਕਰ: ਬੰਦ ਹੈ";
    });
</script>
</body>
</html>
