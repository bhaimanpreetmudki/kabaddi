<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukhdeep TV - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #cc0000; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 10px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 11px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .label-title { font-size: 11px; color: #8b949e; display: block; margin-top: 10px; text-align: left; text-transform: uppercase; font-weight: bold; padding-left: 5px; }
        .content { padding: 15px; }
        .btn-update { background: #238636; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-top: 10px;}
        .btn-mode { background: #30363d; color: white; font-size: 12px; padding: 12px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-active { border: 2px solid #fff !important; background: #cc0000 !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header">Scoreboard Control</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>

            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleScoreVis()">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetScore()">RESET</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>

            <div class="team-box" id="boxB">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MATCH DETAILS (Round & Half) -->
    <div class="card">
        <div class="header">Match Details</div>
        <div class="content">
            <div class="grid-2">
                <div>
                    <span class="label-title">Round</span>
                    <input type="text" id="matchRound" class="std-input" placeholder="e.g. Semi Final" oninput="updateMatchDB()">
                </div>
                <div>
                    <span class="label-title">Half Status</span>
                    <input type="text" id="halfStatus" class="std-input" placeholder="e.g. 1st Half" oninput="updateMatchDB()">
                </div>
            </div>
        </div>
    </div>

    <!-- 3. WATERMARK / LOGO CONTROL -->
    <div class="card">
        <div class="header">Watermark & Logo</div>
        <div class="content">
            <span class="label-title">Logo Image URL</span>
            <input type="text" id="logoUrl" class="std-input" placeholder="Paste Logo Link Here" oninput="updateMatchDB()">
            
            <span class="label-title">Animation Mode</span>
            <div class="grid-3">
                <button id="wm-off" class="btn-mode" onclick="setWMMode('off')">OFF</button>
                <button id="wm-blink" class="btn-mode" onclick="setWMMode('blink')">BLINK</button>
                <button id="wm-scroll" class="btn-mode" onclick="setWMMode('scroll')">SCROLL</button>
                <button id="wm-bounce" class="btn-mode" onclick="setWMMode('bounce')">BOUNCE</button>
            </div>
        </div>
    </div>

    <!-- 4. TICKER CONTROL -->
    <div class="card">
        <div class="header">Ticker Information</div>
        <div class="content">
            <button id="tickerVisBtn" class="btn-update" style="margin-bottom:10px;" onclick="toggleTickerVis()">TICKER: ON</button>
            
            <span class="label-title">Tournament Name</span>
            <input type="text" id="tourName" class="std-input">
            
            <span class="label-title">Participating Teams</span>
            <input type="text" id="teamsList" class="std-input">

            <span class="label-title">Prizes / Info</span>
            <input type="text" id="prizeList" class="std-input">

            <span class="label-title">Next Program</span>
            <input type="text" id="nextProg" class="std-input">

            <button class="btn-update" onclick="updateTickerDB()">UPDATE TICKER INFO</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let sVis = true;
    let tVis = true;
    let currentScoreA = 0;
    let currentScoreB = 0;

    // --- Update Score & Match Details ---
    function updateMatchDB() {
        db.ref("matchData").update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            round: document.getElementById('matchRound').value,
            halfStatus: document.getElementById('halfStatus').value,
            logoUrl: document.getElementById('logoUrl').value
        });
    }

    function changeScore(team, val) {
        let newVal = (team === 'scoreA' ? currentScoreA : currentScoreB) + val;
        if(newVal < 0) newVal = 0;
        db.ref("matchData").update({ [team]: newVal });
    }

    function toggleScoreVis() {
        sVis = !sVis;
        db.ref("matchData").update({ scoreVisible: sVis });
    }

    function resetScore() {
        if(confirm("Reset Score?")) {
            db.ref("matchData").update({ scoreA: 0, scoreB: 0 });
        }
    }

    // --- Watermark Mode ---
    function setWMMode(mode) {
        db.ref("matchData").update({ wmMode: mode });
    }

    // --- Ticker Updates ---
    function toggleTickerVis() {
        tVis = !tVis;
        db.ref("tickerData").update({ tickerVis: tVis });
    }

    function updateTickerDB() {
        db.ref("tickerData").update({
            tournamentName: document.getElementById('tourName').value,
            participatingTeams: document.getElementById('teamsList').value,
            prizes: document.getElementById('prizeList').value,
            nextProgram: document.getElementById('nextProg').value
        });
        alert("Ticker Updated!");
    }

    // --- Sync Data from Firebase ---
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        currentScoreA = d.scoreA || 0;
        currentScoreB = d.scoreB || 0;
        document.getElementById('dispA').innerText = currentScoreA;
        document.getElementById('dispB').innerText = currentScoreB;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
        document.getElementById('matchRound').value = d.round || "";
        document.getElementById('halfStatus').value = d.halfStatus || "";
        document.getElementById('logoUrl').value = d.logoUrl || "";
        
        sVis = !!d.scoreVisible;
        const vBtn = document.getElementById('visBtn');
        vBtn.innerText = sVis ? "HIDE" : "SHOW";
        vBtn.style.background = sVis ? "#da3633" : "#238636";

        // Active Watermark Button
        const modes = ['off', 'blink', 'scroll', 'bounce'];
        modes.forEach(m => {
            document.getElementById('wm-'+m).className = (d.wmMode === m) ? 'btn-mode btn-active' : 'btn-mode';
        });
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tourName').value = d.tournamentName || "";
        document.getElementById('teamsList').value = d.participatingTeams || "";
        document.getElementById('prizeList').value = d.prizes || "";
        document.getElementById('nextProg').value = d.nextProgram || "";
        
        tVis = !!d.tickerVis;
        const tBtn = document.getElementById('tickerVisBtn');
        tBtn.innerText = tVis ? "TICKER: SHOWING" : "TICKER: HIDDEN";
        tBtn.style.background = tVis ? "#238636" : "#da3633";
    });
</script>
</body>
</html>
