<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukhdeep TV - Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .header { background: #cc0000; color: #ffffff; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; border-bottom: 1px solid #30363d; }
        
        .teams-container { display: flex; padding: 15px; gap: 8px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 12px; border-radius: 8px; background: #161b22; border-top: 5px solid #fff; }
        .score-val { font-size: 42px; font-weight: 900; color: #ffffff; margin: 5px 0; }
        .btn-pm { border: none; color: white; padding: 8px; border-radius: 6px; font-size: 22px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 3px; }
        .card-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; width: 100%; }

        .std-input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; outline: none; }
        .std-textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; min-height: 60px; resize: none; outline: none; }
        
        .label-title { font-size: 11px; color: #8b949e; display: block; margin: 8px 0 4px 0; text-transform: uppercase; font-weight: bold; }

        .content { padding: 15px; }
        .btn-update { background: #238636; color: white; padding: 14px; border-radius: 8px; border:none; cursor:pointer; width:100%; font-weight:bold; font-size: 14px; transition: 0.2s; }
        .btn-update:active { transform: scale(0.98); }
        
        .wm-section { background: #1c2128; padding: 15px; border-top: 2px solid #58a6ff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 500px;">
    
    <!-- Score Control -->
    <div class="card">
        <div class="header">LIVE SCORE CONTROL</div>
        <div class="teams-container">
            <div class="team-box">
                <input type="text" id="nameA" class="std-input" placeholder="TEAM A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div style="font-weight:900; color:#8b949e;">VS</div>
            <div class="team-box">
                <input type="text" id="nameB" class="std-input" placeholder="TEAM B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
        <div style="padding: 10px; background: #0d1117;">
             <button id="visBtn" class="btn-update" onclick="toggleVis('scoreVisible')">SHOW/HIDE SCOREBOARD</button>
        </div>
    </div>

    <!-- Ticker Info -->
    <div class="card">
        <div class="header">TICKER & INFO SETTINGS</div>
        <div class="content">
            <span class="label-title">Tournament Name</span>
            <input type="text" id="tourName" class="std-input" placeholder="e.g. KABADDI CUP 2026">
            
            <span class="label-title">Participating Teams (Scroll Top)</span>
            <input type="text" id="teamsList" class="std-input" placeholder="TEAM 1 VS TEAM 2, TEAM 3 VS TEAM 4">

            <span class="label-title">Next Program / Info</span>
            <input type="text" id="nextProg" class="std-input" placeholder="LIVE FROM VILLAGE...">

            <span class="label-title">Prizes (Scroll Bottom)</span>
            <input type="text" id="prizeList" class="std-input" placeholder="1ST: 51000, 2ND: 31000">

            <button class="btn-update" onclick="updateTickerInfo()">UPDATE TICKER DATA</button>
        </div>
    </div>

    <!-- Watermark Section - Fixed -->
    <div class="card">
        <div class="header" style="background:#58a6ff;">WATERMARK SETTINGS</div>
        <div class="wm-section">
            <span class="label-title">Watermark / Branding Text</span>
            <div style="display:flex; gap:8px;">
                <input type="text" id="wmText" class="std-input" placeholder="SUKHDEEP TV" style="margin:0;">
                <button class="btn-update" style="width:120px; background:#58a6ff;" onclick="updateWatermark()">SET WM</button>
            </div>
            <p style="font-size:10px; color:#8b949e; margin-top:10px;">* This text will appear in the top-right or branding area.</p>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true;

    // Load Data
    matchRef.on("value", (snap) => {
        const d = snap.val() || {};
        curA = d.scoreA || 0; curB = d.scoreB || 0;
        sVis = d.scoreVisible !== false;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
        document.getElementById('visBtn').style.background = sVis ? "#238636" : "#da3633";
        document.getElementById('visBtn').innerText = sVis ? "SCOREBOARD: ON" : "SCOREBOARD: OFF";
    });

    tickerRef.on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tourName').value = d.tournamentName || "";
        document.getElementById('teamsList').value = d.participatingTeams || "";
        document.getElementById('nextProg').value = d.nextProgram || "";
        document.getElementById('prizeList').value = d.prizes || "";
        document.getElementById('wmText').value = d.watermarkText || "";
    });

    // Actions
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value.toUpperCase(),
            nameB: document.getElementById('nameB').value.toUpperCase()
        });
    }

    function changeScore(team, val) {
        let newVal = Math.max(0, (team === 'scoreA' ? curA : curB) + val);
        matchRef.update({ [team]: newVal });
    }

    function toggleVis(field) {
        matchRef.update({ [field]: !sVis });
    }

    function updateTickerInfo() {
        tickerRef.update({
            tournamentName: document.getElementById('tourName').value.toUpperCase(),
            participatingTeams: document.getElementById('teamsList').value.toUpperCase(),
            nextProgram: document.getElementById('nextProg').value.toUpperCase(),
            prizes: document.getElementById('prizeList').value.toUpperCase()
        }).then(() => alert("Ticker Data Updated!"));
    }

    // Fixed Watermark Function
    function updateWatermark() {
        const text = document.getElementById('wmText').value.toUpperCase();
        tickerRef.update({
            watermarkText: text
        }).then(() => alert("Watermark Updated!"));
    }
</script>
</body>
</html>
