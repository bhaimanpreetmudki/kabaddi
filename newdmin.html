<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .std-textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; min-height: 45px; resize: none; overflow: hidden; }
        
        .label-title { font-size: 10px; color: #8b949e; display: block; margin-top: 5px; text-align: left; text-transform: uppercase; font-weight: bold; }

        .content { padding: 15px; }
        .btn-update { background: #238636; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-bottom: 10px;}
        .btn-ticker { background: #ff5722; color: white; margin-bottom: 15px; height: 50px; font-size: 16px; border-radius: 6px; border:none; width:100%; font-weight:bold; cursor:pointer; }
        .btn-mode { background: #30363d; color: white; font-size: 12px; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-active { border: 2px solid #fff !important; background: #238636 !important; }

        .grid-effects { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d; }
        
        /* Watermark Box Style - Simple & Clean */
        .watermark-box { border: 2px solid #3498db; padding: 15px; border-radius: 10px; background: #0d1117; margin-top: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- TICKER INFO -->
    <div class="card">
        <div class="header" style="background:#444;">Ticker Info & Control</div>
        <div class="content">
            <button id="tickerToggleBtn" class="btn-ticker" onclick="confirmTickerAction('vis')">Ticker: ON/OFF</button>
            
            <span class="label-title">Tournament Name</span>
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            
            <span class="label-title">Prizes</span>
            <input type="text" id="prizeList" class="std-input" placeholder="Prizes">
            
            <span class="label-title">Contact</span>
            <input type="text" id="contactInfo" class="std-input" placeholder="Contact">
            
            <span class="label-title" style="color:#2ecc71;">Participting Teams</span>
            <textarea id="teamsList" class="std-textarea" placeholder="Enter Team names here..."></textarea>

            <span class="label-title" style="color:#e67e22;">Next Program</span>
            <input type="text" id="nextProg" class="std-input" placeholder="ਅਗਲਾ ਪ੍ਰੋਗਰਾਮ...">
            
            <button class="btn-update" onclick="confirmTickerAction('info')">Update All Ticker Info</button>
            
            <!-- WATERMARK SECTION - NOW INDEPENDENT -->
            <div class="watermark-box">
                <span class="label-title" style="color:#3498db; margin-bottom:10px; display:block;">Channel Watermark (Auto-Save)</span>
                <input type="text" id="wmText" class="std-input" placeholder="e.g. SUKHDEEP TV" oninput="updateWatermarkDirectly(this.value)">
            </div>
            
            <!-- EFFECTS SECTION - MOVED DOWN AWAY FROM WATERMARK -->
            <span class="label-title" style="text-align: center; margin-top: 10px;">Ticker Effects</span>
            <div class="grid-effects">
                <button id="btn-scroll" class="btn-mode" onclick="confirmTickerAction('effect', 'scroll')">SCROLL</button>
                <button id="btn-blink" class="btn-mode" onclick="confirmTickerAction('effect', 'blink')">BLINK</button>
                <button id="btn-fullscreen" class="btn-mode" onclick="confirmTickerAction('effect', 'fullscreen')">F-SCREEN</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const tickerRef = firebase.database().ref("tickerData");
    let tickerStatus = true;
    let effectStates = { scroll: false, blink: false, fullscreen: false };

    // Watermark update (No relation to buttons below it)
    function updateWatermarkDirectly(val) {
        tickerRef.update({ watermarkText: val });
    }

    function confirmTickerAction(type, subType = null) {
        if (confirm("ਕੀ ਤੁਸੀਂ ਅਪਡੇਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            if (type === 'info') {
                tickerRef.update({ 
                    tournamentName: document.getElementById('tourName').value, 
                    prizes: document.getElementById('prizeList').value, 
                    contact: document.getElementById('contactInfo').value,
                    nextProgram: document.getElementById('nextProg').value,
                    participatingTeams: document.getElementById('teamsList').value
                });
            }
            else if (type === 'vis') { 
                tickerStatus = !tickerStatus; 
                tickerRef.child('tickerVis').set(tickerStatus); 
            }
            else if (type === 'effect') { 
                effectStates[subType] = !effectStates[subType]; 
                tickerRef.child('effects').child(subType).set(effectStates[subType]); 
            }
        }
    }

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('tourName').value = data.tournamentName || "";
        document.getElementById('prizeList').value = data.prizes || "";
        document.getElementById('contactInfo').value = data.contact || "";
        document.getElementById('wmText').value = data.watermarkText || "";
        document.getElementById('nextProg').value = data.nextProgram || "";
        document.getElementById('teamsList').value = data.participatingTeams || "";

        tickerStatus = !!data.tickerVis;
        const btn = document.getElementById('tickerToggleBtn');
        btn.style.background = tickerStatus ? "#238636" : "#da3633";
        btn.innerText = tickerStatus ? "Ticker: SHOWING" : "Ticker: HIDDEN";

        const effects = data.effects || {};
        ['scroll', 'blink', 'fullscreen'].forEach(e => {
            effectStates[e] = !!effects[e];
            document.getElementById('btn-' + e).className = effectStates[e] ? 'btn-mode btn-active' : 'btn-mode';
        });
    });
</script>
</body>
</html>
