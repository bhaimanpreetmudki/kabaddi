<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Manpreet Mudki - Pro Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- SCOREBOARD --- */
        #scoreboard {
            position: absolute;
            top: 30px;
            right: 30px; /* Right side as per your image */
            display: flex;
            align-items: center;
            height: 50px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }
        .score-box { background: white; color: black; width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; }
        .team-container { display: flex; height: 100%; min-width: 300px; background: rgba(0,0,0,0.9); overflow: hidden; border-radius: 5px; margin: 0 5px; }
        .team-section { flex: 1; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; text-transform: uppercase; padding: 0 15px; }

        /* --- DOUBLE LAYER TICKER --- */
        #footer-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ticker-line { display: flex; height: 35px; align-items: center; overflow: hidden; }
        
        /* Hint Boxes (labels) */
        .hint-box {
            height: 100%;
            width: 100px; /* 50-50 setting */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Top Line Styles */
        .line-top { background: #b31217; color: white; }
        .white-hint { background: white; color: #b31217; border-right: 1px solid #ddd; }

        /* Bottom Line Styles */
        .line-bottom { background: white; color: #b31217; }
        .red-hint { background: #b31217; color: white; border-right: 1px solid white; }

        .content-area { flex: 1; font-size: 20px; font-weight: bold; padding: 0 15px; white-space: nowrap; display: flex; align-items: center; }

        /* Right Corner Clock/Date */
        .corner-box { width: 140px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; }
        .c-white { background: white; color: #b31217; }
        .c-red { background: #b31217; color: white; }

        /* Animation */
        .step-info { position: relative; height: 100%; flex: 1; display: flex; align-items: center; }
        .step-item { position: absolute; width: 100%; opacity: 0; transform: translateX(20px); transition: all 0.5s ease; }
        .step-item.active { opacity: 1; transform: translateX(0); }

    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="score-box">0</div>
        <div class="team-container">
            <div id="boxA" class="team-section">TEAM A</div>
            <div id="boxB" class="team-section">TEAM B</div>
        </div>
        <div id="disp_sB" class="score-box">0</div>
    </div>

    <!-- Ticker -->
    <div id="footer-container">
        
        <!-- TOP LINE (Red Background, White Hints) -->
        <div class="ticker-line line-top">
            <div class="hint-box white-hint">LIVE</div>
            <div class="content-area" id="tournament-name">PIND MUDKI KABADDI CUP</div>
            <div class="hint-box white-hint">MATCH</div>
            <div class="content-area" id="match-teams">TEAM A VS TEAM B</div>
            <div class="corner-box c-white" id="live-time">00:00 AM</div>
        </div>

        <!-- BOTTOM LINE (White Background, Red Hints) -->
        <div class="ticker-line line-bottom">
            <div class="hint-box red-hint">UPCOMING</div>
            <div class="content-area">
                <div class="step-info">
                    <div class="step-item active" id="u1">Next: Match 2 Live Soon</div>
                    <div class="step-item" id="u2">Stay Tuned for Semi Final</div>
                </div>
            </div>
            <div class="hint-box red-hint">PRIZES</div>
            <div class="content-area">
                <div class="step-info">
                    <div class="step-item active" id="p1">1st: ₹51,000 | 2nd: ₹31,000</div>
                    <div class="step-item" id="p2">Best Raider: ₹5,100</div>
                </div>
            </div>
            <div class="corner-box c-red" id="live-date">01/05/2026</div>
        </div>

    </div>

<script>
    // Firebase Connection
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Scoreboard Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    // 2. Time & Date Sync
    function updateClock() {
        const now = new Date();
        document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 3. Ticker Data Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tournament-name').innerText = d.tournamentName || "LIVE TOURNAMENT";
        document.getElementById('match-teams').innerText = (d.nameA || "TEAM A") + " VS " + (d.nameB || "TEAM B");
        document.getElementById('p1').innerText = "1st: " + (d.prizes || "₹51,000") + " | 2nd: " + (d.prizes2 || "₹31,000");
    });

    // 4. Rotation Logic
    let step = 0;
    setInterval(() => {
        const uItems = [document.getElementById('u1'), document.getElementById('u2')];
        const pItems = [document.getElementById('p1'), document.getElementById('p2')];
        
        uItems[step].classList.remove('active');
        pItems[step].classList.remove('active');
        
        step = (step + 1) % 2;
        
        uItems[step].classList.add('active');
        pItems[step].classList.add('active');
    }, 5000);

</script>
</body>
</html>
