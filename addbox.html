<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Manpreet Mudki - Ticker Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #footer-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ticker-line { display: flex; height: 35px; align-items: center; overflow: hidden; }
        
        .hint-box {
            height: 100%;
            min-width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .line-top { background: #b31217; color: white; }
        .white-hint { background: white; color: #b31217; }
        
        .line-bottom { background: white; color: #b31217; }
        .red-hint { background: #b31217; color: white; }

        .content-area { flex: 1; font-size: 20px; font-weight: bold; padding: 0 15px; white-space: nowrap; display: flex; align-items: center; overflow: hidden; }

        .corner-box { width: 140px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; }
        .c-white { background: white; color: #b31217; }
        .c-red { background: #b31217; color: white; }

        .step-info { position: relative; height: 100%; flex: 1; display: flex; align-items: center; }
        .step-item { position: absolute; width: 100%; opacity: 0; transform: translateX(15px); transition: all 0.5s ease; }
        .step-item.active { opacity: 1; transform: translateX(0); }
    </style>
</head>
<body>

    <div id="footer-container">
        <!-- TOP LINE (Live & Match) -->
        <div class="ticker-line line-top">
            <div class="hint-box white-hint">LIVE ></div>
            <div class="content-area" id="disp-tour">LOADING...</div>
            <div class="hint-box white-hint">MATCH ></div>
            <div class="content-area" id="disp-match">TEAM A VS TEAM B</div>
            <div class="corner-box c-white" id="live-time">00:00 AM</div>
        </div>

        <!-- BOTTOM LINE (Upcoming & Prizes) -->
        <div class="ticker-line line-bottom">
            <div class="hint-box red-hint">UPCOMING ></div>
            <div class="content-area">
                <div class="step-info">
                    <div class="step-item active" id="disp-next">Updating...</div>
                    <div class="step-item" id="disp-teams">Teams Loading...</div>
                </div>
            </div>
            <div class="hint-box red-hint">PRIZES ></div>
            <div class="content-area">
                <div class="step-info">
                    <div class="step-item active" id="disp-prize">Prize Info</div>
                    <div class="step-item" id="disp-contact">Contact Info</div>
                </div>
            </div>
            <div class="corner-box c-red" id="live-date">01/05/2026</div>
        </div>
    </div>

<script>
    // ਪੈਨਲ ਵਾਲਾ ਸਹੀ Firebase ਲਿੰਕ
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // 1. ਮੈਚ ਦਾ ਡਾਟਾ (Teams)
    db.ref("matchData").on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('disp-match').innerText = (data.nameA || "TEAM A") + " VS " + (data.nameB || "TEAM B");
    });

    // 2. ਟਿਕਰ ਦਾ ਡਾਟਾ (Tournament, Prizes, etc.)
    db.ref("tickerData").on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('disp-tour').innerText = data.tournamentName || "LIVE TOURNAMENT";
        document.getElementById('disp-prize').innerText = data.prizes || "Prizes Loading...";
        document.getElementById('disp-next').innerText = data.nextProgram || "Next Match Soon";
        document.getElementById('disp-teams').innerText = data.participatingTeams || "Participating Teams";
        document.getElementById('disp-contact').innerText = data.contact || "";
        
        // ਓਹਲੇ (Hide/Show) ਲੋਜਿਕ
        document.getElementById('footer-container').style.display = data.tickerVis === false ? 'none' : 'flex';
    });

    // 3. ਘੜੀ (Clock)
    function updateClock() {
        const now = new Date();
        document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 4. ਐਨੀਮੇਸ਼ਨ (Rotation)
    let step = 0;
    setInterval(() => {
        const upcomingItems = [document.getElementById('disp-next'), document.getElementById('disp-teams')];
        const prizeItems = [document.getElementById('disp-prize'), document.getElementById('disp-contact')];
        
        upcomingItems[step].classList.remove('active');
        prizeItems[step].classList.remove('active');
        
        step = (step + 1) % 2;
        
        upcomingItems[step].classList.add('active');
        prizeItems[step].classList.add('active');
    }, 6000); // 6 ਸਕਿੰਟ ਬਾਅਦ ਬਦਲੇਗਾ
</script>
</body>
</html>
