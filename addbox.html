<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Top Left Scoreboard & Bottom Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Rajdhani', sans-serif; }

        /* 1. TOP LEFT SCOREBOARD */
        #scoreboard-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            border-left: 5px solid #f1c40f;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            min-width: 300px;
            border-radius: 4px;
            overflow: hidden;
        }

        .match-meta {
            background: #f1c40f;
            color: #000;
            font-size: 12px;
            font-weight: 800;
            padding: 2px 10px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .team-row {
            display: flex;
            align-items: center;
            height: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .team-color { width: 8px; height: 100%; }

        .team-name {
            flex: 1;
            color: white;
            padding-left: 10px;
            font-size: 20px;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        .score-val {
            background: #fff;
            color: #000;
            width: 50px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 900;
        }

        /* 2. BOTTOM TICKER */
        #ticker-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            border-top: 3px solid #238636;
        }

        .ticker-label {
            background: #238636;
            color: white;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            white-space: nowrap;
        }

        marquee {
            color: white;
            font-size: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Top Left Scoreboard -->
    <div id="scoreboard-top-left">
        <div class="match-meta">
            <span id="disp-round">TOURNAMENT</span>
            <span id="timer-text">00:00</span>
        </div>
        
        <div class="team-row">
            <div id="colorA" class="team-color"></div>
            <div id="nameA" class="team-name">TEAM A</div>
            <div id="scoreA" class="score-val">0</div>
        </div>

        <div class="team-row">
            <div id="colorB" class="team-color"></div>
            <div id="nameB" class="team-name">TEAM B</div>
            <div id="scoreB" class="score-val">0</div>
        </div>
    </div>

    <!-- Bottom Ticker -->
    <div id="ticker-container">
        <div class="ticker-label">LIVE UPDATE</div>
        <marquee id="ticker-msg" scrollamount="6"></marquee>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Sync Data
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        
        // Names & Scores
        document.getElementById('nameA').innerText = d.nameA || "TEAM A";
        document.getElementById('nameB').innerText = d.nameB || "TEAM B";
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        
        // Colors
        document.getElementById('colorA').style.backgroundColor = d.colorA || "#ff0000";
        document.getElementById('colorB').style.backgroundColor = d.colorB || "#0000ff";

        // Meta & Timer
        document.getElementById('disp-round').innerText = (d.matchRound || "LIVE") + " | " + (d.round || "");
        document.getElementById('timer-text').innerText = d.matchTime || "00:00";

        // Visibility
        document.getElementById('scoreboard-top-left').style.display = d.scoreVisible ? "flex" : "none";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        const msg = `${d.tournamentName || ""} • NEXT: ${d.nextProgram || ""} • PARTICIPATING TEAMS: ${d.participatingTeams || ""}`;
        document.getElementById('ticker-msg').innerText = msg;
        document.getElementById('ticker-container').style.display = d.tickerVis ? "flex" : "none";
    });
</script>
</body>
</html>
