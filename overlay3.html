<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Kabaddi Overlay - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Segoe UI', Arial, sans-serif; }

        /* MAIN BOTTOM CONTAINER */
        .bottom-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; height: 60px; display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.9); border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333;
            overflow: hidden; opacity: 0; transition: 0.5s;
        }

        /* LIVE BADGE */
        .live-tag {
            background: #da3633; color: white; height: 100%; padding: 0 20px;
            display: flex; align-items: center; font-weight: 900; font-size: 18px;
            letter-spacing: 1px; position: relative; z-index: 10;
        }
        .live-tag::after { content: ''; position: absolute; right: -15px; border-left: 15px solid #da3633; border-top: 30px solid transparent; border-bottom: 30px solid transparent; }

        /* TEAM SCORE SECTION */
        .score-section {
            display: flex; align-items: center; padding: 0 40px; min-width: 450px;
            background: linear-gradient(90deg, #161b22, #0d1117); height: 100%;
        }
        .t-name { color: white; font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .t-score { 
            background: #f39c12; color: #000; padding: 5px 15px; border-radius: 4px;
            font-size: 32px; font-weight: 900; margin: 0 15px; min-width: 50px; text-align: center;
        }
        .vs { color: #8b949e; font-size: 14px; font-weight: bold; }

        /* FLASHING INFO BOX (Right Side) */
        .flash-info {
            flex: 1; height: 100%; position: relative; background: #f39c12;
            display: flex; align-items: center; padding-left: 30px;
            color: #000; font-weight: 800; font-size: 20px; text-transform: uppercase;
        }
        .flash-info::before { content: ''; position: absolute; left: 0; border-left: 20px solid #0d1117; border-top: 30px solid transparent; border-bottom: 30px solid transparent; }

        /* ANIMATION FOR FLASHING TEXT */
        .animate-text {
            position: absolute; width: 100%; opacity: 0;
            transform: translateY(20px); transition: 0.5s ease-in-out;
        }
        .animate-text.active { opacity: 1; transform: translateY(0); }

        /* WING BOX (WINNERS - Floating Style) */
        .wing-float {
            position: absolute; bottom: 90px; left: 2.5%; width: 250px;
            background: rgba(0,0,0,0.85); border-radius: 8px; border-left: 5px solid #238636;
            padding: 10px; color: white; transition: 0.5s; opacity: 0; transform: translateX(-20px);
        }
        .wing-float.show { opacity: 1; transform: translateX(0); }
        .wing-title { color: #238636; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .win-team { font-size: 16px; margin-bottom: 3px; color: #f39c12; }

    </style>
</head>
<body>

    <div id="wing-box" class="wing-float">
        <div class="wing-title">🏆 Jitu Teams (Wing Box)</div>
        <div id="winners-list"></div>
    </div>

    <div id="bottom-bar" class="bottom-bar">
        <div class="live-tag">LIVE</div>

        <div class="score-section">
            <div class="t-name" id="nameA">TEAM A</div>
            <div class="t-score" id="scoreA">0</div>
            <div class="vs">VS</div>
            <div class="t-score" id="scoreB">0</div>
            <div class="t-name" id="nameB">TEAM B</div>
        </div>

        <div class="flash-info">
            <div id="flash-1" class="animate-text active">🏆 <span id="tour-display">Tournament Name</span></div>
            <div id="flash-2" class="animate-text">💰 Prize: <span id="prize-display">₹0</span></div>
            <div id="flash-3" class="animate-text">⏭ Next: <span id="next-display">Upcoming Match</span></div>
            <div id="flash-4" class="animate-text">📞 Help: <span id="booking-display">98765-XXXXX</span></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    // Flash Animation Logic
    let currentFlash = 1;
    function rotateFlash() {
        document.querySelectorAll('.animate-text').forEach(el => el.classList.remove('active'));
        document.getElementById('flash-' + currentFlash).classList.add('active');
        currentFlash = currentFlash >= 4 ? 1 : currentFlash + 1;
    }
    setInterval(rotateFlash, 4000); // Change text every 4 seconds

    db.on("value", (snap) => {
        const data = snap.val() || {};
        
        // Show/Hide Elements
        document.getElementById('bottom-bar').style.opacity = data.scoreVisible ? "1" : "0";
        const wing = document.getElementById('wing-box');
        if(data.wingVisible) wing.classList.add('show'); else wing.classList.remove('show');

        // Update Scores
        document.getElementById('nameA').innerText = data.nameA || "TEAM A";
        document.getElementById('nameB').innerText = data.nameB || "TEAM B";
        document.getElementById('scoreA').innerText = data.scoreA || 0;
        document.getElementById('scoreB').innerText = data.scoreB || 0;

        // Update Info
        document.getElementById('tour-display').innerText = data.tourName || "KABADDI CUP";
        document.getElementById('prize-display').innerText = data.prize || "TBD";
        document.getElementById('next-display').innerText = data.nextMatch || "TBD";
        document.getElementById('booking-display').innerText = data.watermark || "Contact Admin";

        // Update Winners
        const winners = data.winnersData || [];
        document.getElementById('winners-list').innerHTML = winners.map(w => `<div class="win-team">● ${w.name}</div>`).join('');
    });
</script>
</body>
</html>
