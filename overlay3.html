<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Channel Overlay - Design 1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Montserrat', 'Arial Black', sans-serif; }

        /* The master container at the bottom */
        .master-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px;
            overflow: hidden; /* Crucial for animation */
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }

        /* Container that moves up/down */
        .sliding-content {
            width: 100%; height: 140px; /* Two strips height */
            display: flex; flex-direction: column;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        /* General strip style */
        .strip { width: 100%; height: 70px; display: flex; align-items: center; position: relative; }

        /* --- STRIP 1: MODERN SCOREBOARD --- */
        .score-strip { background: linear-gradient(180deg, #1a1d21 0%, #0d0f12 100%); }
        .score-strip::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }

        .team-block { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; position: relative; }
        .t-name { color: white; font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 0 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .score-block { 
            width: 100px; height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 48px; font-weight: 900; color: #000;
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
            position: relative;
        }
        .score-block::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.3); }

        .vs-divider { 
            width: 60px; height: 100%; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 900;
            position: relative;
        }
        .vs-divider::before { content: ''; position: absolute; top: 0; left: 0; width: 1px; height: 100%; background: #ccc; }

        /* --- STRIP 2: INFO FLASH (Always Active) --- */
        .info-strip { background: linear-gradient(90deg, #238636, #1d6e30); }
        .info-strip::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #fff; }
        
        .info-label { background: #000; color: #fff; padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 14px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .flash-wrap { flex: 1; position: relative; height: 100%; display: flex; align-items: center; padding-left: 20px; }
        
        .flash-text { position: absolute; opacity: 0; transform: translateY(10px); transition: all 0.8s ease; font-weight: 800; font-size: 22px; color: white; text-transform: uppercase;}
        .flash-text.active { opacity: 1; transform: translateY(0); }

        /* ANIMATION TRIGGERS */
        .master-bar.hide-score .sliding-content { transform: translateY(-70px); } /* Slide down to show info */
    </style>
</head>
<body>

    <div id="main-bar" class="master-bar">
        <div class="sliding-content">
            
            <div class="strip score-strip">
                <div class="team-block">
                    <div class="t-name" id="nameA">TEAM A</div>
                    <div class="score-block" id="scoreA">0</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="team-block">
                    <div class="score-block" id="scoreB">0</div>
                    <div class="t-name" id="nameB">TEAM B</div>
                </div>
            </div>
            
            <div class="strip info-strip">
                <div class="info-label">LIVE UPDATE</div>
                <div class="flash-wrap">
                    <div class="flash-text active" id="f1">🏆 <span id="tour-val">LOADING...</span></div>
                    <div class="flash-text" id="f2">💰 PRIZE: ₹<span id="prize-val">0</span></div>
                    <div class="flash-text" id="f3">⏭ NEXT: <span id="next-val">---</span></div>
                    <div class="flash-text" id="f4">📞 HELP: <span id="help-val">---</span></div>
                </div>
            </div>

        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    // Flash Text Logic
    let flashIdx = 1;
    setInterval(() => {
        document.querySelectorAll('.flash-text').forEach(t => t.classList.remove('active'));
        document.getElementById('f' + flashIdx).classList.add('active');
        flashIdx = flashIdx >= 4 ? 1 : flashIdx + 1;
    }, 5000); // 5 seconds per message

    db.on("value", (snap) => {
        const data = snap.val() || {};
        const bar = document.getElementById('main-bar');

        // SLOW SLIDE LOGIC: If scoreVisible is false, slide score UP
        if (data.scoreVisible) {
            bar.classList.remove('hide-score');
        } else {
            bar.classList.add('hide-score');
        }

        // UPDATE CONTENT
        document.getElementById('nameA').innerText = data.nameA || "---";
        document.getElementById('nameB').innerText = data.nameB || "---";
        document.getElementById('scoreA').innerText = data.scoreA || 0;
        document.getElementById('scoreB').innerText = data.scoreB || 0;
        document.getElementById('tour-val').innerText = data.tourName || "KABADDI CUP";
        document.getElementById('prize-val').innerText = data.prize || "---";
        document.getElementById('next-val').innerText = data.nextMatch || "TBD";
        document.getElementById('help-val').innerText = data.watermark || "---";
    });
</script>
</body>
</html>
