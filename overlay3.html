<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Strip Overlay - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Arial Black', sans-serif; }

        .main-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; display: flex; flex-direction: column; gap: 5px;
        }

        /* STRIP 1: SCORE or SPONSORS */
        .top-strip {
            height: 60px; background: rgba(0, 0, 0, 0.9); border-radius: 8px 8px 0 0;
            display: flex; align-items: center; overflow: hidden; border-bottom: 2px solid #f39c12;
            position: relative;
        }

        /* Score Layout */
        .score-layout {
            display: flex; width: 100%; height: 100%; align-items: center;
            transition: 0.5s; position: absolute;
        }
        .t-name { flex: 1; text-align: center; color: white; font-size: 22px; text-transform: uppercase; }
        .t-score { background: #f39c12; color: #000; width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; }

        /* Sponsor Flash Layout (Shows when score is hidden) */
        .sponsor-layout {
            width: 100%; height: 100%; background: #161b22; color: #f39c12;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; text-transform: uppercase; transition: 0.5s;
            position: absolute; transform: translateY(100%);
        }

        /* STRIP 2: INFO FLASH (Always Active) */
        .bottom-strip {
            height: 45px; background: #f39c12; border-radius: 0 0 8px 8px;
            display: flex; align-items: center; overflow: hidden; color: #000;
        }
        .info-label { background: #000; color: #fff; height: 100%; padding: 0 15px; display: flex; align-items: center; font-size: 14px; font-weight: bold; }
        .info-content { flex: 1; padding-left: 20px; font-size: 20px; position: relative; height: 100%; display: flex; align-items: center; }
        
        .f-text { position: absolute; opacity: 0; transform: translateX(20px); transition: 0.5s; white-space: nowrap; }
        .f-text.active { opacity: 1; transform: translateX(0); }

        /* VISIBILITY LOGIC */
        .hide-score .score-layout { transform: translateY(-100%); opacity: 0; }
        .hide-score .sponsor-layout { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="main-wrap" class="main-container">
        
        <div class="top-strip">
            <div class="score-layout">
                <div class="t-name" id="nameA">TEAM A</div>
                <div class="t-score" id="scoreA">0</div>
                <div style="background:#fff; color:#000; padding:0 10px; height:100%; display:flex; align-items:center; font-size:12px;">VS</div>
                <div class="t-score" id="scoreB">0</div>
                <div class="t-name" id="nameB">TEAM B</div>
            </div>
            <div class="sponsor-layout" id="sponsor-text">
                THANKS FOR WATCHING - LIVE FROM MUDKI
            </div>
        </div>

        <div class="bottom-strip">
            <div class="info-label">LIVE UPDATE</div>
            <div class="info-content">
                <div class="f-text active" id="f1">🏆 <span id="tour-val">TOURNAMENT</span></div>
                <div class="f-text" id="f2">💰 PRIZE: <span id="prize-val">0</span></div>
                <div class="f-text" id="f3">⏭ NEXT: <span id="next-val">---</span></div>
                <div class="f-text" id="f4">📞 HELP: <span id="help-val">---</span></div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    // Bottom Strip Rotation
    let flashIdx = 1;
    setInterval(() => {
        document.querySelectorAll('.f-text').forEach(t => t.classList.remove('active'));
        document.getElementById('f' + flashIdx).classList.add('active');
        flashIdx = flashIdx >= 4 ? 1 : flashIdx + 1;
    }, 4000);

    // Sponsor Text Rotation (If Score Hidden)
    const sponsors = ["DONATED BY: MANPREET MUDKI", "LIVE KABADDI CUP 2026", "SUBSCRIBE OUR CHANNEL"];
    let spIdx = 0;
    setInterval(() => {
        spIdx = (spIdx + 1) % sponsors.length;
        document.getElementById('sponsor-text').innerText = sponsors[spIdx];
    }, 6000);

    db.on("value", (snap) => {
        const data = snap.val() || {};
        
        // Handle Score Visibility
        const wrap = document.getElementById('main-wrap');
        if (data.scoreVisible) {
            wrap.classList.remove('hide-score');
        } else {
            wrap.classList.add('hide-score');
        }

        // Update Scores/Names
        document.getElementById('nameA').innerText = data.nameA || "---";
        document.getElementById('nameB').innerText = data.nameB || "---";
        document.getElementById('scoreA').innerText = data.scoreA || 0;
        document.getElementById('scoreB').innerText = data.scoreB || 0;

        // Update Bottom Info
        document.getElementById('tour-val').innerText = data.tourName || "KABADDI CUP";
        document.getElementById('prize-val').innerText = data.prize || "---";
        document.getElementById('next-val').innerText = data.nextMatch || "TBD";
        document.getElementById('help-val').innerText = data.watermark || "---";
    });
</script>
</body>
</html>
