<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoreboard Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* LOGIN & STATUS BAR */
        .status-bar { background: #1a1d21; border: 1px solid #333; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 10px; border-left: 5px solid #f39c12; align-items: center; width: 100%; max-width: 500px; box-sizing: border-box; }
        .help-box { background: white; color: black; padding: 6px 12px; border-radius: 6px; font-weight: 950; font-size: 14px; text-decoration: none; }
        .status-val { font-size: 13px; font-weight: 900; color: #2ecc71; text-transform: uppercase; }
        
        /* CARD STYLES */
        .card { background: #1a1d21; width: 100%; max-width: 500px; border-radius: 15px; border: 1px solid #333; overflow: hidden; margin-bottom: 20px; box-sizing: border-box;}
        .header { background: #1a73e8; color: white; padding: 12px; text-align: center; font-size: 16px; font-weight: bold; text-transform: uppercase; }
        .teams-container { display: flex; padding: 15px; gap: 10px; border-bottom: 2px solid #333; }
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-input { width: 95%; padding: 8px; border: 1px solid #444; background: #0d1117; color: white; border-radius: 6px; font-size: 15px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        .score-val { font-size: 50px; font-weight: 900; color: #f39c12; margin: 5px 0; }
        
        .btn-pm { border: none; color: white; padding: 12px; border-radius: 6px; font-size: 24px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 4px; }
        .btn-plus { background: #28a745; } .btn-minus { background: #dc3545; }
        
        .settings-section { padding: 15px; background: #111; box-sizing: border-box; }
        textarea, .std-input { width: 100%; padding: 10px; border: 1px solid #444; background: #0d1117; color: white; border-radius: 6px; font-size: 14px; margin-bottom: 12px; resize: none; box-sizing: border-box; }
        
        .controls { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .btn-full { border: none; color: white; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        .btn-blue { background: #1a73e8; } .btn-yellow { background: #fbbc05; color: #000; } .btn-red { background: #ea4335; } .btn-dark { background: #333; }
        .btn-recharge { background: #f39c12; color: black; margin-bottom: 15px; }

        /* RECHARGE MODAL */
        #recharge-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 15px; overflow-y: auto; }
        .modal-content { background: #1a1d21; padding: 20px; border-radius: 15px; border: 2px solid #f39c12; max-width: 400px; margin: 10px auto; }
        .plan-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .plan-card b { font-size: 30px; color: #2ecc71; display: block; margin-bottom: 15px; }
        .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pay-btn { padding: 12px 5px; border-radius: 8px; color: white; text-decoration: none; font-size: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .gp { background: #4285F4; } .pp { background: #5f259f; } .pt { background: #00baf2; }
    </style>
</head>
<body>

<div id="login-box" style="max-width:400px; margin:80px auto; text-align:center; background:#1a1d21; padding:25px; border-radius:15px; border:1px solid #333;">
    <h2 style="color:#f39c12; font-weight:900;">SCOREBOARD LOGIN</h2>
    <input type="password" id="adminPass" placeholder="ਪਾਸਵਰਡ ਭਰੋ..." style="width:100%; padding:12px; background:#0d1117; border:1px solid #444; color:white; border-radius:8px; margin-bottom:15px;">
    <button onclick="handleManualLogin()" class="btn-full btn-yellow" style="padding:15px;">ENTER CONTROL</button>
</div>

<div id="main-content" style="display:none; width: 100%; max-width: 500px;">
    <div class="status-bar">
        <div><span style="font-size:10px; color:#888;">HELPLINE:</span><br>
            <a href="tel:+918699640061" class="help-box">📞 CALL HELP</a>
        </div>
        <div style="text-align: right;"><span style="font-size:10px; color:#888;">EXPIRY:</span><br><div id="expDisp" class="status-val">--</div></div>
    </div>

    <button class="btn-full btn-recharge" onclick="toggleRecharge(true)">💳 RECHARGE / EXTEND PLAN</button>

    <div id="admin-controls-wrapper">
        <div class="card">
            <div class="header">Live Score Board</div>
            <div class="teams-container">
                <div class="team-box">
                    <input type="text" id="nameA" class="team-input" placeholder="TEAM 1" oninput="updateDB()">
                    <div class="score-val" id="dispA">0</div>
                    <div style="display:flex; width:100%;">
                        <button class="btn-pm btn-minus" onclick="changeScore('scoreA', -1)">-</button>
                        <button class="btn-pm btn-plus" onclick="changeScore('scoreA', 1)">+</button>
                    </div>
                </div>
                <div style="display:flex; align-items:center; font-weight:bold; color:#444;">VS</div>
                <div class="team-box">
                    <input type="text" id="nameB" class="team-input" placeholder="TEAM 2" oninput="updateDB()">
                    <div class="score-val" id="dispB">0</div>
                    <div style="display:flex; width:100%;">
                        <button class="btn-pm btn-minus" onclick="changeScore('scoreB', -1)">-</button>
                        <button class="btn-pm btn-plus" onclick="changeScore('scoreB', 1)">+</button>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button id="visBtn" class="btn-full btn-red" onclick="toggleVis('scoreVisible')">Show/Hide Scoreboard</button>
                <button class="btn-full btn-yellow" onclick="swapTeams()">Swap Teams</button>
                <button class="btn-full btn-dark" onclick="resetScores()">Reset Scores</button>
                <input type="text" id="roundInp" class="std-input" style="text-align:center; margin-top:10px;" placeholder="ROUND (e.g. 1st Semi Final)" oninput="updateDB()">
            </div>
        </div>

        <div class="card">
            <div class="header">Ticker & Branding</div>
            <div class="settings-section">
                <textarea id="row1Inp" rows="2" placeholder="Ticker Line 1" oninput="updateDB()"></textarea>
                <textarea id="row2Inp" rows="2" placeholder="Ticker Line 2" oninput="updateDB()"></textarea>
                <textarea id="row3Inp" rows="2" placeholder="Ticker Line 3" oninput="updateDB()"></textarea>
                <button id="tickVisBtn" class="btn-full btn-blue" onclick="toggleVis('tickerVisible')">Show/Hide Ticker</button>
                <input type="text" id="watermarkInp" class="std-input" placeholder="Channel Name / Watermark" oninput="updateDB()" style="margin-top:10px;">
                <button id="logoBtn" class="btn-full btn-dark" onclick="toggleVis('logoVisible')">Show/Hide Logo</button>
            </div>
        </div>
        <button onclick="logout()" style="width:100%; padding:10px; background:#333; border:none; color:#777; border-radius:8px; font-size:12px; margin-bottom:20px;">LOGOUT (Clear Saved Password)</button>
    </div>

    <div id="expire-msg" style="display:none; text-align:center; padding:40px 20px; background:#1a1d21; border-radius:12px; border:1px solid #dc3545;">
        <i class="fas fa-exclamation-triangle" style="font-size:40px; color:#dc3545; margin-bottom:15px;"></i>
        <h2 style="color:#dc3545;">PLAN EXPIRED</h2>
        <p>ਕਿਰਪਾ ਕਰਕੇ ਵਰਤੋਂ ਜਾਰੀ ਰੱਖਣ ਲਈ ਰਿਚਾਰਜ ਕਰੋ।</p>
    </div>
</div>

<div id="recharge-modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:#f39c12; margin-bottom:20px;">CHOOSE RECHARGE PLAN</h3>
        <div id="plans-container"></div>
        <button onclick="toggleRecharge(false)" style="width:100%; margin-top:10px; padding:15px; background:#444; color:white; border:none; border-radius:10px; font-weight:bold;">CLOSE</button>
    </div>
</div>

<script>
    // --- CONFIG ---
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");
    const userRef = firebase.database().ref("users"); // Admin logic checks from here

    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id') || 'default';
    let curA = 0, curB = 0, sVis = true, tVis = true, lVis = true;
    let isExpired = false;

    // --- AUTO LOGIN ---
    window.onload = function() {
        const savedPass = localStorage.getItem('admin_pass_score_' + userID);
        if(savedPass) checkLogin(savedPass);
    }

    function handleManualLogin() {
        const pass = document.getElementById('adminPass').value;
        checkLogin(pass);
    }

    function checkLogin(pass) {
        // Checking against users table for password and expiry
        userRef.child(userID).once('value', snap => {
            const userData = snap.val();
            if(userData && userData.password === pass) {
                localStorage.setItem('admin_pass_score_' + userID, pass);
                
                const expiryDate = new Date(userData.expiry);
                const now = new Date();
                
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";

                if (now > expiryDate) {
                    isExpired = true;
                    document.getElementById('admin-controls-wrapper').style.display = "none";
                    document.getElementById('expire-msg').style.display = "block";
                    document.getElementById('expDisp').style.color = "red";
                    document.getElementById('expDisp').innerText = "EXPIRED";
                } else {
                    document.getElementById('expDisp').innerText = expiryDate.toLocaleDateString();
                    loadMatchData();
                }
                setupPlans();
            } else {
                alert("Incorrect Password!");
                localStorage.removeItem('admin_pass_score_' + userID);
            }
        });
    }

    function loadMatchData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = parseFloat(data.scoreA) || 0; 
                curB = parseFloat(data.scoreB) || 0;
                sVis = !!data.scoreVisible; tVis = !!data.tickerVisible; lVis = !!data.logoVisible;
                
                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('roundInp').value = data.round || "";
                document.getElementById('row1Inp').value = data.row1Txt || "";
                document.getElementById('row2Inp').value = data.row2Txt || "";
                document.getElementById('row3Inp').value = data.row3Txt || "";
                document.getElementById('watermarkInp').value = data.watermarkTxt || "";
                
                updateBtnUI('visBtn', sVis, "Scoreboard");
                updateBtnUI('tickVisBtn', tVis, "Ticker");
                updateBtnUI('logoBtn', lVis, "Logo");
            }
        });
    }

    function updateBtnUI(id, val, text) {
        const btn = document.getElementById(id);
        if(btn) {
            btn.innerText = val ? "Hide " + text : "Show " + text;
            btn.style.background = val ? (id==='logoBtn'?'#333':'#dc3545') : "#28a745";
        }
    }

    function changeScore(team, val) {
        if(isExpired) return;
        let current = (team === 'scoreA' ? curA : curB);
        let newVal;
        if (val > 0) {
            if (curA === 0 && curB === 0) newVal = 1.5;
            else newVal = current + 1;
        } else {
            if (current === 1.5) newVal = 0;
            else newVal = current - 1;
            if (newVal < 0) newVal = 0;
        }
        db.update({ [team]: newVal });
    }

    function updateDB() {
        if(isExpired) return;
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            round: document.getElementById('roundInp').value,
            row1Txt: document.getElementById('row1Inp').value,
            row2Txt: document.getElementById('row2Inp').value,
            row3Txt: document.getElementById('row3Inp').value,
            watermarkTxt: document.getElementById('watermarkInp').value
        });
    }

    function toggleVis(field) {
        if(isExpired) return;
        let val = (field === 'scoreVisible') ? sVis : (field === 'tickerVisible' ? tVis : lVis);
        db.child(field).set(!val);
    }

    function swapTeams() {
        if(isExpired) return;
        db.update({ nameA: document.getElementById('nameB').value, nameB: document.getElementById('nameA').value, scoreA: curB, scoreB: curA });
    }

    function resetScores() {
        if(isExpired) return;
        if(confirm("Reset Match Scores?")) db.update({ scoreA: 0, scoreB: 0 });
    }

    function setupPlans() {
        const container = document.getElementById('plans-container');
        container.innerHTML = "";
        const plans = [
            { name: "1 DAY PLAN", price: 200, id: "1Day" },
            { name: "2 DAY PLAN", price: 300, id: "2Day" },
            { name: "1 MONTH PLAN", price: 2000, id: "1Month" }
        ];
        plans.forEach(p => {
            const upi = `pa=4kjunctionofficial@okhdfcbank&pn=Manpreet&am=${p.price}&cu=INR&tn=ScorePlan_${p.id}_ID_${userID}`;
            container.innerHTML += `
                <div class="plan-card">
                    <h2>${p.name}</h2><b>₹${p.price}</b>
                    <div class="pay-grid">
                        <a href="upi://pay?${upi}" class="pay-btn gp"><i class="fab fa-google-pay"></i>GPAY</a>
                        <a href="upi://pay?${upi}" class="pay-btn pp"><i class="fas fa-mobile-alt"></i>PHONEPE</a>
                        <a href="upi://pay?${upi}" class="pay-btn pt"><i class="fas fa-wallet"></i>PAYTM</a>
                    </div>
                </div>`;
        });
    }

    function logout() { localStorage.removeItem('admin_pass_score_' + userID); location.reload(); }
    function toggleRecharge(s) { document.getElementById('recharge-modal').style.display = s ? 'block' : 'none'; }
</script>
</body>
</html>
