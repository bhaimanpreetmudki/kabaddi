<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Live Flash & Edit</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; }
        .team-box { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        .btn-pm { border: none; color: white; padding: 8px; border-radius: 5px; font-size: 20px; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 500px;">
    
    <!-- SCORE & INSTANT CARDS -->
    <div class="card">
        <div class="header">Live Score & Instant Cards</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:10px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="Player No." style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="instantFlash('A', 'Yellow')">Yellow</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="instantFlash('A', 'Red')">Red</button>
                </div>
            </div>

            <div class="team-box" id="boxB">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:10px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="Player No." style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="instantFlash('B', 'Yellow')">Yellow</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="instantFlash('B', 'Red')">Red</button>
                </div>
            </div>
        </div>
    </div>

    <!-- EDITABLE PENALTY BOX -->
    <div class="card">
        <div class="header" style="background:#f39c12; color:#000;">Penalty Shootout (Editable)</div>
        <div style="padding:15px;">
            <div class="grid-2">
                <div>
                    <label style="font-size:10px;">Team A Penalty</label>
                    <input type="text" id="pA" class="std-input" oninput="updateMatchDB()" style="text-align:center; font-size:18px;">
                    <div class="grid-2">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pA', '✅')">Goal</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pA', '❌')">Miss</button>
                    </div>
                </div>
                <div>
                    <label style="font-size:10px;">Team B Penalty</label>
                    <input type="text" id="pB" class="std-input" oninput="updateMatchDB()" style="text-align:center; font-size:18px;">
                    <div class="grid-2">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pB', '✅')">Goal</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pB', '❌')">Miss</button>
                    </div>
                </div>
            </div>
            <div class="grid-2" style="margin-top:15px;">
                <button id="pVisBtn" class="card-btn" style="background:#f39c12; color:#000;" onclick="togglePenaltyVis()">Show Penalty</button>
                <button class="card-btn" style="background:#333;" onclick="resetPenalty()">Reset All</button>
            </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const matchRef = firebase.database().ref("matchData");

    let curA = 0, curB = 0, pVis = false;

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    // Instant Flash for Cards
    function instantFlash(team, type) {
        let pNum = document.getElementById('player' + team).value;
        if(!pNum) { alert("ਪਲੇਅਰ ਨੰਬਰ ਭਰੋ!"); return; }
        
        matchRef.update({
            flashType: type,
            flashTeam: team,
            flashPlayer: pNum,
            triggerFlash: Date.now() // Timestamp to trigger animation on overlay
        });
    }

    // Editable Penalty logic
    function addPenalty(id, icon) {
        let inp = document.getElementById(id);
        inp.value = inp.value + icon;
        updateMatchDB();
    }

    function togglePenaltyVis() { matchRef.child('penaltyVisible').set(!pVis); }
    function resetPenalty() { matchRef.update({ penaltyA: "", penaltyB: "" }); }

    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        pVis = !!data.scoreVisible; // Linking with your visibility toggle
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('pA').value = data.penaltyA || "";
        document.getElementById('pB').value = data.penaltyB || "";
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
    });
</script>
</body>
</html>
