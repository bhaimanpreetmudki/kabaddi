<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi All-in-One Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #drag-container { width: 100%; max-width: 600px; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; }
        .header-flex { background: #f39c12; color: #000; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .header-title { font-weight: 900; text-transform: uppercase; font-size: 11px; }
        .upd-btn-small { background: #000; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .p-15 { padding: 12px; }
        
        /* Score Box Styles */
        .score-container { background: #0d1117; border: 2px solid #f39c12; border-radius: 15px; padding: 15px; margin-bottom: 10px; text-align: center; }
        .score-val { font-size: 55px; font-weight: 900; color: #f39c12; margin: 5px 0; }
        
        input, select, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 6px; margin-bottom: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 5px; font-size: 10px; }
        .btn-green { background: #238636; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 120px; overflow-y: auto; padding: 8px; font-size: 12px; }
        .list-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; }
        .handle { margin-right: 8px; color: #555; }
    </style>
</head>
<body>

<div id="drag-container">

    <div class="card" data-id="score">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> LIVE SCORE CONTROL</span>
            <button id="scoreVisBtn" class="upd-btn-small" onclick="toggleVis('scoreVisible')">Show Board</button>
        </div>
        <div class="p-15">
            <div class="score-container">
                <div class="grid-2">
                    <input type="text" id="nameA" placeholder="TEAM 1" oninput="updateDB('names')">
                    <input type="text" id="nameB" placeholder="TEAM 2" oninput="updateDB('names')">
                </div>
                <div class="grid-2" style="align-items: center;">
                    <div>
                        <div class="score-val" id="dispA">0</div>
                        <div style="display:flex; gap:5px;"><button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button></div>
                    </div>
                    <div style="font-weight:900; color:#f39c12;">VS</div>
                    <div>
                        <div class="score-val" id="dispB">0</div>
                        <div style="display:flex; gap:5px;"><button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button></div>
                    </div>
                </div>
            </div>
            <div class="grid-2">
                <button class="btn btn-blue" onclick="swapNames()">Team Swipe</button>
                <button class="btn btn-blue" onclick="swapFull()">Full Swipe</button>
            </div>
            <div class="grid-2">
                <button class="btn btn-red" onclick="confirmAction('resetScore')">Reset Score</button>
                <button class="btn btn-green" onclick="confirmAction('winner')">🏆 Win & Add Box</button>
            </div>
        </div>
    </div>

    <div class="card" data-id="info">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> ROUND & TOURNAMENT</span>
            <button class="upd-btn-small" onclick="confirmAction('updateInfo')">Update</button>
        </div>
        <div class="p-15">
            <div class="grid-2">
                <select id="roundSel">
                    <option value="First Round">First Round</option>
                    <option value="Quarter Final">Quarter Final</option>
                    <option value="Semi Final">Semi Final</option>
                    <option value="Final Match">Final Match</option>
                </select>
                <input type="text" id="customRound" placeholder="Custom Round">
            </div>
            <div class="grid-2">
                <input type="text" id="tourName" placeholder="Tournament Name">
                <input type="text" id="prizeInp" placeholder="Prize Details">
            </div>
        </div>
    </div>

    <div class="card" data-id="lists">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> UPCOMING & TEAM LIST</span>
            <button id="listVisBtn" class="upd-btn-small" onclick="toggleVis('listVisible')">Show List</button>
        </div>
        <div class="p-15">
            <small style="color:#f39c12;">UPCOMING PROGRAMS / NEXT MATCHES</small>
            <textarea id="upcomingInp" placeholder="Next Match: Team X vs Team Y..." style="height:60px;"></textarea>
            
            <div class="grid-2" style="margin-top:10px;">
                <div>
                    <small style="color:#f39c12;">TEAM LIST & TYIAN</small>
                    <textarea id="manualTyan" placeholder="Enter Teams (One per line)" style="height:50px;" oninput="syncTeamArray()"></textarea>
                    <div id="playingList" class="box-list"></div>
                </div>
                <div>
                    <small style="color:#f39c12;">WING BOX (WINNERS)</small>
                    <div id="winnerList" class="box-list" style="height:125px;"></div>
                    <button class="btn btn-blue" style="margin-top:5px;" onclick="confirmAction('promote')">Promote</button>
                </div>
            </div>
            <button class="btn btn-red" style="margin-top:5px;" onclick="confirmAction('resetTeams')">Reset All Teams</button>
        </div>
    </div>

    <div class="card" data-id="wm">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> WATERMARK SETTINGS</span>
            <button class="upd-btn-small" onclick="confirmAction('updateWM')">Update</button>
        </div>
        <div class="p-15">
            <input type="text" id="wmText" placeholder="Watermark: e.g. LIVE MANPREET MUDKI">
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {}, allTeams = [], winners = [];

    // Drag and Drop
    new Sortable(document.getElementById('drag-container'), { animation: 150, handle: '.handle' });

    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data;
        allTeams = data.teams || [];
        winners = data.winners || [];
        
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('tourName').value = data.tourName || "";
        document.getElementById('prizeInp').value = data.prize || "";
        document.getElementById('upcomingInp').value = data.events || "";
        document.getElementById('wmText').value = data.watermark || "";
        
        document.getElementById('scoreVisBtn').innerText = data.scoreVisible ? "HIDE" : "SHOW";
        document.getElementById('listVisBtn').innerText = data.listVisible ? "HIDE LIST" : "SHOW LIST";
        renderLists();
    });

    function renderLists() {
        // Match Show (mudki vs gill)
        let matchHTML = "";
        for(let i=0; i<allTeams.length; i+=2) {
            let t1 = allTeams[i], t2 = allTeams[i+1] || "...";
            matchHTML += `<div class="list-item"><span>${(i/2)+1}. ${t1} vs ${t2}</span></div>`;
        }
        document.getElementById('playingList').innerHTML = matchHTML;
        document.getElementById('winnerList').innerHTML = winners.map(w => `<div class="list-item">🏆 ${w}</div>`).join('');
    }

    function syncTeamArray() {
        const list = document.getElementById('manualTyan').value.split('\n').filter(t => t.trim() !== "");
        db.update({ teams: list });
    }

    function changeScore(team, val) {
        let cur = status[team] || 0;
        let newVal = (val > 0) ? (cur === 0 && (status.scoreA+status.scoreB === 0) ? 1.5 : cur + 1) : Math.max(0, cur === 1.5 ? 0 : cur - 1);
        db.update({ [team]: newVal });
    }

    function confirmAction(type) {
        if(!confirm("Are you sure?")) return;
        if(type === 'resetScore') db.update({ scoreA: 0, scoreB: 0 });
        if(type === 'updateInfo') db.update({ tourName: document.getElementById('tourName').value, prize: document.getElementById('prizeInp').value, currentRound: document.getElementById('customRound').value || document.getElementById('roundSel').value });
        if(type === 'updateWM') db.update({ watermark: document.getElementById('wmText').value });
        if(type === 'resetTeams') db.update({ teams: [], winners: [] });
        if(type === 'promote') db.update({ teams: [...winners], winners: [] });
        if(type === 'winner') {
            const win = status.scoreA > status.scoreB ? status.nameA : status.nameB;
            db.update({ winners: [...winners, win], scoreA: 0, scoreB: 0, scoreVisible: false });
        }
    }

    function updateDB(type) {
        if(type === 'names') db.update({ nameA: document.getElementById('nameA').value, nameB: document.getElementById('nameB').value });
    }

    function swapNames() { db.update({ nameA: status.nameB, nameB: status.nameA }); }
    function swapFull() { db.update({ nameA: status.nameB, nameB: status.nameA, scoreA: status.scoreB, scoreB: status.scoreA }); }
    function toggleVis(key) { db.child(key).set(!status[key]); }
</script>
</body>
</html>
