<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Admin - Score Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 600px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; }
        .header-flex { background: #f39c12; color: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: 900; text-transform: uppercase; font-size: 13px; }
        .p-15 { padding: 15px; }
        
        /* SCORE SECTION STYLE */
        .score-container { background: #0d1117; border: 2px solid #f39c12; border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .team-input-row { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: center; margin-bottom: 15px; }
        .score-row { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: center; text-align: center; }
        .score-val { font-size: 60px; font-weight: 900; color: #f39c12; line-height: 1; margin: 10px 0; }
        
        input, select { width: 100%; padding: 10px; background: #1c2128; border: 1px solid #30363d; color: #fff; border-radius: 8px; text-align: center; font-size: 14px; }
        .vs-text { font-weight: 900; color: #f39c12; text-align: center; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 12px; transition: 0.2s; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .plus-minus-btns { display: flex; gap: 5px; justify-content: center; }
        .pm-btn { width: 45px; height: 45px; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-flex">
        <span class="header-title">Live Score Control</span>
        <button id="showBtn" class="btn btn-green" style="width: auto; padding: 5px 15px;" onclick="toggleVis()">Show Board</button>
    </div>
    
    <div class="p-15">
        <div class="score-container">
            <div class="team-input-row">
                <input type="text" id="nameA" placeholder="TEAM 1" oninput="updateNames()">
                <div class="vs-text">VS</div>
                <input type="text" id="nameB" placeholder="TEAM 2" oninput="updateNames()">
            </div>
            
            <div class="score-row">
                <div>
                    <div class="score-val" id="dispA">0</div>
                    <div class="plus-minus-btns">
                        <button class="btn btn-green pm-btn" onclick="changeScore('scoreA', 1)">+</button>
                        <button class="btn btn-red pm-btn" onclick="changeScore('scoreA', -1)">-</button>
                    </div>
                </div>
                <div class="vs-text"></div>
                <div>
                    <div class="score-val" id="dispB">0</div>
                    <div class="plus-minus-btns">
                        <button class="btn btn-green pm-btn" onclick="changeScore('scoreB', 1)">+</button>
                        <button class="btn btn-red pm-btn" onclick="changeScore('scoreB', -1)">-</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <button class="btn btn-blue" onclick="swapNames()">Only Team Swipe</button>
            <button class="btn btn-blue" onclick="swapFull()">Full Swipe</button>
        </div>
        
        <div class="grid-2">
            <button class="btn btn-red" onclick="resetScores()">Reset Score</button>
            <button class="btn btn-green" onclick="declareWinner()">🏆 Win & Add to Box</button>
        </div>
    </div>
</div>

<script>
    // ਫਾਇਰਬੇਸ ਕਨੈਕਸ਼ਨ (ਤੁਹਾਡਾ URL)
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {};

    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data;
        
        // ਇਨਪੁਟ ਬਾਕਸਾਂ ਵਿੱਚ ਨਾਮ ਦਿਖਾਉਣਾ
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        
        // ਸਕੋਰ ਦਿਖਾਉਣਾ
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        
        // ਬਟਨ ਦਾ ਟੈਕਸਟ
        document.getElementById('showBtn').innerText = data.scoreVisible ? "HIDE BOARD" : "SHOW BOARD";
        document.getElementById('showBtn').className = data.scoreVisible ? "btn btn-red" : "btn btn-green";
    });

    function updateNames() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value
        });
    }

    function changeScore(team, val) {
        let cur = status[team] || 0;
        let newVal;
        if(val > 0) {
            // ਪਹਿਲਾ ਨੰਬਰ 1.5 ਕਰਨ ਲਈ (ਜੇ ਦੋਵੇਂ 0 ਹੋਣ)
            newVal = (cur === 0 && (status.scoreA + status.scoreB === 0)) ? 1.5 : cur + 1;
        } else {
            newVal = Math.max(0, cur === 1.5 ? 0 : cur - 1);
        }
        db.update({ [team]: newVal });
    }

    function swapNames() {
        db.update({ nameA: status.nameB, nameB: status.nameA });
    }

    function swapFull() {
        db.update({ 
            nameA: status.nameB, nameB: status.nameA, 
            scoreA: status.scoreB, scoreB: status.scoreA 
        });
    }

    function resetScores() {
        if(confirm("ਕੀ ਸਕੋਰ ਜ਼ੀਰੋ ਕਰਨਾ ਹੈ?")) {
            db.update({ scoreA: 0, scoreB: 0 });
        }
    }

    function toggleVis() {
        db.child('scoreVisible').set(!status.scoreVisible);
    }

    function declareWinner() {
        const win = status.scoreA > status.scoreB ? status.nameA : status.nameB;
        if(confirm(win + " ਨੂੰ ਜੇਤੂ ਬਣਾ ਕੇ ਲਿਸਟ ਵਿੱਚ ਪਾ ਦੇਈਏ?")) {
            // ਇੱਥੇ ਜੇਤੂ ਲਿਸਟ ਵਿੱਚ ਡਾਟਾ ਭੇਜਣ ਦਾ ਕੋਡ
            let winners = status.winners || [];
            db.update({ 
                winners: [...winners, win],
                scoreA: 0, scoreB: 0,
                scoreVisible: false
            });
        }
    }
</script>
</body>
</html>
