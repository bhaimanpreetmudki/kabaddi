<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .card-log { margin-top: 8px; padding: 5px; background: #000; border-radius: 4px; min-height: 40px; font-size: 11px; color: #f1c40f; text-align: left; border: 1px solid #333; overflow-y: auto; max-height: 60px; }
        .std-textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; min-height: 45px; resize: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .flex-row { display: flex; gap: 5px; margin-top: 8px; }
        .label-title { font-size: 10px; color: #8b949e; display: block; margin-top: 5px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard & Cards</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none;">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="No.">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('A', 'Red')">RC</button>
                </div>
                <div id="logA" class="card-log">No Cards</div>
            </div>

            <div class="mid-controls" style="flex:1; text-align:center;">
                <button id="visBtn" class="card-btn" style="background:#238636; margin-bottom:10px;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetOnlyScore()">RESET</button>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none;">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="No.">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('B', 'Red')">RC</button>
                </div>
                <div id="logB" class="card-log">No Cards</div>
            </div>
        </div>
    </div>

    <!-- 2. UPDATED TIMER SECTION -->
    <div class="card">
        <div class="header">Timer Control</div>
        <div style="padding:12px; background:#0d1117; text-align:center;">
            <div id="timerShow" style="font-size:40px; color:#f1c40f; font-family:monospace; margin-bottom:10px;">00:00</div>
            <div class="grid-2">
                <button id="timerBtn" class="card-btn" style="background:#238636; height:45px; font-size:14px;" onclick="toggleTimer()">START</button>
                <button class="card-btn" style="background:#333; height:45px;" onclick="resetTimer()">RESET TIME</button>
            </div>
            <div class="flex-row" style="margin-top:10px;">
                <div style="flex:1;">
                    <span class="label-title">Duration (Min)</span>
                    <input type="number" id="matchDuration" class="std-input" placeholder="e.g. 20" oninput="updateMatchDB()">
                </div>
                <div style="flex:1;">
                    <span class="label-title">Match Half</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="1st Half" oninput="updateMatchDB()">
                </div>
            </div>
        </div>
    </div>

    <!-- 3. TICKER & NEXT PROGRAM -->
    <div class="card">
        <div class="header">Ticker & Tournament Info</div>
        <div style="padding:15px;">
            <button id="tickerToggleBtn" class="card-btn" style="background:#ff5722; height:40px; margin-bottom:10px;" onclick="confirmTickerAction('vis')">Ticker: ON/OFF</button>
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            <textarea id="teamsList" class="std-textarea" placeholder="Participating Teams (1. TEAM A 2. TEAM B...)" oninput="this.value = this.value.toUpperCase()"></textarea>
            <input type="text" id="nextProg" class="std-input" placeholder="Next Program">
            <button class="card-btn" style="background:#238636; padding:12px;" onclick="confirmTickerAction('info')">UPDATE TICKER</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || "default_user";

    const matchRef = db.ref("users/" + clientID + "/matchData");
    const tickerRef = db.ref("users/" + clientID + "/tickerData");

    let curA = 0, curB = 0, seconds = 0, timerInterval = null, sVis = true, tickerStatus = true;

    // --- Score & Cards Logic ---
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            duration: document.getElementById('matchDuration').value,
            round: document.getElementById('roundInp').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function handleCard(team, type) {
        let pNo = document.getElementById('player' + team).value;
        if(!pNo) return alert("ਪਲੇਅਰ ਨੰਬਰ ਭਰੋ");
        matchRef.child('cards' + team).once('value', (snap) => {
            let current = snap.val() || "";
            let icon = (type === 'Yellow' ? "🟨" : "🟥");
            matchRef.child('cards' + team).set(current + icon + "#" + pNo + " ");
        });
        document.getElementById('player' + team).value = "";
    }

    // --- Updated Timer Logic ---
    function toggleTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('timerBtn').innerText = "START";
            document.getElementById('timerBtn').style.background = "#238636";
        } else {
            document.getElementById('timerBtn').innerText = "STOP";
            document.getElementById('timerBtn').style.background = "#da3633";
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60), s = seconds % 60;
                let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
                
                document.getElementById('timerShow').innerText = timeStr;
                matchRef.child('matchTime').set(timeStr);

                // Auto Stop Logic
                let limit = parseInt(document.getElementById('matchDuration').value);
                if (limit > 0 && m >= limit) {
                    toggleTimer();
                    alert("Match Duration Complete!");
                }
            }, 1000);
        }
    }

    function resetTimer() {
        seconds = 0;
        document.getElementById('timerShow').innerText = "00:00";
        matchRef.child('matchTime').set("00:00");
        if (timerInterval) toggleTimer();
    }

    function toggleVis(field) { matchRef.child(field).set(!sVis); }

    function resetOnlyScore() {
        if(confirm("Reset Everything?")) matchRef.update({ scoreA: 0, scoreB: 0, cardsA: "", cardsB: "", matchTime: "00:00" });
    }

    // --- Ticker Logic ---
    function confirmTickerAction(type) {
        if (type === 'info') {
            tickerRef.update({
                tournamentName: tourName.value,
                nextProgram: nextProg.value,
                participatingTeams: teamsList.value
            });
            alert("Updated!");
        } else if (type === 'vis') {
            tickerStatus = !tickerStatus;
            tickerRef.child('tickerVis').set(tickerStatus);
        }
    }

    // --- Realtime Sync ---
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('logA').innerText = data.cardsA || "No Cards";
        document.getElementById('logB').innerText = data.cardsB || "No Cards";
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
        if (!timerInterval) document.getElementById('timerShow').innerText = data.matchTime || "00:00";
    });

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        tickerStatus = !!data.tickerVis;
        tickerToggleBtn.innerText = tickerStatus ? "Ticker: ON" : "Ticker: OFF";
        tickerToggleBtn.style.background = tickerStatus ? "#238636" : "#da3633";
    });
</script>
</body>
</html>
