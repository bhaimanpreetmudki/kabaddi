<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kabaddi Pro Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1113; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1a1d21; width: 100%; max-width: 550px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; overflow: hidden; }
        .header { background: #f39c12; color: black; padding: 10px; text-align: center; font-weight: 900; text-transform: uppercase; font-size: 14px; }
        .p-15 { padding: 15px; }
        
        /* 4 BOX GRID */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box-list { background: #0d1117; border: 1px solid #444; border-radius: 8px; height: 150px; overflow-y: auto; padding: 10px; font-size: 13px; }
        .box-title { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }

        /* INPUTS */
        input, textarea, select { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 5px; }
        .btn-blue { background: #1a73e8; color: white; }
        .btn-green { background: #2ecc71; color: black; }
        .btn-orange { background: #f39c12; color: black; }
        .btn-red { background: #e74c3c; color: white; }

        /* SCORE SECTION */
        .score-row { display: flex; align-items: center; justify-content: space-between; background: #21262d; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .score-val { font-size: 35px; font-weight: 900; color: #f39c12; }
        .winner-item { color: #2ecc71; border-bottom: 1px solid #222; padding: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">Tournament Setup</div>
    <div class="p-15">
        <input type="text" id="tourName" placeholder="ਟੂਰਨਾਮੈਂਟ ਦਾ ਨਾਮ (e.g. Kabaddi Cup Mudki)" oninput="updateDB()">
        <textarea id="bulkTeams" placeholder="ਟੀਮਾਂ ਐਡ ਕਰੋ (ਕੌਮਾ ਪਾ ਕੇ)..."></textarea>
        <button class="btn btn-blue" onclick="addBulkTeams()">+ Add Teams</button>
    </div>
</div>

<div class="card">
    <div class="header">Live Match (Tyaun Box)</div>
    <div class="p-15">
        <div class="grid-2">
            <div>
                <div class="box-title">Team 1</div>
                <select id="selA"></select>
            </div>
            <div>
                <div class="box-title">Team 2</div>
                <select id="selB"></select>
            </div>
        </div>
        <button class="btn btn-orange" onclick="updateMatchTeams()">Update Match</button>
        
        <div class="score-row">
            <div style="text-align:center;">
                <div id="dispNameA" style="font-size:12px;">--</div>
                <div class="score-val" id="dispA">0</div>
                <button onclick="changeScore('scoreA', 1)" class="btn btn-green" style="width:40px;">+</button>
                <button onclick="changeScore('scoreA', -1)" class="btn btn-red" style="width:40px;">-</button>
            </div>
            <div style="font-weight:900;">VS</div>
            <div style="text-align:center;">
                <div id="dispNameB" style="font-size:12px;">--</div>
                <div class="score-val" id="dispB">0</div>
                <button onclick="changeScore('scoreB', 1)" class="btn btn-green" style="width:40px;">+</button>
                <button onclick="changeScore('scoreB', -1)" class="btn btn-red" style="width:40px;">-</button>
            </div>
        </div>
        <button class="btn btn-green" style="margin-top:10px;" onclick="showResult()">🏆 RESULT (Declare Winner)</button>
    </div>
</div>

<div class="card">
    <div class="header">Prize & Branding</div>
    <div class="p-15">
        <input type="text" id="prizeInp" placeholder="Prize Details (e.g. 1st: 1 Lakh, 2nd: 75k)" oninput="updateDB()">
        <input type="text" id="tickerInp" placeholder="Ticker Line (Live Message)" oninput="updateDB()">
        <div class="grid-2">
            <button class="btn btn-blue" onclick="toggleVis('scoreVisible')">Show Score</button>
            <button class="btn btn-blue" onclick="toggleVis('tickerVisible')">Show Ticker</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="header">Tournament Lists</div>
    <div class="p-15">
        <div class="grid-2">
            <div>
                <div class="box-title">🏆 Winner List (Auto)</div>
                <div id="winnerList" class="box-list"></div>
            </div>
            <div>
                <div class="box-title">🔀 Playing Teams</div>
                <div id="playingList" class="box-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, allTeams = [], winners = [];

    db.on("value", (snap) => {
        const data = snap.val() || {};
        allTeams = data.teams || [];
        winners = data.winners || [];
        curA = data.scoreA || 0; curB = data.scoreB || 0;

        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('dispNameA').innerText = data.nameA || "TEAM 1";
        document.getElementById('dispNameB').innerText = data.nameB || "TEAM 2";
        document.getElementById('tourName').value = data.tourName || "";
        document.getElementById('prizeInp').value = data.prize || "";
        document.getElementById('tickerInp').value = data.row1Txt || "";

        renderLists();
    });

    function renderLists() {
        let opt = `<option value="">Select Team</option>`;
        let pListHtml = "";
        allTeams.forEach(t => {
            opt += `<option value="${t}">${t}</option>`;
            pListHtml += `<div style="font-size:12px; border-bottom:1px solid #222;">${t}</div>`;
        });
        document.getElementById('selA').innerHTML = opt;
        document.getElementById('selB').innerHTML = opt;
        document.getElementById('playingList').innerHTML = pListHtml;

        let wListHtml = "";
        winners.forEach(w => {
            wListHtml += `<div class="winner-item"><span>${w}</span> <i class="fas fa-trophy"></i></div>`;
        });
        document.getElementById('winnerList').innerHTML = wListHtml;
    }

    function addBulkTeams() {
        const val = document.getElementById('bulkTeams').value;
        if(!val) return;
        const newTeams = val.split(',').map(i => i.trim()).filter(i => i !== "");
        db.update({ teams: [...new Set([...allTeams, ...newTeams])] });
        document.getElementById('bulkTeams').value = "";
    }

    function updateMatchTeams() {
        db.update({ nameA: document.getElementById('selA').value, nameB: document.getElementById('selB').value, scoreA: 0, scoreB: 0 });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = (val > 0) ? (current === 0 && (curA+curB === 0) ? 1.5 : current + 1) : Math.max(0, current === 1.5 ? 0 : current - 1);
        db.update({ [team]: newVal });
    }

    function showResult() {
        const nA = document.getElementById('dispNameA').innerText;
        const nB = document.getElementById('dispNameB').innerText;
        const win = curA > curB ? nA : nB;
        const lose = curA > curB ? nB : nA;

        if(confirm(win + " ਨੂੰ ਜੇਤੂ ਐਲਾਨਿਆ ਜਾਵੇ?")) {
            const newWinners = [...winners, win];
            const newPlaying = allTeams.filter(t => t !== lose); // ਹਾਰਨ ਵਾਲੀ ਟੀਮ ਹਟਾਓ
            db.update({ winners: newWinners, teams: newPlaying, scoreVisible: false });
        }
    }

    function updateDB() {
        db.update({
            tourName: document.getElementById('tourName').value,
            prize: document.getElementById('prizeInp').value,
            row1Txt: document.getElementById('tickerInp').value
        });
    }

    function toggleVis(f) {
        db.child(f).once('value', s => db.child(f).set(!s.val()));
    }
</script>
</body>
</html>
