<div class="card">
    <div class="header">Next Round Match Fixing (ਟਾਈਆਂ)</div>
    <div class="p-15">
        <div class="box-title">ਜੇਤੂ ਟੀਮਾਂ ਵਿੱਚੋਂ ਅਗਲਾ ਮੈਚ ਸੈੱਟ ਕਰੋ</div>
        <div class="grid-2">
            <select id="winSelA">
                <option value="">Select Winner 1</option>
            </select>
            <select id="winSelB">
                <option value="">Select Winner 2</option>
            </select>
        </div>
        <button class="btn btn-blue" onclick="fixNextMatch()">Set Next Match (Update Scoreboard)</button>
    </div>
</div>

<div class="card">
    <div class="header">Tournament Data Lists</div>
    <div class="p-15">
        <div class="grid-2">
            <div>
                <div class="box-title">🏆 Winner List</div>
                <div id="winnerList" class="box-list"></div>
            </div>
            <div>
                <div class="box-title">🔀 Playing Teams</div>
                <div id="playingList" class="box-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ਬਾਕੀ ਪੁਰਾਣਾ ਕੋਡ ਸੇਮ ਰਹੇਗਾ, ਬਸ ਇਹ ਨਵੇਂ ਫੰਕਸ਼ਨ ਜੋੜ ਲਵੋ:

    function renderLists() {
        let opt = `<option value="">Select Team</option>`;
        let winOpt = `<option value="">Select Winner</option>`; // ਜੇਤੂਆਂ ਲਈ ਅਲੱਗ ਲਿਸਟ
        
        let pListHtml = "";
        allTeams.forEach(t => {
            opt += `<option value="${t}">${t}</option>`;
            pListHtml += `<div style="font-size:12px; border-bottom:1px solid #222;">${t}</div>`;
        });
        
        let wListHtml = "";
        winners.forEach(w => {
            winOpt += `<option value="${w}">${w}</option>`; // ਜੇਤੂਆਂ ਨੂੰ Dropdown ਵਿੱਚ ਪਾਓ
            wListHtml += `<div class="winner-item"><span>${w}</span> <i class="fas fa-trophy" style="color:#f39c12;"></i></div>`;
        });

        document.getElementById('selA').innerHTML = opt;
        document.getElementById('selB').innerHTML = opt;
        
        // ਨਵੇਂ Dropdowns ਲਈ
        document.getElementById('winSelA').innerHTML = winOpt;
        document.getElementById('winSelB').innerHTML = winOpt;
        
        document.getElementById('playingList').innerHTML = pListHtml;
        document.getElementById('winnerList').innerHTML = wListHtml;
    }

    // ਜੇਤੂਆਂ ਵਿੱਚੋਂ ਮੈਚ ਫਿਕਸ ਕਰਨ ਲਈ
    function fixNextMatch() {
        const t1 = document.getElementById('winSelA').value;
        const t2 = document.getElementById('winSelB').value;

        if(!t1 || !t2) {
            alert("ਕਿਰਪਾ ਕਰਕੇ ਦੋ ਜੇਤੂ ਟੀਮਾਂ ਚੁਣੋ!");
            return;
        }

        if(confirm("ਕੀ ਇਹਨਾਂ ਦੋਵਾਂ ਜੇਤੂਆਂ ਦਾ ਅਗਲਾ ਮੈਚ ਸੈੱਟ ਕਰਨਾ ਹੈ?")) {
            // ਸਕੋਰਬੋਰਡ ਨੂੰ ਇਹਨਾਂ ਟੀਮਾਂ ਨਾਲ ਅਪਡੇਟ ਕਰੋ
            db.update({ 
                nameA: t1, 
                nameB: t2, 
                scoreA: 0, 
                scoreB: 0,
                scoreVisible: true,
                round: "Next Round" 
            });
            alert("ਅਗਲਾ ਮੈਚ ਸੈੱਟ ਹੋ ਗਿਆ ਹੈ!");
        }
    }
</script>
