<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Admin - Sync Timer</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .section-divider { border-bottom: 1px solid #30363d; margin: 10px 0; padding-bottom: 5px; color: #2ecc71; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        #timerShow { font-size: 48px; color: #f1c40f; font-family: 'Courier New', Courier, monospace; margin: 10px 0; font-weight: bold; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- SCOREBOARD -->
    <div class="card">
        <div class="header">Live Score Admin</div>
        <div class="teams-container">
            <div class="team-box">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div style="flex:1; text-align:center; padding: 0 5px;">
                <button id="visBtn" class="card-btn" style="background:#238636; margin-bottom:5px;" onclick="toggleVis()">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetMatch()">RESET</button>
            </div>
            <div class="team-box">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SYNCED TIMER CONTROL -->
    <div class="card">
        <div class="header">Server-Synced Timer</div>
        <div style="padding:15px; text-align:center; background:#0d1117;">
            <div id="timerShow">00:00</div>
            <div class="grid-2">
                <button id="timerBtn" class="card-btn" style="background:#238636; height:50px; font-size:14px;" onclick="toggleServerTimer()">START TIMER</button>
                <button class="card-btn" style="background:#333; height:50px;" onclick="resetServerTimer()">RESET</button>
            </div>
            
            <div class="section-divider">Settings</div>
            <div class="grid-2">
                <input type="text" id="roundInp" class="std-input" placeholder="Match No/Round" oninput="updateMatchDB()">
                <input type="text" id="halfInp" class="std-input" placeholder="Half (e.g. 1st)" oninput="updateMatchDB()">
            </div>
            <input type="number" id="matchDuration" class="std-input" placeholder="Limit (Minutes) - e.g. 20" oninput="updateMatchDB()">
        </div>
    </div>

</div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || "default_user";
    const matchRef = db.ref("users/" + clientID + "/matchData");

    let isRunning = false;
    let serverStartTime = 0;
    let accumulatedTime = 0;
    let serverTimeOffset = 0;
    let sVis = true;

    // --- Get Server Time Offset ---
    db.ref(".info/serverTimeOffset").on("value", (snap) => {
        serverTimeOffset = snap.val() || 0;
    });

    // --- SCORE LOGIC ---
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            round: document.getElementById('roundInp').value,
            half: document.getElementById('halfInp').value,
            duration: document.getElementById('matchDuration').value
        });
    }

    function changeScore(team, val) {
        matchRef.child(team).once('value', snap => {
            matchRef.update({ [team]: Math.max(0, (snap.val() || 0) + val) });
        });
    }

    function toggleVis() { matchRef.child('scoreVisible').set(!sVis); }
    function resetMatch() { if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }

    // --- SYNCED TIMER LOGIC (CRITICAL) ---
    function toggleServerTimer() {
        const now = Date.now() + serverTimeOffset;
        if (!isRunning) {
            // Start
            matchRef.update({
                timerRunning: true,
                startTime: now,
                // We don't reset accumulatedTime here, it keeps what we had before pausing
            });
        } else {
            // Stop/Pause
            const sessionDuration = now - serverStartTime;
            matchRef.update({
                timerRunning: false,
                accumulatedTime: accumulatedTime + sessionDuration
            });
        }
    }

    function resetServerTimer() {
        if(confirm("Reset Timer?")) {
            matchRef.update({
                timerRunning: false,
                startTime: 0,
                accumulatedTime: 0,
                matchTime: "00:00"
            });
        }
    }

    function runClock() {
        let totalMs = accumulatedTime;
        if (isRunning && serverStartTime > 0) {
            const now = Date.now() + serverTimeOffset;
            totalMs += (now - serverStartTime);
        }

        const totalSeconds = Math.floor(totalMs / 1000);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        const timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);

        document.getElementById('timerShow').innerText = timeStr;
        
        // Auto-Stop Logic (Server based)
        const limit = parseInt(document.getElementById('matchDuration').value);
        if (limit > 0 && m >= limit && isRunning) {
            toggleServerTimer();
            alert("Limit Reached!");
        }
    }

    // --- SYNC WITH FIREBASE ---
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        
        // Score Sync
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('roundInp').value = data.round || "";
        document.getElementById('halfInp').value = data.half || "";
        document.getElementById('matchDuration').value = data.duration || "";

        // Visibility Sync
        sVis = !!data.scoreVisible;
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";

        // Timer Sync
        isRunning = !!data.timerRunning;
        serverStartTime = data.startTime || 0;
        accumulatedTime = data.accumulatedTime || 0;

        document.getElementById('timerBtn').innerText = isRunning ? "STOP TIMER" : "START TIMER";
        document.getElementById('timerBtn').style.background = isRunning ? "#da3633" : "#238636";
    });

    // High frequency update for smooth display
    setInterval(runClock, 100);

</script>
</body>
</html>
