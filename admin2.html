<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Admin - Fixed Layout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .collapsible-header { background: #30363d; padding: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 13px; }
        .teams-container { display: flex; padding: 10px; gap: 8px; background: #0d1117; align-items: flex-start; }
        .team-box { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { display: flex; flex-direction: column; gap: 8px; justify-content: center; align-items: center; min-width: 70px; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .penalty-log { font-size: 18px; letter-spacing: 2px; color: #f1c40f; margin-top: 8px; min-height: 25px; background: #0d1117; border-radius: 4px; padding: 5px; text-align: center; }
        .label-text { font-size: 11px; color: #8b949e; margin-bottom: 4px; display: block; text-transform: uppercase; }
        textarea.std-input { height: 60px; resize: none; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">

    <!-- 1. PENALTY BOX -->
    <div class="card">
        <div class="collapsible-header" onclick="toggleBox('penaltyBox')">
            <span><i class="fas fa-volleyball-ball"></i> PENALTY SHOOTOUT</span>
            <i class="fas fa-plus" id="penaltyIcon"></i>
        </div>
        <div id="penaltyBox" style="display: none; padding: 10px;">
            <div class="grid-2">
                <div class="team-box">
                    <span class="label-text">Team A</span>
                    <div class="grid-2">
                        <button class="card-btn" style="background:#238636;" onclick="addShoot('A', 'G')">Goal</button>
                        <button class="card-btn" style="background:#da3633;" onclick="addShoot('A', 'M')">Miss</button>
                    </div>
                    <div class="penalty-log" id="logA">---</div>
                </div>
                <div class="team-box">
                    <span class="label-text">Team B</span>
                    <div class="grid-2">
                        <button class="card-btn" style="background:#238636;" onclick="addShoot('B', 'G')">Goal</button>
                        <button class="card-btn" style="background:#da3633;" onclick="addShoot('B', 'M')">Miss</button>
                    </div>
                    <div class="penalty-log" id="logB">---</div>
                </div>
            </div>
            <button class="card-btn" style="background:#333; margin-top:10px;" onclick="resetPenaltyOnly()">Clear Penalty Log</button>
        </div>
    </div>

    <!-- 2. SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" class="std-input" style="height:25px; padding:2px;" oninput="updateMatchDB()">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:8px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="Player No" style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('A', 'Red')">RC</button>
                </div>
            </div>

            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis()">SHOW</button>
                <div style="font-weight:bold; color:#8b949e; margin: 5px 0;">VS</div>
                <button class="card-btn" style="background:#da3633;" onclick="resetOnlyScore()">RESET</button>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" class="std-input" style="height:25px; padding:2px;" oninput="updateMatchDB()">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:8px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="Player No" style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('B', 'Red')">RC</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. CARD HISTORY -->
    <div class="card">
        <div class="header" style="background:#d35400;"><i class="fas fa-id-card"></i> Card History & Details</div>
        <div style="padding:10px; background:#0d1117; max-height:150px; overflow-y:auto;" id="cardLog">
            <div style="color:#8b949e; text-align:center; font-size:12px;">No cards issued yet</div>
        </div>
    </div>

    <!-- 4. MATCH INFO -->
    <div class="card">
        <div class="header"><i class="fas fa-info-circle"></i> Match Information</div>
        <div style="padding:12px; background:#0d1117;">
            <div class="grid-2">
                <div style="text-align:center; border-right: 1px solid #333; padding-right:10px;">
                    <div id="timerShowSmall" style="font-size:32px; color:#f1c40f; font-family:monospace;">00:00</div>
                    <div class="grid-2" style="margin-top:5px;">
                        <button id="timerBtnSmall" class="card-btn" style="background:#238636;" onclick="handleTimerClick()">Start</button>
                        <button class="card-btn" style="background:#333;" onclick="resetTimer()">Reset</button>
                    </div>
                </div>
                <div style="padding-left:5px;">
                    <span class="label-text">Match Half</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="1st Half" oninput="updateMatchDB()">
                    <div class="grid-2">
                        <button class="card-btn" style="background:#30363d; font-size:8px;" onclick="setHalf('1st Half')">1st</button>
                        <button class="card-btn" style="background:#30363d; font-size:8px;" onclick="setHalf('2nd Half')">2nd</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 5. TICKER DATA -->
    <div class="card">
        <div class="header">Ticker & Tournament Info</div>
        <div style="padding:10px; background:#0d1117;">
            <input type="text" id="tourNameInput" class="std-input" placeholder="Tournament Name" oninput="updateTickerInfo()">
            <textarea id="matchListInput" class="std-input" placeholder="Match List" oninput="updateTickerInfo()"></textarea>
            <textarea id="prizeInput" class="std-input" placeholder="Prize Details" oninput="updateTickerInfo()"></textarea>
            <textarea id="upcomingEventsInput" class="std-input" placeholder="Upcoming Events" oninput="updateTickerInfo()"></textarea>
            <input type="text" id="watermarkText" class="std-input" placeholder="Channel Watermark" oninput="updateTickerInfo()">
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, isRunning = false, startTime = 0, elapsedTime = 0, sVis = true;
    let yellowCounts = {};

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            round: document.getElementById('roundInp').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function handleCard(team, type) {
        let pDetail = document.getElementById('player' + team).value;
        let teamName = document.getElementById('name' + team).value || team;
        if(!pDetail) { alert("Enter Player No!"); return; }
        
        let key = team + "_" + pDetail;
        let eventMsg = type + " Card: #" + pDetail + " (" + teamName + ")";
        let cardColor = (type === 'Yellow') ? "#f1c40f" : "#e74c3c";

        if(type === 'Yellow') {
            yellowCounts[key] = (yellowCounts[key] || 0) + 1;
            if(yellowCounts[key] >= 2) {
                eventMsg = "RED (2nd Yellow): #" + pDetail + " (" + teamName + ")";
                cardColor = "#e74c3c";
            }
        }

        matchRef.child('lastEvent').set(eventMsg);
        matchRef.child('cardHistory').push({
            msg: eventMsg,
            color: cardColor,
            time: document.getElementById('timerShowSmall').innerText
        });
        document.getElementById('player' + team).value = "";
    }

    function handleTimerClick() {
        if (!isRunning) matchRef.update({ timerRunning: true, startTime: Date.now() - elapsedTime });
        else matchRef.update({ timerRunning: false, elapsedTime: Date.now() - startTime });
    }

    function resetTimer() { if(confirm("Reset Timer?")) matchRef.update({ timerRunning: false, startTime: 0, elapsedTime: 0, matchTime: "00:00" }); }
    
    function setHalf(val) { document.getElementById('roundInp').value = val; updateMatchDB(); }

    function addShoot(team, res) {
        matchRef.child('p' + team).once('value', snap => {
            let current = snap.val() || "";
            matchRef.update({ ['p' + team]: current + res });
        });
    }

    function resetPenaltyOnly() { if(confirm("Clear Penalty?")) matchRef.update({ pA: "", pB: "" }); }
    function resetOnlyScore() { if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0, cardHistory: null }); }
    function toggleVis() { matchRef.child('scoreVisible').set(!sVis); }

    function toggleBox(id) {
        let panel = document.getElementById(id);
        let icon = document.getElementById(id.replace('Box', 'Icon'));
        let isVisible = panel.style.display === "block";
        panel.style.display = isVisible ? "none" : "block";
        icon.className = isVisible ? "fas fa-plus" : "fas fa-minus";
    }

    function updateTickerInfo() {
        tickerRef.update({
            upcomingEvents: document.getElementById('upcomingEventsInput').value,
            tournamentName: document.getElementById('tourNameInput').value,
            prizeInfo: document.getElementById('prizeInput').value,
            matchList: document.getElementById('matchListInput').value,
            watermark: document.getElementById('watermarkText').value
        });
    }

    // Firebase Listeners
    matchRef.on("value", snap => {
        const d = snap.val() || {};
        curA = d.scoreA || 0; curB = d.scoreB || 0;
        isRunning = d.timerRunning || false;
        startTime = d.startTime || 0;
        elapsedTime = d.elapsedTime || 0;
        sVis = d.scoreVisible !== false;

        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
        document.getElementById('colorA').value = d.colorA || "#ffffff";
        document.getElementById('colorB').value = d.colorB || "#ffffff";
        document.getElementById('roundInp').value = d.round || "";
        document.getElementById('logA').innerText = d.pA || "---";
        document.getElementById('logB').innerText = d.pB || "---";
        
        const tBtn = document.getElementById('timerBtnSmall');
        tBtn.innerText = isRunning ? "STOP" : "START";
        tBtn.style.background = isRunning ? "#da3633" : "#238636";
        
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";

        const cardLog = document.getElementById('cardLog');
        if (d.cardHistory) {
            cardLog.innerHTML = "";
            Object.values(d.cardHistory).reverse().forEach(c => {
                cardLog.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; font-size:12px; color:${c.color}; font-weight:bold;">[${c.time}] ${c.msg}</div>`;
            });
        } else {
            cardLog.innerHTML = `<div style="color:#8b949e; text-align:center; font-size:12px;">No cards issued yet</div>`;
        }
    });

    tickerRef.on("value", snap => {
        const d = snap.val() || {};
        document.getElementById('tourNameInput').value = d.tournamentName || "";
        document.getElementById('matchListInput').value = d.matchList || "";
        document.getElementById('prizeInput').value = d.prizeInfo || "";
        document.getElementById('upcomingEventsInput').value = d.upcomingEvents || "";
        document.getElementById('watermarkText').value = d.watermark || "";
    });

    setInterval(() => {
        let ms = isRunning ? (Date.now() - startTime) : elapsedTime;
        let totalSec = Math.floor(ms / 1000);
        let m = Math.floor(totalSec / 60), s = totalSec % 60;
        let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        document.getElementById('timerShowSmall').innerText = timeStr;
        if(isRunning) matchRef.child('matchTime').set(timeStr);
    }, 1000);
</script>
</body>
</html>
