<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Master Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; overflow: hidden; width: 100%; max-width: 650px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { background: #f39c12; color: #000; padding: 12px; font-weight: bold; text-transform: uppercase; font-size: 14px; text-align: center; letter-spacing: 1px; }
        .p-15 { padding: 15px; }
        
        /* TEAM ADD SECTION */
        .big-textarea { 
            width: 100%; height: 150px; background: #0d1117; border: 2px solid #30363d; 
            color: #f39c12; border-radius: 8px; padding: 12px; font-size: 16px; resize: none; margin-bottom: 10px; box-sizing: border-box;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        input, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 12px; margin-bottom: 5px; transition: 0.3s; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .btn:hover { opacity: 0.8; }

        .score-display { font-size: 65px; font-weight: 900; color: #f39c12; text-align: center; margin: 10px 0; background: #0d1117; border-radius: 10px; padding: 10px; }
        .label-small { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">➕ ADD TEAMS (ਟੀਮਾਂ ਐਡ ਕਰੋ)</div>
        <div class="p-15">
            <textarea id="manualTyan" class="big-textarea" placeholder="ਟੀਮਾਂ ਦੇ ਨਾਮ ਲਿਖੋ (ਕੋਮਾ ਜਾਂ ਐਂਟਰ ਦੀ ਵਰਤੋਂ ਕਰੋ)...&#10;Team A, Team B, Team C"></textarea>
            <div class="grid-2">
                <button class="btn btn-green" onclick="syncTeams()">ADD TEAMS TO LIST</button>
                <button class="btn btn-red" onclick="resetTeams()">CLEAR ALL TEAMS</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header">👁️ OVERLAY SHOW/HIDE</div>
        <div class="p-15">
            <div class="grid-2">
                <div>
                    <span class="label-small">Scoreboard Strip</span>
                    <button id="scoreBtn" class="btn" onclick="toggleVis('scoreVisible')">SCOREBOARD: ON</button>
                </div>
                <div>
                    <span class="label-small">Tyian/Wing Box</span>
                    <button id="wingBtn" class="btn" onclick="toggleVis('wingVisible')">WING BOX: OFF</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header">🎮 LIVE MATCH CONTROL</div>
        <div class="p-15">
            <div class="grid-2">
                <div>
                    <span class="label-small">Select Team A</span>
                    <select id="selA" onchange="updateMatchTeams()"></select>
                    <div class="score-display" id="dispA">0</div>
                    <div class="grid-2">
                        <button class="btn btn-green" style="font-size: 20px;" onclick="changeScore('scoreA', 1)">+</button>
                        <button class="btn btn-red" style="font-size: 20px;" onclick="changeScore('scoreA', -1)">-</button>
                    </div>
                </div>
                <div>
                    <span class="label-small">Select Team B</span>
                    <select id="selB" onchange="updateMatchTeams()"></select>
                    <div class="score-display" id="dispB">0</div>
                    <div class="grid-2">
                        <button class="btn btn-green" style="font-size: 20px;" onclick="changeScore('scoreB', 1)">+</button>
                        <button class="btn btn-red" style="font-size: 20px;" onclick="changeScore('scoreB', -1)">-</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-orange" style="margin-top:20px; padding:18px; font-size:14px;" onclick="declareWinner()">🏆 DECLARE WINNER & MOVE TO WING BOX</button>
        </div>
    </div>

    <div class="card">
        <div class="header">📝 INFO SETTINGS (ਪੱਟੀ ਦੀ ਜਾਣਕਾਰੀ)</div>
        <div class="p-15">
            <div class="grid-2">
                <div><span class="label-small">Tournament Name</span><input type="text" id="tourName"></div>
                <div><span class="label-small">Prize Money</span><input type="text" id="prizeInp"></div>
            </div>
            <div class="grid-2">
                <div><span class="label-small">Next Match Detail</span><input type="text" id="nextMatchInp"></div>
                <div><span class="label-small">Helpline / Booking No.</span><input type="text" id="wmText"></div>
            </div>
            <button class="btn btn-blue" style="height: 50px;" onclick="updateInfo()">SAVE ALL SETTINGS</button>
        </div>
    </div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {}, allTeams = [], winnersData = [];

    // Sync from Firebase
    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data; 
        allTeams = data.teams || []; 
        winnersData = data.winnersData || [];
        
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('tourName').value = data.tourName || "";
        document.getElementById('prizeInp').value = data.prize || "";
        document.getElementById('nextMatchInp').value = data.nextMatch || "";
        document.getElementById('wmText').value = data.watermark || "";

        updateBtn('scoreBtn', data.scoreVisible, 'SCOREBOARD');
        updateBtn('wingBtn', data.wingVisible, 'WING BOX');
        renderUI();
    });

    function renderUI() {
        let opt = `<option value="">Select Team</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        document.getElementById('selA').innerHTML = opt; 
        document.getElementById('selB').innerHTML = opt;
        document.getElementById('selA').value = status.nameA || ""; 
        document.getElementById('selB').value = status.nameB || "";
    }

    function updateBtn(id, val, text) {
        const btn = document.getElementById(id);
        btn.innerText = val ? text + ": ON" : text + ": OFF";
        btn.style.background = val ? "#238636" : "#da3633";
    }

    function toggleVis(key) { db.child(key).set(!status[key]); }
    
    function syncTeams() {
        let input = document.getElementById('manualTyan').value;
        if(!input) return;
        let list = input.split(/[,\n]/).map(t => t.trim()).filter(t => t !== "");
        db.update({ teams: [...allTeams, ...list] });
        document.getElementById('manualTyan').value = "";
    }

    function changeScore(team, val) {
        let cur = status[team] || 0;
        // Kabaddi logic: starting with 1.5 if needed, else normal increment
        let newVal = (val > 0) ? (cur === 0 && (status.scoreA+status.scoreB === 0) ? 1.5 : cur + 1) : Math.max(0, cur - 1);
        db.update({ [team]: newVal });
    }

    function updateMatchTeams() { 
        db.update({ 
            nameA: document.getElementById('selA').value, 
            nameB: document.getElementById('selB').value 
        }); 
    }
    
    function declareWinner() {
        const winN = (status.scoreA > status.scoreB) ? status.nameA : status.nameB;
        if(!status.nameA || !status.nameB) return alert("Please select teams first!");
        if(confirm("Declare " + winN + " as winner?")) {
            db.update({ 
                winnersData: [...winnersData, { name: winN }], 
                teams: allTeams.filter(t => t !== status.nameA && t !== status.nameB),
                scoreA: 0, scoreB: 0, nameA: "", nameB: ""
            });
        }
    }

    function updateInfo() {
        db.update({ 
            tourName: document.getElementById('tourName').value, 
            prize: document.getElementById('prizeInp').value,
            nextMatch: document.getElementById('nextMatchInp').value,
            watermark: document.getElementById('wmText').value
        });
        alert("Settings Updated!");
    }

    function resetTeams() { 
        if(confirm("This will delete ALL teams and winner history. Are you sure?")) {
            db.update({ teams: [], winnersData: [], scoreA: 0, scoreB: 0, nameA: "", nameB: "" });
        }
    }
</script>
</body>
</html>
