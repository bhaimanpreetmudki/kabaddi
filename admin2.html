<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Admin Pro - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #drag-container { width: 100%; max-width: 600px; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; }
        .header-flex { background: #f39c12; color: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .header-title { font-weight: 900; text-transform: uppercase; font-size: 11px; }
        .p-15 { padding: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-purple { background: #6f42c1; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .score-val { font-size: 60px; font-weight: 900; color: #f39c12; text-align: center; line-height: 1; margin: 10px 0; }
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 130px; overflow-y: auto; padding: 8px; font-size: 13px; }
        .list-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="drag-container">

    <div class="card">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> LIVE SCORE CONTROL</span>
            <button id="scoreVisBtn" class="btn btn-green" style="width:auto; padding:5px 10px;" onclick="toggleVis('scoreVisible')">SHOW</button>
        </div>
        <div class="p-15">
            <div class="grid-2">
                <div><small style="color:#f39c12; font-size:9px;">TEAM 1</small><select id="selA" onchange="updateMatchTeams()"></select></div>
                <div><small style="color:#f39c12; font-size:9px;">TEAM 2</small><select id="selB" onchange="updateMatchTeams()"></select></div>
            </div>
            
            <div class="grid-2" style="background:#0d1117; border-radius:10px; padding:10px; border:1px solid #333;">
                <div>
                    <div class="score-val" id="dispA">0</div>
                    <div class="grid-2">
                        <button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button>
                        <button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button>
                    </div>
                </div>
                <div>
                    <div class="score-val" id="dispB">0</div>
                    <div class="grid-2">
                        <button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button>
                        <button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button>
                    </div>
                </div>
            </div>

            <div class="grid-2" style="margin-top:10px;">
                <button class="btn btn-blue" onclick="swapNames()">ONLY TEAM SWIPE</button>
                <button class="btn btn-purple" onclick="swapScoreOnly()">ONLY SCORE SWIPE</button>
            </div>
            <button class="btn btn-orange" style="margin-bottom:10px;" onclick="swapPanelOnly()">CAMERA / OPPO VIEW (PANEL ONLY SWAP)</button>
            
            <div class="grid-2">
                <button class="btn btn-red" onclick="confirmReset('score')">RESET SCORE</button>
                <button class="btn btn-green" onclick="declareWinner()">🏆 DECLARE RESULT</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-flex"><span class="header-title">TEAM LIST & WING BOX</span></div>
        <div class="p-15">
            <div class="grid-2">
                <div><textarea id="manualTyan" placeholder="Add Teams..." style="height:60px;" oninput="syncTeams()"></textarea><div id="playingList" class="box-list"></div></div>
                <div><div id="winnerList" class="box-list" style="height:210px;"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {}, allTeams = [], winners = [];
    let isPanelSwapped = false; // ਪੈਨਲ ਦੀ ਹਾਲਤ ਚੈੱਕ ਕਰਨ ਲਈ

    new Sortable(document.getElementById('drag-container'), { animation: 150, handle: '.handle' });

    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data; allTeams = data.teams || []; winners = data.winners || [];
        updateUI();
    });

    function updateUI() {
        // ਜੇਕਰ ਪੈਨਲ ਸਵੈਪ ਹੈ, ਤਾਂ ਡਿਸਪਲੇਅ ਨੂੰ ਉਲਟਾ ਦਿਖਾਓ
        if (isPanelSwapped) {
            document.getElementById('dispA').innerText = status.scoreB || 0;
            document.getElementById('dispB').innerText = status.scoreA || 0;
            document.getElementById('selA').value = status.nameB || "";
            document.getElementById('selB').value = status.nameA || "";
        } else {
            document.getElementById('dispA').innerText = status.scoreA || 0;
            document.getElementById('dispB').innerText = status.scoreB || 0;
            document.getElementById('selA').value = status.nameA || "";
            document.getElementById('selB').value = status.nameB || "";
        }
        renderLists();
    }

    function swapPanelOnly() {
        isPanelSwapped = !isPanelSwapped; // ਸਿਰਫ ਐਡਮਿਨ ਪੈਨਲ ਦੀ ਦਿਖ ਬਦਲੋ
        updateUI();
        console.log("Panel View Swapped Locally");
    }

    function changeScore(team, val) {
        // ਜੇ ਪੈਨਲ ਸਵੈਪ ਹੈ, ਤਾਂ 'scoreA' ਵਾਲਾ ਬਟਨ 'scoreB' ਨੂੰ ਅਪਡੇਟ ਕਰੇਗਾ
        let actualTeam = team;
        if (isPanelSwapped) {
            actualTeam = (team === 'scoreA') ? 'scoreB' : 'scoreA';
        }
        
        let cur = status[actualTeam] || 0;
        let newVal = (val > 0) ? (cur === 0 && (status.scoreA+status.scoreB === 0) ? 1.5 : cur + 1) : Math.max(0, cur === 1.5 ? 0 : cur - 1);
        db.update({ [actualTeam]: newVal });
    }

    function updateMatchTeams() {
        let nA = document.getElementById('selA').value;
        let nB = document.getElementById('selB').value;
        if (isPanelSwapped) {
            db.update({ nameA: nB, nameB: nA });
        } else {
            db.update({ nameA: nA, nameB: nB });
        }
    }

    function renderLists() {
        let opt = `<option value="">Select Team</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        document.getElementById('selA').innerHTML = opt; document.getElementById('selB').innerHTML = opt;
        
        let html = "";
        for(let i=0; i<allTeams.length; i+=2) {
            html += `<div class="list-item"><span>${allTeams[i]} VS ${allTeams[i+1] || "..."}</span></div>`;
        }
        document.getElementById('playingList').innerHTML = html;
        document.getElementById('winnerList').innerHTML = winners.map(w => `<div class="list-item">🏆 ${w}</div>`).join('');
    }

    function swapNames() { db.update({ nameA: status.nameB, nameB: status.nameA }); }
    function swapScoreOnly() { db.update({ scoreA: status.scoreB, scoreB: status.scoreA }); }
    function toggleVis(key) { db.child(key).set(!status[key]); }
    function syncTeams() { const list = document.getElementById('manualTyan').value.split('\n').filter(t => t.trim() !== ""); db.update({ teams: list }); }
    function confirmReset(type) { if(confirm("Are you sure?")) { if(type === 'score') db.update({ scoreA: 0, scoreB: 0 }); if(type === 'teams') db.update({ teams: [], winners: [] }); } }
    function declareWinner() {
        const win = status.scoreA > status.scoreB ? status.nameA : status.nameB;
        const lose = status.scoreA > status.scoreB ? status.nameB : status.nameA;
        if(confirm(win + " Wins?")) db.update({ winners: [...winners, win], teams: allTeams.filter(t => t !== lose && t !== win), scoreA: 0, scoreB: 0, scoreVisible: false });
    }
</script>
</body>
</html>
