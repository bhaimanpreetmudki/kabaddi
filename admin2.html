<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Admin Pro - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; width: 100%; max-width: 600px; }
        .header-flex { background: #f39c12; color: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .p-15 { padding: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        .btn { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .score-val { font-size: 60px; font-weight: 900; color: #f39c12; text-align: center; line-height: 1; margin: 10px 0; }
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 150px; overflow-y: auto; padding: 5px; margin-top: 5px; }
        .list-item { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-flex">LIVE SCORE CONTROL</div>
        <div class="p-15">
            <div class="grid-2">
                <select id="selA" onchange="updateMatchTeams()"></select>
                <select id="selB" onchange="updateMatchTeams()"></select>
            </div>
            <div style="background:#0d1117; border-radius:10px; padding:15px; border:1px solid #333; margin:10px 0;">
                <div class="grid-2">
                    <div>
                        <div class="score-val" id="dispA">0</div>
                        <div class="grid-2"><button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button></div>
                    </div>
                    <div>
                        <div class="score-val" id="dispB">0</div>
                        <div class="grid-2"><button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button></div>
                    </div>
                </div>
            </div>
            <div class="grid-3">
                <button class="btn btn-blue" onclick="swapNames()">T-SWIPE</button>
                <button class="btn btn-blue" onclick="swapScores()">S-SWIPE</button>
                <button class="btn btn-orange" onclick="swapFull()">FULL SWAP</button>
            </div>
            <button class="btn btn-green" style="padding:15px; width:100%; margin-top:10px;" onclick="declareWinner()">🏆 DECLARE WINNER (ADD TO WING BOX)</button>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">MANUAL TYIAN (FIX MATCH FROM WINNERS)</div>
        <div class="p-15">
            <div class="grid-2">
                <select id="winSelA"><option value="">Select Winner 1</option></select>
                <select id="winSelB"><option value="">Select Winner 2</option></select>
            </div>
            <button class="btn btn-orange" onclick="fixMatchFromWinners()">FIX THIS MATCH & START</button>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">WING BOX (WINNING TEAMS)</div>
        <div class="p-15">
            <div id="winnerList" class="box-list"></div>
            <small style="color: #8b949e; font-size: 10px;">*ਇੱਥੇ ਉਹ ਟੀਮਾਂ ਆਉਣਗੀਆਂ ਜੋ ਜਿੱਤ ਚੁੱਕੀਆਂ ਹਨ। ਤੁਸੀਂ ਇਹਨਾਂ ਵਿੱਚੋਂ ਉੱਪਰ ਮੈਚ ਬਣਾ ਸਕਦੇ ਹੋ।</small>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">INITIAL TEAM ENTRY</div>
        <div class="p-15">
            <textarea id="manualTyan" placeholder="Enter All Teams First (Team 1, Team 2...)" style="height:50px; margin-bottom:8px;"></textarea>
            <button class="btn btn-green" onclick="syncTeams()">ADD TO LIST</button>
            <hr style="border:0.5px solid #333; margin:15px 0;">
            <div class="grid-3">
                <input type="text" id="tourName" placeholder="Tournament">
                <input type="text" id="prizeInp" placeholder="Prize">
                <input type="text" id="wmText" placeholder="Watermark">
            </div>
            <button class="btn btn-blue" style="margin-top:8px;" onclick="updateSettings()">SAVE SETTINGS</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {}, allTeams = [], winnersData = [];

    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data; 
        allTeams = data.teams || []; 
        winnersData = data.winnersData || [];
        
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('tourName').value = data.tourName || "";
        document.getElementById('prizeInp').value = data.prize || "";
        document.getElementById('wmText').value = data.watermark || "";

        renderUI();
    });

    function renderUI() {
        // Dropdowns for All Teams
        let opt = `<option value="">Select Team</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        document.getElementById('selA').innerHTML = opt; 
        document.getElementById('selB').innerHTML = opt;
        document.getElementById('selA').value = status.nameA || ""; 
        document.getElementById('selB').value = status.nameB || "";

        // Dropdowns for Winners Only (Manual Fixer)
        let winOpt = `<option value="">Select From Winners</option>`;
        winnersData.forEach(w => winOpt += `<option value="${w.name}">${w.name}</option>`);
        document.getElementById('winSelA').innerHTML = winOpt;
        document.getElementById('winSelB').innerHTML = winOpt;

        // Wing Box Display
        document.getElementById('winnerList').innerHTML = winnersData.map(w => `
            <div class="list-item">🏆 ${w.name} <span style="color:#f39c12">(Score: ${w.score})</span></div>
        `).join('') || "<center><small>No winners yet</small></center>";
    }

    // --- MANUAL MATCH FIXER LOGIC ---
    function fixMatchFromWinners() {
        const t1 = document.getElementById('winSelA').value;
        const t2 = document.getElementById('winSelB').value;
        if(t1 && t2) {
            // Remove from winners inventory and set as current match
            let newWinners = winnersData.filter(w => w.name !== t1 && w.name !== t2);
            db.update({ 
                winnersData: newWinners,
                nameA: t1, nameB: t2, 
                scoreA: 0, scoreB: 0, 
                scoreVisible: true 
            });
            alert("Match Fixed: " + t1 + " VS " + t2);
        } else { alert("Please select two winners!"); }
    }

    function declareWinner() {
        const winN = status.scoreA > status.scoreB ? status.nameA : status.nameB;
        const winS = status.scoreA > status.scoreB ? status.scoreA : status.scoreB;
        if(!status.nameA || !status.nameB) return alert("Select teams first!");
        
        if(confirm(winN + " Won? Moving to Wing Box...")) {
            db.update({ 
                winnersData: [...winnersData, { name: winN, score: winS }], 
                teams: allTeams.filter(t => t !== status.nameA && t !== status.nameB),
                scoreA: 0, scoreB: 0, nameA: "", nameB: ""
            });
        }
    }

    function syncTeams() {
        let input = document.getElementById('manualTyan').value;
        if(!input) return;
        let list = input.split(/[,\n]/).map(t => t.trim()).filter(t => t !== "");
        db.update({ teams: [...allTeams, ...list] });
        document.getElementById('manualTyan').value = "";
    }

    function swapNames() { db.update({ nameA: status.nameB, nameB: status.nameA }); }
    function swapScores() { db.update({ scoreA: status.scoreB, scoreB: status.scoreA }); }
    function swapFull() { db.update({ nameA: status.nameB, nameB: status.nameA, scoreA: status.scoreB, scoreB: status.scoreA }); }
    function changeScore(team, val) {
        let cur = status[team] || 0;
        let newVal = (val > 0) ? (cur === 0 && (status.scoreA+status.scoreB === 0) ? 1.5 : cur + 1) : Math.max(0, cur - 1);
        db.update({ [team]: newVal });
    }
    function updateMatchTeams() { db.update({ nameA: document.getElementById('selA').value, nameB: document.getElementById('selB').value }); }
    function updateSettings() { db.update({ tourName: document.getElementById('tourName').value, prize: document.getElementById('prizeInp').value, watermark: document.getElementById('wmText').value }); }
</script>
</body>
</html>
