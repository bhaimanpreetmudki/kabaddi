<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Admin Pro - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: #e0e0e0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); overflow: hidden; }
        .header { background: #f39c12; color: #000; padding: 10px; text-align: center; font-weight: 900; text-transform: uppercase; font-size: 13px; }
        .p-15 { padding: 15px; }
        input, textarea, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 8px; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-green { background: #238636; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .btn-red { background: #da3633; color: white; }
        .score-display { display: flex; justify-content: space-around; align-items: center; background: #0d1117; padding: 15px; border-radius: 10px; border: 1px solid #f39c12; margin: 10px 0; }
        .score-num { font-size: 45px; font-weight: 900; color: #f39c12; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 120px; overflow-y: auto; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">Tournament Setup</div>
    <div class="p-15">
        <input type="text" id="tourName" placeholder="ਟੂਰਨਾਮੈਂਟ ਦਾ ਨਾਮ..." oninput="updateDB()">
        <textarea id="bulkTeams" placeholder="ਟੀਮਾਂ ਦੇ ਨਾਮ (Team A, Team B)..."></textarea>
        <button class="btn btn-blue" onclick="addBulkTeams()">Add Teams</button>
    </div>
</div>

<div class="card">
    <div class="header">Live Match Control</div>
    <div class="p-15">
        <div class="grid-2">
            <select id="selA"></select>
            <select id="selB"></select>
        </div>
        <button class="btn btn-orange" onclick="updateMatchTeams()">Update Live Match</button>
        <div class="score-display">
            <div style="text-align:center;">
                <div id="dispNameA" style="font-size:12px;">--</div>
                <div class="score-num" id="dispA">0</div>
                <div style="display:flex; gap:5px;"><button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button></div>
            </div>
            <div style="font-weight:900;">VS</div>
            <div style="text-align:center;">
                <div id="dispNameB" style="font-size:12px;">--</div>
                <div class="score-num" id="dispB">0</div>
                <div style="display:flex; gap:5px;"><button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button></div>
            </div>
        </div>
        <button class="btn btn-green" onclick="declareWinner()">🏆 Declare Winner (Loser Leaves)</button>
    </div>
</div>

<div class="card">
    <div class="header">Winners & Next Round</div>
    <div class="p-15">
        <div class="grid-2">
            <select id="winSelA"></select>
            <select id="winSelB"></select>
        </div>
        <button class="btn btn-blue" onclick="fixNextMatch()">Fix Next Match</button>
        <div class="grid-2" style="margin-top:10px;">
            <div><div style="font-size:11px; color:#f39c12;">WINNERS</div><div id="winnerList" class="box-list"></div></div>
            <div><div style="font-size:11px; color:#f39c12;">PLAYING</div><div id="playingList" class="box-list"></div></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, allTeams = [], winners = [];

    db.on("value", (snap) => {
        const data = snap.val() || {};
        allTeams = data.teams || [];
        winners = data.winners || [];
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('dispNameA').innerText = data.nameA || "TEAM 1";
        document.getElementById('dispNameB').innerText = data.nameB || "TEAM 2";
        renderUI();
    });

    function renderUI() {
        let opt = `<option value="">Select Team</option>`;
        let winOpt = `<option value="">Select Winner</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        winners.forEach(w => {
            winOpt += `<option value="${w}">${w}</option>`;
            document.getElementById('winnerList').innerHTML += `<div>${w}</div>`;
        });
        document.getElementById('selA').innerHTML = opt;
        document.getElementById('selB').innerHTML = opt;
        document.getElementById('winSelA').innerHTML = winOpt;
        document.getElementById('winSelB').innerHTML = winOpt;
        document.getElementById('playingList').innerHTML = allTeams.map(t => `<div>${t}</div>`).join('');
    }

    function addBulkTeams() {
        const val = document.getElementById('bulkTeams').value;
        const newTeams = val.split(',').map(i => i.trim()).filter(i => i !== "");
        db.update({ teams: [...new Set([...allTeams, ...newTeams])] });
    }

    function updateMatchTeams() {
        db.update({ nameA: document.getElementById('selA').value, nameB: document.getElementById('selB').value, scoreA: 0, scoreB: 0, scoreVisible: true });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = (val > 0) ? (current === 0 && (curA+curB === 0) ? 1.5 : current + 1) : Math.max(0, current === 1.5 ? 0 : current - 1);
        db.update({ [team]: newVal });
    }

    function declareWinner() {
        const win = curA > curB ? document.getElementById('dispNameA').innerText : document.getElementById('dispNameB').innerText;
        const lose = curA > curB ? document.getElementById('dispNameB').innerText : document.getElementById('dispNameA').innerText;
        if(confirm(win + " wins! " + lose + " will leave?")) {
            db.update({ winners: [...new Set([...winners, win])], teams: allTeams.filter(t => t !== lose), scoreVisible: false });
        }
    }

    function fixNextMatch() {
        db.update({ nameA: document.getElementById('winSelA').value, nameB: document.getElementById('winSelB').value, scoreA: 0, scoreB: 0, scoreVisible: true });
    }
</script>
</body>
</html>
