<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Pro Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: #e0e0e0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .header { background: #f39c12; color: #000; padding: 10px; text-align: center; font-weight: 900; text-transform: uppercase; font-size: 13px; }
        .p-15 { padding: 15px; }
        input, textarea, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 6px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-green { background: #238636; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .btn-red { background: #da3633; color: white; }
        .btn-dark { background: #30363d; color: white; }
        
        .score-row { display: flex; justify-content: space-around; align-items: center; background: #0d1117; padding: 15px; border-radius: 10px; border: 1px solid #30363d; margin: 10px 0; }
        .score-num { font-size: 48px; font-weight: 900; color: #f39c12; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 100px; overflow-y: auto; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">Tournament Info & Upcoming</div>
    <div class="p-15">
        <input type="text" id="tourName" placeholder="Tournament Name" oninput="updateDB()">
        <textarea id="upcomingInp" placeholder="Upcoming Matches (e.g. Semi Final 1: Mudki vs Gill)" oninput="updateDB()"></textarea>
        <textarea id="bulkTeams" placeholder="Add All Teams (Comma separated)"></textarea>
        <button class="btn btn-blue" onclick="addBulkTeams()">Save Teams & Info</button>
    </div>
</div>

<div class="card">
    <div class="header">Live Match Control</div>
    <div class="p-15">
        <div class="grid-2">
            <select id="selA"></select>
            <select id="selB"></select>
        </div>
        <button class="btn btn-orange" onclick="updateMatchTeams()">Set New Match</button>
        
        <div class="score-row">
            <div style="text-align:center;">
                <div id="dispNameA" style="font-size:12px; color:#888;">TEAM 1</div>
                <div class="score-num" id="dispA">0</div>
                <div style="display:flex; gap:5px;"><button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button></div>
            </div>
            <div style="font-weight:900;">VS</div>
            <div style="text-align:center;">
                <div id="dispNameB" style="font-size:12px; color:#888;">TEAM 2</div>
                <div class="score-num" id="dispB">0</div>
                <div style="display:flex; gap:5px;"><button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button></div>
            </div>
        </div>

        <div class="grid-2">
            <button id="visBtn" class="btn btn-blue" onclick="toggleVis('scoreVisible')">Show Score</button>
            <button class="btn btn-dark" onclick="swapTeams()">Swipe Teams (Camera View)</button>
        </div>
        <button class="btn btn-dark" onclick="resetScores()">Reset Score Only</button>
        <button class="btn btn-green" onclick="declareWinner()">🏆 Result (Winner Saves / Loser Leaves)</button>
    </div>
</div>

<div class="card">
    <div class="header">Data Lists</div>
    <div class="p-15">
        <div class="grid-2">
            <div><small>WINNER LIST</small><div id="winnerList" class="box-list"></div></div>
            <div><small>PLAYING TEAMS</small><div id="playingList" class="box-list"></div></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, sVis = false, allTeams = [], winners = [];

    db.on("value", (snap) => {
        const data = snap.val() || {};
        allTeams = data.teams || [];
        winners = data.winners || [];
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;

        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('dispNameA').innerText = data.nameA || "TEAM 1";
        document.getElementById('dispNameB').innerText = data.nameB || "TEAM 2";
        document.getElementById('tourName').value = data.tourName || "";
        document.getElementById('upcomingInp').value = data.upcoming || "";
        document.getElementById('visBtn').innerText = sVis ? "Hide Score" : "Show Score";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#1f6feb";
        
        renderUI();
    });

    function renderUI() {
        let opt = `<option value="">Select Team</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        document.getElementById('selA').innerHTML = opt;
        document.getElementById('selB').innerHTML = opt;
        document.getElementById('winnerList').innerHTML = winners.map(w => `<div>🏆 ${w}</div>`).join('');
        document.getElementById('playingList').innerHTML = allTeams.map(t => `<div>${t}</div>`).join('');
    }

    function addBulkTeams() {
        const val = document.getElementById('bulkTeams').value;
        if(val) {
            const newTeams = val.split(',').map(i => i.trim()).filter(i => i !== "");
            db.update({ teams: [...new Set([...allTeams, ...newTeams])] });
            document.getElementById('bulkTeams').value = "";
        }
        updateDB();
    }

    function updateMatchTeams() {
        db.update({ nameA: document.getElementById('selA').value, nameB: document.getElementById('selB').value, scoreA: 0, scoreB: 0, scoreVisible: true });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = (val > 0) ? (current === 0 && (curA+curB === 0) ? 1.5 : current + 1) : Math.max(0, current === 1.5 ? 0 : current - 1);
        db.update({ [team]: newVal });
    }

    function swapTeams() {
        db.update({ nameA: document.getElementById('dispNameB').innerText, nameB: document.getElementById('dispNameA').innerText, scoreA: curB, scoreB: curA });
    }

    function toggleVis(f) { db.child(f).set(!sVis); }
    function resetScores() { if(confirm("Reset Score?")) db.update({ scoreA: 0, scoreB: 0 }); }

    function declareWinner() {
        const win = curA > curB ? document.getElementById('dispNameA').innerText : document.getElementById('dispNameB').innerText;
        const lose = curA > curB ? document.getElementById('dispNameB').innerText : document.getElementById('dispNameA').innerText;
        if(confirm(win + " wins! " + lose + " will be removed?")) {
            db.update({ winners: [...new Set([...winners, win])], teams: allTeams.filter(t => t !== lose), scoreVisible: false });
        }
    }

    function updateDB() {
        db.update({ tourName: document.getElementById('tourName').value, upcoming: document.getElementById('upcomingInp').value });
    }
</script>
</body>
</html>
