<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Admin - Updated Layout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .penalty-header { background: #f39c12; color: black; }
        .teams-container { display: flex; padding: 10px; gap: 8px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border: 1px solid #30363d; }
        .score-val { font-size: 42px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        .card-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 11px; width: 100%; transition: 0.2s; }
        .card-btn:active { transform: scale(0.95); }
        .std-input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label-text { font-size: 11px; color: #8b949e; margin-bottom: 5px; display: block; text-transform: uppercase; text-align: left; }
        .timer-val { font-size: 55px; color: #f1c40f; font-family: monospace; margin: 10px 0; font-weight: bold; }
        
        /* Goal/Miss Colors */
        .btn-goal { background: #238636; }
        .btn-miss { background: #da3633; }
        .penalty-display { font-size: 18px; font-weight: bold; color: #f1c40f; min-height: 25px; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">

    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header">Scoreboard</div>
        <div class="teams-container">
            <div class="team-box">
                <input type="text" id="nameA" class="std-input" placeholder="TEAM 1" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div class="grid-2">
                    <button class="card-btn" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="card-btn" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div style="flex:1; text-align:center;">
                <button id="visBtn" class="card-btn" style="background:#238636; margin-bottom:8px;" onclick="toggleVis()">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetMatch()">RESET</button>
            </div>
            <div class="team-box">
                <input type="text" id="nameB" class="std-input" placeholder="TEAM 2" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div class="grid-2">
                    <button class="card-btn" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="card-btn" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. PENALTY SHOOTOUT (As requested) -->
    <div class="card">
        <div class="header penalty-header">Penalty Shootout</div>
        <div style="padding:15px; text-align:center; background:#0d1117;">
            <div class="grid-2" style="margin-bottom:15px;">
                <div class="team-box">
                    <span class="label-text">Team A Shoot</span>
                    <div id="pLogA" class="penalty-display">---</div>
                    <div class="grid-2">
                        <button class="card-btn btn-goal" onclick="shoot('A', 'G')">Goal</button>
                        <button class="card-btn btn-miss" onclick="shoot('A', 'M')">Miss</button>
                    </div>
                </div>
                <div class="team-box">
                    <span class="label-text">Team B Shoot</span>
                    <div id="pLogB" class="penalty-display">---</div>
                    <div class="grid-2">
                        <button class="card-btn btn-goal" onclick="shoot('B', 'G')">Goal</button>
                        <button class="card-btn btn-miss" onclick="shoot('B', 'M')">Miss</button>
                    </div>
                </div>
            </div>
            <button class="card-btn" style="background:#333; width:auto; padding:8px 20px;" onclick="resetPenalty()">Clear Shootout</button>
        </div>
    </div>

    <!-- 3. MATCH INFO & TIMER -->
    <div class="card">
        <div class="header">Match Information & Timer</div>
        <div style="padding:15px; text-align:center; background:#0d1117;">
            <div id="timerShow" class="timer-val">00:00</div>
            <div class="grid-2" style="margin-bottom: 15px;">
                <button id="timerBtn" class="card-btn" style="background:#238636; height:45px;" onclick="handleTimerClick()">START</button>
                <button class="card-btn" style="background:#333; height:45px;" onclick="resetTimer()">RESET</button>
            </div>
            <div class="grid-2">
                <div>
                    <span class="label-text">Match Round</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="Semi Final" oninput="updateMatchDB()">
                </div>
                <div>
                    <span class="label-text">Match Half</span>
                    <input type="text" id="halfInp" class="std-input" placeholder="2nd Half" oninput="updateMatchDB()">
                </div>
            </div>
        </div>
    </div>

    <!-- 4. NEXT PROGRAM / UPCOMING (New Box) -->
    <div class="card">
        <div class="header" style="background:#444;">Upcoming Program</div>
        <div style="padding:10px;">
            <span class="label-text">Next Match / Event Details</span>
            <input type="text" id="upcomingInp" class="std-input" placeholder="e.g. Next Match: Team C vs Team D" oninput="updateTickerInfo()">
        </div>
    </div>

    <!-- 5. TICKER & PRIZE INFO -->
    <div class="card">
        <div class="header">Ticker & Tournament Info</div>
        <div style="padding:10px;">
            <span class="label-text">Tournament Name</span>
            <input type="text" id="tourNameInput" class="std-input" placeholder="Tournament Name" oninput="updateTickerInfo()">
            <span class="label-text">Prize List</span>
            <textarea id="prizeInput" class="std-input" style="height:50px; resize:none;" placeholder="1st Prize: ..., 2nd Prize: ..." oninput="updateTickerInfo()"></textarea>
        </div>
    </div>

</div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || "default_user";
    const matchRef = db.ref("users/" + clientID + "/matchData");
    const tickerRef = db.ref("users/" + clientID + "/tickerData");

    let isRunning = false, startTime = 0, elapsedTime = 0, sVis = true;

    // Functions
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            round: document.getElementById('roundInp').value,
            half: document.getElementById('halfInp').value
        });
    }

    function changeScore(team, val) {
        matchRef.child(team).once('value', snap => {
            matchRef.update({ [team]: Math.max(0, (snap.val() || 0) + val) });
        });
    }

    function shoot(team, result) {
        matchRef.child('p' + team).once('value', snap => {
            let current = snap.val() || "";
            if(current.length < 5) matchRef.update({ ['p' + team]: current + result });
        });
    }

    function resetPenalty() { matchRef.update({ pA: "", pB: "" }); }

    function handleTimerClick() {
        const now = Date.now();
        if (!isRunning) matchRef.update({ timerRunning: true, startTime: now - elapsedTime });
        else matchRef.update({ timerRunning: false, elapsedTime: Date.now() - startTime });
    }

    function updateTickerInfo() {
        tickerRef.update({
            tournamentName: document.getElementById('tourNameInput').value,
            prizeInfo: document.getElementById('prizeInput').value,
            upcoming: document.getElementById('upcomingInp').value
        });
    }

    function toggleVis() { matchRef.child('scoreVisible').set(!sVis); }
    function resetMatch() { if(confirm("Reset Everything?")) matchRef.update({ scoreA: 0, scoreB: 0, pA: "", pB: "" }); }
    function resetTimer() { if(confirm("Reset Timer?")) matchRef.update({ timerRunning: false, startTime: 0, elapsedTime: 0, matchTime: "00:00" }); }

    // Sync Data
    matchRef.on("value", snap => {
        const data = snap.val() || {};
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('roundInp').value = data.round || "";
        document.getElementById('halfInp').value = data.half || "";
        
        const formatP = (s) => (s || "").split("").map(x => x === 'G' ? '✅' : '❌').join(" ");
        document.getElementById('pLogA').innerText = formatP(data.pA) || "---";
        document.getElementById('pLogB').innerText = formatP(data.pB) || "---";

        isRunning = !!data.timerRunning;
        startTime = data.startTime || 0;
        elapsedTime = data.elapsedTime || 0;
        sVis = !!data.scoreVisible;
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
        document.getElementById('timerBtn').innerText = isRunning ? "PAUSE" : "START";
        document.getElementById('timerBtn').style.background = isRunning ? "#f39c12" : "#238636";
    });

    tickerRef.on("value", snap => {
        const d = snap.val() || {};
        document.getElementById('tourNameInput').value = d.tournamentName || "";
        document.getElementById('prizeInput').value = d.prizeInfo || "";
        document.getElementById('upcomingInp').value = d.upcoming || "";
    });

    setInterval(() => {
        let ms = isRunning ? (Date.now() - startTime) : elapsedTime;
        let totalSec = Math.floor(ms / 1000);
        let m = Math.floor(totalSec / 60), s = totalSec % 60;
        let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        document.getElementById('timerShow').innerText = timeStr;
        if(isRunning) matchRef.child('matchTime').set(timeStr);
    }, 1000);
</script>
</body>
</html>
