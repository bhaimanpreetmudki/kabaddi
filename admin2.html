<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #drag-container { width: 100%; max-width: 600px; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; }
        .header-flex { background: #f39c12; color: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .header-title { font-weight: 900; text-transform: uppercase; font-size: 11px; }
        .p-15 { padding: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; background: #1c2128; border: 1px solid #30363d; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .score-val { font-size: 50px; font-weight: 900; color: #f39c12; text-align: center; margin: 5px 0; }
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 120px; overflow-y: auto; padding: 8px; font-size: 13px; margin-top: 5px; }
        .list-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; }
        .handle { color: #555; margin-right: 8px; }
        label { font-size: 10px; color: #f39c12; font-weight: bold; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="drag-container">

    <div class="card">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> Live Score Control</span>
            <button id="scoreVisBtn" class="btn btn-green" style="width:auto; padding:4px 10px; font-size:9px;" onclick="toggleVis('scoreVisible')">Show</button>
        </div>
        <div class="p-15">
            <div class="grid-2">
                <div>
                    <label>SELECT TEAM 1</label>
                    <select id="selA" onchange="db.update({nameA: this.value})"></select>
                </div>
                <div>
                    <label>SELECT TEAM 2</label>
                    <select id="selB" onchange="db.update({nameB: this.value})"></select>
                </div>
            </div>
            <div class="grid-2" style="text-align:center;">
                <div>
                    <div class="score-val" id="dispA">0</div>
                    <div class="grid-2"><button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button></div>
                </div>
                <div>
                    <div class="score-val" id="dispB">0</div>
                    <div class="grid-2"><button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button></div>
                </div>
            </div>
            <div class="grid-2">
                <button class="btn btn-blue" onclick="swapFull()">Full Swipe</button>
                <button class="btn btn-red" onclick="confirmReset('score')">Reset Score</button>
            </div>
            <button class="btn btn-green" onclick="declareWinner()">🏆 Win & Move to Wing Box</button>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> Round 2 / Next Match Creator</span>
        </div>
        <div class="p-15">
            <label>SELECT TEAMS TO MAKE MATCH</label>
            <div class="grid-2">
                <select id="matchT1"></select>
                <select id="matchT2"></select>
            </div>
            <button class="btn btn-orange" onclick="addCustomMatch()">Add This Match to List</button>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">
            <span class="header-title"><i class="fas fa-grip-lines handle"></i> Team List & Wing Box</span>
            <button class="btn btn-blue" style="width:auto; padding:4px 10px; font-size:9px;" onclick="promoteWinners()">Promote to List</button>
        </div>
        <div class="p-15">
            <div class="grid-2">
                <div>
                    <label>MAIN MATCH LIST</label>
                    <textarea id="manualTyan" placeholder="Add Teams..." style="height:50px; font-size:11px;" oninput="syncTeams()"></textarea>
                    <div id="playingList" class="box-list"></div>
                </div>
                <div>
                    <label>WING BOX (WINNERS)</label>
                    <div id="winnerList" class="box-list" style="height:190px;"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {}, allTeams = [], winners = [];
    new Sortable(document.getElementById('drag-container'), { animation: 150, handle: '.handle' });

    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data;
        allTeams = data.teams || [];
        winners = data.winners || [];
        
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('manualTyan').value = allTeams.join('\n');
        
        updateSelectors();
        renderUI();
    });

    function updateSelectors() {
        let opt = `<option value="">Select Team</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        
        // ਸਕੋਰ ਸਿਲੈਕਟਰ
        const sA = document.getElementById('selA'), sB = document.getElementById('selB');
        sA.innerHTML = opt; sB.innerHTML = opt;
        sA.value = status.nameA || ""; sB.value = status.nameB || "";

        // ਰਾਊਂਡ 2 ਸਿਲੈਕਟਰ (ਜੇਤੂਆਂ ਵਿੱਚੋਂ ਮੈਚ ਬਣਾਉਣ ਲਈ)
        let winOpt = `<option value="">Select Winner</option>`;
        winners.forEach(w => winOpt += `<option value="${w}">${w}</option>`);
        document.getElementById('matchT1').innerHTML = winOpt;
        document.getElementById('matchT2').innerHTML = winOpt;
    }

    function renderUI() {
        let html = "";
        for(let i=0; i<allTeams.length; i+=2) {
            html += `<div class="list-item"><span>${(i/2)+1}. ${allTeams[i]} VS ${allTeams[i+1] || '?'}</span></div>`;
        }
        document.getElementById('playingList').innerHTML = html;
        document.getElementById('winnerList').innerHTML = winners.map(w => `<div class="list-item">🏆 ${w}</div>`).join('');
    }

    function syncTeams() {
        const list = document.getElementById('manualTyan').value.split('\n').filter(t => t.trim() !== "");
        db.update({ teams: list });
    }

    function addCustomMatch() {
        const t1 = document.getElementById('matchT1').value;
        const t2 = document.getElementById('matchT2').value;
        if(t1 && t2) {
            db.update({ teams: [...allTeams, t1, t2], winners: winners.filter(w => w !== t1 && w !== t2) });
            alert("Match Added to List!");
        }
    }

    function changeScore(team, val) {
        let cur = status[team] || 0;
        let newVal = (val > 0) ? (cur === 0 && (status.scoreA+status.scoreB === 0) ? 1.5 : cur + 1) : Math.max(0, cur === 1.5 ? 0 : cur - 1);
        db.update({ [team]: newVal });
    }

    function declareWinner() {
        const win = status.scoreA > status.scoreB ? status.nameA : status.nameB;
        const lose = status.scoreA > status.scoreB ? status.nameB : status.nameA;
        if(confirm(win + " Wins?")) {
            db.update({ 
                winners: [...winners, win], 
                teams: allTeams.filter(t => t !== win && t !== lose),
                scoreA: 0, scoreB: 0 
            });
        }
    }

    function promoteWinners() {
        if(confirm("Move all winners back to Match List?")) {
            db.update({ teams: [...allTeams, ...winners], winners: [] });
        }
    }

    function toggleVis(key) { db.child(key).set(!status[key]); }
    function confirmReset(type) { if(confirm("Reset?")) db.update({ scoreA: 0, scoreB: 0 }); }
    function swapFull() { db.update({ nameA: status.nameB, nameB: status.nameA, scoreA: status.scoreB, scoreB: status.scoreA }); }
</script>
</body>
</html>
