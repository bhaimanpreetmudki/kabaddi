<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Pro Timer & Score</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .section-divider { border-bottom: 1px solid #30363d; margin: 10px 0; padding-bottom: 5px; color: #2ecc71; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- SCOREBOARD -->
    <div class="card">
        <div class="header">Scoreboard</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div style="flex:1; text-align:center;">
                <button id="visBtn" class="card-btn" style="background:#238636; margin-bottom:5px;" onclick="toggleVis()">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetMatch()">RESET</button>
            </div>
            <div class="team-box" id="boxB">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TIMER CONTROL (FIXED FOR BACKGROUND RUNNING) -->
    <div class="card">
        <div class="header">Persistent Timer Control</div>
        <div style="padding:15px; text-align:center; background:#0d1117;">
            <div id="timerShow" style="font-size:45px; color:#f1c40f; font-family:monospace; margin-bottom:10px;">00:00</div>
            <div class="grid-2">
                <button id="timerBtn" class="card-btn" style="background:#238636; height:45px;" onclick="handleTimerClick()">START</button>
                <button class="card-btn" style="background:#333; height:45px;" onclick="resetTimer()">RESET TIME</button>
            </div>
            
            <div class="section-divider">Match Settings</div>
            <div class="grid-2">
                <div>
                    <span style="font-size:9px; color:#8b949e;">ROUND / MATCH NO</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="e.g. Match 1" oninput="updateMatchDB()">
                </div>
                <div>
                    <span style="font-size:9px; color:#8b949e;">HALF (1st/2nd)</span>
                    <input type="text" id="halfInp" class="std-input" placeholder="e.g. 1st Half" oninput="updateMatchDB()">
                </div>
            </div>
            <div style="margin-top:5px;">
                <span style="font-size:9px; color:#8b949e;">AUTO-STOP DURATION (MIN)</span>
                <input type="number" id="matchDuration" class="std-input" placeholder="e.g. 20" oninput="updateMatchDB()">
            </div>
        </div>
    </div>

    <!-- OTHER INFO BOXES -->
    <div class="card">
        <div class="header">Tournament & Prize Info</div>
        <div style="padding:15px;">
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            <input type="text" id="prizeInfo" class="std-input" placeholder="Prize Details">
            <div class="grid-2">
                <input type="text" id="callNum" class="std-input" placeholder="Call No.">
                <input type="text" id="whatsappNum" class="std-input" placeholder="WhatsApp No.">
            </div>
            <button class="card-btn" style="background:#238636; padding:12px;" onclick="updateTickerInfo()">UPDATE INFO</button>
        </div>
    </div>

</div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || "default_user";
    const matchRef = db.ref("users/" + clientID + "/matchData");
    const tickerRef = db.ref("users/" + clientID + "/tickerData");

    let isRunning = false;
    let startTime = 0;
    let elapsedTime = 0;
    let timerInterval = null;
    let sVis = true;

    // --- SCORE & SETTINGS LOGIC ---
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            round: document.getElementById('roundInp').value,
            half: document.getElementById('halfInp').value,
            duration: document.getElementById('matchDuration').value
        });
    }

    function changeScore(team, val) {
        matchRef.child(team).once('value', snap => {
            let newVal = Math.max(0, (snap.val() || 0) + val);
            matchRef.update({ [team]: newVal });
        });
    }

    function toggleVis() { matchRef.child('scoreVisible').set(!sVis); }

    function resetMatch() {
        if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0 });
    }

    // --- NEW PERSISTENT TIMER LOGIC ---
    function handleTimerClick() {
        if (!isRunning) {
            // Start: Save the current server time minus any already elapsed time
            const now = Date.now();
            matchRef.update({
                timerRunning: true,
                startTime: now - elapsedTime
            });
        } else {
            // Stop: Save the current elapsed time and stop
            matchRef.update({
                timerRunning: false,
                elapsedTime: Date.now() - startTime
            });
        }
    }

    function resetTimer() {
        if(confirm("Reset Timer?")) {
            matchRef.update({
                timerRunning: false,
                startTime: 0,
                elapsedTime: 0,
                matchTime: "00:00"
            });
        }
    }

    function updateTimerDisplay() {
        if (isRunning) {
            const now = Date.now();
            const diff = now - startTime;
            displayTime(diff);
        } else {
            displayTime(elapsedTime);
        }
    }

    function displayTime(ms) {
        let totalSeconds = Math.floor(ms / 1000);
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        document.getElementById('timerShow').innerText = timeStr;
        
        // Push string to DB for Overlay (only if it changes to save bandwidth)
        matchRef.child('matchTime').set(timeStr);

        // Auto Stop
        let limit = parseInt(document.getElementById('matchDuration').value);
        if (limit > 0 && m >= limit && isRunning) {
            handleTimerClick();
            alert("Match Finished!");
        }
    }

    // --- TICKER LOGIC ---
    function updateTickerInfo() {
        tickerRef.update({
            tournamentName: document.getElementById('tourName').value,
            prizeInfo: document.getElementById('prizeInfo').value,
            callNumber: document.getElementById('callNum').value,
            whatsappNumber: document.getElementById('whatsappNum').value
        });
        alert("Ticker Updated!");
    }

    // --- REALTIME LISTENERS ---
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        
        // Sync Scores
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        
        // Sync Round & Half (Working now)
        document.getElementById('roundInp').value = data.round || "";
        document.getElementById('halfInp').value = data.half || "";
        document.getElementById('matchDuration').value = data.duration || "";

        // Sync Visibility
        sVis = !!data.scoreVisible;
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";

        // Sync Timer State
        isRunning = !!data.timerRunning;
        startTime = data.startTime || 0;
        elapsedTime = data.elapsedTime || 0;

        document.getElementById('timerBtn').innerText = isRunning ? "STOP" : "START";
        document.getElementById('timerBtn').style.background = isRunning ? "#da3633" : "#238636";

        if (!isRunning) displayTime(elapsedTime);
    });

    // Run the display update every second
    setInterval(updateTimerDisplay, 1000);

</script>
</body>
</html>
