<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ਤੁਹਾਡਾ ਪੁਰਾਣਾ ਸਟਾਈਲ ਬਰਕਰਾਰ ਹੈ */
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        
        /* ਨਵਾਂ ਸਟਾਈਲ ਕਾਰਡ ਡਿਟੇਲ ਬਾਕਸ ਲਈ */
        .card-log { margin-top: 8px; padding: 5px; background: #000; border-radius: 4px; min-height: 40px; font-size: 11px; color: #f1c40f; text-align: left; border: 1px solid #333; overflow-y: auto; max-height: 60px; }
        
        .std-textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; min-height: 45px; resize: none; overflow: hidden; }
        .content { padding: 15px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-bottom: 10px;}
        .btn-ticker { background: #ff5722; color: white; margin-bottom: 15px; height: 50px; font-size: 16px; border-radius: 6px; border:none; width:100%; font-weight:bold; cursor:pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .flex-row { display: flex; gap: 5px; margin-top: 8px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard & Quick Actions</div>
        <div class="teams-container">
            <!-- TEAM A -->
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="Player No">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('A', 'Red')">RC</button>
                </div>
                <!-- Card History Box A -->
                <div id="logA" class="card-log">No Cards</div>
            </div>

            <div class="mid-controls" style="flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center;">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetOnlyScore()">RESET</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>

            <!-- TEAM B -->
            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="Player No">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('B', 'Red')">RC</button>
                </div>
                <!-- Card History Box B -->
                <div id="logB" class="card-log">No Cards</div>
            </div>
        </div>
    </div>

    <!-- ਬਾਕੀ ਸੈਕਸ਼ਨ (Match Info, Ticker ਆਦਿ) ਤੁਹਾਡੇ ਪੁਰਾਣੇ ਕੋਡ ਵਾਂਗ ਹੀ ਰਹਿਣਗੇ -->
    <!-- ... (ਵਕਤ ਬਚਾਉਣ ਲਈ ਇੱਥੇ ਨਹੀਂ ਲਿਖਿਆ, ਪਰ ਤੁਹਾਡੇ ਕੋਡ ਵਿੱਚ ਮੌਜੂਦ ਹੈ) ... -->

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || "default_user";

    const matchRef = db.ref("users/" + clientID + "/matchData");
    const tickerRef = db.ref("users/" + clientID + "/tickerData");

    let curA = 0, curB = 0, sVis = true;

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function handleCard(team, type) {
        let pNo = document.getElementById('player' + team).value;
        if(!pNo) { alert("ਪਲੇਅਰ ਨੰਬਰ ਲਿਖੋ!"); return; }
        
        // ਪੁਰਾਣਾ ਡਾਟਾ ਪੜ੍ਹ ਕੇ ਨਵਾਂ ਇਵੈਂਟ ਜੋੜਨਾ
        matchRef.child('cards' + team).once('value', (snap) => {
            let currentCards = snap.val() || "";
            let newEntry = (type === 'Yellow' ? "🟨" : "🟥") + " #" + pNo + " ";
            matchRef.child('cards' + team).set(currentCards + newEntry);
            matchRef.child('lastEvent').set(team + " Team: " + type + " Card to #" + pNo);
        });
        document.getElementById('player' + team).value = ""; // Clear input
    }

    function toggleVis(field) { matchRef.child(field).set(!sVis); }
    
    function resetOnlyScore() { 
        if(confirm("Reset Score & Cards?")) {
            matchRef.update({ scoreA: 0, scoreB: 0, cardsA: "", cardsB: "", lastEvent: "" });
        }
    }

    // --- REALTIME LISTENER (ਡਾਟਾ ਹਰ ਫੋਨ 'ਤੇ ਸਿੰਕ ਰਹੇਗਾ) ---
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;

        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('colorA').value = data.colorA || "#ffffff";
        document.getElementById('colorB').value = data.colorB || "#ffffff";
        
        // ਕਾਰਡ ਹਿਸਟਰੀ ਅਪਡੇਟ
        document.getElementById('logA').innerText = data.cardsA || "No Cards";
        document.getElementById('logB').innerText = data.cardsB || "No Cards";
        
        document.getElementById('boxA').style.borderTopColor = data.colorA;
        document.getElementById('boxB').style.borderTopColor = data.colorB;
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });
</script>
</body>
</html>
