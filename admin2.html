<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabaddi Admin Pro - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; width: 100%; max-width: 600px; }
        .header-flex { background: #f39c12; color: #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .p-15 { padding: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        .btn { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-orange { background: #f39c12; color: black; }
        .score-val { font-size: 60px; font-weight: 900; color: #f39c12; text-align: center; line-height: 1; margin: 10px 0; }
        
        /* MATCH LIST BOX STYLE */
        .box-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; height: 200px; overflow-y: auto; padding: 5px; margin-top: 5px; }
        .list-item { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; font-size: 12px; transition: 0.3s; }
        .list-item:hover { background: #1c2128; }
        .match-tag { background: #30363d; color: #f39c12; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; margin-right: 8px; }
        .live-status { background: #da3633; color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .edit-btn { background: none; border: none; color: #1f6feb; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-flex">LIVE SCORE CONTROL <button class="btn btn-blue" style="padding:4px 8px;" onclick="toggleVis('scoreVisible')">SHOW/HIDE</button></div>
        <div class="p-15">
            <div class="grid-2">
                <select id="selA" onchange="updateMatchTeams()"></select>
                <select id="selB" onchange="updateMatchTeams()"></select>
            </div>
            <div style="background:#0d1117; border-radius:10px; padding:10px; border:1px solid #333; margin:10px 0;">
                <div class="grid-2">
                    <div>
                        <div class="score-val" id="dispA">0</div>
                        <div class="grid-2"><button class="btn btn-green" onclick="changeScore('scoreA', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreA', -1)">-</button></div>
                    </div>
                    <div>
                        <div class="score-val" id="dispB">0</div>
                        <div class="grid-2"><button class="btn btn-green" onclick="changeScore('scoreB', 1)">+</button><button class="btn btn-red" onclick="changeScore('scoreB', -1)">-</button></div>
                    </div>
                </div>
            </div>
            <button class="btn btn-green" style="padding:15px; width:100%;" onclick="declareWinner()">🏆 DECLARE WINNER & MOVE TO WING BOX</button>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">TYIAN / MATCH LIST BOX</div>
        <div class="p-15">
            <div class="box-list" id="playingList">
                </div>
            <div class="grid-2" style="margin-top:10px;">
                <button class="btn btn-blue" onclick="promoteWinners()">PROMOTE WINNERS</button>
                <button class="btn btn-red" onclick="resetTeams()">CLEAR LIST</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">WING BOX (WINNERS)</div>
        <div class="p-15">
            <div class="box-list" id="winnerList" style="height: 120px;"></div>
        </div>
    </div>

    <div class="card">
        <div class="header-flex">ADD NEW TEAMS</div>
        <div class="p-15">
            <textarea id="manualTyan" placeholder="Enter names: Team A, Team B..." style="height:60px; margin-bottom:8px;"></textarea>
            <button class="btn btn-green" onclick="syncTeams()">ADD TO MATCH LIST</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("kabaddiMatch");

    let status = {}, allTeams = [], winnersData = [];

    db.on("value", (snap) => {
        const data = snap.val() || {};
        status = data; 
        allTeams = data.teams || []; 
        winnersData = data.winnersData || [];
        
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;

        renderUI();
    });

    function renderUI() {
        // Dropdowns
        let opt = `<option value="">Select Team</option>`;
        allTeams.forEach(t => opt += `<option value="${t}">${t}</option>`);
        document.getElementById('selA').innerHTML = opt; 
        document.getElementById('selB').innerHTML = opt;
        document.getElementById('selA').value = status.nameA || ""; 
        document.getElementById('selB').value = status.nameB || "";

        // --- MATCH LIST LOGIC ---
        let matchHtml = "";
        let count = 1;
        for (let i = 0; i < allTeams.length; i += 2) {
            let t1 = allTeams[i];
            let t2 = allTeams[i+1];
            
            let isLive = (t1 === status.nameA && t2 === status.nameB) || (t1 === status.nameB && t2 === status.nameA);
            
            if (t2) {
                matchHtml += `
                <div class="list-item">
                    <span><span class="match-tag">${count}</span> ${t1} <b style="color:#f39c12">VS</b> ${t2}</span>
                    ${isLive ? '<span class="live-status">LIVE</span>' : ''}
                    <button class="edit-btn" onclick="editTeam(${i})"><i class="fas fa-edit"></i></button>
                </div>`;
            } else {
                matchHtml += `
                <div class="list-item">
                    <span><span class="match-tag">${count}</span> ${t1}</span>
                    <b style="color:#238636; font-size:10px;">BYE</b>
                    <button class="edit-btn" onclick="editTeam(${i})"><i class="fas fa-edit"></i></button>
                </div>`;
            }
            count++;
        }
        document.getElementById('playingList').innerHTML = matchHtml || "<center><small>No teams added</small></center>";

        // Winner List
        document.getElementById('winnerList').innerHTML = winnersData.map((w, i) => `
            <div class="list-item"><span>🏆 ${w.name} (${w.score})</span><button class="edit-btn" onclick="editWinner(${i})"><i class="fas fa-edit"></i></button></div>
        `).join('');
    }

    function changeScore(team, val) {
        let cur = status[team] || 0;
        let newVal = (val > 0) ? (cur === 0 && (status.scoreA+status.scoreB === 0) ? 1.5 : cur + 1) : Math.max(0, cur - 1);
        db.update({ [team]: newVal });
    }

    function updateMatchTeams() {
        db.update({ nameA: document.getElementById('selA').value, nameB: document.getElementById('selB').value });
    }

    function declareWinner() {
        const winN = status.scoreA > status.scoreB ? status.nameA : status.nameB;
        const winS = status.scoreA > status.scoreB ? status.scoreA : status.scoreB;
        if(!status.nameA || !status.nameB) return alert("Select teams!");
        if(confirm(winN + " Won?")) {
            db.update({ 
                winnersData: [...winnersData, { name: winN, score: winS }], 
                teams: allTeams.filter(t => t !== status.nameA && t !== status.nameB),
                scoreA: 0, scoreB: 0, nameA: "", nameB: ""
            });
        }
    }

    function syncTeams() {
        let input = document.getElementById('manualTyan').value;
        if(!input) return;
        let list = input.split(/[,\n]/).map(t => t.trim()).filter(t => t !== "");
        db.update({ teams: [...allTeams, ...list] });
        document.getElementById('manualTyan').value = "";
    }

    function promoteWinners() {
        if(winnersData.length === 0) return alert("No winners!");
        if(confirm("Promote winners to next round?")) {
            db.update({ teams: [...allTeams, ...winnersData.map(w => w.name)], winnersData: [] });
        }
    }

    function resetTeams() { if(confirm("Clear Match List?")) db.update({ teams: [] }); }
    function toggleVis(key) { db.child(key).set(!status[key]); }
    
    function editTeam(idx) {
        let n = prompt("Edit Team Name:", allTeams[idx]);
        if(n) { allTeams[idx] = n; db.update({ teams: allTeams }); }
    }
    function editWinner(idx) {
        let n = prompt("Edit Winner:", winnersData[idx].name);
        let s = prompt("Edit Score:", winnersData[idx].score);
        if(n) { winnersData[idx].name = n; winnersData[idx].score = s; db.update({ winnersData: winnersData }); }
    }
</script>
</body>
</html>
