<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .std-textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; min-height: 45px; resize: none; overflow: hidden; }
        .label-text, .label-title { font-size: 10px; color: #8b949e; display: block; margin-top: 5px; text-align: left; text-transform: uppercase; font-weight: bold; }
        .content { padding: 15px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-bottom: 10px;}
        .btn-ticker { background: #ff5722; color: white; margin-bottom: 15px; height: 50px; font-size: 16px; border-radius: 6px; border:none; width:100%; font-weight:bold; cursor:pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .flex-row { display: flex; gap: 5px; margin-top: 8px; }
        #penaltyControlSection { display: none; background: #1c2128; padding: 15px; border-top: 3px solid #f39c12; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard & Quick Actions</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="No" style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('A', 'Red')">RC</button>
                </div>
            </div>

            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetOnlyScore()">RESET</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="No" style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:#000;" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('B', 'Red')">RC</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MATCH INFO -->
    <div class="card">
        <div class="header"><i class="fas fa-info-circle"></i> Match Information</div>
        <div style="padding:12px; background:#0d1117;">
            <div class="grid-2">
                <div style="text-align:center; border-right: 1px solid #333; padding-right:10px;">
                    <div id="timerShow" style="font-size:32px; color:#f1c40f; font-family:monospace;">00:00</div>
                    <div class="flex-row">
                        <button class="card-btn" style="background:#238636;" onclick="startTimer()">Start</button>
                        <button class="card-btn" style="background:#f39c12;" onclick="pauseTimer()">Pause</button>
                        <button class="card-btn" style="background:#333;" onclick="resetTimer()">00</button>
                    </div>
                </div>
                <div style="padding-left:5px;">
                    <input type="text" id="matchRound" class="std-input" placeholder="Semi-Final" oninput="updateMatchDB()">
                    <input type="text" id="roundInp" class="std-input" placeholder="1st Half" oninput="updateMatchDB()">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#30363d; font-size:8px;" onclick="setHalf('1st Half')">1st Half</button>
                        <button class="card-btn" style="background:#30363d; font-size:8px;" onclick="setHalf('2nd Half')">2nd Half</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. PENALTY SHOOTOUT -->
    <div class="card">
        <div class="header" style="background:#f39c12; color:#000;">Penalty Shootout</div>
        <div style="padding:10px; display:flex; gap:5px;">
            <button id="pVisBtn" class="card-btn" style="background:#f39c12; color:#000;" onclick="togglePenaltyVis()">Show Penalty</button>
            <button class="card-btn" style="background:#333;" onclick="resetPenaltyOnly()">Reset Penalty</button>
        </div>
        <div id="penaltyControlSection">
            <div class="grid-2">
                <div>
                    <input type="text" id="pA" class="std-input" readonly style="text-align:center;">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pA', '✅')">Goal</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pA', '❌')">Miss</button>
                    </div>
                </div>
                <div>
                    <input type="text" id="pB" class="std-input" readonly style="text-align:center;">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pB', '✅')">Goal</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pB', '❌')">Miss</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. TICKER INFO -->
    <div class="card">
        <div class="header" style="background:#444;">Ticker Info & Next Program</div>
        <div class="content">
            <button id="tickerToggleBtn" class="btn-ticker" onclick="confirmTickerAction('vis')">Ticker: ON/OFF</button>
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            <input type="text" id="prizeList" class="std-input" placeholder="Prizes">
            <input type="text" id="contactInfo" class="std-input" placeholder="Call Number">
            <input type="text" id="whatsappNumber" class="std-input" placeholder="WhatsApp Number">
            <textarea id="teamsList" class="std-textarea" placeholder="Enter Team names here..."></textarea>
            <input type="text" id="nextProg" class="std-input" placeholder="ਅਗਲਾ ਪ੍ਰੋਗਰਾਮ...">
            <button class="btn-update" style="background: #238636;" onclick="confirmTickerAction('info')">Update Ticker Info</button>
            <div style="display:flex; gap:5px;">
                <input type="text" id="wmText" class="std-input" placeholder="Brand Name" style="margin:0;">
                <button class="btn-update" style="width:80px; margin:0;" onclick="confirmTickerAction('wm')">Set</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="padding:10px;">
            <button class="card-btn" style="background:#e74c3c; padding:12px; font-size:12px;" onclick="fullReset()">RESET EVERYTHING</button>
        </div>
    </div>
</div>

<script>
    // --- ਫਾਇਰਬੇਸ ਕੌਂਫਿਗ ---
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id');
    if (!clientID) { alert("Client ID Missing!"); }

    const matchRef = db.ref("users/" + clientID + "/matchData");
    const tickerRef = db.ref("users/" + clientID + "/tickerData");

    let curA = 0, curB = 0, sVis = true, pVis = false;
    let yellowCounts = {};
    let tickerStatus = true;
    let timerInterval = null;
    let startTime = 0;
    let elapsedTime = 0;
    let isRunning = false;

    // --- ਡਾਟਾਬੇਸ ਅਪਡੇਟ ---
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            matchRound: document.getElementById('matchRound').value,
            round: document.getElementById('roundInp').value
        });
    }

    // --- ਸਕੋਰ ਅਤੇ ਕਾਰਡ ---
    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function handleCard(team, type) {
        let pDetail = document.getElementById('player' + team).value;
        if(!pDetail) { alert("ਖਿਡਾਰੀ ਦਾ ਨੰਬਰ ਲਿਖੋ!"); return; }
        let key = team + "_" + pDetail;
        let eventMsg = "";
        let flashType = "";

        if(type === 'Yellow') {
            yellowCounts[key] = (yellowCounts[key] || 0) + 1;
            if(yellowCounts[key] >= 2) {
                eventMsg = "RED CARD (2nd Yellow): Team " + team + " No." + pDetail;
                flashType = "red_card";
            } else {
                eventMsg = "YELLOW CARD: Team " + team + " No." + pDetail;
                flashType = "yellow_card";
            }
        } else {
            eventMsg = "RED CARD: Team " + team + " No." + pDetail;
            flashType = "red_card";
        }

        matchRef.update({ lastEvent: eventMsg, eventType: flashType, eventTime: Date.now() });
        alert(eventMsg);
    }

    // --- ਟਾਈਮਰ ਲੋਜਿਕ ---
    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        const now = Date.now();
        startTime = now - elapsedTime;
        matchRef.update({ timerStartedAt: startTime, timerRunning: true });
        runTimerUI();
    }

    function runTimerUI() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now = Date.now();
            elapsedTime = now - startTime;
            let totalSecs = Math.floor(elapsedTime / 1000);
            let m = Math.floor(totalSecs / 60);
            let s = totalSecs % 60;
            let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            document.getElementById('timerShow').innerText = timeStr;
            if (totalSecs % 2 === 0) matchRef.child('matchTime').set(timeStr);
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        matchRef.update({ timerRunning: false, savedTime: elapsedTime });
    }

    function resetTimer() {
        pauseTimer();
        elapsedTime = 0;
        document.getElementById('timerShow').innerText = "00:00";
        matchRef.update({ matchTime: "00:00", savedTime: 0, timerStartedAt: 0 });
    }

    // --- ਪੈਨਲਟੀ ਅਤੇ ਹੋਰ ---
    function addPenalty(id, icon) {
        let inp = document.getElementById(id);
        if((inp.value.match(/✅|❌/g) || []).length >= 5) return;
        inp.value += icon;
        updateMatchDB();
    }
    function togglePenaltyVis() { matchRef.child('penaltyVisible').set(!pVis); }
    function toggleVis(field) { matchRef.child(field).set(!sVis); }
    function resetPenaltyOnly() { matchRef.update({ penaltyA: "", penaltyB: "" }); }
    function resetOnlyScore() { if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }
    function setHalf(v) { document.getElementById('roundInp').value = v; updateMatchDB(); }

    function fullReset() {
        if(confirm("Reset Everything?")) {
            yellowCounts = {}; resetTimer();
            matchRef.update({ scoreA: 0, scoreB: 0, penaltyA: "", penaltyB: "", penaltyVisible: false, lastEvent: "" });
        }
    }

    function confirmTickerAction(type) {
        if (type === 'info') {
            tickerRef.update({
                tournamentName: tourName.value, prizes: prizeList.value,
                contact: contactInfo.value, whatsapp: whatsappNumber.value,
                nextProgram: nextProg.value, participatingTeams: document.getElementById('teamsList').value
            });
        } else if (type === 'wm') {
            tickerRef.update({ watermarkText: wmText.value });
        } else if (type === 'vis') {
            tickerRef.child('tickerVis').set(!tickerStatus);
        }
    }

    // --- ਰੀਅਲਟਾਈਮ ਲਿਸਨਰ ---
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible; pVis = !!data.penaltyVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('pA').value = data.penaltyA || "";
        document.getElementById('pB').value = data.penaltyB || "";
        
        if (data.timerRunning && !isRunning) {
            startTime = data.timerStartedAt; isRunning = true; runTimerUI();
        } else if (!data.timerRunning) {
            clearInterval(timerInterval); isRunning = false;
            document.getElementById('timerShow').innerText = data.matchTime || "00:00";
            elapsedTime = data.savedTime || 0;
        }

        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
        document.getElementById('penaltyControlSection').style.display = pVis ? "block" : "none";
    });

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        tickerStatus = !!data.tickerVis;
        document.getElementById('tickerToggleBtn').style.background = tickerStatus ? "#238636" : "#da3633";
    });
</script>
</body>
</html>
