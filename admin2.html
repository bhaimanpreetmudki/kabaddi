<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Admin - Penalty Layout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; flex: 1; width: 100%; }
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .penalty-log { font-size: 18px; letter-spacing: 2px; color: #f1c40f; margin-top: 8px; min-height: 25px; background: #0d1117; border-radius: 4px; padding: 5px; text-align: center; }
        
        .collapsible-header { background: #f39c12; color: black; cursor: pointer; display: flex; justify-content: space-between; padding: 10px; font-size: 12px; font-weight: bold; }
        .content-panel { display: block; padding: 10px; background: #0d1117; }
        .label-text { font-size: 11px; color: #8b949e; margin-bottom: 4px; display: block; text-transform: uppercase; }
        .btn-goal { background: #238636; }
        .btn-miss { background: #da3633; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">

    <!-- 1. PENALTY (PLANTI) BOX (GOAL/MISS) -->
    <div class="card">
        <div class="collapsible-header">
            <span><i class="fas fa-volleyball-ball"></i> PENALTY (PLANTI) SHOOTOUT</span>
            <i class="fas fa-minus"></i>
        </div>
        <div id="penaltyBox" class="content-panel">
            <div class="grid-2">
                <div class="team-box">
                    <span class="label-text">Team A Shoot</span>
                    <div class="grid-2">
                        <button class="card-btn btn-goal" onclick="addShoot('A', 'G')">Goal</button>
                        <button class="card-btn btn-miss" onclick="addShoot('A', 'M')">Miss</button>
                    </div>
                    <div class="penalty-log" id="logA">---</div>
                </div>
                <div class="team-box">
                    <span class="label-text">Team B Shoot</span>
                    <div class="grid-2">
                        <button class="card-btn btn-goal" onclick="addShoot('B', 'G')">Goal</button>
                        <button class="card-btn btn-miss" onclick="addShoot('B', 'M')">Miss</button>
                    </div>
                    <div class="penalty-log" id="logB">---</div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <button class="card-btn" style="background:#333; width: auto; padding: 8px 20px;" onclick="resetPenaltyOnly()">Clear Penalty Log</button>
            </div>
        </div>
    </div>

    <!-- 2. SCOREBOARD -->
    <div class="card">
        <div class="header">Scoreboard</div>
        <div class="teams-container">
            <div class="team-box">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div style="flex:1; text-align:center; padding: 0 5px;">
                <button id="visBtn" class="card-btn" style="background:#238636; margin-bottom:5px;" onclick="toggleVis()">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetMatch()">RESET</button>
            </div>
            <div class="team-box">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ਬਾਕੀ ਸੈਕਸ਼ਨ (Timer, Ticker ਆਦਿ) ਪਹਿਲਾਂ ਵਾਂਗ ਹੀ ਰਹਿਣਗੇ... -->
    <!-- (ਸਪੇਸ ਬਚਾਉਣ ਲਈ ਥੋੜਾ ਛੋਟਾ ਕੀਤਾ ਗਿਆ ਹੈ) -->
    <div class="card">
        <div class="header">Persistent Timer</div>
        <div style="padding:15px; text-align:center; background:#0d1117;">
            <div id="timerShow" style="font-size:45px; color:#f1c40f; font-family:monospace; margin-bottom:10px;">00:00</div>
            <div class="grid-2">
                <button id="timerBtn" class="card-btn" style="background:#238636; height:45px;" onclick="handleTimerClick()">START</button>
                <button class="card-btn" style="background:#333; height:45px;" onclick="resetTimer()">RESET TIME</button>
            </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || "default_user";
    const matchRef = db.ref("users/" + clientID + "/matchData");

    let isRunning = false, startTime = 0, elapsedTime = 0, sVis = true;

    function addShoot(team, res) {
        matchRef.child('p' + team).once('value', snap => {
            let current = snap.val() || "";
            if(current.length < 5) matchRef.update({ ['p' + team]: current + res });
        });
    }

    function resetPenaltyOnly() {
        if(confirm("Clear Penalty Shootout?")) matchRef.update({ pA: "", pB: "" });
    }

    // ਬਾਕੀ ਫੰਕਸ਼ਨ ਪਹਿਲਾਂ ਵਾਲੇ ਹੀ ਕੰਮ ਕਰਨਗੇ...
    function changeScore(team, val) {
        matchRef.child(team).once('value', snap => {
            matchRef.update({ [team]: Math.max(0, (snap.val() || 0) + val) });
        });
    }

    function handleTimerClick() {
        const now = Date.now();
        if (!isRunning) matchRef.update({ timerRunning: true, startTime: now - elapsedTime });
        else matchRef.update({ timerRunning: false, elapsedTime: Date.now() - startTime });
    }

    function toggleVis() { matchRef.child('scoreVisible').set(!sVis); }
    function resetMatch() { if(confirm("Reset Everything?")) matchRef.update({ scoreA: 0, scoreB: 0, pA: "", pB: "" }); }
    function resetTimer() { if(confirm("Reset Timer?")) matchRef.update({ timerRunning: false, startTime: 0, elapsedTime: 0, matchTime: "00:00" }); }

    matchRef.on("value", snap => {
        const data = snap.val() || {};
        document.getElementById('dispA').innerText = data.scoreA || 0;
        document.getElementById('dispB').innerText = data.scoreB || 0;
        
        // Penalty Icons Rendering
        const renderP = (s) => !s ? "---" : s.split("").map(x => x === 'G' ? '✅' : '❌').join(" ");
        document.getElementById('logA').innerHTML = renderP(data.pA);
        document.getElementById('logB').innerHTML = renderP(data.pB);

        isRunning = !!data.timerRunning;
        startTime = data.startTime || 0;
        elapsedTime = data.elapsedTime || 0;
        sVis = !!data.scoreVisible;
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });

    setInterval(() => {
        let ms = isRunning ? (Date.now() - startTime) : elapsedTime;
        let totalSec = Math.floor(ms / 1000);
        let m = Math.floor(totalSec / 60), s = totalSec % 60;
        let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        document.getElementById('timerShow').innerText = timeStr;
        if(isRunning) matchRef.child('matchTime').set(timeStr);
    }, 1000);
</script>
</body>
</html>
