<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Mudki - Football Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; overflow: hidden; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }
        .std-input { width: 90%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; margin: 5px; }
        .btn-box { display: flex; gap: 5px; padding: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .score-display { font-size: 40px; font-weight: 900; text-align: center; margin: 10px 0; color: #2ecc71; }
        .timer-box { font-size: 30px; text-align: center; color: #f1c40f; padding: 10px; background: #000; border-radius: 8px; margin: 10px; }
        #cardLogs { background: #0d1117; padding: 10px; max-height: 150px; overflow-y: auto; font-size: 12px; }
        .log-item { border-bottom: 1px solid #333; padding: 5px 0; }
    </style>
</head>
<body>

<!-- 1. ਮੈਚ ਟਾਈਮਰ ਕੰਟਰੋਲ -->
<div class="card">
    <div class="header">LIVE MATCH TIMER (Background Safe)</div>
    <div class="timer-box" id="timerDisplay">00:00</div>
    <div class="btn-box">
        <button class="btn" style="background:#238636;" onclick="startMatchTimer()">START</button>
        <button class="btn" style="background:#f39c12;" onclick="pauseMatchTimer()">PAUSE</button>
        <button class="btn" style="background:#da3633;" onclick="resetMatchTimer()">RESET</button>
    </div>
</div>

<!-- 2. ਸਕੋਰ ਅਤੇ ਕਾਰਡ ਕੰਟਰੋਲ -->
<div class="card">
    <div class="header">SCORE & CARDS</div>
    <div style="display: flex; text-align: center;">
        <div style="flex:1; border-right: 1px solid #333;">
            <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateNames()">
            <div class="score-display" id="dispA">0</div>
            <button class="btn" style="background:#238636; width:80%;" onclick="changeScore('scoreA', 1)">+ Goal</button>
            <input type="text" id="playerA" class="std-input" placeholder="Jersy No.">
            <div class="btn-box">
                <button class="btn" style="background:#f1c40f; color:black;" onclick="sendCard('A', 'Yellow')">YC</button>
                <button class="btn" style="background:#e74c3c;" onclick="sendCard('A', 'Red')">RC</button>
            </div>
        </div>
        <div style="flex:1;">
            <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateNames()">
            <div class="score-display" id="dispB">0</div>
            <button class="btn" style="background:#238636; width:80%;" onclick="changeScore('scoreB', 1)">+ Goal</button>
            <input type="text" id="playerB" class="std-input" placeholder="Jersy No.">
            <div class="btn-box">
                <button class="btn" style="background:#f1c40f; color:black;" onclick="sendCard('B', 'Yellow')">YC</button>
                <button class="btn" style="background:#e74c3c;" onclick="sendCard('B', 'Red')">RC</button>
            </div>
        </div>
    </div>
</div>

<!-- 3. ਕਾਰਡ ਡਿਟੇਲ ਬਾਕਸ -->
<div class="card">
    <div class="header">CARD HISTORY (ਡਿਟੇਲ ਵਾਲਾ ਬਾਕਸ)</div>
    <div id="cardLogs">
        <div style="color:#8b949e; text-align:center;">No cards issued yet.</div>
    </div>
    <button class="btn" style="background:#333; width:100%;" onclick="clearLogs()">Clear History</button>
</div>

<script>
    // ਫਾਇਰਬੇਸ ਕੌਂਫਿਗ
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // URL ਤੋਂ ID ਲੈਣਾ (e.g., football.html?id=mudki)
    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id') || 'default';
    const matchRef = db.ref("users/" + clientID + "/matchData");

    let scoreA = 0, scoreB = 0;
    let timerInterval;

    // --- ਟਾਈਮਰ ਫੰਕਸ਼ਨ (Background Safe) ---
    function startMatchTimer() {
        const now = Date.now();
        matchRef.update({ timerRunning: true, startTime: now });
    }

    function pauseMatchTimer() {
        matchRef.child('timerRunning').once('value', snap => {
            if(snap.val()){
                matchRef.update({ timerRunning: false, savedTime: currentElapsed });
            }
        });
    }

    function resetMatchTimer() {
        matchRef.update({ timerRunning: false, startTime: 0, savedTime: 0, matchTime: "00:00" });
    }

    // --- ਸਕੋਰ ਅਤੇ ਨਾਮ ---
    function changeScore(team, val) {
        let current = (team === 'scoreA' ? scoreA : scoreB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function updateNames() {
        matchRef.update({ 
            nameA: document.getElementById('nameA').value, 
            nameB: document.getElementById('nameB').value 
        });
    }

    // --- ਕਾਰਡ ਸਿਸਟਮ ---
    function sendCard(team, type) {
        let pNum = document.getElementById('player' + team).value;
        if(!pNum) { alert("ਪਹਿਲਾਂ ਖਿਡਾਰੀ ਦਾ ਨੰਬਰ ਲਿਖੋ!"); return; }
        
        let logMsg = `Team ${team} | No. ${pNum} | ${type} Card`;
        let logRef = matchRef.child('cardHistory').push();
        logRef.set({ msg: logMsg, time: new Date().toLocaleTimeString() });
        
        // ਓਵਰਲੇਅ ਲਈ ਫਲੈਸ਼ ਈਵੈਂਟ
        matchRef.update({ 
            lastEvent: logMsg, 
            eventType: type === 'Yellow' ? 'yellow_card' : 'red_card',
            eventTime: Date.now() 
        });
    }

    function clearLogs() { matchRef.child('cardHistory').remove(); }

    // --- ਰੀਅਲਟਾਈਮ ਡਾਟਾ ਲਿਸਨਰ ---
    matchRef.on('value', snap => {
        const data = snap.val() || {};
        scoreA = data.scoreA || 0;
        scoreB = data.scoreB || 0;
        document.getElementById('dispA').innerText = scoreA;
        document.getElementById('dispB').innerText = scoreB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";

        // ਟਾਈਮਰ ਲੋਜਿਕ
        if (data.timerRunning) {
            if(!timerInterval) {
                timerInterval = setInterval(() => {
                    let elapsed = Date.now() - data.startTime + (data.savedTime || 0);
                    currentElapsed = elapsed;
                    let m = Math.floor(elapsed / 60000);
                    let s = Math.floor((elapsed % 60000) / 1000);
                    let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
                    document.getElementById('timerDisplay').innerText = timeStr;
                    // ਹਰ 2 ਸੈਕਿੰਡ ਬਾਅਦ ਡਾਟਾਬੇਸ ਵਿੱਚ ਟਾਈਮ ਅਪਡੇਟ (ਓਵਰਲੇਅ ਲਈ)
                    if(s % 2 === 0) matchRef.child('matchTime').set(timeStr);
                }, 1000);
            }
        } else {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('timerDisplay').innerText = data.matchTime || "00:00";
        }

        // ਕਾਰਡ ਹਿਸਟਰੀ ਅਪਡੇਟ
        let historyHTML = "";
        if(data.cardHistory) {
            Object.values(data.cardHistory).reverse().forEach(log => {
                historyHTML += `<div class="log-item"><b>${log.time}</b> - ${log.msg}</div>`;
            });
            document.getElementById('cardLogs').innerHTML = historyHTML;
        } else {
            document.getElementById('cardLogs').innerHTML = "No cards issued.";
        }
    });
</script>
</body>
</html>
