<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Pro Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #16191c; width: 100%; max-width: 500px; border-radius: 15px; border: 1px solid #333; overflow: hidden; margin-bottom: 15px; box-sizing: border-box;}
        .header { background: #27ae60; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        .teams-container { display: flex; padding: 15px; gap: 10px; background: #1a1d21; }
        .team-box { flex: 1; text-align: center; position: relative; }
        .team-input { width: 90%; padding: 8px; background: #000; border: 1px solid #444; color: white; border-radius: 5px; font-weight: bold; text-align: center; margin-bottom: 5px; }
        
        /* Jersey Color Picker */
        .color-label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        .shirt-color { width: 40px; height: 30px; border: none; background: none; cursor: pointer; padding: 0; }

        .score-display { font-size: 50px; font-weight: 900; color: white; margin: 5px 0; }
        
        .btn-group { display: flex; gap: 5px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; }
        .btn-plus { background: #2ecc71; } .btn-minus { background: #34495e; }
        .btn-blue { background: #2980b9; } .btn-orange { background: #e67e22; }

        .half-selector { display: flex; background: #000; padding: 5px; border-radius: 10px; margin: 15px; gap: 5px; width: 90%; max-width: 450px; }
        .half-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; background: #222; color: #777; cursor: pointer; font-size: 11px; font-weight: bold; }
        .half-btn.active { background: #27ae60; color: white; }

        .std-input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #333; color: white; border-radius: 6px; margin-top: 10px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <div class="card">
        <div class="header">Football Live Controller</div>
        
        <div style="display:flex; justify-content:center;">
            <div class="half-selector">
                <button id="h1" class="half-btn" onclick="setHalf('1st Half')">1ST HALF</button>
                <button id="h2" class="half-btn" onclick="setHalf('2nd Half')">2ND HALF</button>
                <button id="het" class="half-btn" onclick="setHalf('Extra Time')">E.T.</button>
            </div>
        </div>

        <div class="teams-container">
            <!-- Team A -->
            <div class="team-box">
                <input type="text" id="nameA" class="team-input" placeholder="HOME" oninput="updateDB()">
                <span class="color-label">SHIRT COLOR</span>
                <input type="color" id="colorA" class="shirt-color" oninput="updateDB()" value="#ff0000">
                <div class="score-display" id="dispA">0</div>
                <div class="btn-group">
                    <button class="btn-action btn-minus" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-action btn-plus" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>

            <div style="align-self:center; font-weight:bold; color:#444; font-size: 24px;">VS</div>

            <!-- Team B -->
            <div class="team-box">
                <input type="text" id="nameB" class="team-input" placeholder="AWAY" oninput="updateDB()">
                <span class="color-label">SHIRT COLOR</span>
                <input type="color" id="colorB" class="shirt-color" oninput="updateDB()" value="#0000ff">
                <div class="score-display" id="dispB">0</div>
                <div class="btn-group">
                    <button class="btn-action btn-minus" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-action btn-plus" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>

        <div style="padding: 15px;">
            <button class="btn-action btn-blue" style="width:100%;" onclick="swapTeams()">🔄 SWAP SIDES (HALF TIME)</button>
            <input type="text" id="timeInp" class="std-input" placeholder="MATCH TIME (00:00)" oninput="updateDB()">
        </div>
    </div>

    <!-- Penalty Shootout Section -->
    <div class="card">
        <div class="header" style="background:#e67e22;">Penalty Shootout</div>
        <div style="padding:15px; display:flex; justify-content:space-around; align-items:center;">
            <div style="text-align:center;">
                <div style="font-size:30px; font-weight:bold;" id="pA">0</div>
                <div class="btn-group" style="margin-top:5px;">
                    <button class="btn-action btn-minus" onclick="changePenalty('pScoreA', -1)">-</button>
                    <button class="btn-action btn-orange" onclick="changePenalty('pScoreA', 1)">+</button>
                </div>
            </div>
            <div style="color:#555; font-weight:bold;">PENALTY</div>
            <div style="text-align:center;">
                <div style="font-size:30px; font-weight:bold;" id="pB">0</div>
                <div class="btn-group" style="margin-top:5px;">
                    <button class="btn-action btn-minus" onclick="changePenalty('pScoreB', -1)">-</button>
                    <button class="btn-action btn-orange" onclick="changePenalty('pScoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, curPA = 0, curPB = 0;

    function loadData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = data.scoreA || 0; curB = data.scoreB || 0;
                curPA = data.pScoreA || 0; curPB = data.pScoreB || 0;
                
                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('pA').innerText = curPA;
                document.getElementById('pB').innerText = curPB;
                
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('colorA').value = data.teamColorA || "#ff0000";
                document.getElementById('colorB').value = data.teamColorB || "#0000ff";
                document.getElementById('timeInp').value = data.matchTime || "";

                // Half Buttons
                document.querySelectorAll('.half-btn').forEach(btn => btn.classList.remove('active'));
                if(data.half === "1st Half") document.getElementById('h1').classList.add('active');
                if(data.half === "2nd Half") document.getElementById('h2').classList.add('active');
                if(data.half === "Extra Time") document.getElementById('het').classList.add('active');
            }
        });
    }

    function setHalf(h) { db.update({ half: h }); }

    function changeScore(team, val) {
        let newVal = (team === 'scoreA' ? curA : curB) + val;
        if(newVal < 0) newVal = 0;
        db.update({ [team]: newVal });
    }

    function changePenalty(team, val) {
        let newVal = (team === 'pScoreA' ? curPA : curPB) + val;
        if(newVal < 0) newVal = 0;
        db.update({ [team]: newVal });
    }

    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            teamColorA: document.getElementById('colorA').value,
            teamColorB: document.getElementById('colorB').value,
            matchTime: document.getElementById('timeInp').value
        });
    }

    function swapTeams() {
        const nA = document.getElementById('nameA').value;
        const nB = document.getElementById('nameB').value;
        const cA = document.getElementById('colorA').value;
        const cB = document.getElementById('colorB').value;
        
        db.update({
            nameA: nB, nameB: nA,
            scoreA: curB, scoreB: curA,
            teamColorA: cB, teamColorB: cA,
            pScoreA: curPB, pScoreB: curPA
        });
    }

    loadData();
</script>
</body>
</html>
