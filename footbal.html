<!DOCTYPE html>
<html>
<head>
    <title>Admin Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-plus { background: #27ae60; color: white; }
        .btn-minus { background: #e74c3c; color: white; }
        select, input { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Match Info</h2>
        <label>Round:</label>
        <select id="roundInput" onchange="sendData()">
            <option value="Round 1">Round 1</option>
            <option value="Round 2">Round 2</option>
            <option value="Quarter Final">Quarter Final</option>
            <option value="Semi Final">Semi Final</option>
            <option value="Final">Final</option>
        </select>

        <label style="margin-left: 15px;">Half/Period:</label>
        <select id="halfInput" onchange="sendData()">
            <option value="1ST HALF">1st Half</option>
            <option value="2ND HALF">2nd Half</option>
            <option value="EXTRA TIME">Extra Time</option>
            <option value="PENALTIES">Penalties</option>
        </select>
    </div>

    <div class="card">
        <h2>Scores</h2>
        <button class="btn-plus" onclick="changeScore('scoreA', 1)">Team A +</button>
        <button class="btn-minus" onclick="changeScore('scoreA', -1)">-</button>
        <span style="margin: 0 30px;">VS</span>
        <button class="btn-plus" onclick="changeScore('scoreB', 1)">Team B +</button>
        <button class="btn-minus" onclick="changeScore('scoreB', -1)">-</button>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    function sendData() {
        db.update({
            currentRound: document.getElementById('roundInput').value,
            currentHalf: document.getElementById('halfInput').value
        });
    }

    function changeScore(team, val) {
        db.child(team).transaction(c => (c || 0) + val);
    }
</script>
</body>
</html>
