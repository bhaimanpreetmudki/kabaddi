<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Admin - Round Box</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 15px; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        /* Teams Section */
        .teams-container { display: flex; padding: 15px; gap: 10px; border-bottom: 1px solid #30363d; }
        .team-box { flex: 1; text-align: center; }
        .team-input { width: 90%; padding: 8px; background: #0d1117; border: 1px solid #444; color: white; border-radius: 5px; text-align: center; font-weight: bold; }
        .score-val { font-size: 45px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        
        /* Match Info (Time & Round) */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #0d1117; }
        .info-box { display: flex; flex-direction: column; }
        .info-label { font-size: 10px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        
        .btn-pm { border: none; color: white; padding: 10px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 3px; }
        .btn-plus { background: #238636; } .btn-minus { background: #da3633; }
        
        .std-input { width: 100%; padding: 10px; background: #161b22; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        .controls { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-full { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-red { background: #f85149; color: white; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px; margin-top: 20px;">
    <!-- SCORE CARD -->
    <div class="card">
        <div class="header">Football Live Score</div>
        <div class="teams-container">
            <div class="team-box">
                <input type="text" id="nameA" class="team-input" placeholder="Home Team" oninput="updateDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm btn-minus" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm btn-plus" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div style="display:flex; align-items:center; color:#444; font-weight:bold;">VS</div>
            <div class="team-box">
                <input type="text" id="nameB" class="team-input" placeholder="Away Team" oninput="updateDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm btn-minus" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm btn-plus" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>

        <!-- MATCH INFO: TIME & ROUND -->
        <div class="info-grid">
            <div class="info-box">
                <span class="info-label">Match Timer</span>
                <input type="text" id="timerInp" class="std-input" style="color: #2ecc71; font-size: 18px; text-align: center;" placeholder="45:00" oninput="updateDB()">
            </div>
            <div class="info-box">
                <span class="info-label">Match Round / Half</span>
                <input type="text" id="roundInp" class="std-input" style="text-align: center;" placeholder="1st Half" oninput="updateDB()">
            </div>
        </div>

        <div class="controls">
            <button id="visBtn" class="btn-full btn-red" onclick="toggleVis('scoreVisible')">Show/Hide Overlay</button>
            <button class="btn-full btn-blue" onclick="resetMatch()">Reset Match</button>
        </div>
    </div>

    <!-- TICKER CARD -->
    <div class="card">
        <div class="header">Branding & News Ticker</div>
        <div class="controls">
            <input type="text" id="watermarkInp" class="std-input" placeholder="Broadcaster Name" oninput="updateDB()">
            <textarea id="row1Inp" class="std-input" rows="2" placeholder="Ticker Message..." oninput="updateDB()"></textarea>
            <button id="tickVisBtn" class="btn-full btn-blue" onclick="toggleVis('tickerVisible')">Show/Hide Ticker</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, sVis = true, tVis = true;

    function loadData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = data.scoreA || 0; curB = data.scoreB || 0;
                sVis = !!data.scoreVisible; tVis = !!data.tickerVisible;

                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('timerInp').value = data.matchTime || "";
                document.getElementById('roundInp').value = data.round || "";
                document.getElementById('watermarkInp').value = data.watermarkTxt || "";
                document.getElementById('row1Inp').value = data.row1Txt || "";

                updateBtnUI('visBtn', sVis, "Overlay");
                updateBtnUI('tickVisBtn', tVis, "Ticker");
            }
        });
    }

    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            matchTime: document.getElementById('timerInp').value,
            round: document.getElementById('roundInp').value,
            watermarkTxt: document.getElementById('watermarkInp').value,
            row1Txt: document.getElementById('row1Inp').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = current + val;
        if(newVal < 0) newVal = 0;
        db.update({ [team]: newVal });
    }

    function toggleVis(field) {
        let val = (field === 'scoreVisible') ? sVis : tVis;
        db.child(field).set(!val);
    }

    function updateBtnUI(id, val, text) {
        const btn = document.getElementById(id);
        btn.innerText = val ? "Hide " + text : "Show " + text;
        btn.style.background = val ? "#da3633" : "#238636";
    }

    function resetMatch() {
        if(confirm("ਕੀ ਤੁਸੀਂ ਸਕੋਰ ਅਤੇ ਟਾਈਮਰ ਰੀਸੈੱਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            db.update({ scoreA: 0, scoreB: 0, matchTime: "00:00", round: "1st Half" });
        }
    }

    loadData();
</script>

</body>
</html>
