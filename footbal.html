<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Admin Panel - Swap & Penalty</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; }
        .card { background: #16191c; border-radius: 12px; border: 1px solid #333; margin-bottom: 12px; padding: 15px; }
        .header { background: #27ae60; padding: 10px; text-align: center; font-weight: bold; margin: -15px -15px 15px -15px; border-radius: 12px 12px 0 0; }
        .team-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .team-box { flex: 1; text-align: center; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        input { width: 90%; padding: 8px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; text-align: center; margin-bottom: 5px; }
        .score-display { font-size: 45px; font-weight: 900; margin: 10px 0; color: #2ecc71; }
        .btn-group { display: flex; gap: 5px; margin-top: 5px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-plus { background: #2ecc71; } .btn-minus { background: #34495e; }
        .btn-yellow { background: #f1c40f; color: black; } .btn-red { background: #e74c3c; }
        .btn-swap { background: #8e44ad; width: 100%; padding: 15px; margin: 10px 0; }
        .timer-display { font-size: 35px; color: #f1c40f; text-align: center; font-family: monospace; font-weight: bold; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- 1. Match Info & Timer -->
    <div class="card">
        <div class="header">TIME & MATCH SETTINGS</div>
        <div id="timerDisplay" class="timer-display">00:00</div>
        <div class="btn-group">
            <button class="btn" style="background: #27ae60;" onclick="startTimer()">START</button>
            <button class="btn" style="background: #e67e22;" onclick="pauseTimer()">PAUSE</button>
            <button class="btn" style="background: #34495e;" onclick="resetTimer()">RESET</button>
        </div>
        <button class="btn" style="background:#2980b9; width:100%; margin-top:10px;" onclick="toggleBoard()">BOARD ON/OFF</button>
    </div>

    <!-- 2. Score & Swap -->
    <div class="card">
        <div class="header">SCORE & TEAMS</div>
        <div class="team-row">
            <div class="team-box">
                <input type="text" id="nameA" placeholder="Team A" oninput="updateDB()">
                <input type="color" id="colorA" oninput="updateDB()" style="height:30px;">
                <div class="score-display" id="dispA">0</div>
                <div class="btn-group"><button class="btn btn-minus" onclick="changeVal('scoreA', -1)">-</button><button class="btn btn-plus" onclick="changeVal('scoreA', 1)">+</button></div>
            </div>
            <div class="team-box">
                <input type="text" id="nameB" placeholder="Team B" oninput="updateDB()">
                <input type="color" id="colorB" oninput="updateDB()" style="height:30px;">
                <div class="score-display" id="dispB">0</div>
                <div class="btn-group"><button class="btn btn-minus" onclick="changeVal('scoreB', -1)">-</button><button class="btn btn-plus" onclick="changeVal('scoreB', 1)">+</button></div>
            </div>
        </div>
        <button class="btn btn-swap" onclick="swapTeams()">🔄 SWAP TEAMS (Half-Time)</button>
    </div>

    <!-- 3. Penalty Box -->
    <div class="card">
        <div class="header" style="background:#e67e22;">PENALTY SHOOTOUT</div>
        <div class="team-row">
            <div class="team-box">
                <div id="pNameA" style="font-weight:bold; margin-bottom:5px;">TEAM A</div>
                <div class="btn-group">
                    <button class="btn" style="background:#27ae60;" onclick="addPenalty('A', 'goal')">GOAL</button>
                    <button class="btn" style="background:#e74c3c;" onclick="addPenalty('A', 'miss')">MISS</button>
                </div>
                <button class="btn" style="background:#444; font-size:10px; margin-top:5px;" onclick="clearPen('A')">RESET PEN A</button>
            </div>
            <div class="team-box">
                <div id="pNameB" style="font-weight:bold; margin-bottom:5px;">TEAM B</div>
                <div class="btn-group">
                    <button class="btn" style="background:#27ae60;" onclick="addPenalty('B', 'goal')">GOAL</button>
                    <button class="btn" style="background:#e74c3c;" onclick="addPenalty('B', 'miss')">MISS</button>
                </div>
                <button class="btn" style="background:#444; font-size:10px; margin-top:5px;" onclick="clearPen('B')">RESET PEN B</button>
            </div>
        </div>
        <button class="btn" id="pToggleBtn" style="background:#d35400; width:100%;" onclick="togglePenaltyMode()">SHOW PENALTY ON OVERLAY</button>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");
    let current = {}; let timerInt;

    db.on("value", (snap) => {
        current = snap.val() || {};
        document.getElementById('dispA').innerText = current.scoreA || 0;
        document.getElementById('dispB').innerText = current.scoreB || 0;
        document.getElementById('nameA').value = current.nameA || "";
        document.getElementById('nameB').value = current.nameB || "";
        document.getElementById('pNameA').innerText = current.nameA || "TEAM A";
        document.getElementById('pNameB').innerText = current.nameB || "TEAM B";
        document.getElementById('colorA').value = current.teamColorA || "#ff0000";
        document.getElementById('colorB').value = current.teamColorB || "#0000ff";
        document.getElementById('pToggleBtn').innerText = current.penaltyMode ? "HIDE PENALTY OVERLAY" : "SHOW PENALTY OVERLAY";
        
        let s = current.matchSeconds || 0; let m = Math.floor(s/60); let sec = s%60;
        document.getElementById('timerDisplay').innerText = (m<10?"0"+m:m) + ":" + (sec<10?"0"+sec:sec);

        if(current.timerRunning && !timerInt) timerInt = setInterval(() => db.update({ matchSeconds: (current.matchSeconds || 0) + 1 }), 1000);
        if(!current.timerRunning) { clearInterval(timerInt); timerInt = null; }
    });

    function changeVal(key, val) { 
        let nv = (current[key] || 0) + val;
        db.update({ [key]: nv < 0 ? 0 : nv, goalTrigger: val > 0 ? Date.now() : 0, lastGoalTeam: (key === 'scoreA' ? current.nameA : current.nameB) });
    }

    function swapTeams() {
        if(!confirm("ਬਦਲਣਾ ਹੈ?")) return;
        db.update({
            nameA: current.nameB, nameB: current.nameA,
            scoreA: current.scoreB, scoreB: current.scoreA,
            teamColorA: current.teamColorB, teamColorB: current.teamColorA,
            pListA: current.pListB || [], pListB: current.pListA || []
        });
    }

    function addPenalty(team, type) {
        let list = current['pList' + team] || [];
        if(list.length >= 5) return;
        list.push(type);
        db.update({ ['pList' + team]: list });
    }

    function clearPen(team) { db.update({ ['pList' + team]: [] }); }
    function startTimer() { db.update({ timerRunning: true }); }
    function pauseTimer() { db.update({ timerRunning: false }); }
    function resetTimer() { db.update({ matchSeconds: 0, timerRunning: false }); }
    function toggleBoard() { db.update({ showBoard: current.showBoard === false }); }
    function togglePenaltyMode() { db.update({ penaltyMode: !current.penaltyMode }); }
    function updateDB() { db.update({ nameA: document.getElementById('nameA').value, nameB: document.getElementById('nameB').value, teamColorA: document.getElementById('colorA').value, teamColorB: document.getElementById('colorB').value }); }
</script>
</body>
</html>
