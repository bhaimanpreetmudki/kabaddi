<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Admin - Players & Cards</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #16191c; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #333; overflow: hidden; margin-bottom: 12px; }
        .header { background: #27ae60; color: white; padding: 8px; text-align: center; font-weight: bold; font-size: 14px; }
        .master-control { background: #1a1d21; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .toggle-btn { padding: 6px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-on { background: #2ecc71; color: white; } .btn-off { background: #e74c3c; color: white; }
        
        .teams-container { display: flex; padding: 10px; gap: 8px; background: #1a1d21; }
        .team-box { flex: 1; text-align: center; background: #111; padding: 10px; border-radius: 8px; }
        .team-input { width: 95%; padding: 6px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; text-align: center; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
        .player-list-input { height: 40px; font-size: 10px !important; color: #aaa !important; }
        
        .score-display { font-size: 45px; font-weight: 900; color: white; margin: 5px 0; }
        .btn-group { display: flex; gap: 4px; margin-top: 5px; }
        .btn-action { flex: 1; padding: 8px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-plus { background: #2ecc71; } .btn-minus { background: #34495e; }
        .btn-yellow { background: #f1c40f; color: black; } .btn-red { background: #e74c3c; }
        
        .select-player { width: 100%; padding: 5px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-top: 5px; font-size: 11px; }
        .timer-box { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #2ecc71; text-align: center; border-radius: 4px; font-family: monospace; font-size: 18px; font-weight: bold; margin-top: 10px; box-sizing: border-box;}
    </style>
</head>
<body>

<div style="width: 100%; max-width: 500px;">
    <!-- Board Status -->
    <div class="card">
        <div class="master-control">
            <span style="font-size: 12px;">SCOREBOARD VISIBILITY</span>
            <button id="boardToggle" class="toggle-btn btn-on" onclick="toggleBoard()">ON</button>
        </div>
    </div>

    <div class="card">
        <div class="header">Football Match Admin</div>
        
        <div class="teams-container">
            <!-- Team A -->
            <div class="team-box">
                <input type="text" id="nameA" class="team-input" placeholder="Home Team" oninput="updateDB()">
                <input type="text" id="playersA" class="team-input player-list-input" placeholder="Nos: 1, 7, 10..." oninput="updateDB(); updateDropdowns();">
                
                <div class="score-display" id="dispA">0</div>
                <div class="btn-group">
                    <button class="btn-action btn-minus" onclick="changeVal('scoreA', -1)">-</button>
                    <button class="btn-action btn-plus" onclick="changeVal('scoreA', 1)">+</button>
                </div>
                
                <div style="margin-top: 10px; border-top: 1px solid #222; padding-top: 5px;">
                    <select id="selA" class="select-player"><option>Select No/Name</option></select>
                    <div class="btn-group">
                        <button class="btn-action btn-yellow" onclick="giveCard('A', 'yellow')">YEL</button>
                        <button class="btn-action btn-red" onclick="giveCard('A', 'red')">RED</button>
                    </div>
                </div>
            </div>

            <!-- Team B -->
            <div class="team-box">
                <input type="text" id="nameB" class="team-input" placeholder="Away Team" oninput="updateDB()">
                <input type="text" id="playersB" class="team-input player-list-input" placeholder="Nos: 5, 9, 11..." oninput="updateDB(); updateDropdowns();">
                
                <div class="score-display" id="dispB">0</div>
                <div class="btn-group">
                    <button class="btn-action btn-minus" onclick="changeVal('scoreB', -1)">-</button>
                    <button class="btn-action btn-plus" onclick="changeVal('scoreB', 1)">+</button>
                </div>

                <div style="margin-top: 10px; border-top: 1px solid #222; padding-top: 5px;">
                    <select id="selB" class="select-player"><option>Select No/Name</option></select>
                    <div class="btn-group">
                        <button class="btn-action btn-yellow" onclick="giveCard('B', 'yellow')">YEL</button>
                        <button class="btn-action btn-red" onclick="giveCard('B', 'red')">RED</button>
                    </div>
                </div>
            </div>
        </div>

        <div style="padding: 10px;">
            <input type="text" id="timeInp" class="timer-box" placeholder="00:00" oninput="updateDB()">
            <button class="btn-action" style="background:#34495e; width:100%; margin-top:10px; padding:12px;" onclick="resetMatch()">RESET MATCH</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config (ਤੁਹਾਡੀ ਆਪਣੀ URL)
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let current = {};

    function loadData() {
        db.on("value", (snap) => {
            current = snap.val() || {};
            document.getElementById('dispA').innerText = current.scoreA || 0;
            document.getElementById('dispB').innerText = current.scoreB || 0;
            document.getElementById('nameA').value = current.nameA || "";
            document.getElementById('nameB').value = current.nameB || "";
            document.getElementById('playersA').value = current.playersA || "";
            document.getElementById('playersB').value = current.playersB || "";
            document.getElementById('timeInp').value = current.matchTime || "00:00";
            
            const boardBtn = document.getElementById('boardToggle');
            if(current.showBoard !== false) { boardBtn.innerText = "ON"; boardBtn.className = "toggle-btn btn-on"; }
            else { boardBtn.innerText = "OFF"; boardBtn.className = "toggle-btn btn-off"; }
            
            updateDropdowns(); // ਨਾਮਾਂ ਦੀ ਲਿਸਟ ਅਪਡੇਟ ਕਰੋ
        });
    }

    function updateDropdowns() {
        fillSel('selA', document.getElementById('playersA').value);
        fillSel('selB', document.getElementById('playersB').value);
    }

    function fillSel(id, str) {
        const sel = document.getElementById(id);
        const val = sel.value; 
        sel.innerHTML = '<option value="">Select No/Name</option>';
        str.split(',').forEach(n => {
            if(n.trim()){
                let opt = document.createElement('option');
                opt.value = opt.text = n.trim();
                sel.add(opt);
            }
        });
        sel.value = val;
    }

    function changeVal(key, val) {
        let nv = (current[key] || 0) + val;
        db.update({ [key]: nv < 0 ? 0 : nv });
    }

    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            playersA: document.getElementById('playersA').value,
            playersB: document.getElementById('playersB').value,
            matchTime: document.getElementById('timeInp').value
        });
    }

    function giveCard(team, type) {
        const p = document.getElementById('sel' + team).value;
        if(!p) { alert("ਪਹਿਲਾਂ ਨੰਬਰ ਜਾਂ ਨਾਮ ਚੁਣੋ!"); return; }
        
        let cardKey = (type === 'yellow' ? 'yellow' : 'red') + team;
        db.update({
            [cardKey]: (current[cardKey] || 0) + 1,
            lastCardPlayer: p,
            lastCardType: type,
            cardTime: Date.now() // ਓਵਰਲੇਅ ਐਨੀਮੇਸ਼ਨ ਲਈ
        });
    }

    function toggleBoard() { db.update({ showBoard: current.showBoard === false }); }
    
    function resetMatch() {
        if(confirm("ਕੀ ਤੁਸੀਂ ਸਾਰਾ ਡਾਟਾ ਰੀਸੈੱਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            db.set({ scoreA: 0, scoreB: 0, yellowA: 0, yellowB: 0, redA: 0, redB: 0, matchTime: "00:00", showBoard: true });
        }
    }

    loadData();
</script>
</body>
</html>
