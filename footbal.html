<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Ultimate Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 15px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        
        .teams-container { display: flex; padding: 10px; gap: 8px; background: #0d1117; }
        .team-box { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 40px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        
        .std-input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-top: 5px; font-size: 13px; }
        .player-input { border-color: #f1c40f; color: #f1c40f; font-weight: bold; } /* Player detail special style */

        .btn-pm { border: none; color: white; padding: 8px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; flex: 1; transition: 0.2s; }
        .card-btn:active { transform: scale(0.95); }

        .yellow-card { background: #f1c40f; color: black; }
        .red-card { background: #e74c3c; }
        .btn-goal { background: #2ecc71; }
        .btn-miss { background: #555; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
        .flex-row { display: flex; gap: 5px; margin-top: 10px; }
        
        #penaltyControlSection { display: none; background: #1c2128; padding: 15px; border-top: 3px solid #f39c12; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- TIMER -->
    <div class="card">
        <div class="header"><i class="fas fa-stopwatch"></i> Match Timer</div>
        <div style="padding:15px; text-align:center; background:#0d1117;">
            <div id="timerShow" style="font-size:35px; color:#f1c40f; font-family: monospace;">00:00</div>
            <div class="flex-row">
                <button class="card-btn" style="background:#238636;" onclick="startTimer()">Start</button>
                <button class="card-btn" style="background:#f39c12;" onclick="pauseTimer()">Pause</button>
                <button class="card-btn" style="background:#333;" onclick="resetTimer()">Reset Time</button>
            </div>
        </div>
    </div>

    <!-- MAIN SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Score & Player Cards</div>
        <div class="teams-container">
            <!-- Team A -->
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateDB()" style="width:100%; height:20px; border:none; cursor:pointer;">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:8px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <!-- Player Detail for Card -->
                <input type="text" id="playerA" class="std-input player-input" placeholder="Player No/Name">
                <div class="grid-2">
                    <button class="card-btn yellow-card" onclick="handleCard('A', 'Yellow')">Yellow</button>
                    <button class="card-btn red-card" onclick="handleCard('A', 'Red')">Red</button>
                </div>
            </div>

            <!-- Team B -->
            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateDB()" style="width:100%; height:20px; border:none; cursor:pointer;">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:8px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <!-- Player Detail for Card -->
                <input type="text" id="playerB" class="std-input player-input" placeholder="Player No/Name">
                <div class="grid-2">
                    <button class="card-btn yellow-card" onclick="handleCard('B', 'Yellow')">Yellow</button>
                    <button class="card-btn red-card" onclick="handleCard('B', 'Red')">Red</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PENALTY CONTROL -->
    <div class="card">
        <div class="header" style="background:#f39c12; color:000;"><i class="fas fa-trophy"></i> Penalty Shootout</div>
        <div style="padding:10px;">
            <button id="pVisBtn" class="card-btn" style="background:#f39c12; color:black; width:100%;" onclick="togglePenaltyVis()">Show Penalty Box</button>
        </div>
        
        <div id="penaltyControlSection">
            <div class="grid-2">
                <div>
                    <span style="font-size:10px;">TEAM A PENALTY</span>
                    <input type="text" id="pA" class="std-input" oninput="updateDB()">
                    <div class="flex-row">
                        <button class="card-btn btn-goal" onclick="addPenalty('pA', '✅')">Goal</button>
                        <button class="card-btn btn-miss" onclick="addPenalty('pA', '❌')">Miss</button>
                    </div>
                </div>
                <div>
                    <span style="font-size:10px;">TEAM B PENALTY</span>
                    <input type="text" id="pB" class="std-input" oninput="updateDB()">
                    <div class="flex-row">
                        <button class="card-btn btn-goal" onclick="addPenalty('pB', '✅')">Goal</button>
                        <button class="card-btn btn-miss" onclick="addPenalty('pB', '❌')">Miss</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SYSTEM ACTIONS -->
    <div class="card">
        <div class="header" style="background:#333;">System Controls</div>
        <div style="padding:15px;">
            <div class="grid-2">
                <button id="visBtn" class="card-btn" style="background:#da3633;" onclick="toggleVis('scoreVisible')">Hide Score</button>
                <button class="card-btn" style="background:#1f6feb;" onclick="swapTeams()">Swap Teams</button>
            </div>
            <button class="card-btn" style="background:#e74c3c; width:100%; margin-top:10px; padding:12px;" onclick="fullReset()">
                <i class="fas fa-trash-alt"></i> RESET ALL (Score, Penalty, Time)
            </button>
            
            <input type="text" id="eventInp" class="std-input" placeholder="Live Event (Goal by...)" oninput="updateDB()" style="margin-top:15px;">
            <input type="text" id="roundInp" class="std-input" placeholder="Round (e.g. Semi Final)" oninput="updateDB()">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, seconds = 0, timerInterval = null, sVis = true, pVis = false;
    let yellowCounts = {};

    function loadData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = data.scoreA || 0; curB = data.scoreB || 0;
                sVis = !!data.scoreVisible; pVis = !!data.penaltyVisible;
                
                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('colorA').value = data.colorA || "#ffffff";
                document.getElementById('colorB').value = data.colorB || "#ffffff";
                document.getElementById('pA').value = data.penaltyA || "";
                document.getElementById('pB').value = data.penaltyB || "";
                document.getElementById('eventInp').value = data.lastEvent || "";
                document.getElementById('roundInp').value = data.round || "";
                
                if(!timerInterval) document.getElementById('timerShow').innerText = data.matchTime || "00:00";
                document.getElementById('boxA').style.borderTopColor = data.colorA;
                document.getElementById('boxB').style.borderTopColor = data.colorB;
                
                // Toggle Button Text
                document.getElementById('visBtn').innerText = sVis ? "Hide Score" : "Show Score";
                document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
                
                // Penalty Panel Visibility
                document.getElementById('penaltyControlSection').style.display = pVis ? "block" : "none";
                document.getElementById('pVisBtn').innerText = pVis ? "Hide Penalty Box" : "Show Penalty Box";
            }
        });
    }

    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            lastEvent: document.getElementById('eventInp').value,
            round: document.getElementById('roundInp').value,
            matchTime: document.getElementById('timerShow').innerText
        });
    }

    // --- CARD LOGIC ---
    function handleCard(team, type) {
        let pDetail = document.getElementById('player' + team).value;
        if(!pDetail) { alert("Please enter player number/name first!"); return; }
        
        let key = team + "_" + pDetail;
        if(type === 'Yellow') {
            yellowCounts[key] = (yellowCounts[key] || 0) + 1;
            if(yellowCounts[key] >= 2) {
                alert("Player " + pDetail + " received 2nd Yellow! Automatic RED.");
                document.getElementById('eventInp').value = "RED CARD (2nd Yellow): " + pDetail;
            } else {
                document.getElementById('eventInp').value = "YELLOW CARD: " + pDetail;
            }
        } else {
            document.getElementById('eventInp').value = "RED CARD: " + pDetail;
        }
        updateDB();
    }

    // --- PENALTY CONTROL ---
    function addPenalty(id, icon) {
        let inp = document.getElementById(id);
        inp.value = inp.value + icon;
        updateDB();
    }

    function togglePenaltyVis() {
        db.child('penaltyVisible').set(!pVis);
    }

    // --- SYSTEM ACTIONS ---
    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = Math.max(0, current + val);
        db.update({ [team]: newVal });
    }

    function swapTeams() {
        let nA = document.getElementById('nameA').value;
        let nB = document.getElementById('nameB').value;
        let cA = document.getElementById('colorA').value;
        let cB = document.getElementById('colorB').value;
        db.update({ nameA: nB, nameB: nA, colorA: cB, colorB: cA, scoreA: curB, scoreB: curA });
    }

    function fullReset() {
        if(confirm("Are you sure? This will reset Score, Penalty and Time!")) {
            yellowCounts = {};
            pauseTimer();
            seconds = 0;
            document.getElementById('timerShow').innerText = "00:00";
            db.update({ 
                scoreA: 0, scoreB: 0, 
                penaltyA: "", penaltyB: "", 
                matchTime: "00:00", 
                lastEvent: "Match Reset",
                penaltyVisible: false
            });
        }
    }

    function toggleVis(field) { db.child(field).set(!sVis); }

    // --- TIMER ---
    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60), s = seconds % 60;
            let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            document.getElementById('timerShow').innerText = timeStr;
            db.child('matchTime').set(timeStr);
        }, 1000);
    }
    function pauseTimer() { clearInterval(timerInterval); timerInterval = null; updateDB(); }
    function resetTimer() { seconds = 0; document.getElementById('timerShow').innerText = "00:00"; db.child('matchTime').set("00:00"); }

    loadData();
</script>
</body>
</html>
