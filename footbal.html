<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Pro Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 15px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        
        /* Teams & Score Section */
        .teams-container { display: flex; padding: 15px; gap: 10px; border-bottom: 1px solid #30363d; background: #0d1117; }
        .team-box { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; transition: border 0.3s; }
        .score-val { font-size: 45px; font-weight: 900; color: #2ecc71; margin: 5px 0; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        
        /* Timer Styles */
        .timer-section { text-align: center; padding: 20px; background: #0d1117; }
        #timerShow { font-size: 48px; font-family: 'Courier New', monospace; color: #f1c40f; font-weight: bold; margin-bottom: 10px; }
        
        /* Inputs & Buttons */
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-top: 5px; font-size: 14px; }
        .btn-pm { border: none; color: white; padding: 12px; border-radius: 6px; font-size: 22px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 3px; transition: 0.2s; }
        .btn-pm:active { transform: scale(0.95); }
        
        .card-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 12px; }
        .yellow-card { background: #f1c40f; color: black; }
        .red-card { background: #e74c3c; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .flex-row { display: flex; gap: 5px; margin-top: 10px; }
        
        /* Penalty Box */
        .penalty-container { padding: 15px; background: #0d1117; }
        .p-label { font-size: 11px; color: #8b949e; font-weight: bold; }

        /* Color Picker Overlay */
        .color-label { font-size: 10px; color: #8b949e; display: block; margin-bottom: 4px; }
        input[type="color"] { width: 100%; height: 30px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- TIMER & ROUND CONTROL -->
    <div class="card">
        <div class="header"><i class="fas fa-stopwatch"></i> Match Clock</div>
        <div class="timer-section">
            <div id="timerShow">00:00</div>
            <div class="flex-row">
                <button class="card-btn" style="background:#238636; flex:1;" onclick="startTimer()"><i class="fas fa-play"></i> START</button>
                <button class="card-btn" style="background:#f39c12; flex:1;" onclick="pauseTimer()"><i class="fas fa-pause"></i> PAUSE</button>
                <button class="card-btn" style="background:#da3633; flex:1;" onclick="resetTimer()"><i class="fas fa-undo"></i> RESET</button>
            </div>
            <div class="grid-2">
                <div>
                    <span class="p-label">ROUND / HALF</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="e.g. 1st Half" oninput="updateDB()">
                </div>
                <div>
                    <span class="p-label">ADDED TIME (MIN)</span>
                    <input type="text" id="extraInp" class="std-input" placeholder="e.g. +2" oninput="updateDB()">
                </div>
            </div>
        </div>
    </div>

    <!-- TEAMS, SCORE & JERSEY COLOR -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Match Scoreboard</div>
        <div class="teams-container">
            <!-- Team A -->
            <div class="team-box" id="boxA" style="border-top: 5px solid #fff;">
                <span class="color-label">JERSEY</span>
                <input type="color" id="colorA" value="#ffffff" oninput="updateDB()">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateDB()">
                <div class="score-val" id="dispA">0</div>
                <div class="flex-row">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <div class="grid-2">
                    <button class="card-btn yellow-card" onclick="logEvent('Team A: Yellow Card')">YC</button>
                    <button class="card-btn red-card" onclick="logEvent('Team A: Red Card')">RC</button>
                </div>
            </div>
            
            <div style="display:flex; align-items:center; color:#30363d; font-weight:bold;">VS</div>

            <!-- Team B -->
            <div class="team-box" id="boxB" style="border-top: 5px solid #fff;">
                <span class="color-label">JERSEY</span>
                <input type="color" id="colorB" value="#ffffff" oninput="updateDB()">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateDB()">
                <div class="score-val" id="dispB">0</div>
                <div class="flex-row">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <div class="grid-2">
                    <button class="card-btn yellow-card" onclick="logEvent('Team B: Yellow Card')">YC</button>
                    <button class="card-btn red-card" onclick="logEvent('Team B: Red Card')">RC</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PENALTY SHOOTOUT -->
    <div class="card">
        <div class="header"><i class="fas fa-list-check"></i> Penalty Shootout (Goal/Miss)</div>
        <div class="penalty-container">
            <div class="grid-2">
                <div>
                    <span class="p-label">TEAM A PENALTIES</span>
                    <input type="text" id="pA" class="std-input" placeholder="✅✅❌✅" oninput="updateDB()">
                </div>
                <div>
                    <span class="p-label">TEAM B PENALTIES</span>
                    <input type="text" id="pB" class="std-input" placeholder="✅❌✅✅" oninput="updateDB()">
                </div>
            </div>
        </div>
    </div>

    <!-- LIVE EVENTS & BRANDING -->
    <div class="card">
        <div class="header"><i class="fas fa-info-circle"></i> Branding & Events</div>
        <div style="padding:15px;">
            <span class="p-label">LAST EVENT / GOAL SCORER</span>
            <input type="text" id="eventInp" class="std-input" placeholder="e.g. Goal: No. 7 Manpreet" oninput="updateDB()">
            
            <div style="margin-top:15px;">
                <span class="p-label">CHANNEL / WATERMARK</span>
                <input type="text" id="watermarkInp" class="std-input" placeholder="Broadcaster Name" oninput="updateDB()">
            </div>
            
            <div class="grid-2" style="margin-top:15px;">
                <button id="visBtn" class="card-btn" style="background:#1f6feb;" onclick="toggleVis('scoreVisible')">Show/Hide Overlay</button>
                <button class="card-btn" style="background:#333;" onclick="location.reload()">Refresh App</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, seconds = 0, timerInterval = null, sVis = true;

    // --- LOAD DATA ---
    function loadData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = data.scoreA || 0; curB = data.scoreB || 0;
                sVis = !!data.scoreVisible;
                
                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('roundInp').value = data.round || "";
                document.getElementById('extraInp').value = data.extraTime || "";
                document.getElementById('pA').value = data.penaltyA || "";
                document.getElementById('pB').value = data.penaltyB || "";
                document.getElementById('eventInp').value = data.lastEvent || "";
                document.getElementById('watermarkInp').value = data.watermarkTxt || "";
                
                // Colors
                document.getElementById('colorA').value = data.colorA || "#ffffff";
                document.getElementById('colorB').value = data.colorB || "#ffffff";
                document.getElementById('boxA').style.borderTopColor = data.colorA || "#ffffff";
                document.getElementById('boxB').style.borderTopColor = data.colorB || "#ffffff";

                // Only update timer text if not running locally to avoid flickering
                if(!timerInterval) {
                    document.getElementById('timerShow').innerText = data.matchTime || "00:00";
                    // Sync seconds from stored time if possible
                    let parts = (data.matchTime || "00:00").split(":");
                    seconds = (parseInt(parts[0]) * 60) + parseInt(parts[1]);
                }
                
                const btn = document.getElementById('visBtn');
                btn.innerText = sVis ? "HIDE OVERLAY" : "SHOW OVERLAY";
                btn.style.background = sVis ? "#da3633" : "#238636";
            }
        });
    }

    // --- UPDATE DATABASE ---
    function updateDB() {
        const cA = document.getElementById('colorA').value;
        const cB = document.getElementById('colorB').value;
        
        document.getElementById('boxA').style.borderTopColor = cA;
        document.getElementById('boxB').style.borderTopColor = cB;

        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            round: document.getElementById('roundInp').value,
            extraTime: document.getElementById('extraInp').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            lastEvent: document.getElementById('eventInp').value,
            watermarkTxt: document.getElementById('watermarkInp').value,
            colorA: cA,
            colorB: cB,
            matchTime: document.getElementById('timerShow').innerText
        });
    }

    // --- TIMER FUNCTIONS ---
    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            let timeStr = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
            document.getElementById('timerShow').innerText = timeStr;
            db.child('matchTime').set(timeStr);
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        updateDB();
    }

    function resetTimer() {
        if(!confirm("Reset Time to 00:00?")) return;
        pauseTimer();
        seconds = 0;
        document.getElementById('timerShow').innerText = "00:00";
        db.child('matchTime').set("00:00");
    }

    // --- SCORE & EVENTS ---
    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = current + val;
        if(newVal < 0) newVal = 0;
        db.update({ [team]: newVal });
    }

    function logEvent(type) {
        let pInfo = prompt("Player Number/Name:");
        let msg = type + (pInfo ? " - " + pInfo : "");
        document.getElementById('eventInp').value = msg;
        updateDB();
    }

    function toggleVis(field) {
        db.child(field).set(!sVis);
    }

    // Start App
    loadData();
</script>

</body>
</html>
