<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Full Admin Panel - Manpreet Singh</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; }
        .card { background: #16191c; border-radius: 12px; border: 1px solid #333; margin-bottom: 12px; padding: 15px; box-sizing: border-box; text-align: center; }
        .header { background: #27ae60; padding: 6px; font-weight: bold; margin: -15px -15px 15px -15px; border-radius: 12px 12px 0 0; font-size: 13px; }
        .team-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .team-box { flex: 1; text-align: center; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        input, select { width: 100%; padding: 8px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; text-align: center; margin-bottom: 5px; box-sizing: border-box; }
        .score-display { font-size: 45px; font-weight: 900; margin: 5px 0; color: #2ecc71; }
        .btn-group { display: flex; gap: 4px; margin-top: 5px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-plus { background: #2ecc71; } .btn-minus { background: #34495e; }
        .btn-yellow { background: #f1c40f; color: black; } .btn-red { background: #e74c3c; }
        .timer-display { font-size: 35px; color: #f1c40f; font-weight: bold; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .reset-btn { background: #e74c3c; width: 100%; padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetAll()">⚠️ RESET ALL (NEW MATCH)</button>

    <!-- Timer Control -->
    <div class="card">
        <div id="timerDisplay" class="timer-display">00:00</div>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="number" id="setTimeInput" placeholder="Set Minutes">
            <button class="btn" style="background:#8e44ad; flex:0.4;" onclick="applyTime()">SET</button>
        </div>
        <div class="btn-group">
            <button class="btn" style="background: #27ae60;" onclick="startTimer()">START</button>
            <button class="btn" style="background: #e67e22;" onclick="pauseTimer()">PAUSE</button>
            <button class="btn" style="background: #34495e;" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <!-- Live Score & Cards -->
    <div class="card">
        <div class="header">LIVE SCORE & CARDS</div>
        <div class="team-row">
            <!-- Team A -->
            <div class="team-box">
                <input type="text" id="nameA" placeholder="Team A" oninput="updateDB()">
                <div class="score-display" id="dispA">0</div>
                <div class="btn-group">
                    <button class="btn btn-minus" onclick="changeVal('scoreA', -1)">-</button>
                    <button class="btn btn-plus" onclick="changeVal('scoreA', 1)">+</button>
                </div>
                <div class="btn-group" style="margin-top:10px;">
                    <button class="btn btn-yellow" onclick="sendCard('A', 'yellow')">Y</button>
                    <button class="btn btn-red" onclick="sendCard('A', 'red')">R</button>
                </div>
            </div>
            <!-- Team B -->
            <div class="team-box">
                <input type="text" id="nameB" placeholder="Team B" oninput="updateDB()">
                <div class="score-display" id="dispB">0</div>
                <div class="btn-group">
                    <button class="btn btn-minus" onclick="changeVal('scoreB', -1)">-</button>
                    <button class="btn btn-plus" onclick="changeVal('scoreB', 1)">+</button>
                </div>
                <div class="btn-group" style="margin-top:10px;">
                    <button class="btn btn-yellow" onclick="sendCard('B', 'yellow')">Y</button>
                    <button class="btn btn-red" onclick="sendCard('B', 'red')">R</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Penalty Control -->
    <div class="card">
        <div class="header" style="background:#d35400;">PENALTY CONTROL</div>
        <div class="team-row">
            <div class="team-box">
                <div class="btn-group">
                    <button class="btn" style="background:#27ae60;" onclick="addPenalty('A', 'goal')">GOAL</button>
                    <button class="btn" style="background:#e74c3c;" onclick="addPenalty('A', 'miss')">MISS</button>
                </div>
                <button class="btn" style="background:#444; font-size:10px; margin-top:5px;" onclick="clearPen('A')">RESET A</button>
            </div>
            <div class="team-box">
                <div class="btn-group">
                    <button class="btn" style="background:#27ae60;" onclick="addPenalty('B', 'goal')">GOAL</button>
                    <button class="btn" style="background:#e74c3c;" onclick="addPenalty('B', 'miss')">MISS</button>
                </div>
                <button class="btn" style="background:#444; font-size:10px; margin-top:5px;" onclick="clearPen('B')">RESET B</button>
            </div>
        </div>
        <button class="btn" id="pToggleBtn" style="background:#e67e22; width:100%; margin-top:5px;" onclick="togglePenaltyMode()">SHOW PENALTY OVERLAY</button>
    </div>

    <!-- Round Settings -->
    <div class="card">
        <select id="roundInput" onchange="updateDB()">
            <option value="LEAGUE MATCH">LEAGUE MATCH</option>
            <option value="QUARTER FINAL">QUARTER FINAL</option>
            <option value="SEMI FINAL">SEMI FINAL</option>
            <option value="FINAL">FINAL</option>
        </select>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");
    let current = {}; let timerInt;

    db.on("value", (snap) => {
        current = snap.val() || {};
        document.getElementById('dispA').innerText = current.scoreA || 0;
        document.getElementById('dispB').innerText = current.scoreB || 0;
        document.getElementById('nameA').value = current.nameA || "";
        document.getElementById('nameB').value = current.nameB || "";
        document.getElementById('roundInput').value = current.currentRound || "LEAGUE MATCH";
        document.getElementById('pToggleBtn').innerText = current.penaltyMode ? "HIDE PENALTY" : "SHOW PENALTY";
        
        let s = current.matchSeconds || 0;
        let m = Math.floor(s/60); let sc = s%60;
        document.getElementById('timerDisplay').innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);

        if(current.timerRunning && !timerInt) {
            timerInt = setInterval(() => {
                if(current.matchSeconds > 0) db.update({ matchSeconds: current.matchSeconds - 1 });
                else db.update({ timerRunning: false });
            }, 1000);
        }
        if(!current.timerRunning) { clearInterval(timerInt); timerInt = null; }
    });

    function applyTime() {
        let mins = document.getElementById('setTimeInput').value;
        if(mins > 0) db.update({ matchSeconds: mins * 60, timerRunning: false });
    }
    function changeVal(key, val) { 
        let nv = (current[key] || 0) + val;
        db.update({ [key]: nv < 0 ? 0 : nv });
    }
    function addPenalty(team, type) {
        let list = current['pList' + team] || [];
        if(list.length < 5) { list.push(type); db.update({ ['pList' + team]: list }); }
    }
    function clearPen(team) { db.update({ ['pList' + team]: [] }); }
    function togglePenaltyMode() { db.update({ penaltyMode: !current.penaltyMode }); }
    function sendCard(team, type) { db.update({ cardTrigger: { team, type, time: Date.now() } }); }
    
    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            currentRound: document.getElementById('roundInput').value
        });
    }

    function startTimer() { db.update({ timerRunning: true }); }
    function pauseTimer() { db.update({ timerRunning: false }); }
    function resetTimer() { db.update({ matchSeconds: 0, timerRunning: false }); }
    function resetAll() { if(confirm("ਕੀ ਸਭ ਕੁਝ ਰੀਸੈੱਟ ਕਰਨਾ ਹੈ?")) db.set({ scoreA:0, scoreB:0, matchSeconds:0, timerRunning:false, nameA:"", nameB:"", currentRound:"LEAGUE MATCH", pListA:[], pListB:[], penaltyMode:false }); }
</script>
</body>
</html>
