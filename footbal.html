<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Smart Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 15px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        .teams-container { display: flex; padding: 15px; gap: 10px; background: #0d1117; }
        .team-box { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 5px solid #fff; }
        .score-val { font-size: 45px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-top: 5px; }
        .btn-pm { border: none; color: white; padding: 10px; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        
        .card-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 11px; flex: 1; }
        .yellow-card { background: #f1c40f; color: black; }
        .red-card { background: #e74c3c; }
        .btn-goal { background: #2ecc71; color: white; margin-top: 5px; }
        .btn-miss { background: #95a5a6; color: white; margin-top: 5px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .flex-row { display: flex; gap: 5px; margin-top: 10px; }
        
        .penalty-section { background: #1c2128; padding: 15px; border-top: 2px solid #f39c12; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- TIMER CONTROL -->
    <div class="card">
        <div class="header"><i class="fas fa-clock"></i> Live Timer</div>
        <div style="padding:15px; text-align:center;">
            <div id="timerShow" style="font-size:40px; color:#f1c40f; font-weight:bold;">00:00</div>
            <div class="flex-row">
                <button class="card-btn" style="background:#238636;" onclick="startTimer()">START</button>
                <button class="card-btn" style="background:#f39c12;" onclick="pauseTimer()">PAUSE</button>
                <button class="card-btn" style="background:#da3633;" onclick="resetTimer()">RESET</button>
            </div>
        </div>
    </div>

    <!-- SCOREBOARD & CARDS -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Match Score & Cards</div>
        <div class="teams-container">
            <!-- Team A -->
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateDB()" style="width:100%; height:25px; border:none; background:none;">
                <input type="text" id="nameA" class="std-input" placeholder="Home" oninput="updateDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <div class="grid-2">
                    <button class="card-btn yellow-card" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn red-card" onclick="handleCard('A', 'Red')">RC</button>
                </div>
            </div>

            <!-- Team B -->
            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateDB()" style="width:100%; height:25px; border:none; background:none;">
                <input type="text" id="nameB" class="std-input" placeholder="Away" oninput="updateDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <div class="grid-2">
                    <button class="card-btn yellow-card" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn red-card" onclick="handleCard('B', 'Red')">RC</button>
                </div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div style="padding:10px; display:flex; gap:5px; background:#0d1117;">
            <button class="card-btn" style="background:#1f6feb;" onclick="swapTeams()"><i class="fas fa-exchange-alt"></i> SWIPE TEAMS</button>
            <button class="card-btn" style="background:#333;" onclick="resetMatch()"><i class="fas fa-redo"></i> RESET SCORE</button>
        </div>
    </div>

    <!-- PENALTY BOX CONTROL -->
    <div class="card">
        <div class="header" style="background:#f39c12; color:black;"><i class="fas fa-list-ol"></i> Penalty Shootout</div>
        <div style="padding:10px; text-align:center;">
            <button id="pVisBtn" class="card-btn" style="background:#f39c12; color:black; width:100%;" onclick="togglePenaltyVis()">SHOW PENALTY OVERLAY</button>
        </div>
        <div class="penalty-section">
            <div class="grid-2">
                <div>
                    <span style="font-size:11px;">TEAM A:</span>
                    <input type="text" id="pA" class="std-input" oninput="updateDB()">
                    <div style="display:flex; gap:2px;">
                        <button class="card-btn btn-goal" onclick="addPenalty('pA', '✅')">GOAL</button>
                        <button class="card-btn btn-miss" onclick="addPenalty('pA', '❌')">MISS</button>
                    </div>
                </div>
                <div>
                    <span style="font-size:11px;">TEAM B:</span>
                    <input type="text" id="pB" class="std-input" oninput="updateDB()">
                    <div style="display:flex; gap:2px;">
                        <button class="card-btn btn-goal" onclick="addPenalty('pB', '✅')">GOAL</button>
                        <button class="card-btn btn-miss" onclick="addPenalty('pB', '❌')">MISS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SHOW/HIDE & EVENTS -->
    <div class="card">
        <div class="header">Main Controls</div>
        <div style="padding:15px;">
            <button id="visBtn" class="card-btn" style="background:#da3633; width:100%; margin-bottom:10px;" onclick="toggleVis('scoreVisible')">HIDE SCOREBOARD</button>
            <input type="text" id="eventInp" class="std-input" placeholder="Live Event (e.g. Goal by No. 10)" oninput="updateDB()">
            <input type="text" id="roundInp" class="std-input" placeholder="Match Round (1st Half)" oninput="updateDB()">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, seconds = 0, timerInterval = null, sVis = true, pVis = false;
    let playerYellowCards = {}; // ਪਲੇਅਰ ਦੇ ਕਾਰਡ ਟਰੈਕ ਕਰਨ ਲਈ

    function loadData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = data.scoreA || 0; curB = data.scoreB || 0;
                sVis = !!data.scoreVisible; pVis = !!data.penaltyVisible;
                
                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('colorA').value = data.colorA || "#ffffff";
                document.getElementById('colorB').value = data.colorB || "#ffffff";
                document.getElementById('pA').value = data.penaltyA || "";
                document.getElementById('pB').value = data.penaltyB || "";
                document.getElementById('eventInp').value = data.lastEvent || "";
                document.getElementById('roundInp').value = data.round || "";
                if(!timerInterval) document.getElementById('timerShow').innerText = data.matchTime || "00:00";

                document.getElementById('boxA').style.borderTopColor = data.colorA;
                document.getElementById('boxB').style.borderTopColor = data.colorB;
                
                document.getElementById('visBtn').innerText = sVis ? "HIDE SCOREBOARD" : "SHOW SCOREBOARD";
                document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
                document.getElementById('pVisBtn').innerText = pVis ? "HIDE PENALTY OVERLAY" : "SHOW PENALTY OVERLAY";
            }
        });
    }

    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            lastEvent: document.getElementById('eventInp').value,
            round: document.getElementById('roundInp').value,
            matchTime: document.getElementById('timerShow').innerText
        });
    }

    // --- SMART CARD LOGIC ---
    function handleCard(team, type) {
        let pNum = prompt("Enter Player Jersey Number:");
        if(!pNum) return;
        let key = team + "_" + pNum;

        if(type === 'Yellow') {
            playerYellowCards[key] = (playerYellowCards[key] || 0) + 1;
            if(playerYellowCards[key] >= 2) {
                alert("Player " + pNum + " has 2 Yellows. Now RED CARD!");
                document.getElementById('eventInp').value = "RED CARD: Team " + team + " (No." + pNum + ")";
            } else {
                document.getElementById('eventInp').value = "YELLOW CARD: Team " + team + " (No." + pNum + ")";
            }
        } else {
            document.getElementById('eventInp').value = "RED CARD: Team " + team + " (No." + pNum + ")";
        }
        updateDB();
    }

    // --- PENALTY BUTTONS ---
    function addPenalty(id, icon) {
        let inp = document.getElementById(id);
        inp.value = inp.value + icon;
        updateDB();
    }

    function togglePenaltyVis() {
        db.child('penaltyVisible').set(!pVis);
    }

    // --- ACTIONS ---
    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = current + val; if(newVal < 0) newVal = 0;
        db.update({ [team]: newVal });
    }

    function swapTeams() {
        let nA = document.getElementById('nameA').value;
        let nB = document.getElementById('nameB').value;
        db.update({ nameA: nB, nameB: nA, scoreA: curB, scoreB: curA });
    }

    function resetMatch() {
        if(confirm("Reset Score?")) db.update({ scoreA: 0, scoreB: 0 });
    }

    function toggleVis(field) { db.child(field).set(!sVis); }

    // --- TIMER ---
    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60), s = seconds % 60;
            let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            document.getElementById('timerShow').innerText = timeStr;
            db.child('matchTime').set(timeStr);
        }, 1000);
    }
    function pauseTimer() { clearInterval(timerInterval); timerInterval = null; updateDB(); }
    function resetTimer() { pauseTimer(); seconds = 0; document.getElementById('timerShow').innerText = "00:00"; db.child('matchTime').set("00:00"); }

    loadData();
</script>
</body>
</html>
