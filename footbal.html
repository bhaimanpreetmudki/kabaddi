<!-- Overlay ਵਾਲੇ ਹਿੱਸੇ ਵਿੱਚ ਸਿਰਫ ਸਕ੍ਰਿਪਟ ਅਤੇ ਸਟਾਈਲ ਅਪਡੇਟ ਕਰੋ -->
<style>
    /* ਟਾਈਮ ਉਦੋਂ ਹੀ ਦਿਖੇਗਾ ਜਦੋਂ timerRunning true ਹੋਵੇਗਾ */
    #timer-wrap { display: none; width: 130px; background: #27ae60; height: 100%; flex-direction: column; align-items: center; justify-content: center; border-left: 3px solid rgba(0,0,0,0.3); }
    .timer-active { display: flex !important; }
</style>

<script>
    db.on("value", (snap) => {
        const d = snap.val(); if(!d) return;
        
        // ਟਾਈਮ ਸਿਰਫ START ਹੋਣ ਤੇ ਦਿਖਾਓ
        const tWrap = document.getElementById('timer-wrap');
        if(d.timerRunning) { tWrap.classList.add('timer-active'); } 
        else { tWrap.classList.remove('timer-active'); }

        // Countdown Timer Logic
        let s = d.matchSeconds || 0;
        let m = Math.floor(s/60);
        let sc = s%60;
        document.getElementById('time-val').innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);
        document.getElementById('period-val').innerText = d.currentHalf || "MATCH";
    });
</script>
