<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Ultimate Admin - Manpreet Mudki</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .std-input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-top: 5px; font-size: 13px; }
        .label-text { font-size: 10px; color: #8b949e; display: block; margin-top: 8px; text-align: left; text-transform: uppercase; }

        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
        .flex-row { display: flex; gap: 5px; margin-top: 8px; }
        
        #penaltyControlSection { display: none; background: #1c2128; padding: 15px; border-top: 3px solid #f39c12; }
        .half-btn { background: #30363d; font-size: 9px !important; padding: 5px !important; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- MAIN SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard & Quick Actions</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
                <input type="text" id="playerA" class="std-input" placeholder="No" style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:000;" onclick="handleCard('A', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('A', 'Red')">RC</button>
                </div>
            </div>

            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <button class="card-btn" style="background:#333;" onclick="resetOnlyScore()">RESET</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateDB()" style="width:100%; height:18px; border:none; cursor:pointer;">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; margin-bottom:5px;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
                <input type="text" id="playerB" class="std-input" placeholder="No" style="border-color:#f1c40f;">
                <div class="grid-2">
                    <button class="card-btn" style="background:#f1c40f; color:000;" onclick="handleCard('B', 'Yellow')">YC</button>
                    <button class="card-btn" style="background:#e74c3c;" onclick="handleCard('B', 'Red')">RC</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MATCH INFO (ROUND & HALF SEPARATED) -->
    <div class="card">
        <div class="header"><i class="fas fa-info-circle"></i> Match Information</div>
        <div style="padding:12px; background:#0d1117;">
            <div class="grid-2">
                <div style="text-align:center; border-right: 1px solid #333; padding-right:10px;">
                    <div id="timerShow" style="font-size:32px; color:#f1c40f; font-family:monospace;">00:00</div>
                    <div class="flex-row">
                        <button class="card-btn" style="background:#238636;" onclick="startTimer()">Start</button>
                        <button class="card-btn" style="background:#f39c12;" onclick="pauseTimer()">Pause</button>
                        <button class="card-btn" style="background:#333;" onclick="resetTimer()">00</button>
                    </div>
                    <span class="label-text">Duration</span>
                    <input type="text" id="matchDuration" class="std-input" placeholder="e.g. 20m" oninput="updateDB()">
                </div>
                <div style="padding-left:5px;">
                    <span class="label-text" style="color:#2ecc71;">Match Round</span>
                    <input type="text" id="matchRound" class="std-input" placeholder="Semi-Final" oninput="updateDB()">
                    
                    <span class="label-text" style="color:#f1c40f;">Match Half</span>
                    <input type="text" id="roundInp" class="std-input" placeholder="1st Half" oninput="updateDB()">
                    <div class="flex-row">
                        <button class="card-btn half-btn" onclick="setHalf('1st Half')">1st</button>
                        <button class="card-btn half-btn" onclick="setHalf('2nd Half')">2nd</button>
                        <button class="card-btn half-btn" onclick="setHalf('FT')">FT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PENALTY SHOOTOUT -->
    <div class="card">
        <div class="header" style="background:#f39c12; color:000;">Penalty Shootout (Max 5)</div>
        <div style="padding:10px; display:flex; gap:5px;">
            <button id="pVisBtn" class="card-btn" style="background:#f39c12; color:000;" onclick="togglePenaltyVis()">Show Penalty Box</button>
            <button class="card-btn" style="background:#333;" onclick="resetPenaltyOnly()">Reset Penalty</button>
        </div>
        <div id="penaltyControlSection">
            <div class="grid-2">
                <div>
                    <input type="text" id="pA" class="std-input" readonly style="text-align:center; font-size:16px;">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pA', '✅')">Goal</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pA', '❌')">Miss</button>
                    </div>
                </div>
                <div>
                    <input type="text" id="pB" class="std-input" readonly style="text-align:center; font-size:16px;">
                    <div class="flex-row">
                        <button class="card-btn" style="background:#2ecc71;" onclick="addPenalty('pB', '✅')">Goal</button>
                        <button class="card-btn" style="background:#555;" onclick="addPenalty('pB', '❌')">Miss</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SYSTEM EVENTS -->
    <div class="card">
        <div class="header" style="background:#333;">Live Events</div>
        <div style="padding:10px;">
            <input type="text" id="eventInp" class="std-input" placeholder="Goal Scorer / Event" oninput="updateDB()">
            <button class="card-btn" style="background:#e74c3c; margin-top:10px; padding:10px;" onclick="fullReset()">RESET EVERYTHING</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    let curA = 0, curB = 0, seconds = 0, timerInterval = null, sVis = true, pVis = false;
    let yellowCounts = {};

    function loadData() {
        db.on("value", (snap) => {
            const data = snap.val();
            if(data) {
                curA = data.scoreA || 0; curB = data.scoreB || 0;
                sVis = !!data.scoreVisible; pVis = !!data.penaltyVisible;
                
                document.getElementById('dispA').innerText = curA;
                document.getElementById('dispB').innerText = curB;
                document.getElementById('nameA').value = data.nameA || "";
                document.getElementById('nameB').value = data.nameB || "";
                document.getElementById('colorA').value = data.colorA || "#ffffff";
                document.getElementById('colorB').value = data.colorB || "#ffffff";
                document.getElementById('pA').value = data.penaltyA || "";
                document.getElementById('pB').value = data.penaltyB || "";
                document.getElementById('eventInp').value = data.lastEvent || "";
                document.getElementById('matchRound').value = data.matchRound || "";
                document.getElementById('roundInp').value = data.round || "";
                document.getElementById('matchDuration').value = data.duration || "";
                
                if(!timerInterval) document.getElementById('timerShow').innerText = data.matchTime || "00:00";
                document.getElementById('boxA').style.borderTopColor = data.colorA;
                document.getElementById('boxB').style.borderTopColor = data.colorB;
                
                document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
                document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
                document.getElementById('penaltyControlSection').style.display = pVis ? "block" : "none";
                document.getElementById('pVisBtn').innerText = pVis ? "Hide Penalty" : "Show Penalty";
            }
        });
    }

    function updateDB() {
        db.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            lastEvent: document.getElementById('eventInp').value,
            matchRound: document.getElementById('matchRound').value,
            round: document.getElementById('roundInp').value,
            duration: document.getElementById('matchDuration').value,
            matchTime: document.getElementById('timerShow').innerText
        });
    }

    function setHalf(val) { document.getElementById('roundInp').value = val; updateDB(); }

    function addPenalty(id, icon) {
        let inp = document.getElementById(id);
        let count = (inp.value.match(/✅|❌/g) || []).length;
        if(count >= 5) { alert("Max 5 Penalties!"); return; }
        inp.value = inp.value + icon;
        updateDB();
    }

    function resetPenaltyOnly() { db.update({ penaltyA: "", penaltyB: "" }); }
    function resetOnlyScore() { if(confirm("Reset Score?")) db.update({ scoreA: 0, scoreB: 0 }); }

    function handleCard(team, type) {
        let pDetail = document.getElementById('player' + team).value;
        if(!pDetail) { alert("Enter Player No!"); return; }
        let key = team + "_" + pDetail;
        if(type === 'Yellow') {
            yellowCounts[key] = (yellowCounts[key] || 0) + 1;
            document.getElementById('eventInp').value = (yellowCounts[key] >= 2 ? "RED (2nd Yellow): " : "Yellow Card: ") + pDetail;
        } else {
            document.getElementById('eventInp').value = "Red Card: " + pDetail;
        }
        updateDB();
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        db.update({ [team]: Math.max(0, current + val) });
    }

    function fullReset() {
        if(confirm("Reset Everything?")) {
            yellowCounts = {}; seconds = 0; pauseTimer();
            db.update({ scoreA: 0, scoreB: 0, penaltyA: "", penaltyB: "", matchTime: "00:00", penaltyVisible: false, lastEvent: "", matchRound: "" });
        }
    }

    function togglePenaltyVis() { db.child('penaltyVisible').set(!pVis); }
    function toggleVis(field) { db.child(field).set(!sVis); }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60), s = seconds % 60;
            let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            document.getElementById('timerShow').innerText = timeStr;
            db.child('matchTime').set(timeStr);
        }, 1000);
    }
    function pauseTimer() { clearInterval(timerInterval); timerInterval = null; updateDB(); }
    function resetTimer() { seconds = 0; document.getElementById('timerShow').innerText = "00:00"; db.child('matchTime').set("00:00"); }

    loadData();
</script>
</body>
</html>
