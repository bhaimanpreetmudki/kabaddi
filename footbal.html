<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Streamer - Football Control</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --danger: #ff4757;
            --bg: #080a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 136, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 212, 255, 0.05) 0px, transparent 50%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        h2 { text-align: center; font-size: 20px; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); margin-bottom: 30px; }

        /* Setup Design */
        .setup-group { position: relative; margin-bottom: 20px; }
        .setup-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .setup-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        /* Scoring Dashboard */
        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        #timer { font-family: 'Courier New', monospace; font-size: 28px; color: var(--secondary); font-weight: bold; text-shadow: 0 0 10px rgba(0,212,255,0.4); }
        .match-badge { background: var(--danger); padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; }

        .scoreboard-v2 {
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            gap: 20px;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .team-box { text-align: center; }
        .goal-count { font-size: 72px; font-weight: 900; margin: 5px 0; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .team-name { font-size: 12px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .vs-circle {
            width: 50px; height: 50px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; color: var(--border);
        }

        /* Controls */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-goal {
            background: linear-gradient(135deg, var(--primary), #00b894);
            color: #000; font-weight: 900; border: none; padding: 18px;
            border-radius: 16px; cursor: pointer; transition: 0.3s;
        }
        .btn-goal:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,136,0.3); }

        /* Penalty Section */
        .penalty-premium {
            margin-top: 30px;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid rgba(255, 68, 68, 0.1);
            border-radius: 20px;
            padding: 20px;
        }

        .p-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .p-dots { display: flex; gap: 8px; }
        .p-dot { width: 12px; height: 12px; border-radius: 3px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); transition: 0.4s; }
        .p-dot.hit { background: var(--primary); box-shadow: 0 0 10px var(--primary); border: none; }
        .p-dot.miss { background: var(--danger); box-shadow: 0 0 10px var(--danger); border: none; }

        .p-btns button {
            background: #1a1f2c; color: white; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
        }

        .btn-reset { width: 100%; background: none; border: 1px solid var(--border); color: #555; padding: 10px; margin-top: 20px; cursor: pointer; border-radius: 12px; font-size: 12px; }
        .hidden { display: none !important; }

        /* Animations */
        @keyframes goalScale {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: var(--primary); }
            100% { transform: scale(1); }
        }
        .animate-goal { animation: goalScale 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="main-card">
    <!-- Setup View -->
    <div id="view-setup">
        <h2>Match Engine v3.0</h2>
        <div class="setup-group"><input type="text" id="inputA" placeholder="Home Team Name (e.g. Real Madrid)"></div>
        <div class="setup-group"><input type="text" id="inputB" placeholder="Away Team Name (e.g. Barcelona)"></div>
        <button class="btn-goal" style="width:100%" onclick="launchMatch()">LAUNCH DASHBOARD</button>
    </div>

    <!-- Live View -->
    <div id="view-live" class="hidden">
        <div class="header-info">
            <div class="match-badge">LIVE MATCH</div>
            <div id="timer">00:00</div>
        </div>

        <div class="scoreboard-v2">
            <div class="team-box">
                <div class="team-name" id="nameA">HOME</div>
                <div class="goal-count" id="countA">0</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="team-box">
                <div class="team-name" id="nameB">AWAY</div>
                <div class="goal-count" id="countB">0</div>
            </div>
        </div>

        <div class="action-grid">
            <button class="btn-goal" onclick="score('A')">HOME GOAL ⚽</button>
            <button class="btn-goal" onclick="score('B')">AWAY GOAL ⚽</button>
        </div>

        <!-- Penalty Section -->
        <div class="penalty-premium">
            <div style="font-size: 10px; font-weight: bold; color: var(--danger); margin-bottom: 15px; letter-spacing: 2px;">PENALTY SHOOTOUT TRACKER</div>
            
            <div class="p-row">
                <div class="p-dots" id="p-dotsA">
                    <div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div>
                </div>
                <div class="p-btns">
                    <button onclick="recordP('A', true)">✅</button>
                    <button onclick="recordP('A', false)">❌</button>
                </div>
            </div>

            <div class="p-row">
                <div class="p-dots" id="p-dotsB">
                    <div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div>
                </div>
                <div class="p-btns">
                    <button onclick="recordP('B', true)">✅</button>
                    <button onclick="recordP('B', false)">❌</button>
                </div>
            </div>
        </div>

        <button class="btn-reset" onclick="location.reload()">TERMINATE MATCH & RESET</button>
    </div>
</div>

<script>
    let state = { goalsA: 0, goalsB: 0, pA: 0, pB: 0 };

    function launchMatch() {
        const a = document.getElementById('inputA').value || "HOME";
        const b = document.getElementById('inputB').value || "AWAY";
        
        document.getElementById('nameA').innerText = a;
        document.getElementById('nameB').innerText = b;
        
        document.getElementById('view-setup').classList.add('hidden');
        document.getElementById('view-live').classList.remove('hidden');

        let s = 0;
        setInterval(() => {
            s++;
            let m = Math.floor(s/60), sec = s%60;
            document.getElementById('timer').innerText = `${m<10?'0'+m:m}:${sec<10?'0'+sec:sec}`;
        }, 1000);
    }

    function score(t) {
        const el = document.getElementById('count' + t);
        if(t === 'A') state.goalsA++; else state.goalsB++;
        el.innerText = t === 'A' ? state.goalsA : state.goalsB;
        
        // Animation
        el.classList.add('animate-goal');
        setTimeout(() => el.classList.remove('animate-goal'), 500);
    }

    function recordP(t, hit) {
        const dots = document.getElementById('p-dots' + t).children;
        let idx = t === 'A' ? state.pA : state.pB;
        
        if(idx < 5) {
            dots[idx].classList.add(hit ? 'hit' : 'miss');
            if(t === 'A') state.pA++; else state.pB++;
        }
    }
</script>

</body>
</html>
