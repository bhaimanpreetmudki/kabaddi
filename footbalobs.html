<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; color: white; width: 1920px; height: 1080px; overflow: hidden; }
        
        #scoreboard { 
            position: absolute; top: 50px; left: 50px; display: flex; align-items: center; 
            background: #000; border-radius: 6px; height: 60px; width: 700px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.7); overflow: hidden;
            transform: translateX(-150%); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .show-board { transform: translateX(0) !important; }

        .team-sec { display: flex; align-items: center; height: 100%; flex: 1; position: relative; }
        #secA { clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); z-index: 2; margin-right: -20px; }
        #secB { clip-path: polygon(5% 0, 100% 0, 100% 100%, 0% 100%); }

        /* White Score Boxes at Edges */
        .score-box { 
            font-size: 30px; font-weight: 900; width: 55px; text-align: center; 
            background: #fff; color: #000; line-height: 60px; height: 100%;
        }
        
        .name-container { flex-grow: 1; overflow: hidden; white-space: nowrap; padding: 0 15px; text-align: center; }
        .name-text { display: inline-block; font-size: 28px; text-transform: uppercase; }
        @keyframes scrollName { 0% { transform: translateX(100%); } 100% { transform: translateX(-120%); } }

        /* Fixed Timer Section */
    /* ਬਾਕੀ ਸਟਾਈਲ ਦੇ ਨਾਲ ਇਹ ਵੀ ਜੋੜ ਦਿਓ */
    #timer-wrap { 
        display: none; /* ਪਹਿਲਾਂ ਲੁਕਿਆ ਰਹੇਗਾ */
        width: 130px; 
        background: #27ae60; 
        height: 100%; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        border-left: 3px solid rgba(0,0,0,0.3); 
    }
    .timer-active { 
        display: flex !important; /* ਜਦੋਂ START ਹੋਵੇਗਾ ਤਾਂ ਦਿਖੇਗਾ */

        #period-val { font-size: 11px; text-transform: uppercase; font-weight: 900; opacity: 0.9; }
        #time-val { font-size: 26px; font-family: monospace; font-weight: bold; }

        /* Silver Penalty Strip */
        #penalty-strip {
            position: absolute; top: 111px; left: 50px; height: 35px; width: 800px;
            background: linear-gradient(180deg, #f0f0f0 0%, #bbbbbb 100%);
            display: none; align-items: center; justify-content: space-between;
            border-radius: 0 0 10px 10px; border: 1px solid #fff;
        }
        .p-sec { display: flex; align-items: center; padding: 0 20px; flex: 1; }
        .balls { display: flex; gap: 8px; }
        .ball { width: 18px; height: 18px; border-radius: 50%; background: #888; border: 1px solid #777; }
        .ball.goal { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; border: none; }
        .ball.miss { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; border: none; }
    </style>
</head>
<body>
    <div id="scoreboard">
        <div id="secA" class="team-sec">
            <div class="score-box" id="scoreA">0</div>
            <div class="name-container"><div class="name-text" id="nameA">TEAM A</div></div>
        </div>
        <div id="secB" class="team-sec">
            <div class="name-container"><div class="name-text" id="nameB">TEAM B</div></div>
            <div class="score-box" id="scoreB">0</div>
        </div>
        <div id="timer-wrap">
            <div id="period-val">MATCH START</div>
            <div id="time-val">00:00</div>
        </div>
    </div>
    <div id="penalty-strip">
        <div class="p-sec"><div id="pbA" class="balls"></div></div>
        <div style="font-weight:bold; color:#666;">/</div>
        <div class="p-sec" style="justify-content: flex-end;"><div id="pbB" class="balls"></div></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    db.on("value", (snap) => {
        const d = snap.val(); if(!d) return;
        document.getElementById('scoreboard').classList.toggle('show-board', d.showBoard !== false);
        
        document.getElementById('secA').style.backgroundColor = d.teamColorA || "#ff0000";
        document.getElementById('secB').style.backgroundColor = d.teamColorB || "#0000ff";
        
        document.getElementById('nameA').innerText = d.nameA || "TEAM A";
        document.getElementById('nameB').innerText = d.nameB || "TEAM B";
        document.getElementById('scoreA').innerText = d.scoreA || 0;
        document.getElementById('scoreB').innerText = d.scoreB || 0;
        
        // Timer & Half/Round
        let s=d.matchSeconds||0, m=Math.floor(s/60), sc=s%60;
        document.getElementById('time-val').innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);
        document.getElementById('period-val').innerText = d.currentHalf || "1ST HALF";

        // Scroll Logic
        document.getElementById('nameA').style.animation = (d.nameA||"").length > 12 ? "scrollName 6s linear infinite" : "none";
        document.getElementById('nameB').style.animation = (d.nameB||"").length > 12 ? "scrollName 6s linear infinite" : "none";

        // Penalty
        const pStrip = document.getElementById('penalty-strip');
        if(d.penaltyMode) {
            pStrip.style.display = 'flex';
            renderBalls('pbA', d.pListA || []);
            renderBalls('pbB', d.pListB || []);
        } else { pStrip.style.display = 'none'; }
    });

    function renderBalls(id, list) {
        let h = ''; for(let i=0; i<5; i++) h += `<div class="ball ${list[i]||''}"></div>`;
        document.getElementById(id).innerHTML = h;
    }
</script>
</body>
</html>
