<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Football Overlay Complete</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; color: white; width: 1920px; height: 1080px; overflow: hidden; }
        
        #scoreboard { 
            position: absolute; top: 50px; left: 50px; display: flex; align-items: center; 
            background: rgba(0,0,0,0.9); border-radius: 8px; height: 70px;
            transform: translateX(-150%); transition: 0.8s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .show-board { transform: translateX(0) !important; }

        .t-color { width: 12px; height: 100%; }
        .t-name { font-size: 30px; padding: 0 25px; min-width: 140px; text-align: center; text-transform: uppercase; }
        .score { font-size: 45px; background: rgba(255,255,255,0.1); padding: 0 30px; line-height: 70px; font-weight: 900; }
        #timer { background: #27ae60; padding: 0 20px; font-size: 30px; height: 100%; display: flex; align-items: center; min-width: 100px; border-left: 2px solid rgba(0,0,0,0.3); }

        /* Penalty UI */
        #penalty-box {
            position: absolute; top: 130px; left: 50px; background: rgba(0,0,0,0.95);
            padding: 15px 25px; border-radius: 10px; border-bottom: 5px solid #e67e22;
            display: none; min-width: 380px;
        }
        .p-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
        .p-name { font-size: 22px; width: 120px; }
        .ball-box { display: flex; gap: 10px; }
        .ball { 
            width: 22px; height: 22px; border-radius: 50%; background: #333; 
            border: 1px solid #555; transition: 0.3s;
        }
        .ball.goal { background: #2ecc71; border: none; box-shadow: 0 0 12px #2ecc71; }
        .ball.miss { background: #e74c3c; border: none; box-shadow: 0 0 12px #e74c3c; }

        /* Goal Anim */
        #goal-anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 100; }
        .goal-text { font-size: 150px; text-shadow: 0 0 40px #27ae60; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div id="cBoxA" class="t-color"></div>
        <div class="t-name" id="nameA">HOME</div>
        <div class="score" id="scoreA">0</div>
        <div class="score" id="scoreB" style="border-left:1px solid #444;">0</div>
        <div class="t-name" id="nameB">AWAY</div>
        <div id="cBoxB" class="t-color"></div>
        <div id="timer">00:00</div>
    </div>

    <div id="penalty-box">
        <div style="text-align:center; font-size:14px; color:#e67e22; margin-bottom:10px;">PENALTY SHOOTOUT</div>
        <div class="p-row">
            <span class="p-name" id="pNameA">HOME</span>
            <div class="ball-box" id="ballsA"></div>
        </div>
        <div class="p-row">
            <span class="p-name" id="pNameB">AWAY</span>
            <div class="ball-box" id="ballsB"></div>
        </div>
    </div>

    <div id="goal-anim"><div style="text-align:center;"><div class="goal-text">GOAL!!!</div><div id="gTeam" style="font-size:50px; color:#f1c40f;">TEAM</div></div></div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");
    let lastG = 0;

    db.on("value", (snap) => {
        const d = snap.val(); if(!d) return;

        // Scoreboard
        document.getElementById('scoreboard').classList.toggle('show-board', d.showBoard !== false);
        document.getElementById('nameA').innerText = d.nameA || "HOME";
        document.getElementById('nameB').innerText = d.nameB || "AWAY";
        document.getElementById('scoreA').innerText = d.scoreA || 0;
        document.getElementById('scoreB').innerText = d.scoreB || 0;
        document.getElementById('cBoxA').style.background = d.teamColorA || "#ff0000";
        document.getElementById('cBoxB').style.background = d.teamColorB || "#0000ff";

        // Timer
        let s = d.matchSeconds || 0; let m = Math.floor(s/60); let sec = s%60;
        document.getElementById('timer').innerText = (m<10?"0"+m:m) + ":" + (sec<10?"0"+sec:sec);

        // Penalties
        document.getElementById('penalty-box').style.display = d.penaltyMode ? 'block' : 'none';
        document.getElementById('pNameA').innerText = d.nameA;
        document.getElementById('pNameB').innerText = d.nameB;
        renderBalls('A', d.pListA || []);
        renderBalls('B', d.pListB || []);

        // Goal Anim
        if(d.goalTrigger && d.goalTrigger > lastG) {
            const ga = document.getElementById('goal-anim');
            document.getElementById('gTeam').innerText = d.lastGoalTeam || "";
            ga.style.display = 'flex'; setTimeout(() => ga.style.display = 'none', 3500);
            lastG = d.goalTrigger;
        }
    });

    function renderBalls(team, list) {
        let html = '';
        for(let i=0; i<5; i++) {
            let status = list[i] || ''; // 'goal' or 'miss'
            html += `<div class="ball ${status}"></div>`;
        }
        document.getElementById('balls' + team).innerHTML = html;
    }
</script>
</body>
</html>
