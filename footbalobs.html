<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 20px; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        .scoreboard { display: flex; align-items: center; background: rgba(0,0,0,0.85); color: white; height: 60px; border-radius: 5px; border: 2px solid #444; width: fit-content; overflow: hidden; }
        
        .team-name { padding: 0 20px; font-size: 22px; text-transform: uppercase; }
        .score { background: #27ae60; width: 60px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 35px; border-left: 2px solid #000; border-right: 2px solid #000; }
        
        /* ਟਾਈਮ ਵਾਲਾ ਹਿੱਸਾ - ਪਹਿਲਾਂ ਲੁਕਿਆ ਹੋਇਆ */
        #timer-wrap { 
            display: none; 
            background: #e67e22; 
            height: 100%; 
            padding: 0 15px; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-left: 2px solid #000; 
        }
        .timer-active { display: flex !important; }
        
        #time-val { font-size: 24px; line-height: 1; }
        #period-val { font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="team-name" id="nameA_disp">TEAM A</div>
        <div class="score" id="scoreA_disp">0</div>
        <div class="score" id="scoreB_disp" style="background:#c0392b">0</div>
        <div class="team-name" id="nameB_disp">TEAM B</div>
        
        <!-- Timer UI -->
        <div id="timer-wrap">
            <div id="time-val">00:00</div>
            <div id="period-val">1ST HALF</div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    db.on("value", (snap) => {
        const d = snap.val(); if(!d) return;

        // Score & Names
        document.getElementById('nameA_disp').innerText = d.nameA || "TEAM A";
        document.getElementById('nameB_disp').innerText = d.nameB || "TEAM B";
        document.getElementById('scoreA_disp').innerText = d.scoreA || 0;
        document.getElementById('scoreB_disp').innerText = d.scoreB || 0;

        // Timer Visibility (ਸਿਰਫ Start ਤੇ ਦਿਖੇਗਾ)
        const tWrap = document.getElementById('timer-wrap');
        if(d.timerRunning) { 
            tWrap.classList.add('timer-active'); 
        } else { 
            tWrap.classList.remove('timer-active'); 
        }

        // Timer Value
        let s = d.matchSeconds || 0;
        let m = Math.floor(s/60); let sc = s%60;
        document.getElementById('time-val').innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);
        document.getElementById('period-val').innerText = d.currentHalf || "MATCH";
    });
</script>
</body>
</html>
