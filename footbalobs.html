<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 20px; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        .main-container {
            display: flex;
            align-items: center;
            height: 50px;
            background: rgba(15, 15, 15, 0.9);
            color: white;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: fit-content;
            border: 1px solid #333;
        }

        .team-section {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .team-name {
            padding: 0 15px;
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box {
            width: 55px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            background: #27ae60; /* Default Green */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* ਟਾਈਮ ਵਾਲਾ ਹਿੱਸਾ - ਪਹਿਲਾਂ ਲੁਕਿਆ ਹੋਇਆ */
        #timer-wrap {
            display: none; /* ਪੈਨਲ ਤੋਂ ਸਟਾਰਟ ਹੋਣ ਤੇ ਹੀ ਦਿਖੇਗਾ */
            background: #f39c12; /* Orange color for timer */
            height: 100%;
            padding: 0 15px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 2px solid #000;
        }

        .timer-active {
            display: flex !important;
        }

        #time-val {
            font-size: 22px;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1;
        }

        #half-val {
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
        }

        .round-info {
            background: #8e44ad;
            padding: 0 10px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            border-right: 2px solid #000;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Round Info (Quarter/Semi/Final) -->
        <div class="round-info" id="round-disp">MATCH</div>

        <!-- Team A -->
        <div class="team-section">
            <div class="team-name" id="nameA-disp">TEAM A</div>
            <div class="score-box" id="scoreA-disp">0</div>
        </div>

        <!-- Team B -->
        <div class="team-section">
            <div class="score-box" id="scoreB-disp" style="background: #c0392b;">0</div>
            <div class="team-name" id="nameB-disp">TEAM B</div>
        </div>

        <!-- Timer Wrap -->
        <div id="timer-wrap">
            <div id="time-val">00:00</div>
            <div id="half-val">1ST HALF</div>
        </div>
    </div>

<script>
    // ਤੁਹਾਡਾ ਫਾਇਰਬੇਸ ਲਿੰਕ
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    db.on("value", (snap) => {
        const d = snap.val();
        if(!d) return;

        // ਨਾਮ ਅਤੇ ਸਕੋਰ ਅਪਡੇਟ
        document.getElementById('nameA-disp').innerText = d.nameA || "TEAM A";
        document.getElementById('nameB-disp').innerText = d.nameB || "TEAM B";
        document.getElementById('scoreA-disp').innerText = d.scoreA || 0;
        document.getElementById('scoreB-disp').innerText = d.scoreB || 0;
        document.getElementById('round-disp').innerText = d.currentRound || "MATCH";

        // ਟੀਮਾਂ ਦੇ ਰੰਗ (ਜੇ ਤੁਸੀਂ ਪੈਨਲ ਤੋਂ ਬਦਲਦੇ ਹੋ)
        if(d.teamColorA) document.getElementById('scoreA-disp').style.background = d.teamColorA;
        if(d.teamColorB) document.getElementById('scoreB-disp').style.background = d.teamColorB;

        // ਟਾਈਮ ਦਿਖਾਉਣ ਜਾਂ ਲੁਕਾਉਣ ਦੀ ਲੋਜਿਕ
        const tWrap = document.getElementById('timer-wrap');
        if(d.timerRunning) {
            tWrap.classList.add('timer-active');
        } else {
            tWrap.classList.remove('timer-active');
        }

        // ਟਾਈਮ ਦੀ ਵੈਲਿਊ (00:00)
        let s = d.matchSeconds || 0;
        let m = Math.floor(s/60);
        let sc = s%60;
        document.getElementById('time-val').innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);
        document.getElementById('half-val').innerText = d.currentHalf || "1ST HALF";
    });
</script>
</body>
</html>
