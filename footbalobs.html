<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sleek Wide Overlay - Manpreet Singh</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; color: white; width: 1920px; height: 1080px; overflow: hidden; }
        
        /* Goal Animation */
        #goal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            z-index: 999; pointer-events: none;
        }
        .goal-text {
            font-size: 180px; font-weight: 900; font-style: italic;
            text-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px #fff;
            animation: goalPop 0.8s ease-out infinite alternate;
        }
        @keyframes goalPop { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        
        .flash-active { animation: screenFlash 0.4s ease-in-out 3; }
        @keyframes screenFlash { 0%, 100% { background: transparent; } 50% { background: rgba(255,255,255,0.3); } }

        /* Scoreboard - Low Height & Edge Scores */
        #scoreboard { 
            position: absolute; top: 50px; left: 50px; display: flex; align-items: center; 
            background: #000; border-radius: 6px; height: 60px; /* Height Reduced */
            transform: translateX(-150%); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.7); overflow: hidden;
            min-width: 700px; /* Wider */
        }
        .show-board { transform: translateX(0) !important; }

        .team-sec { display: flex; align-items: center; height: 100%; flex: 1; position: relative; }
        
        /* Slanted Divider / Effect */
        #secA { clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); z-index: 2; margin-right: -20px; }
        #secB { clip-path: polygon(5% 0, 100% 0, 100% 100%, 0% 100%); }

        /* Score at Edges */
        .score-box { font-size: 38px; font-weight: 900; width: 70px; text-align: center; background: rgba(0,0,0,0.3); line-height: 60px; }
        
        /* Names in Middle */
        .name-container { flex-grow: 1; overflow: hidden; white-space: nowrap; padding: 0 15px; text-align: center; }
        .name-text { display: inline-block; font-size: 22px; text-transform: uppercase; } /* Font size reduced */
        @keyframes scrollName { 0% { transform: translateX(100%); } 100% { transform: translateX(-120%); } }

        #timer { 
            background: #27ae60; padding: 0 20px; font-size: 28px; height: 100%; 
            display: none; align-items: center; font-family: monospace;
            border-left: 3px solid rgba(0,0,0,0.5);
        }
        .timer-active { display: flex !important; }

        /* Silver Penalty Strip - Thinner */
        #penalty-strip {
            position: absolute; top: 111px; left: 50px; height: 40px; /* Thinner */
            background: linear-gradient(180deg, #f0f0f0 0%, #bbbbbb 100%);
            display: none; align-items: center; justify-content: space-between;
            border-radius: 0 0 10px 10px; box-shadow: 0 8px 15px rgba(0,0,0,0.4); border: 1px solid #fff;
        }
        .p-sec { display: flex; align-items: center; padding: 0 20px; flex: 1; }
        .balls { display: flex; gap: 8px; }
        .ball { width: 18px; height: 18px; border-radius: 50%; background: radial-gradient(circle, #888 0%, #333 100%); border: 1px solid #777; }
        .ball.goal { background: radial-gradient(circle, #2ecc71 0%, #1b5e20 100%); box-shadow: 0 0 8px #2ecc71; border: none; }
        .ball.miss { background: radial-gradient(circle, #e74c3c 0%, #b71c1c 100%); box-shadow: 0 0 8px #e74c3c; border: none; }
    </style>
</head>
<body>

    <div id="goal-overlay"><div class="goal-text" id="goal-msg">GOAL!</div></div>

    <div id="scoreboard">
        <!-- Team A: Score at Edge, Name in Middle -->
        <div id="secA" class="team-sec">
            <div class="score-box" id="scoreA">0</div>
            <div class="name-container"><div class="name-text" id="nameA">TEAM A</div></div>
        </div>

        <!-- Team B: Name in Middle, Score at Edge -->
        <div id="secB" class="team-sec">
            <div class="name-container"><div class="name-text" id="nameB">TEAM B</div></div>
            <div class="score-box" id="scoreB">0</div>
        </div>

        <div id="timer">00:00</div>
    </div>

    <div id="penalty-strip">
        <div class="p-sec"><div id="pbA" class="balls"></div></div>
        <div style="font-weight:bold; color:#666;">/</div>
        <div class="p-sec" style="justify-content: flex-end;"><div id="pbB" class="balls"></div></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");
    let lastGoalTime = 0;

    db.on("value", (snap) => {
        const d = snap.val(); if(!d) return;
        const board = document.getElementById('scoreboard');
        board.classList.toggle('show-board', d.showBoard !== false);
        
        const cA = d.teamColorA || "#ff0000", cB = d.teamColorB || "#0000ff";
        document.getElementById('secA').style.backgroundColor = cA;
        document.getElementById('secB').style.backgroundColor = cB;
        
        const nA = d.nameA || "TEAM A", nB = d.nameB || "TEAM B";
        document.getElementById('nameA').innerText = nA;
        document.getElementById('nameB').innerText = nB;
        document.getElementById('scoreA').innerText = d.scoreA || 0;
        document.getElementById('scoreB').innerText = d.scoreB || 0;

        document.getElementById('nameA').style.animation = nA.length > 12 ? "scrollName 6s linear infinite" : "none";
        document.getElementById('nameB').style.animation = nB.length > 12 ? "scrollName 6s linear infinite" : "none";

        if(d.goalTrigger && d.goalTrigger > lastGoalTime) {
            lastGoalTime = d.goalTrigger;
            const overlay = document.getElementById('goal-overlay');
            const msg = document.getElementById('goal-msg');
            msg.style.color = (d.lastGoalTeam === d.nameA ? cA : cB);
            overlay.style.display = 'flex';
            document.body.classList.add('flash-active');
            setTimeout(() => { overlay.style.display = 'none'; document.body.classList.remove('flash-active'); }, 3000);
        }

        const tBox = document.getElementById('timer');
        if(d.timerRunning || d.matchSeconds > 0) {
            tBox.classList.add('timer-active');
            let s=d.matchSeconds||0, m=Math.floor(s/60), sc=s%60;
            tBox.innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);
        } else { tBox.classList.remove('timer-active'); }

        const pStrip = document.getElementById('penalty-strip');
        if(d.penaltyMode) {
            pStrip.style.display = 'flex';
            pStrip.style.width = board.offsetWidth + "px";
            renderBalls('pbA', d.pListA || []);
            renderBalls('pbB', d.pListB || []);
        } else { pStrip.style.display = 'none'; }
    });

    function renderBalls(id, list) {
        let h = ''; for(let i=0; i<5; i++) h += `<div class="ball ${list[i]||''}"></div>`;
        document.getElementById(id).innerHTML = h;
    }
</script>
</body>
</html>
