<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Professional Silver 3D Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; color: white; width: 1920px; height: 1080px; overflow: hidden; }
        
        /* Main Scoreboard */
        #scoreboard { 
            position: absolute; top: 50px; left: 50px; display: flex; align-items: center; 
            background: rgba(0,0,0,0.9); border-radius: 8px; height: 75px;
            transform: translateX(-150%); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); overflow: hidden;
        }
        .show-board { transform: translateX(0) !important; }

        .team-sec { display: flex; align-items: center; height: 100%; transition: 0.5s; position: relative; }
        
        /* Auto-Scrolling for Long Names */
        .name-wrap { width: 150px; overflow: hidden; white-space: nowrap; text-align: center; font-size: 26px; padding: 0 15px; }
        .scroll-text { display: inline-block; min-width: 100%; }
        @keyframes scrollName { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .score { font-size: 48px; padding: 0 25px; line-height: 75px; font-weight: 900; background: rgba(0,0,0,0.3); min-width: 60px; text-align: center; }
        
        #timer { 
            background: #27ae60; padding: 0 20px; font-size: 32px; height: 100%; 
            display: none; align-items: center; min-width: 110px; border-left: 3px solid rgba(0,0,0,0.3);
        }
        .timer-active { display: flex !important; }

        /* Silver 3D Penalty Strip */
        #penalty-strip {
            position: absolute; top: 125px; left: 50px; height: 50px; 
            background: linear-gradient(180deg, #e0e0e0 0%, #a0a0a0 100%); /* Silver Background */
            display: none; align-items: center; border-radius: 0 0 12px 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); border: 1px solid #fff;
            color: #222; /* Dark text for silver background */
        }
        .p-sec { display: flex; align-items: center; padding: 0 15px; height: 100%; }
        
        /* 3D Balls */
        .balls { display: flex; gap: 6px; }
        .ball { 
            width: 20px; height: 20px; border-radius: 50%; 
            background: radial-gradient(circle, #888 0%, #333 100%); border: 1px solid #666; 
        }
        .ball.goal { background: radial-gradient(circle, #2ecc71 0%, #1b5e20 100%); border: none; box-shadow: 0 0 8px #2ecc71; }
        .ball.miss { background: radial-gradient(circle, #e74c3c 0%, #b71c1c 100%); border: none; box-shadow: 0 0 8px #e74c3c; }

        .divider { font-size: 30px; font-weight: bold; color: #444; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <!-- Team A -->
        <div id="secA" class="team-sec">
            <div class="name-wrap"><div class="scroll-text" id="nameA">TEAM A</div></div>
            <div class="score" id="scoreA">0</div>
        </div>

        <!-- Team B -->
        <div id="secB" class="team-sec">
            <div class="score" id="scoreB">0</div>
            <div class="name-wrap"><div class="scroll-text" id="nameB">TEAM B</div></div>
        </div>

        <!-- Timer -->
        <div id="timer">00:00</div>
    </div>

    <!-- Silver Penalty Box -->
    <div id="penalty-strip">
        <div class="p-sec" id="psA">
            <div class="balls" id="pbA"></div>
        </div>
        
        <div class="divider">/</div>
        
        <div class="p-sec" id="psB">
            <div class="balls" id="pbB"></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("matchData");

    function getContrast(hex){
        hex = hex.replace("#","");
        let r=parseInt(hex.substr(0,2),16), g=parseInt(hex.substr(2,2),16), b=parseInt(hex.substr(4,2),16);
        return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? 'black' : 'white';
    }

    db.on("value", (snap) => {
        const d = snap.val(); if(!d) return;

        const board = document.getElementById('scoreboard');
        board.classList.toggle('show-board', d.showBoard !== false);
        
        // Dynamic Colors
        const cA = d.teamColorA || "#ff0000", cB = d.teamColorB || "#0000ff";
        const secA = document.getElementById('secA'), secB = document.getElementById('secB');
        
        secA.style.backgroundColor = cA; secA.style.color = getContrast(cA);
        secB.style.backgroundColor = cB; secB.style.color = getContrast(cB);

        // Names & Scores
        const nA = d.nameA || "TEAM A", nB = d.nameB || "TEAM B";
        document.getElementById('nameA').innerText = nA;
        document.getElementById('nameB').innerText = nB;
        document.getElementById('scoreA').innerText = d.scoreA || 0;
        document.getElementById('scoreB').innerText = d.scoreB || 0;

        // Auto Scroll Check
        document.getElementById('nameA').style.animation = nA.length > 9 ? "scrollName 5s linear infinite" : "none";
        document.getElementById('nameB').style.animation = nB.length > 9 ? "scrollName 5s linear infinite" : "none";

        // Timer
        const tBox = document.getElementById('timer');
        if(d.timerRunning || d.matchSeconds > 0) {
            tBox.classList.add('timer-active');
            let s=d.matchSeconds||0, m=Math.floor(s/60), sc=s%60;
            tBox.innerText = (m<10?"0"+m:m)+":"+(sc<10?"0"+sc:sc);
        } else { tBox.classList.remove('timer-active'); }

        // Silver Penalty Logic
        const pStrip = document.getElementById('penalty-strip');
        if(d.penaltyMode) {
            pStrip.style.display = 'flex';
            // Match the width of the scoreboard
            pStrip.style.width = (board.offsetWidth) + "px";
            
            renderBalls('pbA', d.pListA || []);
            renderBalls('pbB', d.pListB || []);
        } else { pStrip.style.display = 'none'; }
    });

    function renderBalls(id, list) {
        let h = ''; for(let i=0; i<5; i++) h += `<div class="ball ${list[i]||''}"></div>`;
        document.getElementById(id).innerHTML = h;
    }
</script>
</body>
</html>
