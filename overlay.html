<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: 'Arial', sans-serif; overflow: hidden; position: relative; }
        
        /* ⚠ EXPIRY BLOCK */
        #expiry-notice {
            position: absolute; top: 0; left: 0; width: 1920px; background: #dc3545; color: white;
            font-size: 40px; font-weight: bold; text-align: center; padding: 15px 0;
            z-index: 10000; display: none; text-transform: uppercase;
        }

        /* 📊 SCOREBOARD */
        #scoreboard { position: absolute; top: 60px; right: 80px; display: flex; flex-direction: column; align-items: center; transition: 0.7s ease; }
        .main-bar { display: flex; align-items: center; height: 75px; background: rgba(0, 0, 0, 0.9); border-radius: 12px; border: 3px solid #00aeef; padding: 0 15px; }
        .s-box { background: linear-gradient(145deg, #00aeef, #005a8d); color: white; font-size: 50px; font-weight: 900; min-width: 90px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 8px; text-shadow: 2px 2px 4px #000; }
        .name-area { width: 220px; color: white; font-size: 30px; font-weight: bold; text-align: center; text-transform: uppercase; }

        /* 📜 3-LINE TICKER SYSTEM */
        #ticker-wrap { position: absolute; bottom: 0px; left: 0px; width: 1920px; height: 145px; display: flex; flex-direction: column; z-index: 999; }
        .row-text { display: flex; align-items: center; font-weight: 900; text-transform: uppercase; width: 100%; overflow: hidden; white-space: nowrap; }
        
        .row-1 { background: rgba(0, 0, 0, 0.95); color: white; height: 60px; font-size: 38px; border-top: 3px solid #00aeef; } 
        .row-2 { background: white; color: #b91c1c; height: 42px; font-size: 28px; } 
        .row-3 { background: rgba(0, 0, 0, 0.95); color: #ffcc00; height: 43px; font-size: 28px; }

        /* SCROLLER ANIMATION - Duration JS ਨਾਲ ਸੈੱਟ ਹੋਵੇਗੀ */
        .scroller { 
            display: inline-block; 
            padding-left: 100%; 
            animation: scroll-anim linear infinite; 
        }
        @keyframes scroll-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div id="expiry-notice">⚠ PLAN EXPIRED - RECHARGE NOW ⚠</div>

<div id="scoreboard">
    <div class="main-bar">
        <div class="name-area" id="nA">TEAM 1</div>
        <div class="s-box" id="sA">0</div>
        <div style="color:white; font-weight:900; margin:0 15px;">VS</div>
        <div class="s-box" id="sB">0</div>
        <div class="name-area" id="nB">TEAM 2</div>
    </div>
</div>

<div id="ticker-wrap">
    <div class="row-text row-1" id="c1"><div class="scroller" id="t1"></div></div>
    <div class="row-text row-2" id="c2"><div class="scroller" id="t2"></div></div>
    <div class="row-text row-3" id="c3"><div class="scroller" id="t3"></div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id') || 'demo';

    // --- ਸਪੀਡ ਫਿਕਸ ਕਰਨ ਵਾਲਾ ਫੰਕਸ਼ਨ ---
    function updateTickerWithSpeed(elementId, text) {
        const el = document.getElementById(elementId);
        if (!text || text.trim() === "") {
            el.innerText = "";
            return;
        }
        
        el.innerText = text;
        
        // ⚙️ ਸਪੀਡ ਸੈਟਿੰਗ: 150 ਮਤਲਬ ਨੋਰਮਲ, 200 ਮਤਲਬ ਤੇਜ਼, 100 ਮਤਲਬ ਹੌਲੀ
        const pixelsPerSecond = 160; 
        const textWidth = el.offsetWidth;
        const containerWidth = 1920;
        
        // ਆਪਣੇ ਆਪ ਸਹੀ ਸੈਕਿੰਡ ਕੱਢਣਾ
        const duration = (textWidth + containerWidth) / pixelsPerSecond;
        el.style.animationDuration = duration + "s";
    }

    db.ref("users/" + userID).on("value", (uSnap) => {
        const userData = uSnap.val();
        const now = new Date();
        const expiry = userData ? new Date(userData.expiry) : new Date(0);

        if (now > expiry) {
            document.getElementById('expiry-notice').style.display = "block";
            document.getElementById('ticker-wrap').style.display = "none";
        } else {
            document.getElementById('expiry-notice').style.display = "none";
            document.getElementById('ticker-wrap').style.display = "flex";

            db.ref("matchData").on("value", (snap) => {
                const data = snap.val() || {};
                
                // ਸਕੋਰ ਅਪਡੇਟ
                document.getElementById('sA').innerText = data.scoreA || "0";
                document.getElementById('sB').innerText = data.scoreB || "0";
                document.getElementById('nA').innerText = data.nameA || "TEAM 1";
                document.getElementById('nB').innerText = data.nameB || "TEAM 2";

                // ਟਿੱਕਰ ਅਪਡੇਟ (with Auto Speed)
                updateTickerWithSpeed('t1', data.row1Txt || "WELCOME TO LIVE KABADDI");
                updateTickerWithSpeed('t2', data.row2Txt || "SUBSCRIBE OUR CHANNEL");
                updateTickerWithSpeed('t3', data.row3Txt || "LIKE & SHARE");
            });
        }
    });
</script>
</body>
</html>
