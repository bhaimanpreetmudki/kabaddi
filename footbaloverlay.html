<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Full Scrolling Ticker with Arrows</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bar {
            display: flex;
            height: 52px;
            align-items: center;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* ਬੈਕਗਰਾਊਂਡ ਰੰਗ */
        .top-bar-bg { background: #ffffff; }
        .bot-bar-bg { background: #000000; border-top: 2px solid #ff0000; }

        /* ਸਕ੍ਰੋਲ ਹੋਣ ਵਾਲਾ ਕੰਟੇਨਰ */
        .scroll-wrapper {
            display: flex;
            align-items: center;
            white-space: nowrap;
            width: 100%;
        }

        /* Arrow Box (ਹੁਣ ਇਹ ਵੀ ਸਕ੍ਰੋਲ ਹੋਵੇਗਾ) */
        .arrow-tag {
            display: inline-flex;
            align-items: center;
            height: 52px;
            padding: 0 25px;
            font-weight: 900;
            font-size: 22px;
            position: relative;
            margin-right: 30px; /* ਐਰੋ ਤੋਂ ਬਾਅਦ ਜਗ੍ਹਾ */
        }

        /* ਐਰੋ (>) ਦੀ ਸ਼ੇਪ */
        .arrow-tag::after {
            content: "";
            position: absolute;
            right: -20px;
            top: 0;
            width: 0;
            height: 0;
            border-top: 26px solid transparent;
            border-bottom: 26px solid transparent;
        }

        /* ਰੰਗ ਸੈਟਿੰਗ */
        .red-tag { background: #ff0000; color: #ffffff; }
        .red-tag::after { border-left: 20px solid #ff0000; }

        .white-tag { background: #ffffff; color: #ff0000; border-right: 1px solid #ddd; }
        .white-tag::after { border-left: 20px solid #ffffff; }

        /* ਟੈਕਸਟ ਸਟਾਈਲ */
        .ticker-text {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            align-items: center;
        }

        .red-txt { color: #ff0000; }
        .white-txt { color: #ffffff; }
        .yellow-txt { color: #f1c40f; padding: 0 15px; }

        /* ਘੜੀ ਫਿਕਸ ਰਹੇਗੀ (ਤਾਕਿ ਟਾਈਮ ਪੜ੍ਹਿਆ ਜਾ ਸਕੇ) */
        .clock-fixed {
            position: absolute;
            right: 0;
            background: #f1c40f;
            color: #000;
            min-width: 130px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            z-index: 200;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 15px; left: 15px; display: flex; gap: 4px; }
        .s-box { background: white; color: #ff0000; width: 55px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 15px; height: 45px; display: flex; align-items: center; font-size: 20px; min-width: 120px; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- TOP SCROLLING BAR -->
        <div class="bar top-bar-bg">
            <marquee scrollamount="7">
                <div class="scroll-wrapper">
                    <span class="arrow-tag red-tag">LIVE</span>
                    <span class="ticker-text red-txt" id="tour-name">MAJHA CUP 2026</span>
                    <span style="margin: 0 40px;"></span> <!-- Space between sections -->
                    <span class="arrow-tag red-tag">NEXT MATCH</span>
                    <span class="ticker-text red-txt" id="scroll-top">TEAM A VS TEAM B</span>
                </div>
            </marquee>
        </div>

        <!-- BOTTOM SCROLLING BAR -->
        <div class="bar bot-bar-bg">
            <marquee scrollamount="6">
                <div class="scroll-wrapper">
                    <span class="arrow-tag white-tag">INFO</span>
                    <span class="ticker-text yellow-txt" id="sub-info">LIVE STREAMING</span>
                    <span style="margin: 0 40px;"></span>
                    <span class="arrow-tag white-tag">PRIZES</span>
                    <span class="ticker-text white-txt" id="scroll-bot">1ST: 1,00,000 | 2ND: 75,000</span>
                </div>
            </marquee>
            <!-- Clock stays fixed for readability -->
            <div class="clock-fixed" id="live-clock">00:00 AM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "KABADDI 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING MATCH...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
