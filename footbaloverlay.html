<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi Pro Split Scroll Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bar {
            display: flex;
            height: 50px;
            align-items: center;
            overflow: hidden;
        }

        /* Slanted Shapes */
        .slanted {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            padding: 0 20px;
            font-weight: 900;
            z-index: 15;
        }

        /* LIVE BOX (White BG, Red Text) */
        .live-box {
            background: #ffffff;
            color: #ff0000;
            min-width: 100px;
            font-size: 28px;
            border-right: 3px solid #ff0000;
        }

        /* 50% STATIC SECTION (Black) */
        .static-half {
            background: #000000;
            color: #ffffff;
            width: 40%; /* Adjusted for balance */
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 30px;
            margin-left: -15px;
            font-size: 22px;
            z-index: 10;
        }

        /* RED HINT BOX (Appears after 50%) */
        .hint-red {
            background: #ff0000;
            color: #ffffff;
            min-width: 130px;
            font-size: 16px;
            text-transform: uppercase;
            margin-left: -15px;
            z-index: 12;
        }

        /* SCROLL SECTION */
        .scroll-bg {
            background: rgba(0, 0, 0, 0.9);
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            margin-left: -15px;
            z-index: 5;
            border-right: 4px solid #ff0000;
        }

        marquee {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        /* CLOCK BOX */
        .clock-box {
            background: #f1c40f;
            color: #000;
            min-width: 130px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
            z-index: 13;
            font-weight: 900;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; height: 50px; }
        .s-box { background: white; color: #ff0000; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; }
        .t-box { background: #000; color: white; padding: 0 20px; display: flex; align-items: center; font-size: 22px; min-width: 130px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); margin-left: -10px; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box" style="clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%); margin-left: -10px;">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + TOURNAMENT (50%) + NEXT MATCH HINT + SCROLL -->
        <div class="bar">
            <div class="slanted live-box">LIVE</div>
            <div class="static-half" id="tour-name">PUNJAB KABADDI CUP 2026</div>
            <div class="slanted hint-red">NEXT MATCH</div>
            <div class="scroll-bg">
                <marquee scrollamount="6" id="scroll-top">TEAM C VS TEAM D — COMING UP NEXT</marquee>
            </div>
        </div>

        <!-- LINE 2: INFO (STATIC) + PRIZES HINT + SCROLL + CLOCK -->
        <div class="bar">
            <div class="slanted hint-red" style="margin-left:0; clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%);">INFO</div>
            <div class="static-half" style="width:35%;" id="sub-info">WELCOME TO LIVE STREAMING</div>
            <div class="slanted hint-red">PRIZES</div>
            <div class="scroll-bg">
                <marquee scrollamount="5" id="scroll-bot">1st: ₹1,00,000 | 2nd: ₹75,000 | Best Raider: Motorcycle</marquee>
            </div>
            <div class="clock-box" id="live-clock">02:30 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Scores Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    // Content Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        // Top Line
        document.getElementById('tour-name').innerText = d.tournamentName || "TOURNAMENT 2026";
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "NEXT MATCH LOADING...");
        
        // Bottom Line
        document.getElementById('sub-info').innerText = d.nextProgram || "LIVE KABADDI ACTION";
        document.getElementById('scroll-bot').innerText = "🏆 " + (d.prizes || "UPDATING...") + " — 📢 " + (d.fullTickerText || "");
    });

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
