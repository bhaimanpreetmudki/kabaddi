<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Double Layer Professional Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Common Bar Style */
        .bar {
            display: flex;
            height: 40px;
            align-items: center;
            color: white;
            font-size: 18px;
            overflow: hidden;
        }

        /* Top Bar Colors */
        .top-bar { background: #1a1a1a; border-bottom: 2px solid #f1c40f; }
        
        /* Bottom Bar Colors */
        .bottom-bar { background: #000; border-top: 1px solid #333; }

        /* Small Hint Box */
        .hint {
            background: #b31217; /* Red */
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            min-width: 100px;
            border-right: 2px solid #f1c40f;
        }

        /* Large List Box */
        .list-box {
            flex: 2;
            padding: 0 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        /* Time & Date Flash Box */
        .flash-box {
            background: #f1c40f;
            color: #000;
            width: 150px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
        }

        .flash-item {
            position: absolute;
            opacity: 0;
            transition: 0.5s ease-in-out;
        }

        .flash-item.active { opacity: 1; }

        /* Scoreboard (Keep previous style) */
        #scoreboard {
            position: absolute; top: 20px; left: 20px; display: flex; height: 50px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }
        .s-box { background: white; color: black; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }
        .t-container { display: flex; background: rgba(0,0,0,0.9); min-width: 300px; }
        .t-sec { flex: 1; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; padding: 0 15px; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="border-radius: 25px 0 0 25px;">0</div>
        <div class="t-container">
            <div id="boxA" class="t-sec" style="background: #87CEEB; color: black;">TEAM A</div>
            <div id="boxB" class="t-sec" style="background: #000;">TEAM B</div>
        </div>
        <div id="disp_sB" class="s-box" style="border-radius: 0 25px 25px 0;">0</div>
    </div>

    <!-- Double Layer Footer -->
    <div id="master-footer">
        
        <!-- TOP BAR: 2 Hints + 2 Lists -->
        <div class="top-bar bar">
            <div class="hint">📍 ਪਿੰਡ</div>
            <div class="list-box" id="top-list-1">VILLAGE NAME</div>
            <div class="hint">🏆 ਇਨਾਮ</div>
            <div class="list-box" id="top-list-2">1st: 1 Lakh, 2nd: 75k</div>
        </div>

        <!-- BOTTOM BAR: 2 Hints + 2 Lists + Time/Date -->
        <div class="bottom-bar bar">
            <div class="hint">🏏 ਅਗਲਾ ਮੈਚ</div>
            <div class="list-box" id="bot-list-1">Team A vs Team B</div>
            <div class="hint">📢 ਅੱਪਡੇਟ</div>
            <div class="list-box" id="bot-list-2">Welcome to Live Streaming</div>
            
            <!-- Flash Time/Date -->
            <div class="flash-box">
                <div id="flash-date" class="flash-item active">01-05-2026</div>
                <div id="flash-time" class="flash-item">12:00 PM</div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Match Data
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
        document.getElementById('scoreboard').style.opacity = d.scoreVisible ? "1" : "0";
    });

    // 2. Ticker Data
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('top-list-1').innerText = d.tournamentName || "VILLAGE";
        document.getElementById('top-list-2').innerText = d.prizes || "UPDATING...";
        document.getElementById('bot-list-1').innerText = d.participatingTeams || "NEXT MATCH";
        document.getElementById('bot-list-2').innerText = d.nextProgram || "LIVE NOW";
    });

    // 3. Time & Date Logic
    function updateClock() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB');
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('flash-date').innerText = dateStr;
        document.getElementById('flash-time').innerText = timeStr;
    }
    setInterval(updateClock, 1000);

    // 4. Flash Switcher (Every 3 seconds)
    let showingDate = true;
    setInterval(() => {
        if (showingDate) {
            document.getElementById('flash-date').classList.remove('active');
            document.getElementById('flash-time').classList.add('active');
        } else {
            document.getElementById('flash-time').classList.remove('active');
            document.getElementById('flash-date').classList.add('active');
        }
        showingDate = !showingDate;
    }, 3000);
</script>
</body>
</html>
