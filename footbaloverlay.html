<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi Professional Split Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar {
            display: flex;
            height: 48px;
            align-items: center;
            overflow: hidden;
        }

        /* --- Slanted Design --- */
        .slanted {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            padding: 0 20px;
            font-weight: 900;
            z-index: 10;
        }

        /* LIVE BOX */
        .live-box {
            background: #ff0000;
            color: #ffffff;
            min-width: 90px;
            font-size: 22px;
        }

        /* TOURNAMENT NAME (50% Width) */
        .tour-name-box {
            background: #000000;
            color: #f1c40f; /* Yellow text for contrast */
            width: 45%; /* 50% section focus */
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 30px;
            font-size: 22px;
            margin-left: -15px;
            z-index: 9;
            border-right: 3px solid #ff0000;
        }

        /* UPPER TICKER (White) */
        .upper-ticker {
            background: #ffffff;
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            margin-left: -15px;
            z-index: 8;
        }

        .upper-ticker marquee { color: #000; font-size: 20px; font-weight: bold; }

        /* HINT BOXES (Lower Bar) */
        .hint-yellow { background: #f1c40f; color: #000; min-width: 90px; font-size: 16px; margin-left: 0; }
        .hint-red { background: #b31217; color: #fff; min-width: 110px; font-size: 16px; margin-left: -15px; z-index: 11; }

        /* LOWER RED LIST BAR */
        .red-list-bar {
            background: #b31217;
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 30px;
            margin-left: -15px;
            color: white;
            font-size: 20px;
            z-index: 5;
        }

        /* CLOCK */
        .clock-box {
            background: #fff;
            color: #000;
            min-width: 130px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
            z-index: 12;
            font-weight: 900;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; height: 50px; }
        .s-box { background: white; color: black; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; }
        .t-box { background: #000; color: white; padding: 0 20px; display: flex; align-items: center; font-size: 22px; min-width: 130px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); margin-left: -10px; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);">0</div>
        <div id="boxA" class="t-box" style="background: #87CEEB; color: black;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box" style="clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%); margin-left: -10px;">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + 50% TOURNAMENT NAME + NEXT MATCH TICKER -->
        <div class="bar">
            <div class="slanted live-box">LIVE</div>
            <div class="tour-name-box" id="tour-display">DHOLEWALA KABADDI CUP</div>
            <div class="upper-ticker">
                <marquee scrollamount="5" id="next-match-scroll">NEXT MATCH: TEAM C VS TEAM D — ENJOY LIVE STREAMING</marquee>
            </div>
        </div>

        <!-- LINE 2: PRIZE HINT + UPCOMING HINT + LIST BOX -->
        <div class="bar">
            <div class="slanted hint-yellow">🏆 PRIZE</div>
            <div class="slanted hint-red">UPCOMING</div>
            <div class="red-list-bar" id="list-text">Moga vs Ludhiana | Bathinda vs Mansa | Semi-Final at 5 PM</div>
            <div class="clock-box" id="live-clock">02:30 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Scores Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    // Ticker & Content Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        // Upper Bar
        document.getElementById('tour-display').innerText = d.tournamentName || "TOURNAMENT NAME";
        document.getElementById('next-match-scroll').innerText = "NEXT MATCH: " + (d.participatingTeams || "WAITING...");
        
        // Lower Bar
        // ਇੱਥੇ ਤੁਸੀਂ prizes ਜਾਂ ਕਿਸੇ ਵੀ ਲਿਸਟ ਵਾਲੇ ਖਾਨੇ ਤੋਂ ਆਉਣ ਵਾਲੇ ਮੈਚਾਂ ਦੀ ਲਿਸਟ ਦਿਖਾ ਸਕਦੇ ਹੋ
        document.getElementById('list-text').innerText = (d.prizes || "") + " | UPCOMING: " + (d.fullTickerText || "");
    });

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
