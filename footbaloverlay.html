<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Dual Ticker Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* Scoreboard (Top Left) */
        #scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 5px solid #f1c40f;
            color: white;
            padding: 10px;
            min-width: 250px;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .sb-row { display: flex; justify-content: space-between; font-size: 22px; margin-bottom: 5px; }
        .sb-score { color: #f1c40f; font-weight: bold; }

        /* Ticker Container (Bottom) */
        #footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Top Layer: Village Name + Changing Info */
        .top-layer {
            display: flex;
            height: 35px;
            background: #b31217; /* Red Background */
            color: white;
            font-size: 18px;
            align-items: center;
        }
        .village-box {
            background: #f1c40f; /* Yellow Box */
            color: black;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
            min-width: 200px;
        }
        .top-info-scroll {
            padding-left: 20px;
            flex-grow: 1;
            font-style: italic;
        }

        /* Bottom Layer: Step by Step Info */
        .bottom-layer {
            height: 50px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #f1c40f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
            overflow: hidden;
        }

        /* Step by Step Animation */
        .step-text {
            position: absolute;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-in-out;
        }
        .step-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .bump { animation: bump 0.3s ease-in-out; }
        @keyframes bump { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div class="sb-row"> <span id="nA">TEAM A</span> <span id="sA" class="sb-score">0</span> </div>
        <div class="sb-row"> <span id="nB">TEAM B</span> <span id="sB" class="sb-score">0</span> </div>
    </div>

    <!-- Dual Ticker Footer -->
    <div id="footer">
        <!-- Top Layer -->
        <div class="top-layer">
            <div class="village-box" id="village-display">VILLAGE NAME</div>
            <div class="top-info-scroll" id="event-display">LIVE TOURNAMENT 2024</div>
        </div>

        <!-- Bottom Layer (Step-by-Step Info) -->
        <div class="bottom-layer" id="step-container">
            <div class="step-text active" id="step1">Welcome to the Match!</div>
            <div class="step-text" id="step2">Next Match: Team A vs Team B</div>
            <div class="step-text" id="step3">1st Prize: ₹51,000 + Cup</div>
            <div class="step-text" id="step4">Don't forget to Subscribe!</div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Sync Match Data
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('nA').innerText = d.nameA || "TEAM A";
        document.getElementById('nB').innerText = d.nameB || "TEAM B";
        document.getElementById('sA').innerText = d.scoreA || "0";
        document.getElementById('sB').innerText = d.scoreB || "0";
        document.getElementById('scoreboard').style.opacity = d.scoreVisible ? "1" : "0";
    });

    // 2. Sync Ticker Data & Setup Steps
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('village-display').innerText = d.tournamentName || "VILLAGE";
        document.getElementById('event-display').innerText = d.nextProgram || "LIVE EVENT";
        
        // Update Step Texts
        document.getElementById('step1').innerText = "📍 " + (d.tournamentName || "LIVE");
        document.getElementById('step2').innerText = "🏏 NEXT: " + (d.participatingTeams || "Updating...");
        document.getElementById('step3').innerText = "🏆 PRIZE: " + (d.prizes || "TBD");
        document.getElementById('step4').innerText = "📢 INFO: " + (d.fullTickerText || "Stay Tuned");
        
        document.getElementById('footer').style.opacity = d.tickerVis ? "1" : "0";
    });

    // 3. Step-by-Step Logic (Every 5 seconds change info)
    let currentStep = 1;
    const totalSteps = 4;

    setInterval(() => {
        // Remove active class from current
        document.getElementById(`step${currentStep}`).classList.remove('active');
        
        // Move to next step
        currentStep = currentStep >= totalSteps ? 1 : currentStep + 1;
        
        // Add active class to new step
        document.getElementById(`step${currentStep}`).classList.add('active');
    }, 5000); // 5000ms = 5 Seconds
</script>
</body>
</html>
