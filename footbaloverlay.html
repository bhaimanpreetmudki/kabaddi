<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animated Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #238636; --bg: #0b0d0f; --card-bg: #161b22; --text: #e6edf3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header { background: var(--primary); color: white; padding: 10px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }

        /* Animated Score Styling */
        .score-val { 
            font-size: 45px; 
            font-weight: 900; 
            color: #2ecc71; 
            margin: 5px 0; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        .score-up { transform: scale(1.3); color: #f1c40f; }

        .teams-container { display: flex; padding: 15px; gap: 8px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 10px; background: #1c2128; border-top: 4px solid #fff; transition: 0.3s; }
        
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 8px; font-size: 13px; outline: none; }
        .std-input:focus { border-color: var(--primary); }

        .btn-pm { border: none; color: white; padding: 8px; border-radius: 6px; font-size: 22px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 3px; transition: 0.2s; }
        .btn-pm:active { transform: scale(0.9); }

        .card-btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 10px; width: 100%; transition: 0.2s; }
        .card-btn:hover { filter: brightness(1.2); }

        /* Ticker Style */
        .ticker-preview {
            background: #000;
            color: #f1c40f;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            border: 1px solid #444;
        }
        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-move 15s linear infinite;
            font-weight: bold;
        }
        @keyframes ticker-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .label-title { font-size: 11px; color: #8b949e; display: block; margin: 10px 0 5px 0; text-transform: uppercase; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .flex-row { display: flex; gap: 6px; margin-top: 8px; }
        
        #penaltyControlSection { display: none; background: #1c2128; padding: 15px; border-top: 3px solid #f39c12; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 500px;">
    
    <!-- SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-trophy"></i> Live Score Control</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="color" id="colorA" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:20px; border:none; border-radius:3px; cursor:pointer; background:none;">
                <input type="text" id="nameA" class="std-input" placeholder="Home Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div class="flex-row">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">−</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>

            <div style="flex: 1; display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <div style="font-weight:900; color:#444; font-size:20px;">VS</div>
                <button class="card-btn" style="background:#333;" onclick="resetOnlyScore()">RESET</button>
            </div>

            <div class="team-box" id="boxB">
                <input type="color" id="colorB" value="#ffffff" oninput="updateMatchDB()" style="width:100%; height:20px; border:none; border-radius:3px; cursor:pointer; background:none;">
                <input type="text" id="nameB" class="std-input" placeholder="Away Team" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div class="flex-row">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">−</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TICKER CONTROL -->
    <div class="card">
        <div class="header" style="background:#444;"><i class="fas fa-broadcast-tower"></i> Animated Ticker Settings</div>
        <div style="padding: 15px;">
            <div class="ticker-preview">
                <div id="previewText" class="ticker-text">Welcome to the Tournament! Update info below...</div>
            </div>

            <span class="label-title">Main Ticker Info</span>
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            <input type="text" id="prizeList" class="std-input" placeholder="Prizes (e.g. 1st: 51000)">
            <input type="text" id="nextProg" class="std-input" placeholder="Next Match Details">
            
            <button class="btn-update" style="background:#1a73e8; color:white; padding:12px; border-radius:6px; border:none; cursor:pointer; width:100%; font-weight:bold;" onclick="updateTicker()">
                UPDATE TICKER ANIMATION
            </button>

            <div class="flex-row" style="margin-top:15px;">
                <button id="tickerToggleBtn" class="card-btn" style="background:#ff5722; height:45px;" onclick="confirmTickerAction('vis')">TICKER ON/OFF</button>
            </div>
        </div>
    </div>

</div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true;

    // Score Animation Function
    function animateScore(elemId) {
        const el = document.getElementById(elemId);
        el.classList.add('score-up');
        setTimeout(() => el.classList.remove('score-up'), 300);
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        let newVal = Math.max(0, current + val);
        matchRef.update({ [team]: newVal });
        animateScore(team === 'scoreA' ? 'dispA' : 'dispB');
    }

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value
        });
    }

    function updateTicker() {
        const fullText = `${document.getElementById('tourName').value} | ${document.getElementById('prizeList').value} | NEXT: ${document.getElementById('nextProg').value}`;
        tickerRef.update({ 
            tournamentName: document.getElementById('tourName').value,
            prizes: document.getElementById('prizeList').value,
            nextProgram: document.getElementById('nextProg').value,
            fullTickerText: fullText 
        });
        alert("Ticker Updated!");
    }

    function toggleVis(field) { matchRef.child(field).set(!sVis); }
    function resetOnlyScore() { if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }

    // Sync Data
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        if(data.scoreA !== curA) animateScore('dispA');
        if(data.scoreB !== curB) animateScore('dispB');
        
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;
        
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('colorA').value = data.colorA || "#ffffff";
        document.getElementById('colorB').value = data.colorB || "#ffffff";
        document.getElementById('boxA').style.borderTopColor = data.colorA;
        document.getElementById('boxB').style.borderTopColor = data.colorB;
        
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('tourName').value = data.tournamentName || "";
        document.getElementById('prizeList').value = data.prizes || "";
        document.getElementById('nextProg').value = data.nextProgram || "";
        document.getElementById('previewText').innerText = data.fullTickerText || "Waiting for update...";
        
        let tickerStatus = !!data.tickerVis;
        document.getElementById('tickerToggleBtn').style.background = tickerStatus ? "#238636" : "#da3633";
    });

    function confirmTickerAction(type) {
        if(type === 'vis') {
            tickerRef.child('tickerVis').once('value', s => {
                tickerRef.child('tickerVis').set(!s.val());
            });
        }
    }
</script>
</body>
</html>
