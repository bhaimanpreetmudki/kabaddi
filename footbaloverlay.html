<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi 50-50 Pro Layout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bar {
            display: flex;
            height: 52px; /* Fixed professional height */
            align-items: center;
            background: #000;
            overflow: hidden;
            width: 100%;
        }

        /* --- 50-50 Sectioning --- */
        .left-half {
            width: 45%;
            height: 100%;
            display: flex;
            align-items: center;
            background: #000;
            position: relative;
            z-index: 20; /* Keep static part on top */
        }

        .right-half {
            width: 55%;
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10; /* Scrolling part goes underneath */
        }

        /* --- Capsule Design --- */
        .capsule {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            font-weight: 900;
            border-radius: 50px;
            text-transform: uppercase;
            white-space: nowrap;
            margin-left: 5px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.8);
        }

        .cap-white { background: #ffffff; color: #ff0000; font-size: 24px; }
        .cap-red { background: #ff0000; color: #ffffff; font-size: 18px; }

        /* --- Static Text --- */
        .static-txt {
            color: #f1c40f;
            font-size: 22px;
            font-weight: bold;
            padding-left: 10px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
        }

        /* --- Scroll Areas --- */
        .bg-scroll-white { background: #ffffff; width: 100%; height: 100%; display: flex; align-items: center; }
        .bg-scroll-black { background: #000000; width: 100%; height: 100%; display: flex; align-items: center; border-left: 2px solid #ff0000; }

        marquee {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .white-marquee { color: #ff0000; }
        .black-marquee { color: #ffffff; }

        /* Clock Area */
        .clock-box {
            background: #f1c40f;
            color: #000;
            min-width: 150px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            z-index: 30;
        }

        /* Scoreboard (Mini) */
        #scoreboard { position: absolute; top: 15px; left: 15px; display: flex; gap: 4px; }
        .s-box { background: white; color: #ff0000; width: 55px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 15px; height: 45px; display: flex; align-items: center; font-size: 20px; min-width: 120px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + TOUR NAME (Left 50) + NEXT MATCH (Capsule) + WHITE SCROLL (Right 50) -->
        <div class="bar">
            <div class="left-half">
                <div class="capsule cap-white">LIVE</div>
                <div class="static-txt" id="tour-name">MAJHA CUP 2026</div>
            </div>
            <div class="right-half">
                <div class="capsule cap-red" style="position: absolute; left: -20px;">NEXT MATCH</div>
                <div class="bg-scroll-white">
                    <marquee scrollamount="6" class="white-marquee" id="scroll-top">TEAM MOGA VS TEAM LUDHIANA</marquee>
                </div>
            </div>
        </div>

        <!-- LINE 2: INFO + SUB INFO (Left 50) + PRIZES (Capsule) + BLACK SCROLL (Right 50) + CLOCK -->
        <div class="bar">
            <div class="left-half" style="width: 40%;">
                <div class="capsule cap-white">INFO</div>
                <div class="static-txt" style="color: white; font-size: 18px;" id="sub-info">LIVE FROM VILLAGE</div>
            </div>
            <div class="right-half" style="width: 60%;">
                <div class="capsule cap-red" style="position: absolute; left: -20px;">PRIZES</div>
                <div class="bg-scroll-black">
                    <marquee scrollamount="5" class="black-marquee" id="scroll-bot">1ST: 1,00,000 | 2ND: 75,000 | BEST PLAYER: MOTORCYCLE</marquee>
                </div>
                <div class="clock-box" id="live-clock">00:00 AM</div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "KABADDI 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "LOADING MATCHES...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
