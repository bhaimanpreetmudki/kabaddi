<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Kabaddi Overlay v3</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar {
            display: flex;
            height: 46px;
            align-items: center;
            overflow: hidden;
        }

        /* --- Slanted Box Style --- */
        .slanted {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            padding: 0 20px;
            font-weight: 900;
            z-index: 10;
        }

        /* LIVE FIXED BOX */
        .live-box {
            background: #ff0000;
            color: #ffffff;
            min-width: 100px;
            font-size: 24px;
        }

        /* NEXT MATCH HINT (RED) */
        .next-hint {
            background: #b31217;
            color: white;
            min-width: 120px;
            font-size: 16px;
            text-transform: uppercase;
            margin-left: -15px;
            z-index: 9;
        }

        /* WHITE TICKER (Line 1) */
        .white-ticker {
            background: #ffffff;
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            margin-left: -15px;
            z-index: 8;
            border-right: 5px solid #ff0000;
        }

        .white-ticker marquee {
            color: #000;
            font-size: 22px;
            font-weight: bold;
        }

        /* PRIZE HINT (YELLOW) */
        .prize-hint {
            background: #f1c40f;
            color: #000;
            min-width: 100px;
            font-size: 18px;
            z-index: 10;
        }

        /* RED LIST BAR (Line 2) */
        .red-list-bar {
            background: #b31217;
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 35px;
            margin-left: -15px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            z-index: 5;
        }

        /* CLOCK BOX */
        .clock-box {
            background: #000;
            color: #fff;
            min-width: 140px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
            z-index: 11;
            border-left: 2px solid #f1c40f;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; height: 50px; filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.5)); }
        .s-box { background: white; color: black; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; }
        .t-box { background: #000; color: white; padding: 0 20px; display: flex; align-items: center; font-size: 22px; min-width: 120px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); margin-left: -10px; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);">0</div>
        <div id="boxA" class="t-box" style="background: #87CEEB; color: black;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box" style="clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%); margin-left: -10px;">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + NEXT MATCH HINT + WHITE TICKER -->
        <div class="bar">
            <div class="slanted live-box">LIVE</div>
            <div class="slanted next-hint">NEXT MATCH</div>
            <div class="white-ticker">
                <marquee scrollamount="5" id="next-match-scroll">TEAM A VS TEAM B — LIVE FROM VILLAGE NAME</marquee>
            </div>
        </div>

        <!-- LINE 2: PRIZE HINT + RED LIST BAR + TIME -->
        <div class="bar">
            <div class="slanted prize-hint">🏆 PRIZE</div>
            <div class="red-list-bar" id="list-text">1st: ₹1,00,000 | 2nd: ₹75,000 | Best Raider: Motorcycle</div>
            <div class="clock-box" id="live-clock">12:00 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Scores & Teams Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    // Ticker & List Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        // Upper White Ticker
        const village = d.tournamentName || "VILLAGE";
        const teams = d.participatingTeams || "UPCOMING MATCH";
        document.getElementById('next-match-scroll').innerText = teams + " — LIVE FROM " + village;
        
        // Lower Red Bar List
        document.getElementById('list-text').innerText = d.prizes || "Updating Tournament Info...";
    });

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
