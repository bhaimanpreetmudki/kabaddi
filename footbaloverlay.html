<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Connected Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bar {
            display: flex;
            height: 52px;
            align-items: center;
            background: #000; /* Main Bar Black */
            overflow: hidden;
            width: 100%;
        }

        /* --- Hint Boxes (Connected to Edges - No Rounding) --- */
        .hint-box {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            font-weight: 900;
            z-index: 10;
        }

        /* White BG Boxes (LIVE, INFO) */
        .bg-white {
            background: #ffffff;
            color: #ff0000;
            font-size: 26px;
            min-width: 100px;
        }

        /* Red BG Boxes (NEXT MATCH, PRIZES) */
        .bg-red {
            background: #ff0000;
            color: #ffffff;
            font-size: 18px;
            text-transform: uppercase;
            min-width: 130px;
        }

        /* 50% STATIC SECTION (Tournament Name) */
        .static-area {
            width: 35%;
            color: #f1c40f;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            padding-left: 15px;
            white-space: nowrap;
        }

        /* --- SCROLL SECTION (White Background as requested) --- */
        .scroll-white {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            background: #ffffff; /* List background white */
            border-left: 2px solid #ff0000;
        }

        marquee { 
            color: #ff0000; /* Red text on white background */
            font-size: 22px; 
            font-weight: bold; 
        }

        /* CLOCK SECTION */
        .clock-section {
            background: #f1c40f;
            color: #000;
            min-width: 160px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; gap: 5px; }
        .s-box { background: white; color: #ff0000; width: 65px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 900; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 25px; height: 55px; display: flex; align-items: center; font-size: 24px; min-width: 140px; border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + TOUR NAME + NEXT MATCH + WHITE SCROLL LIST -->
        <div class="bar">
            <div class="hint-box bg-white">LIVE</div>
            <div class="static-area" id="tour-name">MAJHA KABADDI CUP 2026</div>
            <div class="hint-box bg-red">NEXT MATCH</div>
            <div class="scroll-white">
                <marquee scrollamount="6" id="scroll-top">UPCOMING: TEAM C VS TEAM D — ENJOY THE MATCH</marquee>
            </div>
        </div>

        <!-- LINE 2: INFO + SUB INFO + PRIZES + WHITE SCROLL LIST + CLOCK -->
        <div class="bar">
            <div class="hint-box bg-white" style="min-width: 100px;">INFO</div>
            <div class="static-area" style="width: 30%; color: white;" id="sub-info">LIVE FROM VILLAGE</div>
            <div class="hint-box bg-red">PRIZES</div>
            <div class="scroll-white">
                <marquee scrollamount="5" id="scroll-bot">1st Prize: ₹1,00,000 | 2nd Prize: ₹75,000 | Best Raider: Motorcycle</marquee>
            </div>
            <div class="clock-section" id="live-clock">02:30 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = d.tournamentName || "TOURNAMENT 2026";
        document.getElementById('scroll-top').innerText = d.participatingTeams || "NEXT MATCH LOADING...";
        document.getElementById('sub-info').innerText = d.nextProgram || "LIVE STREAMING";
        document.getElementById('scroll-bot').innerText = "🏆 " + (d.prizes || "UPDATING...");
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
