<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Zero-Gap Pro Kabaddi Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0px; /* Saare gap khatam */
        }

        .bar {
            display: flex;
            height: 54px;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        /* --- Overlapping Slanted Design --- */
        .slanted {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            padding: 0 30px;
            font-weight: 900;
            margin-right: -35px; /* Box ek duje de upr charan ge */
            position: relative;
        }

        /* LIVE BOX (Top Level) */
        .live-box {
            background: #ffffff;
            color: #ff0000;
            min-width: 110px;
            font-size: 32px;
            z-index: 50; /* Sab ton upr */
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
        }

        /* TOURNAMENT NAME BOX */
        .tour-name-box {
            background: #0a192f;
            color: #f1c40f;
            width: 40%;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 50px;
            font-size: 24px;
            z-index: 40;
            clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
            margin-right: -40px;
        }

        /* HINT BOX (Red - Tikker de upr dikhega) */
        .hint-red {
            background: #ff0000;
            color: #ffffff;
            min-width: 150px;
            font-size: 16px;
            text-transform: uppercase;
            z-index: 30;
        }

        /* SCROLL BOX (Piche wala area) */
        .scroll-area {
            background: #4a0000;
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 50px;
            z-index: 20; /* Eh sab ton thalle rahega */
            border-bottom: 2px solid #ff0000;
        }

        marquee { color: white; font-size: 24px; font-weight: bold; }

        /* CLOCK BOX (Right Side Corner) */
        .clock-box {
            background: #f1c40f;
            color: #000;
            min-width: 250px; /* Full wide */
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 900;
            z-index: 60; /* Clock v upr rahegi */
            margin-right: 0;
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
        }

        /* Scoreboard Zero Gap */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; height: 55px; }
        .s-box { background: white; color: #ff0000; width: 70px; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 900; z-index: 10; }
        .t-box { background: #000; color: white; padding: 0 30px; display: flex; align-items: center; font-size: 26px; min-width: 160px; clip-path: polygon(12% 0, 100% 0, 88% 100%, 0 100%); margin-left: -20px; z-index: 5; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="clip-path: polygon(0 0, 100% 0, 75% 100%, 0 100%);">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box" style="margin-left: -25px;">TEAM B</div>
        <div id="disp_sB" class="s-box" style="clip-path: polygon(25% 0, 100% 0, 100% 100%, 0 100%); margin-left: -20px;">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + TOUR NAME + NEXT MATCH + SCROLL -->
        <div class="bar">
            <div class="slanted live-box">LIVE</div>
            <div class="tour-name-box" id="tour-name">PUNJAB KABADDI CUP 2026</div>
            <div class="slanted hint-red">NEXT MATCH</div>
            <div class="scroll-area">
                <marquee scrollamount="6" id="scroll-top">UPCOMING: TEAM A VS TEAM B — LIVE FROM VILLAGE</marquee>
            </div>
        </div>

        <!-- LINE 2: INFO + SUB INFO + PRIZES + SCROLL + CLOCK -->
        <div class="bar" style="margin-top: -2px;"> <!-- Overlap line 1 -->
            <div class="slanted hint-red" style="margin-left:0; clip-path: polygon(0 0, 100% 0, 82% 100%, 0 100%); min-width:110px;">INFO</div>
            <div class="tour-name-box" style="width:30%; padding-left:45px;" id="sub-info">LIVE STREAMING</div>
            <div class="slanted hint-red">PRIZES</div>
            <div class="scroll-area">
                <marquee scrollamount="5" id="scroll-bot">1st Prize: ₹1,00,000 | 2nd Prize: ₹75,000 | Best Player: Motorcycle</marquee>
            </div>
            <div class="clock-box" id="live-clock">02:30 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Data Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = d.tournamentName || "TOURNAMENT 2026";
        document.getElementById('scroll-top').innerText = d.participatingTeams || "NEXT MATCH LOADING...";
        document.getElementById('sub-info').innerText = d.nextProgram || "LIVE KABADDI";
        document.getElementById('scroll-bot').innerText = "🏆 " + (d.prizes || "UPDATING...");
    });

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
