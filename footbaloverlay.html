<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Capsule Style Kabaddi Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar {
            display: flex;
            height: 45px;
            align-items: center;
            position: relative;
            background: rgba(0, 0, 0, 0.85); /* Black strip background */
            border-radius: 50px; /* Puri patti gol */
            overflow: hidden;
        }

        /* --- Capsule Style Hint Boxes --- */
        .capsule {
            height: 85%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            font-weight: 900;
            border-radius: 50px; /* Capsule Shape */
            position: relative;
            z-index: 10;
            margin-left: 5px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        /* LIVE CAPSULE (White BG, Red Text) */
        .live-cap {
            background: #ffffff;
            color: #ff0000;
            font-size: 24px;
            min-width: 90px;
            border: 2px solid #ff0000;
        }

        /* RED HINT CAPSULE */
        .hint-cap {
            background: #ff0000;
            color: #ffffff;
            font-size: 16px;
            text-transform: uppercase;
            min-width: 120px;
        }

        /* YELLOW CAPSULE (Clock) */
        .clock-cap {
            background: #f1c40f;
            color: #000;
            min-width: 150px;
            height: 85%;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            margin-right: 5px;
            margin-left: 10px;
        }

        /* SCROLL AREA */
        .scroll-area {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 15px;
            z-index: 5;
        }

        marquee {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        /* Scoreboard Capsule Style */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; gap: 5px; }
        .s-box { background: white; color: #ff0000; width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; border-radius: 15px; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 20px; height: 50px; display: flex; align-items: center; font-size: 22px; min-width: 120px; border-radius: 15px; border: 1px solid #444; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE + TOUR NAME (CAPSULE) + NEXT MATCH + SCROLL -->
        <div class="bar">
            <div class="capsule live-cap">LIVE</div>
            <div class="capsule hint-cap" style="background: #0a192f; color: #f1c40f; min-width: 200px;" id="tour-name">TOURNAMENT 2026</div>
            <div class="capsule hint-cap">NEXT MATCH</div>
            <div class="scroll-area">
                <marquee scrollamount="6" id="scroll-top">UPCOMING MATCH: TEAM A VS TEAM B — LIVE FROM VILLAGE</marquee>
            </div>
        </div>

        <!-- LINE 2: INFO + SUB INFO + PRIZES + SCROLL + CLOCK -->
        <div class="bar">
            <div class="capsule hint-cap" style="min-width: 80px;">INFO</div>
            <div class="capsule hint-cap" style="background: #333; min-width: 150px;" id="sub-info">LIVE STREAMING</div>
            <div class="capsule hint-cap">PRIZES</div>
            <div class="scroll-area">
                <marquee scrollamount="5" id="scroll-bot">1st Prize: ₹1,00,000 | 2nd Prize: ₹75,000 | Best Player: Motorcycle</marquee>
            </div>
            <div class="clock-cap" id="live-clock">02:30 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Data Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = d.tournamentName || "TOURNAMENT 2026";
        document.getElementById('scroll-top').innerText = d.participatingTeams || "NEXT MATCH LOADING...";
        document.getElementById('sub-info').innerText = d.nextProgram || "LIVE KABADDI";
        document.getElementById('scroll-bot').innerText = "🏆 " + (d.prizes || "UPDATING...");
    });

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
