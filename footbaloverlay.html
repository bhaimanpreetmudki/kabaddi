<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Sports Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* 1. SCOREBOARD (TOP LEFT) */
        #scoreboard {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 4px;
            overflow: hidden;
            border-left: 5px solid #238636;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            min-width: 300px;
            transition: 0.5s;
        }

        .team-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; border-bottom: 1px solid #333; }
        .team-name { font-size: 20px; color: white; text-transform: uppercase; font-weight: 700; }
        .score { font-size: 28px; color: #f1c40f; font-weight: 800; }
        
        .timer-row { background: #238636; color: white; text-align: center; font-size: 18px; padding: 2px 0; font-weight: 700; }

        /* 2. DUAL LAYER TICKER (BOTTOM) */
        #ticker-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Top Red Strip (Main Info Heading) */
        .top-strip {
            background: #b31217;
            color: white;
            height: 30px;
            width: fit-content;
            padding: 0 30px;
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 700;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
            z-index: 2;
        }

        /* Bottom Black Strip (Content) */
        .bottom-strip {
            background: rgba(0, 0, 0, 0.9);
            color: #f1c40f;
            height: 45px;
            border-top: 2px solid #b31217;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-size: 24px;
        }

        .info-slide {
            white-space: nowrap;
            display: inline-block;
            animation: slide-info 25s linear infinite;
            padding-left: 100%;
        }

        @keyframes slide-info {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Score Animation */
        .bump { animation: bumpAnim 0.4s ease; }
        @keyframes bumpAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #fff; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Scoreboard at Top Left -->
    <div id="scoreboard">
        <div class="team-row">
            <span id="nameA" class="team-name">TEAM A</span>
            <span id="scoreA" class="score">0</span>
        </div>
        <div class="team-row">
            <span id="nameB" class="team-name">TEAM B</span>
            <span id="scoreB" class="score">0</span>
        </div>
        <div id="time" class="timer-row">00:00</div>
    </div>

    <!-- Dual Layer Ticker -->
    <div id="ticker-container">
        <div class="top-strip" id="ticker-heading">LIVE TOURNAMENT</div>
        <div class="bottom-strip">
            <div id="full-ticker" class="info-slide">
                <!-- Data will be injected here -->
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastA = -1, lastB = -1;

    // 1. Match Score Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('scoreboard').style.opacity = d.scoreVisible ? "1" : "0";
        
        document.getElementById('nameA').innerText = d.nameA || "TEAM A";
        document.getElementById('nameB').innerText = d.nameB || "TEAM B";
        document.getElementById('time').innerText = d.matchTime || "00:00";

        // Score Bumping Animation
        const sA = document.getElementById('scoreA');
        const sB = document.getElementById('scoreB');

        if(d.scoreA !== lastA) { sA.innerText = d.scoreA; if(lastA !== -1) sA.classList.add('bump'); setTimeout(()=>sA.classList.remove('bump'), 500); }
        if(d.scoreB !== lastB) { sB.innerText = d.scoreB; if(lastB !== -1) sB.classList.add('bump'); setTimeout(()=>sB.classList.remove('bump'), 500); }
        
        lastA = d.scoreA; lastB = d.scoreB;
    });

    // 2. Ticker Sync (Combines all 4 fields)
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        const village = d.tournamentName || "VILLAGE NAME";
        const nextMatch = d.participatingTeams || "UPCOMING MATCH"; // Using participatingTeams as Next Match placeholder
        const prize = d.prizes || "WINNING PRIZE";
        const event = d.nextProgram || "NEXT EVENT";

        // Joining all 4 parts with a separator
        const separator = " • ";
        const combinedText = `📍 ${village}${separator} 🏏 NEXT MATCH: ${nextMatch}${separator} 🏆 PRIZE: ${prize}${separator} 📢 INFO: ${event}`;
        
        document.getElementById('full-ticker').innerText = combinedText + " " + combinedText; // Repeat for gapless scrolling
        document.getElementById('ticker-container').style.opacity = d.tickerVis ? "1" : "0";
    });
</script>
</body>
</html>
