<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi Pro Capsule Scroll Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar {
            display: flex;
            height: 52px;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 50px;
            overflow: hidden;
            padding: 0 5px;
        }

        /* --- Capsule Style for Hint Boxes Only --- */
        .capsule-hint {
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            font-weight: 900;
            border-radius: 50px; /* Capsule Shape */
            z-index: 10;
            margin: 0 5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* LIVE & INFO (White BG, Red Text) */
        .bg-white { background: #ffffff; color: #ff0000; font-size: 24px; }

        /* NEXT MATCH & PRIZES (Red BG, White Text) */
        .bg-red { background: #ff0000; color: #ffffff; font-size: 16px; }

        /* --- Scrolling Area for ALL other content --- */
        .scroll-box {
            flex-grow: 1;
            height: 38px;
            background: #ffffff; /* White background for list */
            border-radius: 50px; /* List box v capsule look ch */
            display: flex;
            align-items: center;
            overflow: hidden;
            margin: 0 5px;
        }

        marquee {
            color: #ff0000; 
            font-size: 22px; 
            font-weight: bold; 
            text-transform: uppercase; /* Saare akhar capital */
        }

        /* Tournament Name Scroll (Yellowish) */
        .tour-scroll {
            width: 30%;
            background: transparent;
        }
        .tour-scroll marquee { color: #f1c40f; }

        /* Clock Capsule */
        .clock-cap {
            background: #f1c40f;
            color: #000;
            min-width: 140px;
            height: 38px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            margin-right: 5px;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; gap: 5px; }
        .s-box { background: white; color: #ff0000; width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; border-radius: 10px; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 20px; height: 50px; display: flex; align-items: center; font-size: 22px; min-width: 130px; border-radius: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #ff0000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: LIVE (Cap) + TOUR NAME (Scroll) + NEXT MATCH (Cap) + LIST (Scroll) -->
        <div class="bar">
            <div class="capsule-hint bg-white">LIVE</div>
            <div class="scroll-box tour-scroll" style="background: transparent;">
                <marquee scrollamount="4" id="tour-name">MAJHA KABADDI CUP 2026</marquee>
            </div>
            <div class="capsule-hint bg-red">NEXT MATCH</div>
            <div class="scroll-box">
                <marquee scrollamount="6" id="scroll-top">TEAM MOGA VS TEAM LUDHIANA — BIG MATCH COMING UP</marquee>
            </div>
        </div>

        <!-- LINE 2: INFO (Cap) + LIST (Scroll) + PRIZES (Cap) + LIST (Scroll) + CLOCK -->
        <div class="bar">
            <div class="capsule-hint bg-white">INFO</div>
            <div class="scroll-box" style="max-width: 200px;">
                <marquee scrollamount="3" id="scroll-info">LIVE STREAMING HD</marquee>
            </div>
            <div class="capsule-hint bg-red">PRIZES</div>
            <div class="scroll-box">
                <marquee scrollamount="5" id="scroll-bot">1ST: ₹1,00,000 | 2ND: ₹75,000 | BEST PLAYER: MOTORCYCLE</marquee>
            </div>
            <div class="clock-cap" id="live-clock">02:30 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "TOURNAMENT 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "LOADING...").toUpperCase();
        document.getElementById('scroll-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
