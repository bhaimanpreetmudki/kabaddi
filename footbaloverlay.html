<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Ticker with Add Box</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --arrow-width: 25px;      /* Arrow ਦੀ ਨੋਕ */
            --arrow-height: 52px;     /* ਪੱਟੀ ਦੀ ਉਚਾਈ */
            --label-padding: 30px;    /* Hint ਬਾਕਸ ਦੀ ਚੌੜਾਈ */
            --white-box-color: #ffffff;
            --red-box-color: #ff0000;
            
            /* --- Add Box Settings --- */
            --add-box-bg: #f1c40f;    /* ਐਡ ਬਾਕਸ ਦਾ ਬੈਕਗਰਾਊਂਡ (ਪੀਲਾ) */
            --add-box-txt: #000000;   /* ਐਡ ਬਾਕਸ ਦਾ ਟੈਕਸਟ ਰੰਗ */
            --add-font-size: 20px;    /* ਐਡ ਬਾਕਸ ਦੇ ਫੌਂਟ ਦਾ ਸਾਈਜ਼ */
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px; left: 0; right: 0;
            display: flex; flex-direction: column; gap: 4px;
        }

        .bar { display: flex; height: var(--arrow-height); width: 100%; overflow: hidden; position: relative; }

        /* 50-50 Sections */
        .box-left { width: 45%; height: 100%; position: relative; display: flex; align-items: center; overflow: hidden; background: #000; }
        .box-right { width: 55%; height: 100%; position: relative; display: flex; align-items: center; overflow: hidden; }

        /* Static Hint Labels */
        .hint-label {
            height: 100%; display: flex; align-items: center; justify-content: center;
            padding: 0 var(--label-padding); font-weight: 900; font-size: 22px;
            text-transform: uppercase; position: absolute; left: 0; top: 0; z-index: 100;
        }

        /* Arrow (>) Setup */
        .hint-label::after {
            content: ""; position: absolute; right: calc(var(--arrow-width) * -1);
            top: 0; width: 0; height: 0;
            border-top: calc(var(--arrow-height) / 2) solid transparent;
            border-bottom: calc(var(--arrow-height) / 2) solid transparent;
            z-index: 100;
        }

        .hint-white { background: var(--white-box-color); color: #ff0000; }
        .hint-white::after { border-left: var(--arrow-width) solid var(--white-box-color); }

        .hint-red { background: var(--red-box-color); color: #ffffff; }
        .hint-red::after { border-left: var(--arrow-width) solid var(--red-box-color); }

        /* --- Add Box Styling --- */
        .add-box {
            background: var(--add-box-bg);
            color: var(--add-box-txt);
            height: 80%; /* ਪੱਟੀ ਤੋਂ ਥੋੜਾ ਛੋਟਾ ਰੱਖਣ ਲਈ */
            display: inline-flex;
            align-items: center;
            padding: 0 15px;
            margin: 0 10px;
            font-weight: 900;
            font-size: var(--add-font-size);
            border-radius: 4px;
            border: 1px solid #000;
            text-transform: uppercase;
        }

        marquee { width: 100%; font-size: 26px; font-weight: 900; text-transform: uppercase; z-index: 10; padding-left: 120px; }

        .txt-white { color: #fff; }
        .txt-red { color: #ff0000; }
        .txt-yellow { color: #f1c40f; }

        .clock-area {
            position: absolute; right: 0; background: #f1c40f; color: #000;
            min-width: 130px; height: 100%; display: flex; align-items: center;
            justify-content: center; font-size: 24px; font-weight: 900; z-index: 110;
        }
    </style>
</head>
<body>

    <div id="master-footer">
        <!-- LINE 1 (Top Bar) -->
        <div class="bar">
            <div class="box-left">
                <div class="hint-label hint-white">LIVE</div>
                <marquee scrollamount="5" class="txt-yellow">
                    <span id="tour-name">LOADING...</span>
                    <!-- Add Box Example -->
                    <span class="add-box">AD: MANPREET STUDIO</span>
                </marquee>
            </div>
            <div class="box-right" style="background:#fff;">
                <div class="hint-label hint-red">NEXT</div>
                <marquee scrollamount="6" class="txt-red">
                    <span id="scroll-top">LOADING...</span>
                </marquee>
            </div>
        </div>

        <!-- LINE 2 (Bottom Bar) -->
        <div class="bar">
            <div class="box-left">
                <div class="hint-label hint-white">INFO</div>
                <marquee scrollamount="4" class="txt-white">
                    <span id="sub-info">LOADING...</span>
                    <span class="add-box" style="background: #ffffff; color: #ff0000;">SPONSOR: KABADDI CLUB</span>
                </marquee>
            </div>
            <div class="box-right" style="background:#000; border-left: 2px solid #ff0000;">
                <div class="hint-label hint-red">PRIZES</div>
                <marquee scrollamount="5" class="txt-white" style="width: calc(100% - 130px);">
                    <span id="scroll-bot">LOADING...</span>
                </marquee>
                <div class="clock-area" id="live-clock">00:00 AM</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "KABADDI 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING MATCH...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
