<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Slanted Double Layer Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .bar {
            display: flex;
            height: 45px;
            align-items: center;
            color: white;
            padding-left: 20px;
        }

        /* Slanted Design Logic */
        .slanted-box {
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            /* Tehdha Cut (Slant) */
            clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
            margin-left: -15px; 
            font-weight: bold;
        }

        /* Color Palette */
        .color-red { background: linear-gradient(90deg, #b31217, #e6191f); color: white; min-width: 120px; z-index: 5; }
        .color-dark { background: rgba(10, 25, 47, 0.95); color: #fff; flex: 2; z-index: 4; font-size: 22px; }
        .color-yellow { background: #f1c40f; color: #000; min-width: 120px; z-index: 3; }
        .color-blue { background: #0056b3; color: #fff; flex: 2; z-index: 2; font-size: 22px; }
        .color-flash { background: #fff; color: #b31217; min-width: 160px; z-index: 1; font-weight: 900; font-size: 20px; }

        .hint-text { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }

        /* Flash Clock Animation */
        .flash-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .flash-item { position: absolute; opacity: 0; transition: 0.6s ease; }
        .flash-item.active { opacity: 1; }

        /* Scoreboard */
        #scoreboard {
            position: absolute; top: 30px; left: 30px; display: flex; height: 55px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
        }
        .s-box { background: white; color: black; width: 70px; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 900; }
        .t-container { display: flex; background: #0a192f; border-top: 3px solid #f1c40f; }
        .t-sec { padding: 0 25px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; min-width: 150px; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%); border-radius: 5px 0 0 5px;">0</div>
        <div class="t-container" style="margin-left: -15px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);">
            <div id="boxA" class="t-sec" style="background: #87CEEB; color: black;">TEAM A</div>
            <div id="boxB" class="t-sec" style="background: #000;">TEAM B</div>
        </div>
        <div id="disp_sB" class="s-box" style="margin-left: -15px; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%); border-radius: 0 5px 5px 0;">0</div>
    </div>

    <!-- Double Layer Footer -->
    <div id="master-footer">
        
        <!-- TOP BAR -->
        <div class="bar">
            <div class="slanted-box color-red"><span class="hint-text">📍 ਪਿੰਡ</span></div>
            <div class="slanted-box color-dark" id="top-list-1">DHOLEWALA (MOGA)</div>
            <div class="slanted-box color-yellow"><span class="hint-text">🏆 ਇਨਾਮ</span></div>
            <div class="slanted-box color-blue" id="top-list-2">1st: 1,00,000 | 2nd: 75,000</div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bar">
            <div class="slanted-box color-yellow"><span class="hint-text">🏏 ਅਗਲਾ ਮੈਚ</span></div>
            <div class="slanted-box color-blue" id="bot-list-1">TEAM A VS TEAM B</div>
            <div class="slanted-box color-red"><span class="hint-text">📢 ਅੱਪਡੇਟ</span></div>
            <div class="slanted-box color-dark" id="bot-list-2">WELCOME TO LIVE KABADDI</div>
            <div class="slanted-box color-flash">
                <div class="flash-container">
                    <div id="date" class="flash-item active">01/05/2026</div>
                    <div id="time" class="flash-item">10:30 AM</div>
                </div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Sync Data
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
        document.getElementById('scoreboard').style.opacity = d.scoreVisible ? "1" : "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('top-list-1').innerText = d.tournamentName || "VILLAGE";
        document.getElementById('top-list-2').innerText = d.prizes || "UPDATING...";
        document.getElementById('bot-list-1').innerText = d.participatingTeams || "NEXT MATCH";
        document.getElementById('bot-list-2').innerText = d.nextProgram || "LIVE NOW";
    });

    // Time & Date Switcher
    setInterval(() => {
        const now = new Date();
        document.getElementById('date').innerText = now.toLocaleDateString('en-GB');
        document.getElementById('time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        
        const d = document.getElementById('date');
        const t = document.getElementById('time');
        if (d.classList.contains('active')) {
            d.classList.remove('active'); t.classList.add('active');
        } else {
            t.classList.remove('active'); d.classList.add('active');
        }
    }, 4000);
</script>
</body>
</html>
