<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>OBS Cricket/Football Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* Scoreboard Overlay */
        #scoreboard {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #333;
            border-radius: 8px;
            height: 60px;
            min-width: 600px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.5s ease-in-out;
            opacity: 0; /* Hidden by default */
        }

        .team { display: flex; align-items: center; padding: 0 20px; flex: 1; }
        .team-name { font-size: 24px; text-transform: uppercase; margin: 0 15px; }
        .score { font-size: 38px; font-weight: 700; color: #2ecc71; min-width: 40px; text-align: center; }

        .vs-box { background: #f1c40f; color: black; padding: 5px 15px; font-weight: 800; font-size: 18px; skew: -20deg; }
        
        .timer { background: #238636; padding: 0 20px; height: 100%; display: flex; align-items: center; font-size: 28px; border-radius: 0 6px 6px 0; min-width: 80px; }

        /* Animated Ticker */
        #ticker-wrap {
            position: absolute;
            bottom: 10px;
            width: 100%;
            background: linear-gradient(90deg, #b31217 0%, #e74c3c 50%, #b31217 100%);
            color: white;
            height: 35px;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-size: 20px;
            font-weight: 600;
            border-top: 2px solid #fff;
            opacity: 0;
        }

        .ticker-move {
            white-space: nowrap;
            padding-left: 100%;
            display: inline-block;
            animation: moveTicker 20s linear infinite;
        }

        @keyframes moveTicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Score Change Animation */
        .bump { animation: bumpAnim 0.4s ease; }
        @keyframes bumpAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: #f1c40f; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1. Scoreboard -->
    <div id="scoreboard">
        <div class="team" id="sideA">
            <div id="overlay_nameA" class="team-name">TEAM A</div>
            <div id="overlay_scoreA" class="score">0</div>
        </div>
        
        <div class="vs-box">VS</div>

        <div class="team" id="sideB">
            <div id="overlay_scoreB" class="score">0</div>
            <div id="overlay_nameB" class="team-name">TEAM B</div>
        </div>

        <div class="timer" id="overlay_time">00:00</div>
    </div>

    <!-- 2. Scrolling Ticker -->
    <div id="ticker-wrap">
        <div id="overlay_ticker" class="ticker-move">Welcome to Live Tournament...</div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastScoreA = 0, lastScoreB = 0;

    // Listen for Match Data
    db.ref("matchData").on("value", (snap) => {
        const data = snap.val() || {};
        
        // Toggle Visibility
        document.getElementById('scoreboard').style.opacity = data.scoreVisible ? "1" : "0";

        // Update Names & Colors
        document.getElementById('overlay_nameA').innerText = data.nameA || "TEAM A";
        document.getElementById('overlay_nameB').innerText = data.nameB || "TEAM B";
        document.getElementById('sideA').style.borderLeft = `8px solid ${data.colorA || '#fff'}`;
        document.getElementById('sideB').style.borderRight = `8px solid ${data.colorB || '#fff'}`;

        // Update Score with Animation
        const sA = document.getElementById('overlay_scoreA');
        const sB = document.getElementById('overlay_scoreB');

        if(data.scoreA !== lastScoreA) { sA.innerText = data.scoreA; sA.classList.add('bump'); setTimeout(()=>sA.classList.remove('bump'), 500); }
        if(data.scoreB !== lastScoreB) { sB.innerText = data.scoreB; sB.classList.add('bump'); setTimeout(()=>sB.classList.remove('bump'), 500); }
        
        lastScoreA = data.scoreA;
        lastScoreB = data.scoreB;

        // Timer
        document.getElementById('overlay_time').innerText = data.matchTime || "00:00";
    });

    // Listen for Ticker Data
    db.ref("tickerData").on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('ticker-wrap').style.opacity = data.tickerVis ? "1" : "0";
        document.getElementById('overlay_ticker').innerText = data.fullTickerText || "";
    });
</script>
</body>
</html>
