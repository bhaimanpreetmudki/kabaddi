<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional 50-50 Kabaddi Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- SCOREBOARD --- */
        #scoreboard {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            height: 60px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }
        .score-box {
            background: white;
            color: black;
            width: 75px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 900;
            z-index: 2;
        }
        .score-left { border-radius: 40px 0 0 40px; }
        .score-right { border-radius: 0 40px 40px 0; }
        
        .team-container { display: flex; height: 100%; min-width: 400px; background: rgba(0,0,0,0.85); margin: 0 -5px; overflow: hidden; }
        .team-section { flex: 1; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; text-transform: uppercase; padding: 0 25px; transition: 0.5s; }
        
        /* Default Team Colors */
        .team-a { background: #87CEEB; color: black; } /* Skyblue */
        .team-b { background: #000000; color: white; } /* Black */
        
        .vs-divider { width: 45px; background: white; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%); font-size: 16px; }

        /* --- 50-50 FOOTER TICKER --- */
        #footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            height: 65px;
            background: #1a1a1a;
            border-top: 4px solid #f1c40f;
        }

        /* Left Side: Village Name (Static) */
        .village-half {
            flex: 1;
            background: #b31217; /* Red */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            border-right: 5px solid #f1c40f;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }

        /* Right Side: Step-by-Step Info */
        .info-half {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .step-text {
            position: absolute;
            width: 90%;
            text-align: center;
            color: #f1c40f; /* Yellow Text */
            font-size: 28px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .step-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animation */
        .bump { animation: scoreBump 0.4s ease; }
        @keyframes scoreBump { 0%{transform:scale(1);} 50%{transform:scale(1.25);} 100%{transform:scale(1);} }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="score-box score-left">0</div>
        <div class="team-container">
            <div id="boxA" class="team-section team-a">TEAM A</div>
            <div class="vs-divider">VS</div>
            <div id="boxB" class="team-section team-b">TEAM B</div>
        </div>
        <div id="disp_sB" class="score-box score-right">0</div>
    </div>

    <!-- 50-50 Footer -->
    <div id="footer">
        <!-- Village Section -->
        <div class="village-half" id="village-display">DHOLEWALA (MOGA)</div>

        <!-- Info Section (Auto Changes) -->
        <div class="info-half">
            <div class="step-text active" id="step1">🏆 1st Prize: ₹1,00,000</div>
            <div class="step-text" id="step2">🏏 Next: Team A vs Team B</div>
            <div class="step-text" id="step3">📢 Contact: +91 98765-43210</div>
            <div class="step-text" id="step4">🔥 Subscribe Kabaddi Junc.</div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastA = -1, lastB = -1;

    // 1. Match Data Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        
        // Colors from Admin or Defaults
        const colorA = (d.colorA && d.colorA !== "#ffffff") ? d.colorA : "#87CEEB";
        const colorB = (d.colorB && d.colorB !== "#ffffff") ? d.colorB : "#000000";
        
        document.getElementById('boxA').style.backgroundColor = colorA;
        document.getElementById('boxB').style.backgroundColor = colorB;
        document.getElementById('boxA').style.color = (colorA === "#87CEEB") ? "black" : "white";

        const sA = document.getElementById('disp_sA');
        const sB = document.getElementById('disp_sB');

        if(d.scoreA !== lastA) { sA.innerText = d.scoreA || "0"; sA.classList.add('bump'); setTimeout(()=>sA.classList.remove('bump'), 400); }
        if(d.scoreB !== lastB) { sB.innerText = d.scoreB || "0"; sB.classList.add('bump'); setTimeout(()=>sB.classList.remove('bump'), 400); }

        lastA = d.scoreA; lastB = d.scoreB;
        document.getElementById('scoreboard').style.opacity = d.scoreVisible ? "1" : "0";
    });

    // 2. Ticker Data Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('village-display').innerText = d.tournamentName || "VILLAGE NAME";
        
        document.getElementById('step1').innerText = "🏆 PRIZE: " + (d.prizes || "UPDATING...");
        document.getElementById('step2').innerText = "🏏 NEXT: " + (d.participatingTeams || "WAITING...");
        document.getElementById('step3').innerText = "📢 " + (d.nextProgram || "LIVE NOW");
        document.getElementById('step4').innerText = "📍 " + (d.fullTickerText || "WELCOME");
        
        document.getElementById('footer').style.opacity = d.tickerVis ? "1" : "0";
    });

    // 3. Step Rotation (Every 5 seconds)
    let curStep = 1;
    setInterval(() => {
        document.getElementById(`step${curStep}`).classList.remove('active');
        curStep = (curStep % 4) + 1;
        document.getElementById(`step${curStep}`).classList.add('active');
    }, 5000);
</script>
</body>
</html>
