<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi Live Scroll Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bar {
            display: flex;
            height: 45px;
            align-items: center;
            overflow: hidden;
        }

        /* --- Slanted Box Style --- */
        .slanted {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            padding: 0 30px;
            font-weight: 900;
            z-index: 10;
        }

        /* 1. LIVE HINT BOX */
        .live-box {
            background: #ff0000; /* Red */
            color: #ffffff; /* White text */
            min-width: 100px;
            font-size: 22px;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.8; } }

        /* 2. SCROLLING BOX (Village Name) */
        .scroll-container {
            background: rgba(0, 0, 0, 0.9); /* Dark Black */
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            margin-left: -20px;
            z-index: 5;
            border-right: 4px solid #ff0000;
        }

        /* Marquee Effect */
        marquee {
            color: white;
            font-size: 24px;
            width: 100%;
            font-weight: 500;
        }

        /* 3. PRICE HINT BOX */
        .price-hint {
            background: #ff0000;
            color: white;
            min-width: 140px;
            font-size: 18px;
            text-transform: uppercase;
        }

        /* 4. PRICE DISPLAY BOX */
        .price-display {
            background: #1a1a1a;
            color: #f1c40f; /* Yellowish for price highlight */
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 40px;
            font-size: 24px;
            margin-left: -20px;
        }

        /* 5. CLOCK BOX */
        .clock-box {
            background: white;
            color: black;
            min-width: 150px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            clip-path: polygon(12% 0, 100% 0, 100% 100%, 0 100%);
            z-index: 11;
        }

        /* Scoreboard (Mini Slant) */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; height: 50px; filter: drop-shadow(2px 4px 6px black); }
        .s-box { background: white; color: black; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; }
        .t-box { background: #000; color: white; padding: 0 20px; display: flex; align-items: center; font-size: 22px; min-width: 120px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); margin-left: -10px; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="s-box" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);">0</div>
        <div id="boxA" class="t-box" style="background: #87CEEB; color: black;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box" style="clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%); margin-left: -10px;">0</div>
    </div>

    <!-- Double Layer Footer -->
    <div id="master-footer">
        
        <!-- LINE 1: LIVE + SCROLLING VILLAGE NAME -->
        <div class="bar">
            <div class="slanted live-box">LIVE</div>
            <div class="scroll-container">
                <marquee scrollamount="6" id="scroll-village">WELCOME TO THE TOURNAMENT - LIVE FROM VILLAGE NAME</marquee>
            </div>
        </div>

        <!-- LINE 2: PRICE HINT + PRICE SHOW + TIME -->
        <div class="bar">
            <div class="slanted price-hint">🏆 PRIZES</div>
            <div class="price-display" id="prize-text">1st: ₹1,00,000 | 2nd: ₹75,000</div>
            <div class="clock-box" id="live-clock">12:00 PM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Score & Teams Sync
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    // Ticker & Village Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        // Village name scrolling
        const vName = d.tournamentName || "VILLAGE NAME";
        document.getElementById('scroll-village').innerText = "LIVE TOURNAMENT FROM: " + vName + " — " + (d.nextProgram || "");
        
        // Price update
        document.getElementById('prize-text').innerText = d.prizes || "Updating Prizes...";
    });

    // Simple Clock
    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('live-clock').innerText = timeStr;
    }, 1000);
</script>
</body>
</html>
