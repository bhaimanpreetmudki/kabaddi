<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi 50-50 Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 2px; /* Pattiyan de vich gapp ghat kita */
        }

        .bar {
            display: flex;
            height: 50px; /* Exact 50-50 feel height */
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            overflow: hidden;
            position: relative;
        }

        /* --- Capsule Hint Boxes --- */
        .capsule-hint {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            font-weight: 900;
            border-radius: 50px;
            position: relative;
            z-index: 100; /* Isde thalle akhar jan ge */
            margin: 0 5px;
            text-transform: uppercase;
            white-space: nowrap;
            box-shadow: 5px 0 10px rgba(0,0,0,0.5); /* Shadow ta ki akhar thalle jande saaf dikhan */
        }

        .bg-white { background: #ffffff; color: #ff0000; font-size: 22px; }
        .bg-red { background: #ff0000; color: #ffffff; font-size: 18px; }

        /* --- Scroll Box Layout --- */
        .scroll-box {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10; /* Hint box ton thalle */
            margin-right: -10px; /* Akhar nu hint box de thalle bhejan layi */
        }

        /* White Scroll (Top Bar) */
        .bg-scroll-white { background: #ffffff; }
        .bg-scroll-white marquee { color: #ff0000; }

        /* Black Scroll (Prize/Bottom Bar) */
        .bg-scroll-black { background: #000000; border-left: 1px solid #333; }
        .bg-scroll-black marquee { color: #ffffff; }

        marquee {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Tournament Name Section */
        .tour-area {
            width: 30%;
            color: #f1c40f;
            font-size: 20px;
            font-weight: bold;
            padding-left: 10px;
            text-transform: uppercase;
        }

        /* Clock Capsule */
        .clock-cap {
            background: #f1c40f;
            color: #000;
            min-width: 140px;
            height: 40px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            margin-right: 10px;
            z-index: 110;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 20px; left: 20px; display: flex; gap: 5px; }
        .s-box { background: white; color: #ff0000; width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; border-radius: 5px; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 20px; height: 50px; display: flex; align-items: center; font-size: 22px; min-width: 130px; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #ff0000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- LINE 1: 50-50 Style (White Scroll) -->
        <div class="bar">
            <div class="capsule-hint bg-white">LIVE</div>
            <div class="tour-area" id="tour-name">MAJHA CUP 2026</div>
            <div class="capsule-hint bg-red">NEXT MATCH</div>
            <div class="scroll-box bg-scroll-white">
                <marquee scrollamount="6" id="scroll-top">UPCOMING MATCH LOADING...</marquee>
            </div>
        </div>

        <!-- LINE 2: 50-50 Style (Black Scroll for Prizes) -->
        <div class="bar">
            <div class="capsule-hint bg-white">INFO</div>
            <div class="scroll-box" style="max-width: 200px; background: #222; margin-left: 5px;">
                <marquee scrollamount="4" id="scroll-info">LIVE STREAMING</marquee>
            </div>
            <div class="capsule-hint bg-red">PRIZES</div>
            <div class="scroll-box bg-scroll-black">
                <marquee scrollamount="5" id="scroll-bot">LOADING PRIZES...</marquee>
            </div>
            <div class="clock-cap" id="live-clock">00:00 AM</div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "TOURNAMENT 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "NEXT MATCH UPDATING Soon...").toUpperCase();
        document.getElementById('scroll-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
