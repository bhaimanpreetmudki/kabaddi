<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Square Box Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .bar {
            display: flex;
            height: 52px;
            align-items: center;
            overflow: hidden;
            width: 100%;
        }

        /* --- 1. Top Left Section --- */
        #box-top-left {
            width: 45%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            z-index: 50;
        }

        /* --- 2. Top Right Section (Scroll Area) --- */
        #box-top-right {
            width: 55%;
            height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            position: relative;
        }

        /* --- 3. Bottom Left Section --- */
        #box-bottom-left {
            width: 40%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            z-index: 50;
        }

        /* --- 4. Bottom Right Section (Scroll Area) --- */
        #box-bottom-right {
            width: 60%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            position: relative;
            border-left: 2px solid #ff0000;
        }

        /* --- ਸਿੰਪਲ ਬਾਕਸ ਸਟਾਈਲ (ਕੈਪਸੂਲ ਦੀ ਥਾਂ) --- */
        .static-label {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 22px;
            padding: 0 25px; /* ਇੱਥੋਂ ਬਾਕਸ ਦੀ ਚੌੜਾਈ ਵਧਾਓ */
            z-index: 100;
        }

        /* ਅਲੱਗ-ਅਲੱਗ ਬਾਕਸਾਂ ਦੇ ਰੰਗ */
        .bg-white { background: #ffffff; color: #ff0000; }
        .bg-red { background: #ff0000; color: #ffffff; }

        /* ਟਿੱਕਰ ਸੈਟਿੰਗ */
        marquee {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .red-text { color: #ff0000; }
        .white-text { color: #ffffff; }

        .tour-text {
            color: #f1c40f;
            font-size: 22px;
            font-weight: bold;
            padding-left: 15px;
            text-transform: uppercase;
        }

        .clock-section {
            background: #f1c40f;
            color: #000;
            min-width: 140px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 15px; left: 15px; display: flex; gap: 4px; }
        .s-box { background: white; color: #ff0000; width: 55px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 15px; height: 45px; display: flex; align-items: center; font-size: 20px; min-width: 120px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- TOP BAR -->
        <div class="bar">
            <div id="box-top-left">
                <div class="static-label bg-white">LIVE</div>
                <div class="tour-text" id="tour-name">MAJHA CUP 2026</div>
            </div>
            <div id="box-top-right">
                <div class="static-label bg-red">NEXT MATCH</div>
                <marquee scrollamount="6" class="red-text" id="scroll-top">TEAM A VS TEAM B</marquee>
            </div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bar">
            <div id="box-bottom-left">
                <div class="static-label bg-white">INFO</div>
                <div class="tour-text" style="color: white; font-size: 18px;" id="sub-info">LIVE STREAMING</div>
            </div>
            <div id="box-bottom-right">
                <div class="static-label bg-red">PRIZES</div>
                <marquee scrollamount="5" class="white-text" id="scroll-bot">1ST: 1,00,000 | 2ND: 75,000</marquee>
                <div class="clock-section" id="live-clock">00:00 AM</div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "KABADDI 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING MATCH...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
