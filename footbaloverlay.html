<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Individual Box Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .bar {
            display: flex;
            height: 52px;
            align-items: center;
            background: transparent; /* Main bar transparent rakhi hai taaki boxes dikhan */
            overflow: hidden;
            width: 100%;
            position: relative;
        }

        /* --- 4 ਵੱਡੇ ਬਾਕਸਾਂ ਦੀ ਅਲੱਗ-ਅਲੱਗ ਸੈਟਿੰਗ --- */

        #box-top-left {
            width: 55%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 50;
            /* ਇੱਥੋਂ ਸੈੱਟ ਕਰੋ */
            top: 0px; 
            left: 0px;
        }

        #box-top-right {
            width: 45%;
            height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
            /* ਇੱਥੋਂ ਸੈੱਟ ਕਰੋ */
            top: 0px;
            left: 0px;
        }

        #box-bottom-left {
            width: 45%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 50;
            /* ਇੱਥੋਂ ਸੈੱਟ ਕਰੋ */
            top: 0px;
            left: 0px;
        }

        #box-bottom-right {
            width: 55%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
            border-left: 2px solid #ff0000;
            /* ਇੱਥੋਂ ਸੈੱਟ ਕਰੋ */
            top: 0px;
            left: 0px;
        }
/* ਸਾਰੇ ਕੈਪਸੂਲਾਂ ਲਈ ਸਾਂਝਾ ਸਟਾਈਲ */
    .capsule {
        height: 52px; /* ਇੱਥੋਂ ਸਾਰਿਆਂ ਦੀ ਹਾਈਟ ਇਕੱਠੀ ਵਧੇਗੀ */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 25px;
        font-weight: 900;
        border-radius: 50px;
        text-transform: uppercase;
        position: relative;
        z-index: 100;
    }

    /* --- ਹੁਣ ਇਕੱਲੇ-ਇਕੱਲੇ ਕੈਪਸੂਲ ਦੀ ਸੈਟਿੰਗ --- */

    #cap-live {
        background: #ffffff; color: #ff0000;
        top: 0px;    /* ਉੱਪਰ-ਹੇਠਾਂ ਲਈ */
        left: 0px;   /* ਸੱਜੇ-ਖੱਬੇ ਲਈ */
        height: 52px; /* ਜੇ ਸਿਰਫ ਇਸਦੀ ਹਾਈਟ ਬਦਲਣੀ ਹੋਵੇ */
    }

    #cap-next {
        background: #ff0000; color: #ffffff;
        top: 0px;    /* ਉੱਪਰ-ਹੇਠਾਂ (ਜਿਵੇਂ -2px) */
        left: -10px; /* ਇਸ ਨੂੰ ਥੋੜਾ ਖੱਬੇ ਕਰਨ ਲਈ */
    }

    #cap-info {
        background: #ffffff; color: #ff0000;
        top: 0px;
        left: 0px;
    }

    #cap-prizes {
        background: #ff0000; color: #ffffff;
        top: 0px;
        left: -10px;
    }

    #cap-clock {
        background: #f1c40f; color: #000;
        top: 0px;
        right: 0px; /* ਘੜੀ ਨੂੰ ਸੱਜੇ ਪਾਸੇ ਸੈੱਟ ਕਰਨ ਲਈ */
    }
        marquee { font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .red-text { color: #ff0000; }
        .white-text { color: #ffffff; }

        .static-tour { color: #f1c40f; font-size: 22px; font-weight: bold; padding-left: 10px; text-transform: uppercase; }

        .clock-section {
            background: #f1c40f;
            color: #000;
            min-width: 140px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            z-index: 60;
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 15px; left: 15px; display: flex; gap: 4px; }
        .s-box { background: white; color: #ff0000; width: 55px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 15px; height: 45px; display: flex; align-items: center; font-size: 20px; min-width: 120px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- TOP BAR -->
        <div class="bar">
            <!-- 1. Top Left Box -->
            <div id="box-top-left">
                <div id="cap-live" class="capsule">LIVE</div>
                <div class="static-tour" id="tour-name">MAJHA CUP 2026</div>
            </div>
            <!-- 2. Top Right Box -->
            <div id="box-top-right">
                <div id="cap-next" class="capsule">NEXT MATCH</div>
                <marquee scrollamount="6" class="red-text" id="scroll-top">TEAM A VS TEAM B</marquee>
            </div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bar">
            <!-- 3. Bottom Left Box -->
            <div id="box-bottom-left">
                <div id="cap-info" class="capsule">INFO</div>
                <div class="static-tour" style="color: white; font-size: 18px;" id="sub-info">LIVE STREAMING</div>
            </div>
            <!-- 4. Bottom Right Box -->
            <div id="box-bottom-right">
                <div id="cap-prizes" class="capsule">PRIZES</div>
                <marquee scrollamount="5" class="white-text" id="scroll-bot">1ST: 1,00,000 | 2ND: 75,000</marquee>
                <div class="clock-section" id="live-clock">00:00 AM</div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "KABADDI 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING MATCH...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
