<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional 50-50 Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- SCOREBOARD (Top Left) --- */
        #scoreboard {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            height: 60px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }
        .score-box {
            background: white;
            color: black;
            width: 70px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: 900;
            z-index: 2;
        }
        .score-left { border-radius: 40px 0 0 40px; }
        .score-right { border-radius: 0 40px 40px 0; }
        .team-container { display: flex; height: 100%; min-width: 350px; background: rgba(0,0,0,0.8); margin: 0 -5px; overflow: hidden; }
        .team-section { flex: 1; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; text-transform: uppercase; padding: 0 20px; transition: 0.5s; }
        .team-a { background: #87CEEB; color: black; }
        .team-b { background: #000000; color: white; }
        .vs-divider { width: 40px; background: white; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%); font-size: 14px; }

        /* --- FOOTER DUAL TICKER (50-50 Split) --- */
        #footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            height: 55px; /* Patii di uchai */
            background: rgba(0, 0, 0, 0.9);
            border-top: 3px solid #f1c40f;
        }

        /* Khabba Pasa (Village Name) */
        .village-half {
            flex: 1; /* 50% width */
            background: #b31217; /* Red background */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            border-right: 4px solid #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Sajja Pasa (Changing Info) */
        .info-half {
            flex: 1; /* 50% width */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        .step-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: #f1c40f;
            font-size: 26px;
            font-weight: bold;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.6s ease-in-out;
        }
        .step-text.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Animation for score change */
        .bump { animation: scoreBump 0.4s ease; }
        @keyframes scoreBump { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard">
        <div id="disp_sA" class="score-box score-left">0</div>
        <div class="team-container">
            <div id="boxA" class="team-section team-a">TEAM A</div>
            <div class="vs-divider">VS</div>
            <div id="boxB" class="team-section team-b">TEAM B</div>
        </div>
        <div id="disp_sB" class="score-box score-right">0</div>
    </div>

    <!-- 50-50 Dual Ticker Footer -->
    <div id="footer">
        <!-- Village Half -->
        <div class="village-half" id="village-display">VILLAGE NAME</div>

        <!-- Info Half (Step by Step) -->
        <div class="info-half">
            <div class="step-text active" id="step1">🏏 Loading Next Match...</div>
            <div class="step-text" id="step2">🏆 Prize Details...</div>
            <div class="step-text" id="step3">📢 Tournament Info...</div>
            <div class="step-text" id="step4">🔥 Subscribe for Live!</div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastA = -1, lastB = -1;

    // 1. Sync Match Data
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = d.nameA || "TEAM A";
        document.getElementById('boxB').innerText = d.nameB || "TEAM B";
        
        const colorA = (d.colorA && d.colorA !== "#ffffff") ? d.colorA : "#87CEEB";
        const colorB = (d.colorB && d.colorB !== "#ffffff") ? d.colorB : "#000000";
        
        document.getElementById('boxA').style.backgroundColor = colorA;
        document.getElementById('boxB').style.backgroundColor = colorB;
        document.getElementById('boxA').style.color = (colorA === "#87CEEB") ? "black" : "white";

        const sA = document.getElementById('disp_sA');
        const sB = document.getElementById('disp_sB');

        if(d.scoreA !== lastA) { sA.innerText = d.scoreA || "0"; if(lastA !== -1) { sA.classList.add('bump'); setTimeout(()=>sA.classList.remove('bump'), 400); } }
        if(d.scoreB !== lastB) { sB.innerText = d.scoreB || "0"; if(lastB !== -1) { sB.classList.add('bump'); setTimeout(()=>sB.classList.remove('bump'), 400); } }

        lastA = d.scoreA; lastB = d.scoreB;
        document.getElementById('scoreboard').style.opacity = d.scoreVisible ? "1" : "0";
    });

    // 2. Sync Ticker Logic
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('village-display').innerText = d.tournamentName || "VILLAGE";
        
        document.getElementById('step1').innerText = "🏏 NEXT: " + (d.participatingTeams || "UPCOMING");
        document.getElementById('step2').innerText = "🏆 PRIZE: " + (d.prizes || "BEST LUCK");
        document.getElementById('step3').innerText = "📢 " + (d.nextProgram || "LIVE NOW");
        document.getElementById('step4').innerText = "📍 " + (d.tournamentName || "WELCOME");
        
        document.getElementById('footer').style.opacity = d.tickerVis ? "1" : "0";
    });

    // 3. Step-by-Step Cycle (50-50 info change)
    let curStep = 1;
    setInterval(() => {
        document.getElementById(`step${curStep}`).classList.remove('active');
        curStep = (curStep % 4) + 1;
        document.getElementById(`step${curStep}`).classList.add('active');
    }, 5000);
</script>
</body>
</html>
