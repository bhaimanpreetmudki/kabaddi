<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV - Final Master Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --arrow-width: 20px;
            --arrow-height: 50px;
            --label-padding: 25px;
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
            --container-width: 610px;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- 1. Scoreboard Wrapper --- */
        #scoreboard-wrapper { position: absolute; top: 25px; left: 20px; display: flex; flex-direction: column; gap: 2px; z-index: 100; }
        #scoreboard-main-row { display: flex; align-items: flex-start; }
        
        #scoreboard-container { 
            display: flex; 
            width: var(--container-width); 
            border: 3px solid var(--pure-white); 
            border-radius: 6px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); 
            background: var(--pure-black); 
        }

        .jersey-strip { width: 12px; height: 60px; flex-shrink: 0; }

        .score-unit { display: flex; height: 60px; align-items: center; flex-grow: 1; position: relative; }
        .team-display { 
            flex-grow: 1; 
            padding: 0 15px; 
            font-size: 36px; 
            font-weight: 900; 
            text-transform: uppercase; 
            overflow: hidden;
            white-space: nowrap;
        }
        .score-box { width: 75px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; flex-shrink: 0; }
        
        /* --- Card Styles --- */
        .card-indicator {
            width: 15px;
            height: 22px;
            border-radius: 2px;
            display: none;
            position: absolute;
            bottom: 5px;
            border: 1px solid rgba(0,0,0,0.3);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        #cardA { right: 10px; }
        #cardB { left: 10px; }
        .yellow-card { background: #ffd700; display: block; }
        .red-card { background: #ff0000; display: block; }

        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        #match-timer-box { background: var(--main-red); color: white; height: 60px; display: none; align-items: center; padding: 0 15px; font-size: 32px; font-weight: 900; border: 3px solid white; border-left: none; border-radius: 0 6px 6px 0; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); }

        #match-details { display: flex; justify-content: space-between; padding: 0 5px; color: var(--pure-white); font-size: 26px; font-weight: 700; text-shadow: 2px 2px 4px #000; text-transform: uppercase; width: var(--container-width); }

      /* --- Penalty System Updated --- */
#penalty-shots-container { 
    display: none; 
    justify-content: space-between; 
    align-items: center; 
    background: var(--main-red); /* ਬੈਕਗਰਾਊਂਡ ਲਾਲ ਕਰ ਦਿੱਤੀ */
    padding: 10px; 
    border: 3px solid white; /* ਚਿੱਟਾ ਬਾਰਡਰ */
    border-radius: 8px; 
    margin-top: 5px; 
    width: var(--container-width); 
    box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    color: white; /* ਅੱਖਰਾਂ ਦਾ ਰੰਗ ਚਿੱਟਾ */
}

.team-shots { display: flex; gap: 3px; }

.ball { 
    width: 25px; /* ਸਾਈਜ਼ ਥੋੜਾ ਵੱਡਾ ਕੀਤਾ */
    height: 25px; 
    border-radius: 50%; 
    background: #fff; /* ਖਾਲੀ ਬਾਲ ਹੁਣ ਚਿੱਟੀ ਦਿਖੇਗੀ */
    border: 2px solid #000; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 18px; 
    font-weight: bold; 
    color: #000; 
}

.ball.goal { background: #00ff00; color: #000; border-color: #fff; } /* ਗੋਲ ਹੋਣ ਤੇ ਹਰੀ ਬਾਲ */
.ball.miss { background: #000000; color: #fff; border-color: #fff; } /* ਮਿਸ ਹੋਣ ਤੇ ਕਾਲੀ ਬਾਲ */

        /* Contact Flasher */
        #contact-flasher { position: absolute; bottom: 120px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 6px 15px; border-radius: 5px; border-left: 4px solid var(--main-red); font-size: 36px; font-weight: 900; display: flex; align-items: center; gap: 10px; z-index: 1001; }

        /* --- 4. Ticker --- */
        #master-footer { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; flex-direction: column; gap: 4px; padding: 0 10px; z-index: 999; }
        .bar { display: flex; height: var(--arrow-height); width: 100%; overflow: hidden; position: relative; border: 2px solid var(--main-red); border-radius: 4px; }
        .top-bg { background: var(--pure-white); }
        .bottom-bg { background: var(--main-red); }
        .box-left, .box-right { width: 50%; height: 100%; position: relative; display: flex; align-items: center; overflow: hidden; }
        .hint-label { height: 100%; display: flex; align-items: center; justify-content: center; padding: 0 var(--label-padding); font-weight: 900; font-size: 36px; text-transform: uppercase; position: absolute; left: 0; top: 0; z-index: 100; }
        .hint-label::after { content: ""; position: absolute; right: calc(var(--arrow-width) * -1); top: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; }
        .hint-red { background: var(--main-red); color: var(--pure-white); }
        .hint-red::after { border-left: var(--arrow-width) solid var(--main-red); }
        .hint-white { background: var(--pure-white); color: var(--main-red); }
        .hint-white::after { border-left: var(--arrow-width) solid var(--pure-white); }
        marquee { width: 100%; font-size: 36px; font-weight: 900; text-transform: uppercase; padding-left: 130px; }
        .txt-red { color: var(--main-red); }
        .txt-white { color: var(--pure-white); }
        .clock-area { position: absolute; right: 0; background: var(--pure-white); color: var(--main-red); min-width: 140px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; z-index: 110; border-left: 2px solid var(--main-red); }

        #watermark { position: fixed; color: #FFFFFF !important; font-size: 35px; font-weight: 1000; letter-spacing:2px; z-index: 9999; opacity: 1 !important text-shadow: 4px 4px 8px rgba (0,0,0,1); filter: drop shadow(0px 0px 5px rgba (255,255,255,0.5));   (1.5); transition: all 1.2s ease-in-out; pointer-events: none; }
        #goal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 80vh; display: none; justify-content: center; align-items: center; z-index: 500; pointer-events: none; }
        .goal-text { font-size: 180px; color: #fff; font-weight: 900; text-shadow: 0 0 20px #ff0000; animation: ghaintGoal 0.5s ease-in-out infinite alternate; }
        @keyframes ghaintGoal { from { transform: scale(0.8); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="goal-overlay"><div class="goal-text">GOAL !!!</div></div>
    <div id="watermark">SUKHDEEP TV</div>

    <div id="contact-flasher">
        <i id="fl-icon" class="fas fa-phone-alt"></i>
        <span id="fl-num">86996-40061</span>
    </div>

    <div id="scoreboard-wrapper">
        <div id="scoreboard-main-row">
            <div id="scoreboard-container">
                <div id="jA" class="jersey-strip"></div>
                <div class="score-unit side-a">
                    <div class="score-box" id="scoreA">0</div>
                    <div class="team-display" id="nameA">TEAM A</div>
                    <div id="cardA" class="card-indicator"></div>
                </div>
                <div class="score-unit side-b">
                    <div id="cardB" class="card-indicator"></div>
                    <div class="team-display" id="nameB" style="text-align: right;">TEAM B</div>
                    <div class="score-box" id="scoreB">0</div>
                </div>
                <div id="jB" class="jersey-strip"></div>
            </div>
            <div id="match-timer-box">00:00</div>
        </div>
        
        <div id="match-details">
            <span id="round-detail">ROUND: 1</span>
            <span id="half-detail">FIRST HALF</span>
        </div>

        <div id="penalty-shots-container">
            <div class="team-shots" id="shotsA">
                <div class="ball" id="a1">1</div><div class="ball" id="a2">2</div><div class="ball" id="a3">3</div><div class="ball" id="a4">4</div><div class="ball" id="a5">5</div>
            </div>
            <div style="color: white; font-weight: 900;">PENALTY</div>
            <div class="team-shots" id="shotsB">
                <div class="ball" id="b1">1</div><div class="ball" id="b2">2</div><div class="ball" id="b3">3</div><div class="ball" id="b4">4</div><div class="ball" id="b5">5</div>
            </div>
        </div>
    </div>

    <!-- Ticker Same as before -->
    <div id="master-footer">
        <div class="bar top-bg">
            <div class="box-left"><div class="hint-label hint-red">LIVE</div><marquee id="tour-name" class="txt-red">TOURNAMENT</marquee></div>
            <div class="box-right"><div class="hint-label hint-red">TEAMS</div><marquee id="scroll-top" class="txt-red">UPCOMING</marquee></div>
        </div>
        <div class="bar bottom-bg">
            <div class="box-left"><div class="hint-label hint-white">INFO</div><marquee id="sub-info" class="txt-white">LIVE COVERAGE</marquee></div>
            <div class="box-right"><div class="hint-label hint-white">PRIZES</div><marquee id="scroll-bot" class="txt-white">UPDATING...</marquee><div class="clock-area" id="live-clock">00:00 AM</div></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let lastA = 0, lastB = 0;

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        if (d.scoreA > lastA || d.scoreB > lastB) { triggerGoal(); }
        lastA = d.scoreA || 0; lastB = d.scoreB || 0;

        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('round-detail').innerText = "ROUND: " + (d.matchRound || "1");
        document.getElementById('half-detail').innerText = (d.round || "FIRST HALF").toUpperCase();
        
        let mTime = d.matchTime || "00:00";
        document.getElementById('match-timer-box').innerText = mTime;
        document.getElementById('match-timer-box').style.display = (mTime === "00:00" || mTime === "") ? "none" : "flex";

        document.getElementById('jA').style.backgroundColor = d.colorA || "#cc0000";
        document.getElementById('jB').style.backgroundColor = d.colorB || "#ffffff";

        // Card Logic
        updateCard('cardA', d.cardsA);
        updateCard('cardB', d.cardsB);

        for (let i = 1; i <= 5; i++) {
            updatePenaltyBall('a', i, d.penaltyA);
            updatePenaltyBall('b', i, d.penaltyB);
        }
        document.getElementById('penalty-shots-container').style.display = (d.penaltyVisible === true) ? 'flex' : 'none';
        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    function updateCard(elementId, type) {
        let el = document.getElementById(elementId);
        el.className = "card-indicator"; // Reset
        if (type === "yellow") el.classList.add("yellow-card");
        else if (type === "red") el.classList.add("red-card");
    }

    function updatePenaltyBall(team, index, penaltyString) {
        let ball = document.getElementById(team + index);
        let symbols = penaltyString ? Array.from(penaltyString) : [];
        let s = symbols[index-1];
        if (s === "✅") { ball.className = "ball goal"; ball.innerText = "●"; }
        else if (s === "❌") { ball.className = "ball miss"; ball.innerText = "X"; }
        else { ball.className = "ball"; ball.innerText = index; }
    }

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "TOURNAMENT").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE COVERAGE").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
        document.getElementById('watermark').innerText = (d.watermarkText || "SUKHDEEP TV").toUpperCase();
        document.getElementById('fl-num').innerText = d.contact || "86996-40061";
        document.getElementById('master-footer').style.display = (d.tickerVis === false) ? 'none' : 'flex';
    });

    // Contact Flasher logic same as before
    let isW = false;
    setInterval(() => {
        const icon = document.getElementById('fl-icon');
        icon.className = isW ? "fab fa-whatsapp" : "fas fa-phone-alt";
        icon.style.color = isW ? "#25D366" : "white";
        isW = !isW;
    }, 15000);

    function moveWatermark() {
        const wm = document.getElementById('watermark');
        const maxX = window.innerWidth - wm.offsetWidth - 50;
        const maxY = window.innerHeight - 150; 
        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * (maxY - 120)) + 120;
        wm.style.left = randomX + 'px'; wm.style.top = randomY + 'px';
    }
    setInterval(moveWatermark, 7000);

    function triggerGoal() {
        const overlay = document.getElementById('goal-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();
    window.onload = moveWatermark;
</script>
</body>
</html>
