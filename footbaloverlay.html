<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Static Labels with Hidden Text Scroll</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        #master-footer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .bar { display: flex; height: 52px; width: 100%; overflow: hidden; position: relative; }

        /* --- 50-50 Sections --- */
        .box-left { width: 45%; height: 100%; position: relative; display: flex; align-items: center; overflow: hidden; }
        .box-right { width: 55%; height: 100%; position: relative; display: flex; align-items: center; overflow: hidden; }

        .bg-black { background: #000; }
        .bg-white { background: #fff; }
        .border-red { border-left: 2px solid #ff0000; }

        /* --- ਖੜ੍ਹੇ ਰਹਿਣ ਵਾਲੇ ਬਾਕਸ (Static Labels) --- */
        .hint-label {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 25px;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            position: absolute; /* ਇਹ ਬਾਕਸ ਨੂੰ ਇੱਕ ਜਗ੍ਹਾ ਟਿਕਾ ਕੇ ਰੱਖੇਗਾ */
            left: 0;
            top: 0;
            z-index: 100; /* ਇਹ ਟੈਕਸਟ ਦੇ ਉੱਪਰ ਰਹੇਗਾ */
        }

        .hint-white { background: #ffffff; color: #ff0000; }
        .hint-red { background: #ff0000; color: #ffffff; }

        /* --- ਟੈਕਸਟ ਜੋ ਪਿੱਛੇ ਚੱਲੇਗਾ --- */
        marquee {
            width: 100%;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 10;
            /* ਟੈਕਸਟ ਨੂੰ ਬਾਕਸ ਦੇ ਅੱਗੋਂ ਸ਼ੁਰੂ ਕਰਨ ਲਈ ਪੈਡਿੰਗ (Label ਦੀ ਚੌੜਾਈ ਮੁਤਾਬਕ) */
            padding-left: 100px; 
        }

        .red-txt { color: #ff0000; }
        .white-txt { color: #ffffff; }
        .yellow-txt { color: #f1c40f; }

        /* ਘੜੀ */
        .clock-area {
            position: absolute;
            right: 0;
            background: #f1c40f;
            color: #000;
            min-width: 130px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            z-index: 110; /* ਘੜੀ ਸਭ ਤੋਂ ਉੱਪਰ */
        }

        /* Scoreboard */
        #scoreboard { position: absolute; top: 15px; left: 15px; display: flex; gap: 4px; }
        .s-box { background: white; color: #ff0000; width: 55px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; border: 2px solid #ff0000; }
        .t-box { background: #000; color: white; padding: 0 15px; height: 45px; display: flex; align-items: center; font-size: 20px; min-width: 120px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div id="disp_sA" class="s-box">0</div>
        <div id="boxA" class="t-box" style="background: #ffffff; color: #000;">TEAM A</div>
        <div id="boxB" class="t-box">TEAM B</div>
        <div id="disp_sB" class="s-box">0</div>
    </div>

    <div id="master-footer">
        
        <!-- TOP BAR -->
        <div class="bar">
            <div class="box-left bg-black">
                <div class="hint-label hint-white">LIVE</div>
                <marquee scrollamount="5" class="yellow-txt" id="tour-name">MAJHA CUP 2026</marquee>
            </div>
            <div class="box-right bg-white">
                <div class="hint-label hint-red">NEXT</div>
                <marquee scrollamount="6" class="red-txt" id="scroll-top">TEAM A VS TEAM B</marquee>
            </div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bar">
            <div class="box-left bg-black">
                <div class="hint-label hint-white">INFO</div>
                <marquee scrollamount="4" class="white-txt" id="sub-info">LIVE STREAMING</marquee>
            </div>
            <div class="box-right bg-black border-red">
                <div class="hint-label hint-red">PRIZES</div>
                <!-- ਘੜੀ ਦੇ ਪਿੱਛੇ ਟੈਕਸਟ ਨਾ ਜਾਵੇ ਇਸ ਲਈ width ਘਟਾਈ ਹੈ -->
                <marquee scrollamount="5" class="white-txt" style="width: calc(100% - 130px);" id="scroll-bot">1ST: 1,00,000 | 2ND: 75,000</marquee>
                <div class="clock-area" id="live-clock">00:00 AM</div>
            </div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('boxA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('boxB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('disp_sA').innerText = d.scoreA || "0";
        document.getElementById('disp_sB').innerText = d.scoreB || "0";
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "KABADDI 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING MATCH...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE ACTION").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);
</script>
</body>
</html>
