<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV Style - Professional Scoreboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --arrow-width: 20px;
            --arrow-height: 50px;
            --label-padding: 25px;
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- Scoreboard Container --- */
        #scoreboard-container {
            position: absolute;
            top: 25px;
            left: 20px;
            display: flex;
            flex-direction: row;
            border: 3px solid var(--pure-white);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .score-unit {
            display: flex;
            height: 60px;
            align-items: center;
        }

        .team-display { 
            width: 280px; 
            height: 100%;
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            font-size: 26px; 
            font-weight: 900; 
            text-transform: uppercase; /* ਸਾਰੇ ਅੱਖਰ ਕੈਪੀਟਲ */
        }

        .score-box { 
            width: 80px; 
            height: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            font-weight: 900; 
            background: var(--pure-black); 
            color: var(--pure-white); 
        }

        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        /* --- Ticker Design --- */
        #master-footer {
            position: absolute;
            bottom: 10px; left: 0; right: 0;
            display: flex; flex-direction: column; gap: 4px;
            padding: 0 10px;
        }

        .bar { 
            display: flex; 
            height: var(--arrow-height); 
            width: 100%; 
            overflow: hidden; 
            position: relative; 
            border: 2px solid var(--main-red);
            border-radius: 4px;
        }

        .top-bg { background: var(--pure-white); }
        .bottom-bg { background: var(--main-red); }

        .box-left, .box-right { width: 50%; height: 100%; position: relative; display: flex; align-items: center; overflow: hidden; }

        .hint-label {
            height: 100%; display: flex; align-items: center; justify-content: center;
            padding: 0 var(--label-padding); font-weight: 900; font-size: 20px;
            text-transform: uppercase; position: absolute; left: 0; top: 0; z-index: 100;
        }

        .hint-label::after {
            content: ""; position: absolute; right: calc(var(--arrow-width) * -1);
            top: 0; width: 0; height: 0;
            border-top: calc(var(--arrow-height) / 2) solid transparent;
            border-bottom: calc(var(--arrow-height) / 2) solid transparent;
        }

        .hint-red { background: var(--main-red); color: var(--pure-white); }
        .hint-red::after { border-left: var(--arrow-width) solid var(--main-red); }

        .hint-white { background: var(--pure-white); color: var(--main-red); }
        .hint-white::after { border-left: var(--arrow-width) solid var(--pure-white); }

        marquee { width: 100%; font-size: 26px; font-weight: 900; text-transform: uppercase; padding-left: 130px; }

        .txt-red { color: var(--main-red); }
        .txt-white { color: var(--pure-white); }

        .clock-area {
            position: absolute; right: 0; background: var(--pure-white); color: var(--main-red);
            min-width: 150px; height: 100%; display: flex; align-items: center;
            justify-content: center; font-size: 28px; font-weight: 900; z-index: 110;
            border-left: 3px solid var(--main-red);
        }
    </style>
</head>
<body>

    <div id="scoreboard-container">
        <div class="score-unit side-a">
            <div class="score-box" id="scoreA">0</div>
            <div class="team-display" id="nameA">LOADING...</div>
        </div>
        <div class="score-unit side-b">
            <div class="team-display" id="nameB" style="text-align: right; justify-content: flex-end;">LOADING...</div>
            <div class="score-box" id="scoreB">0</div>
        </div>
    </div>

    <div id="master-footer">
        <div class="bar top-bg">
            <div class="box-left">
                <div class="hint-label hint-red">LIVE</div>
                <marquee scrollamount="5" class="txt-red"><span id="tour-name">LOADING...</span></marquee>
            </div>
            <div class="box-right">
                <div class="hint-label hint-red">TEAMS</div>
                <marquee scrollamount="6" class="txt-red"><span id="scroll-top">LOADING...</span></marquee>
            </div>
        </div>

        <div class="bar bottom-bg">
            <div class="box-left">
                <div class="hint-label hint-white">INFO</div>
                <marquee scrollamount="4" class="txt-white"><span id="sub-info">LOADING...</span></marquee>
            </div>
            <div class="box-right">
                <div class="hint-label hint-white">PRIZES</div>
                <marquee scrollamount="5" class="txt-white" style="width: calc(100% - 150px);">
                    <span id="scroll-bot">LOADING...</span>
                </marquee>
                <div class="clock-area" id="live-clock">00:00</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // Match Data Update
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('scoreboard-container').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    // Ticker Data Update
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "WELCOME").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING MATCHES").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE FROM GROUND").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "SEE YOU SOON")).toUpperCase();
        document.getElementById('master-footer').style.display = (d.tickerVis === false) ? 'none' : 'flex';
    });

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
