<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Professional Sports Overlay - Ultimate Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- Goal Animation --- */
        #goal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(204, 0, 0, 0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 10000; font-size: 150px; color: white; font-weight: 900;
            text-transform: uppercase; animation: flash 0.5s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- Tournament Name (Top Center) --- */
        #tour-top {
            position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            background: var(--main-red); color: white; padding: 2px 30px;
            font-size: 20px; border-radius: 0 0 10px 10px; border: 2px solid white;
        }

        /* --- Main Scoreboard --- */
        #scoreboard-wrapper {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        #main-board {
            display: flex; align-items: center; background: rgba(0,0,0,0.8);
            border: 3px solid white; border-radius: 8px; overflow: hidden;
        }

        .team-section { display: flex; align-items: center; width: 350px; height: 60px; padding: 0 15px; }
        .jersey-color { width: 15px; height: 40px; border: 1px solid white; margin-right: 10px; }
        .team-name { flex-grow: 1; font-size: 28px; color: white; text-transform: uppercase; overflow: hidden; }
        .score-box { width: 80px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; }
        
        .side-a { background: var(--main-red); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); flex-direction: row-reverse; }
        .score-a { background: black; color: white; }
        .score-b { background: white; color: black; }

        /* --- Stats (Round & Half) --- */
        #stats-bar { display: flex; gap: 20px; font-size: 20px; color: white; font-weight: bold; text-shadow: 2px 2px 4px black; }

        /* --- Time Box --- */
        #time-box {
            background: black; color: #f1c40f; padding: 5px 15px; border: 2px solid white;
            font-size: 24px; border-radius: 5px; margin-top: 5px;
        }

        /* --- Penalty Box (Balls) --- */
        #penalty-container {
            display: none; margin-top: 10px; background: rgba(0,0,0,0.7);
            padding: 10px; border-radius: 10px; border: 1px solid white;
        }
        .p-row { display: flex; gap: 10px; align-items: center; margin: 5px 0; }
        .ball { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .goal-ball { background: #2ecc71; } /* Green for Goal */
        .miss-ball { background: #e74c3c; } /* Red for Miss */

        /* --- Watermark Text --- */
        #wm-text { position: absolute; bottom: 80px; left: 20px; color: white; font-size: 24px; font-weight: 900; display: none; }
    </style>
</head>
<body>

    <div id="goal-overlay">GOAL !!!</div>
    <div id="tour-top">TOURNAMENT NAME</div>

    <div id="scoreboard-wrapper">
        <div id="main-board">
            <div class="team-section side-a">
                <div id="jA" class="jersey-color"></div>
                <div id="nameA" class="team-name">TEAM A</div>
                <div id="scoreA" class="score-box score-a">0</div>
            </div>
            <div class="team-section side-b">
                <div id="jB" class="jersey-color"></div>
                <div id="nameB" class="team-name" style="text-align: right; margin-right: 10px;">TEAM B</div>
                <div id="scoreB" class="score-box score-b">0</div>
            </div>
        </div>

        <div id="stats-bar">
            <span id="round-disp">ROUND STATS</span>
            <span style="color: red;">|</span>
            <span id="half-disp">HALF STATS</span>
        </div>

        <div id="time-box">00:00</div>

        <div id="penalty-container">
            <div class="p-row">
                <span style="color: white; width: 60px;">TEAM A:</span>
                <div id="pA-balls" style="display: flex; gap: 5px;"></div>
            </div>
            <div class="p-row">
                <span style="color: white; width: 60px;">TEAM B:</span>
                <div id="pB-balls" style="display: flex; gap: 5px;"></div>
            </div>
        </div>
    </div>

    <div id="wm-text"></div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastScoreA = 0, lastScoreB = 0;

    function renderBalls(containerId, dataString) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        if(!dataString) return;
        
        // ਪੈਨਲਟੀ ਸਟਰਿੰਗ ਨੂੰ ਤੋੜ ਕੇ ਬਾਲ ਬਣਾਉਣਾ (✅/❌)
        const symbols = dataString.match(/✅|❌/g) || [];
        symbols.forEach(s => {
            const ball = document.createElement('div');
            ball.className = s === '✅' ? 'ball goal-ball' : 'ball miss-ball';
            ball.innerText = s === '✅' ? '⚽' : 'X';
            container.appendChild(ball);
        });
    }

    function triggerGoalAnim() {
        const div = document.getElementById('goal-overlay');
        div.style.display = 'flex';
        setTimeout(() => { div.style.display = 'none'; }, 4000);
    }

    // --- Firebase Logic ---
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        
        // Goal Animation check
        if(d.scoreA > lastScoreA || d.scoreB > lastScoreB) triggerGoalAnim();
        lastScoreA = d.scoreA || 0; lastScoreB = d.scoreB || 0;

        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('time-box').innerText = d.matchTime || "00:00";
        document.getElementById('round-disp').innerText = d.matchRound || "ROUND";
        document.getElementById('half-disp').innerText = d.round || "HALF";
        
        // Jersey Colors
        document.getElementById('jA').style.backgroundColor = d.colorA || "white";
        document.getElementById('jB').style.backgroundColor = d.colorB || "white";

        // Penalty Logic
        document.getElementById('penalty-container').style.display = d.penaltyVisible ? 'block' : 'none';
        renderBalls('pA-balls', d.penaltyA);
        renderBalls('pB-balls', d.penaltyB);

        // Watermark Text
        const wm = document.getElementById('wm-text');
        if(d.watermarkText && d.wmMode !== 'off') {
            wm.innerText = d.watermarkText;
            wm.style.display = 'block';
        } else { wm.style.display = 'none'; }
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-top').innerText = (d.tournamentName || "TOURNAMENT 2026").toUpperCase();
    });
</script>
</body>
</html>
