<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV - Advanced Scoreboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- Main Scoreboard --- */
        #scoreboard-wrapper {
            position: absolute;
            top: 25px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #scoreboard-container {
            display: flex;
            border: 3px solid var(--pure-white);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            background: var(--pure-black);
        }

        .score-unit { display: flex; height: 60px; align-items: center; position: relative; }
        .team-display { width: 250px; padding: 0 20px; font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .score-box { width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; background: var(--pure-black); color: var(--pure-white); }

        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        /* --- Round & Half Details (Underneath, No Background) --- */
        #match-details {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            color: var(--pure-white);
            font-size: 18px;
            font-weight: 700;
            text-shadow: 2px 2px 4px #000;
            text-transform: uppercase;
        }

        /* --- Penalty Box / Timer --- */
        #penalty-box {
            background: rgba(0, 0, 0, 0.8);
            color: yellow;
            border: 2px solid yellow;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 20px;
            font-weight: 900;
            display: none; /* Only show when active */
            align-self: flex-start;
            margin-top: 5px;
        }

        /* --- Goal Animation --- */
        #goal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(204, 0, 0, 0.4);
        }

        .goal-text {
            font-size: 150px;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 20px #000;
            animation: bounceIn 0.8s infinite alternate;
        }

        @keyframes bounceIn {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Watermark Styles */
        #watermark {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="goal-overlay"><div class="goal-text">GOAL !!!</div></div>
    <div id="watermark">SUKHDEEP TV</div>

    <div id="scoreboard-wrapper">
        <div id="scoreboard-container">
            <!-- Team A -->
            <div class="score-unit side-a">
                <div class="score-box" id="scoreA">0</div>
                <div class="team-display" id="nameA">TEAM A</div>
            </div>
            <!-- Team B -->
            <div class="score-unit side-b">
                <div class="team-display" id="nameB" style="text-align: right; justify-content: flex-end;">TEAM B</div>
                <div class="score-box" id="scoreB">0</div>
            </div>
        </div>

        <!-- Round and Half Details (No background) -->
        <div id="match-details">
            <span id="round-detail">ROUND: 1</span>
            <span id="half-detail">FIRST HALF</span>
        </div>

        <!-- Penalty/Time Box -->
        <div id="penalty-box">TIME: <span id="timer-val">00:00</span></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let lastScoreA = 0;
    let lastScoreB = 0;

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        
        // Goal Animation Trigger
        if (d.scoreA > lastScoreA || d.scoreB > lastScoreB) {
            triggerGoal();
        }
        lastScoreA = d.scoreA || 0;
        lastScoreB = d.scoreB || 0;

        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        
        // Round & Half Details
        document.getElementById('round-detail').innerText = "ROUND: " + (d.roundNum || "1");
        document.getElementById('half-detail').innerText = (d.halfName || "FIRST HALF").toUpperCase();

        // Penalty Box / Timer Logic
        if (d.timerActive) {
            document.getElementById('penalty-box').style.display = 'block';
            document.getElementById('timer-val').innerText = d.matchTimer || "00:00";
        } else {
            document.getElementById('penalty-box').style.display = 'none';
        }

        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    // Branding / Watermark from TickerData
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('watermark').innerText = (d.watermarkText || "SUKHDEEP TV").toUpperCase();
    });

    function triggerGoal() {
        const overlay = document.getElementById('goal-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; }, 3000); // 3 seconds animation
    }
</script>
</body>
</html>
