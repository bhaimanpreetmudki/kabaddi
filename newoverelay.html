<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV - Professional Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
            --ticker-height: 50px;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- 1. Scoreboard (Top Layer) --- */
        #scoreboard-wrapper {
            position: absolute;
            top: 25px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 500; /* Scoreboard level */
        }

        #scoreboard-container {
            display: flex;
            border: 3px solid var(--pure-white);
            border-radius: 6px;
            overflow: hidden;
            background: var(--pure-black);
        }

        .score-unit { display: flex; height: 60px; align-items: center; }
        .team-display { width: 250px; padding: 0 20px; font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .score-box { width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; }
        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        /* --- 2. Goal Animation (Middle Layer) --- */
        #goal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 400; /* Ticker ਤੋਂ ਨੀਚੇ ਰਹੇਗਾ */
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }
        .goal-text { 
            font-size: 150px; color: white; font-weight: 900; 
            text-shadow: 0 0 20px var(--main-red);
            animation: bounceIn 0.6s infinite alternate; 
        }

        /* --- 3. Ticker (Top Most Layer) --- */
        #master-footer {
            position: absolute;
            bottom: 10px; left: 0; right: 0;
            display: flex; flex-direction: column; gap: 4px;
            padding: 0 10px;
            z-index: 999; /* ਸਭ ਤੋਂ ਉੱਪਰ ਰਹੇਗਾ ਤਾਂ ਜੋ ਐਨੀਮੇਸ਼ਨ ਪਿੱਛੇ ਚੱਲੇ */
        }

        .bar { 
            display: flex; height: var(--ticker-height); width: 100%; 
            overflow: hidden; position: relative; border: 2px solid var(--main-red); border-radius: 4px;
        }
        .top-bg { background: var(--pure-white); }
        .bottom-bg { background: var(--main-red); }
        
        marquee { width: 100%; font-size: 24px; font-weight: 900; text-transform: uppercase; line-height: 45px; }
        .txt-red { color: var(--main-red); }
        .txt-white { color: var(--pure-white); }

        @keyframes bounceIn { from { transform: scale(1); } to { transform: scale(1.15); } }
    </style>
</head>
<body>

    <div id="goal-overlay"><div class="goal-text">GOAL !!!</div></div>

    <div id="scoreboard-wrapper">
        <div id="scoreboard-container">
            <div class="score-unit side-a">
                <div class="score-box" id="scoreA">0</div>
                <div class="team-display" id="nameA">HOME</div>
            </div>
            <div class="score-unit side-b">
                <div class="team-display" id="nameB" style="text-align: right;">AWAY</div>
                <div class="score-box" id="scoreB">0</div>
            </div>
        </div>
    </div>

    <div id="master-footer">
        <div class="bar top-bg">
            <marquee scrollamount="6" class="txt-red" id="scroll-top">WELCOME TO THE TOURNAMENT</marquee>
        </div>
        <div class="bar bottom-bg">
            <marquee scrollamount="5" class="txt-white" id="scroll-bot">LIVE FROM THE GROUND</marquee>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastA = 0, lastB = 0;

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        if (d.scoreA > lastA || d.scoreB > lastB) { triggerGoal(); }
        lastA = d.scoreA || 0; lastB = d.scoreB || 0;

        document.getElementById('nameA').innerText = (d.nameA || "HOME").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "AWAY").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('scroll-top').innerText = (d.tournamentName + " | " + d.participatingTeams).toUpperCase();
        document.getElementById('scroll-bot').innerText = (d.nextProgram + " | " + d.prizes).toUpperCase();
        document.getElementById('master-footer').style.display = (d.tickerVis === false) ? 'none' : 'flex';
    });

    function triggerGoal() {
        const overlay = document.getElementById('goal-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
    }
</script>
</body>
</html>
