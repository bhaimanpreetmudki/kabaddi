<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV - Professional Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- Scoreboard & Timer --- */
        #scoreboard-wrapper {
            position: absolute;
            top: 25px;
            left: 20px;
            display: flex;
            flex-direction: column;
            z-index: 500;
        }

        .main-bar {
            display: flex;
            border: 3px solid var(--pure-white);
            border-radius: 6px;
            background: var(--pure-black);
            overflow: hidden;
        }

        .score-unit { display: flex; height: 60px; align-items: center; }
        .team-name { width: 220px; padding: 0 15px; font-size: 24px; font-weight: 900; text-transform: uppercase; }
        .score-box { width: 70px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; }
        
        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        /* --- Timer & Round Box --- */
        .info-bar {
            display: flex;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            font-size: 18px;
            border: 2px solid white;
            border-top: none;
            justify-content: space-between;
            width: fit-content;
            min-width: 200px;
        }

        /* --- Penalty Box --- */
        #penalty-box {
            position: absolute;
            top: 130px;
            left: 20px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #f39c12;
            padding: 10px;
            border-radius: 8px;
            display: none; /* ਐਡਮਿਨ ਤੋਂ ਕੰਟਰੋਲ ਹੋਵੇਗਾ */
            z-index: 600;
            color: white;
        }
        .p-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 20px; }
        .p-icons { letter-spacing: 5px; color: #2ecc71; }

        /* --- Ticker --- */
        #master-footer {
            position: absolute;
            bottom: 10px; left: 0; right: 0;
            z-index: 999;
        }
        .bar { height: 45px; display: flex; align-items: center; border: 2px solid var(--main-red); margin: 2px 10px; border-radius: 4px; overflow: hidden; }
        .top-bg { background: var(--pure-white); color: var(--main-red); }
        .bot-bg { background: var(--main-red); color: var(--pure-white); }
        marquee { width: 100%; font-size: 22px; font-weight: 900; }
    </style>
</head>
<body>

    <!-- Scoreboard -->
    <div id="scoreboard-wrapper">
        <div class="main-bar">
            <div class="score-unit side-a">
                <div class="score-box" id="dispA">0</div>
                <div class="team-name" id="nameA">HOME</div>
            </div>
            <div class="score-unit side-b">
                <div class="team-name" id="nameB" style="text-align:right;">AWAY</div>
                <div class="score-box" id="dispB">0</div>
            </div>
        </div>
        <div class="info-bar">
            <span id="roundText">1st Half</span>
            <span id="timerText" style="color:#f1c40f; font-family:monospace;">00:00</span>
        </div>
    </div>

    <!-- Penalty Shootout Box -->
    <div id="penalty-box">
        <div style="text-align:center; color:#f39c12; font-weight:bold; border-bottom:1px solid #444; margin-bottom:5px;">PENALTY SHOOTOUT</div>
        <div class="p-row">
            <span id="pNameA" style="width:100px;">TEAM A</span>
            <span class="p-icons" id="pIconsA"></span>
        </div>
        <div class="p-row">
            <span id="pNameB" style="width:100px;">TEAM B</span>
            <span class="p-icons" id="pIconsB"></span>
        </div>
    </div>

    <!-- Ticker -->
    <div id="master-footer">
        <div class="bar top-bg"><marquee id="tickTop"></marquee></div>
        <div class="bar bot-bg"><marquee id="tickBot"></marquee></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Match Data Sync (Score, Timer, Penalty)
    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        
        // Timer & Score
        document.getElementById('timerText').innerText = d.matchTime || "00:00";
        document.getElementById('dispA').innerText = d.scoreA || 0;
        document.getElementById('dispB').innerText = d.scoreB || 0;
        document.getElementById('nameA').innerText = (d.nameA || "HOME").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "AWAY").toUpperCase();
        document.getElementById('roundText').innerText = d.round || "1st Half";

        // Penalty Visibility & Icons
        const pBox = document.getElementById('penalty-box');
        if (d.penaltyVisible) {
            pBox.style.display = 'block';
            document.getElementById('pNameA').innerText = (d.nameA || "TEAM A").toUpperCase();
            document.getElementById('pNameB').innerText = (d.nameB || "TEAM B").toUpperCase();
            document.getElementById('pIconsA').innerText = d.penaltyA || "";
            document.getElementById('pIconsB').innerText = d.penaltyB || "";
        } else {
            pBox.style.display = 'none';
        }

        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    // Ticker Data Sync
    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tickTop').innerText = (d.tournamentName + " | " + d.participatingTeams).toUpperCase();
        document.getElementById('tickBot').innerText = (d.nextProgram + " | " + d.prizes + " | " + d.contact).toUpperCase();
        document.getElementById('master-footer').style.display = (d.tickerVis === false) ? 'none' : 'block';
    });
</script>
</body>
</html>
