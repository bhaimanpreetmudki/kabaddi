<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV - Professional Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
            --silver-grad: linear-gradient(145deg, #bdc3c7, #7f8c8d);
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- Scoreboard Wrapper --- */
        #scoreboard-wrapper {
            position: absolute;
            top: 25px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #scoreboard-main {
            display: flex;
            border: 3px solid var(--pure-white);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            background: var(--pure-black);
        }

        /* Jersey Color Strip */
        .jersey-color { width: 12px; height: 60px; }
        #colorA { background: var(--main-red); } /* Firebase ਨਾਲ ਬਦਲ ਸਕਦਾ ਹੈ */
        #colorB { background: var(--pure-white); }

        .score-unit { display: flex; height: 60px; align-items: center; }
        .team-name { width: 220px; padding: 0 15px; font-size: 26px; font-weight: 900; text-transform: uppercase; color: white; }
        
        /* Score Box with Partition */
        .score-area { 
            display: flex; 
            align-items: center; 
            font-size: 40px; 
            font-weight: 900; 
            background: rgba(255,255,255,0.1); 
        }
        .partition { color: rgba(255,255,255,0.5); padding: 0 5px; font-weight: 300; }
        .score-num { width: 60px; text-align: center; color: white; }

        .side-b .team-name { text-align: right; }

        /* Round/Half Info */
        #match-details {
            display: flex;
            justify-content: space-between;
            padding: 2px 8px;
            color: var(--pure-white);
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(0,0,0,0.7);
            border-radius: 0 0 4px 4px;
        }

        /* --- Penalty Box (Silver) --- */
        #penalty-shots-container {
            display: none; 
            justify-content: space-between;
            align-items: center;
            background: var(--silver-grad); 
            padding: 8px 15px;
            border: 2px solid white;
            border-radius: 8px;
            margin-top: 8px;
            width: 680px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .team-shots { display: flex; gap: 10px; }
        .ball {
            width: 30px; height: 30px; border-radius: 50%;
            background: #444; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; color: white;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .ball.goal { background: #2ecc71; color: #fff; text-shadow: 0 0 5px black; } /* Green Ball */
        .ball.miss { background: #e74c3c; color: #fff; } /* Red X */

        /* Goal Overlay */
        #goal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 80vh; display: none; justify-content: center; align-items: center; z-index: 1000; pointer-events: none; }
        .goal-text { font-size: 200px; color: white; font-weight: 900; text-shadow: 0 0 30px red; animation: ghaint 0.5s infinite alternate; }
        @keyframes ghaint { from { transform: scale(0.9); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="goal-overlay"><div class="goal-text">GOAL !!!</div></div>

    <div id="scoreboard-wrapper">
        <div id="scoreboard-main">
            <!-- Team A -->
            <div id="colorA" class="jersey-color"></div>
            <div class="score-unit">
                <div class="team-name" id="nameA">TEAM A</div>
                <div class="score-area">
                    <span class="partition">|</span>
                    <span class="score-num" id="scoreA">0</span>
                </div>
            </div>

            <!-- Team B -->
            <div class="score-unit side-b" style="border-left: 2px solid white;">
                <div class="score-area">
                    <span class="score-num" id="scoreB">0</span>
                    <span class="partition">|</span>
                </div>
                <div class="team-name" id="nameB">TEAM B</div>
            </div>
            <div id="colorB" class="jersey-color"></div>
        </div>
        
        <div id="match-details">
            <span id="round-detail">ROUND 1</span>
            <span id="half-detail">1ST HALF</span>
        </div>

        <!-- Penalty Box Under Half Info -->
        <div id="penalty-shots-container">
            <div class="team-shots" id="shotsA">
                <div class="ball" id="a1">1</div><div class="ball" id="a2">2</div>
                <div class="ball" id="a3">3</div><div class="ball" id="a4">4</div>
                <div class="ball" id="a5">5</div>
            </div>
            <div style="color: #2c3e50; font-weight: 900; font-size: 16px; letter-spacing: 1px;">PENALTY</div>
            <div class="team-shots" id="shotsB">
                <div class="ball" id="b1">1</div><div class="ball" id="b2">2</div>
                <div class="ball" id="b3">3</div><div class="ball" id="b4">4</div>
                <div class="ball" id="b5">5</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let lastA = 0, lastB = 0;

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        
        if (d.scoreA > lastA || d.scoreB > lastB) { triggerGoal(); }
        lastA = d.scoreA || 0; lastB = d.scoreB || 0;

        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('round-detail').innerText = "ROUND " + (d.roundNum || "1");
        document.getElementById('half-detail').innerText = (d.halfName || "1ST HALF").toUpperCase();
        
        // Jersey Colors from Firebase
        if(d.teamColorA) document.getElementById('colorA').style.background = d.teamColorA;
        if(d.teamColorB) document.getElementById('colorB').style.background = d.teamColorB;

        // Penalty Logic
        for (let i = 1; i <= 5; i++) {
            updateBall('a', i, d['a' + i]);
            updateBall('b', i, d['b' + i]);
        }

        document.getElementById('penalty-shots-container').style.display = (d.showPenalty === true) ? 'flex' : 'none';
        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    function updateBall(team, num, status) {
        let el = document.getElementById(team + num);
        if (status === "goal") { 
            el.className = "ball goal"; el.innerText = "●"; 
        } else if (status === "miss") { 
            el.className = "ball miss"; el.innerText = "X"; 
        } else { 
            el.className = "ball"; el.innerText = num; 
        }
    }

    function triggerGoal() {
        const overlay = document.getElementById('goal-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
    }
</script>
</body>
</html>
