<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV Full System - Advanced Watermark</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; height: 100vh; width: 100vw; }

        /* --- Advanced Watermark Styles --- */
        #watermark-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        #wm-img {
            position: absolute;
            width: 120px; /* ਲੋੜ ਅਨੁਸਾਰ ਸਾਈਜ਼ ਬਦਲੋ */
            opacity: 0.7;
            display: none;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }

        /* --- Scoreboard & Ticker Styles --- */
        #scoreboard-wrapper { position: absolute; top: 25px; left: 20px; display: flex; flex-direction: column; z-index: 500; }
        #scoreboard-container { display: flex; border: 3px solid var(--pure-white); border-radius: 6px 6px 0 0; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
        .score-unit { display: flex; height: 55px; align-items: center; }
        .team-display { width: 250px; height: 100%; display: flex; align-items: center; padding: 0 20px; font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .score-box { width: 70px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 900; background: var(--pure-black); color: var(--pure-white); }
        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        #match-meta { display: flex; background: var(--pure-black); color: var(--pure-white); height: 30px; border: 3px solid var(--pure-white); border-top: none; border-radius: 0 0 6px 6px; justify-content: space-between; padding: 0 15px; align-items: center; font-size: 16px; font-weight: 800; text-transform: uppercase; }
        .meta-item { color: #f1c40f; }

        #master-footer { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; flex-direction: column; gap: 6px; padding: 0 10px; z-index: 500; }
        .bar { display: flex; height: 50px; width: 100%; overflow: hidden; position: relative; border: 2px solid var(--main-red); border-radius: 4px; }
        .top-bg { background: var(--pure-white); }
        .bottom-bg { background: var(--main-red); }
        .hint-label { height: 100%; display: flex; align-items: center; justify-content: center; padding: 0 25px; font-weight: 900; font-size: 22px; text-transform: uppercase; position: absolute; left: 0; top: 0; z-index: 100; }
        .hint-label::after { content: ""; position: absolute; right: -20px; top: 0; width: 0; height: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; z-index: 100; }
        .hint-red { background: var(--main-red); color: var(--pure-white); }
        .hint-red::after { border-left: 20px solid var(--main-red); }
        .hint-white { background: var(--pure-white); color: var(--main-red); }
        .hint-white::after { border-left: 20px solid var(--pure-white); }
        marquee { width: 100%; font-size: 24px; font-weight: 900; text-transform: uppercase; z-index: 10; padding-left: 110px; }
        .txt-red { color: var(--main-red); }
        .txt-white { color: var(--pure-white); }
        .clock-area { position: absolute; right: 0; background: var(--pure-white); color: var(--main-red); min-width: 140px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; z-index: 110; border-left: 2px solid var(--main-red); }
    </style>
</head>
<body>

    <div id="watermark-container">
        <img src="" id="wm-img">
    </div>

    <div id="scoreboard-wrapper">
        <div id="scoreboard-container">
            <div class="score-unit side-a">
                <div class="score-box" id="scoreA">0</div>
                <div class="team-display" id="nameA">TEAM A</div>
            </div>
            <div class="score-unit side-b">
                <div class="team-display" id="nameB" style="text-align: right; justify-content: flex-end;">TEAM B</div>
                <div class="score-box" id="scoreB">0</div>
            </div>
        </div>
        <div id="match-meta">
            <div>ROUND: <span class="meta-item" id="round-val">1</span></div>
            <div>STATUS: <span class="meta-item" id="half-val">1ST HALF</span></div>
        </div>
    </div>

    <div id="master-footer">
        <div class="bar top-bg">
            <div class="box-left" style="width:45%;">
                <div class="hint-label hint-red">LIVE</div>
                <marquee scrollamount="5" class="txt-red"><span id="tour-name">LOADING...</span></marquee>
            </div>
            <div class="box-right" style="width:55%;">
                <div class="hint-label hint-red">NEXT MATCH</div>
                <marquee scrollamount="6" class="txt-red"><span id="scroll-top">LOADING...</span></marquee>
            </div>
        </div>
        <div class="bar bottom-bg">
            <div class="box-left" style="width:45%;">
                <div class="hint-label hint-white">INFO</div>
                <marquee scrollamount="4" class="txt-white"><span id="sub-info">LOADING...</span></marquee>
            </div>
            <div class="box-right" style="width:55%;">
                <div class="hint-label hint-white">PRIZES</div>
                <marquee scrollamount="5" class="txt-white" style="width: calc(100% - 140px);"><span id="scroll-bot">LOADING...</span></marquee>
                <div class="clock-area" id="live-clock">00:00 AM</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const wm = document.getElementById('wm-img');
    let wmMode = "blink"; // blink, scroll, bounce
    let posX = 100, posY = 100, velX = 2, velY = 2;

    function startWatermarkLogic() {
        if (wmMode === "scroll") {
            let startY = Math.random() * (window.innerHeight * 0.35) + (window.innerHeight * 0.35);
            wm.style.top = startY + "px";
            wm.style.left = window.innerWidth + "px";
            wm.style.display = "block";
            let moveX = window.innerWidth;
            let scrollInt = setInterval(() => {
                moveX -= 3;
                wm.style.left = moveX + "px";
                if (moveX < -150) { clearInterval(scrollInt); wm.style.display="none"; setTimeout(startWatermarkLogic, 2000); }
            }, 20);
        } 
        else if (wmMode === "blink") {
            wm.style.display = "none";
            setTimeout(() => {
                let randomX = Math.random() * (window.innerWidth - 150);
                let randomY = Math.random() * (window.innerHeight - 150);
                wm.style.left = randomX + "px";
                wm.style.top = randomY + "px";
                wm.style.display = "block";
                setTimeout(startWatermarkLogic, 5000); // 5 sec show
            }, 1000); // 1 sec hide
        }
        else if (wmMode === "bounce") {
            wm.style.display = "block";
            function animateBounce() {
                posX += velX; posY += velY;
                if (posX + 120 >= window.innerWidth || posX <= 0) velX *= -1;
                if (posY + 120 >= window.innerHeight || posY <= 0) velY *= -1;
                wm.style.left = posX + "px";
                wm.style.top = posY + "px";
                if(wmMode === "bounce") requestAnimationFrame(animateBounce);
            }
            animateBounce();
        }
    }

    db.ref("matchData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('round-val').innerText = d.round || "1";
        document.getElementById('half-val').innerText = (d.halfStatus || "1ST HALF").toUpperCase();
        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';

        if(d.logoUrl) { 
            wm.src = d.logoUrl; 
            if(wm.style.display === "none" && wmMode !== "blink") startWatermarkLogic();
        }
        if(d.wmMode) { wmMode = d.wmMode; } // ਪੈਨਲ ਤੋਂ ਮੋਡ ਬਦਲੋ (blink, scroll, bounce)
    });

    db.ref("tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "TOURNAMENT 2026").toUpperCase();
        document.getElementById('scroll-top').innerText = (d.participatingTeams || "UPCOMING...").toUpperCase();
        document.getElementById('sub-info').innerText = (d.nextProgram || "LIVE COVERAGE").toUpperCase();
        document.getElementById('scroll-bot').innerText = ("🏆 " + (d.prizes || "UPDATING...")).toUpperCase();
        document.getElementById('master-footer').style.display = (d.tickerVis === false) ? 'none' : 'flex';
    });

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();
    startWatermarkLogic(); // ਸ਼ੁਰੂਆਤੀ ਲੋਡ 'ਤੇ ਚਲਾਓ
</script>
</body>
</html>
