<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi Style Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Arial', sans-serif; }

        /* ਮੇਨ ਟਿੱਕਰ ਕੰਟੇਨਰ */
        .ticker-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 55px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85); /* ਕਾਲਾ ਬੈਕਗਰਾਊਂਡ */
            border: 2px solid #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* LIVE ਵਾਲਾ ਨੀਲਾ ਬਾਕਸ (ਟੇਢੀ ਲਾਈਨ ਵਾਲਾ) */
        .live-box {
            background: #007bff;
            color: white;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 35px 0 20px;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
            /* ਕਬੱਡੀ 365 ਵਰਗਾ Slanted Design */
            clip-path: polygon(0% 0%, 85% 0%, 100% 100%, 0% 100%);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* ਚੱਲਣ ਵਾਲੀ ਪੱਟੀ (Scrolling Text) */
        .ticker-text-wrap {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding-left: 20px;
        }

        .ticker-text {
            display: inline-block;
            font-size: 26px;
            font-weight: bold;
            color: #ffffff;
            padding-left: 100%;
            animation: scroll-text 20s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* LIVE ਬਲਿੰਕਿੰਗ ਇਫੈਕਟ */
        .live-dot {
            height: 10px;
            width: 10px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="ticker-container">
    <div class="live-box">
        <span class="live-dot"></span>LIVE
    </div>
    <div class="ticker-text-wrap">
        <div id="ticker-msg" class="ticker-text">Loading News...</div>
    </div>
</div>

<script>
    // ਫਾਇਰਬੇਸ ਕੌਂਫਿਗਰੇਸ਼ਨ
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // URL ਤੋਂ ID ਚੱਕਣਾ
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id') || "sukhdeeptv";

    // ਡਾਟਾ ਰੀਡ ਕਰਨਾ
    db.ref('users/' + userID + '/config').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.ticker) {
            document.getElementById('ticker-msg').innerText = data.ticker;
        } else {
            document.getElementById('ticker-msg').innerText = "ਜੀ ਆਇਆਂ ਨੂੰ - ਆਪਣਾ ਟਿੱਕਰ ਮੈਸੇਜ ਐਡਮਿਨ ਪੈਨਲ ਤੋਂ ਅਪਡੇਟ ਕਰੋ।";
        }
    });
</script>

</body>
</html>
