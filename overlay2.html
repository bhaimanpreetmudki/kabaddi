<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Kabaddi Scoreboard Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Arial', sans-serif; }

        /* ਓਵਰਲੇਅ ਦਾ ਮੇਨ ਕੰਟੇਨਰ */
        .main-ticker-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 55px;
            display: flex;
            align-items: center;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        /* ਖੱਬੇ ਪਾਸੇ ਵਾਲਾ LIVE ਬਾਕਸ (ਟੇਢਾ ਕੱਟ) */
        .live-side {
            background: #007bff;
            color: white;
            height: 100%;
            padding: 0 30px 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            font-style: italic;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0% 100%);
            z-index: 3;
        }

        /* ਵਿਚਾਲੇ ਵਾਲਾ ਮੈਸੇਜ ਬਾਕਸ */
        .message-area {
            background: rgba(15, 17, 19, 0.9);
            height: 85%;
            flex-grow: 1;
            margin-left: -20px;
            margin-right: -20px;
            display: flex;
            align-items: center;
            border-top: 2px solid #444;
            border-bottom: 2px solid #444;
            z-index: 1;
            overflow: hidden;
        }

        marquee {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ਸੱਜੇ ਪਾਸੇ ਵਾਲਾ ਪ੍ਰਾਈਜ਼/ਨੋਟ ਬਾਕਸ */
        .prize-side {
            background: #4db8ff;
            height: 100%;
            padding: 0 15px 0 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
            z-index: 3;
            min-width: 80px;
        }

        .prize-side img {
            height: 40px;
            filter: drop-shadow(0px 0px 2px black);
        }
    </style>
</head>
<body>

    <div class="main-ticker-wrapper">
        <div class="live-side">LIVE</div>

        <div class="message-area">
            <marquee id="ticker-text" scrollamount="5">Connecting to database...</marquee>
        </div>

        <div class="prize-side">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" alt="prize">
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetpigeons-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id');

    if(userID) {
        db.ref('users/' + userID + '/config').on('value', (snapshot) => {
            const config = snapshot.val();
            if(config && config.ticker) {
                document.getElementById('ticker-text').innerText = config.ticker;
            }
        });
    } else {
        document.getElementById('ticker-text').innerText = "ID NOT FOUND IN URL";
    }
</script>

</body>
</html>
