<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: 'Arial', sans-serif; overflow: hidden; position: relative; }
        
        #expiry-notice {
            position: absolute; top: 0; left: 0; width: 1920px; background: #dc3545; color: white;
            font-size: 40px; font-weight: bold; text-align: center; padding: 15px 0;
            z-index: 10000; display: none; text-transform: uppercase;
        }

        /* 📜 TICKER SYSTEM */
        #ticker-container {
            position: absolute; bottom: 0px; left: 0px; width: 1920px; height: 145px; 
            display: flex; flex-direction: column; z-index: 999;
        }

        .ticker-row { display: flex; width: 100%; overflow: hidden; position: relative; align-items: center; }
        .row-text-area { flex: 1; overflow: hidden; white-space: nowrap; display: flex; align-items: center; font-weight: 900; text-transform: uppercase; }

        /* 📐 LIVE TAG WITH SLANT (LEFT SIDE) */
        .live-tag-slant {
            width: 200px; background: #b91c1c; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: 900; height: 100%;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0% 100%);
            padding-right: 20px; z-index: 5; margin-right: -30px;
        }

        /* 📐 TIME BOX WITH SLANT (RIGHT SIDE) */
        .ticker-time-box { 
            width: 320px; background: #00aeef; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 40px; font-weight: 900; height: 100%;
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
            margin-left: -50px; z-index: 5;
        }

        .row-1 { background: rgba(0, 0, 0, 0.95); color: white; height: 65px; font-size: 38px; border-top: 3px solid #00aeef; } 
        .row-2 { background: white; color: #b91c1c; height: 40px; font-size: 28px; } 
        .row-3 { background: rgba(0, 0, 0, 0.95); color: #ffcc00; height: 40px; font-size: 28px; }

        .scroller { display: inline-block; padding-left: 100%; animation: scroll-anim linear infinite; }
        @keyframes scroll-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Scoreboard (same as before) */
        #scoreboard-wrap { position: absolute; top: 60px; right: 80px; display: flex; flex-direction: column; align-items: flex-end; }
        .main-bar { display: flex; align-items: center; height: 75px; background: rgba(0, 0, 0, 0.95); border-radius: 12px; border: 3px solid #00aeef; padding: 0 15px; }
        .s-box { background: linear-gradient(145deg, #00aeef, #005a8d); color: white; font-size: 50px; font-weight: 900; min-width: 90px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .name-area { width: 220px; height: 100%; display: flex; align-items: center; overflow: hidden; color: white; font-size: 28px; font-weight: bold; text-transform: uppercase; text-align: center; justify-content: center; }
    </style>
</head>
<body>

<div id="expiry-notice">⚠ PLAN EXPIRED ⚠</div>

<div id="scoreboard-wrap">
    <div class="main-bar">
        <div class="name-area" id="nA">TEAM 1</div>
        <div class="s-box" id="sA">0</div>
        <div style="color:white; font-weight:900; margin:0 15px; font-size:24px;">VS</div>
        <div class="s-box" id="sB">0</div>
        <div class="name-area" id="nB">TEAM 2</div>
    </div>
</div>

<div id="ticker-container">
    <div class="ticker-row row-1">
        <div class="live-tag-slant">LIVE</div>
        <div class="row-text-area"><div class="scroller" id="t1"></div></div>
        <div class="ticker-time-box" id="live-time">00:00:00 AM</div>
    </div>
    
    <div class="ticker-row row-2">
        <div class="row-text-area"><div class="scroller" id="t2"></div></div>
    </div>
    
    <div class="ticker-row row-3">
        <div class="row-text-area"><div class="scroller" id="t3"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id') || 'demo';

    function updateTickerWithSpeed(elementId, text) {
        const el = document.getElementById(elementId);
        el.innerText = text || "";
        const pixelsPerSecond = 150; 
        const duration = (el.offsetWidth + 1400) / pixelsPerSecond; 
        el.style.animationDuration = duration + "s";
    }

    function setTeamName(id, txt) {
        document.getElementById(id).innerText = txt || "TEAM";
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);

    db.ref("users/" + userID).on("value", (uSnap) => {
        const userData = uSnap.val();
        const now = new Date();
        if (userData && now > new Date(userData.expiry)) {
            document.getElementById('expiry-notice').style.display = "block";
            document.getElementById('ticker-container').style.display = "none";
        } else {
            document.getElementById('expiry-notice').style.display = "none";
            db.ref("matchData").on("value", (snap) => {
                const data = snap.val() || {};
                document.getElementById('sA').innerText = data.scoreA || "0";
                document.getElementById('sB').innerText = data.scoreB || "0";
                setTeamName('nA', data.nameA);
                setTeamName('nB', data.nameB);
                updateTickerWithSpeed('t1', data.row1Txt);
                updateTickerWithSpeed('t2', data.row2Txt);
                updateTickerWithSpeed('t3', data.row3Txt);
            });
        }
    });
</script>
</body>
</html>
