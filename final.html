<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Next Match List</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        .btn-pm { border: none; color: white; padding: 5px; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }

        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .label-text, .label-title { font-size: 10px; color: #8b949e; display: block; margin-top: 5px; text-align: left; text-transform: uppercase; font-weight: bold; }

        .content { padding: 15px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; margin-bottom: 10px;}
        .btn-ticker { background: #ff5722; color: white; margin-bottom: 15px; height: 50px; font-size: 16px; border-radius: 6px; border:none; width:100%; font-weight:bold; cursor:pointer; }
        
        .team-item { background: #0d1117; padding: 8px; margin-bottom: 5px; border-radius: 4px; border-left: 3px solid #1a73e8; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .flex-row { display: flex; gap: 5px; margin-top: 8px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- SCOREBOARD -->
    <div class="card">
        <div class="header"><i class="fas fa-futbol"></i> Scoreboard</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>
            <div class="team-box" id="boxB">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NEXT MATCH LIST BOX -->
    <div class="card">
        <div class="header" style="background: #1a73e8;"><i class="fas fa-list-ol"></i> Next Match List</div>
        <div class="content">
            <span class="label-title">ਟੀਮਾਂ ਦੇ ਜੋੜੇ ਪਾਓ (ਜਿਵੇਂ: mudki-gill, fzr-fdk)</span>
            <textarea id="round1Input" class="std-input" style="height: 60px;" placeholder="ਟੀਮ 1-ਟੀਮ 2, ਟੀਮ 3-ਟੀਮ 4..."></textarea>
            <button class="btn-update" onclick="saveRound1()">Update Match List</button>
            
            <div id="round1List" style="margin-top:10px; max-height:200px; overflow-y:auto;">
                <!-- List will appear here -->
            </div>
        </div>
    </div>

    <!-- MATCH INFO & TICKER -->
    <div class="card">
        <div class="header" style="background: #6f42c1;">Control Panel</div>
        <div class="content">
            <span class="label-title">Current Match Tie</span>
            <input type="text" id="tieInput" class="std-input" placeholder="Current Playing Teams">
            <button class="btn-update" onclick="updateTieManual()">Update Ticker Match</button>
            
            <button id="tickerToggleBtn" class="btn-ticker" onclick="confirmTickerAction('vis')">Ticker: ON/OFF</button>
            
            <span class="label-title">Next Program</span>
            <input type="text" id="nextProg" class="std-input" placeholder="ਅਗਲਾ ਪ੍ਰੋਗਰਾਮ...">
            <button class="btn-update" style="background: #238636;" onclick="confirmTickerAction('info')">Update Next Program</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true, tickerStatus = true;

    // Save List Logic
    function saveRound1() {
        const input = document.getElementById('round1Input').value;
        if(!input) return;
        let teamsArray = input.split(',').map((pair, index) => {
            let formatted = pair.trim().replace('-', ' VS ');
            return { id: index + 1, name: formatted };
        });
        tickerRef.child('round1Teams').set(teamsArray);
        document.getElementById('round1Input').value = "";
    }

    // Display List Logic
    tickerRef.child('round1Teams').on('value', (snap) => {
        const listDiv = document.getElementById('round1List');
        listDiv.innerHTML = "";
        const teams = snap.val() || [];
        teams.forEach(t => {
            listDiv.innerHTML += `
                <div class="team-item">
                    <span><b>${t.id}.</b> ${t.name}</span>
                    <button class="card-btn" style="background:#238636; width:50px;" onclick="setAsCurrent('${t.name}')">SET</button>
                </div>`;
        });
    });

    function setAsCurrent(matchName) {
        document.getElementById('tieInput').value = matchName;
        let teams = matchName.split(' VS ');
        document.getElementById('nameA').value = teams[0] || "";
        document.getElementById('nameB').value = teams[1] || "";
        updateTieManual();
        updateMatchDB();
    }

    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            scoreA: curA,
            scoreB: curB
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function toggleVis(field) { matchRef.child(field).set(!sVis); }

    function updateTieManual() {
        tickerRef.update({ currentMatchTie: document.getElementById('tieInput').value });
    }

    function confirmTickerAction(type) {
        if (type === 'info') {
            tickerRef.update({ nextProgram: document.getElementById('nextProg').value });
        } else if (type === 'vis') {
            tickerStatus = !tickerStatus;
            tickerRef.child('tickerVis').set(tickerStatus);
        }
    }

    // Firebase Sync
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });

    tickerRef.on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('nextProg').value = data.nextProgram || "";
        document.getElementById('tieInput').value = data.currentMatchTie || "";
        tickerStatus = !!data.tickerVis;
        tickerToggleBtn.style.background = tickerStatus ? "#238636" : "#da3633";
        tickerToggleBtn.innerText = tickerStatus ? "Ticker: SHOWING" : "Ticker: HIDDEN";
    });
</script>
</body>
</html>
