<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet - Smart Scoreboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 15px; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        
        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .score-val { font-size: 42px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; font-weight: bold;}
        .content { padding: 15px; }
        
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 10px; width: 100%; }
        
        .match-list-item { 
            background: #0d1117; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid #1a73e8; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .match-text { font-size: 14px; font-weight: bold; }
        .set-btn { background: #238636; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 500px;">
    
    <!-- 1. LIVE SCOREBOARD (ਮੈਨੂਅਲ ਐਡਿਟ ਵੀ ਹੋ ਸਕਦਾ) -->
    <div class="card">
        <div class="header">Live Scoreboard (Auto + Manual)</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="text" id="nameA" class="std-input" placeholder="ਟੀਮ A ਦਾ ਨਾਮ" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; gap:5px;">
                    <button class="card-btn" style="background:#da3633; font-size:20px;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="card-btn" style="background:#238636; font-size:20px;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>

            <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <div style="color:#555; font-weight:bold;">VS</div>
                <button class="card-btn" style="background:#333;" onclick="resetScore()">RESET</button>
            </div>

            <div class="team-box" id="boxB">
                <input type="text" id="nameB" class="std-input" placeholder="ਟੀਮ B ਦਾ ਨਾਮ" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; gap:5px;">
                    <button class="card-btn" style="background:#da3633; font-size:20px;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="card-btn" style="background:#238636; font-size:20px;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. NEXT MATCH LIST -->
    <div class="card">
        <div class="header" style="background: #1a73e8;">Next Match Scheduler</div>
        <div class="content">
            <textarea id="matchInput" class="std-input" style="height: 60px;" placeholder="Team1-Team2, Team3-Team4"></textarea>
            <button class="btn-update" onclick="saveMatches()">Update Schedule</button>
            <div id="displayList" style="margin-top:12px; max-height: 200px; overflow-y: auto;">
                <!-- List content -->
            </div>
        </div>
    </div>

    <!-- 3. TICKER SETTINGS -->
    <div class="card">
        <div class="header" style="background:#444;">Ticker Info</div>
        <div class="content">
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            <input type="text" id="nextProg" class="std-input" placeholder="Next Match Message">
            <button class="btn-update" style="background: #238636;" onclick="updateTicker()">Update Ticker</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true;

    // --- SCORES & MANUAL EDIT ---
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            scoreA: curA,
            scoreB: curB
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function resetScore() { if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }
    function toggleVis(field) { matchRef.child(field).set(!sVis); }

    // --- SCHEDULER ---
    function saveMatches() {
        const val = document.getElementById('matchInput').value;
        if(!val) return;
        let pairs = val.split(',').map(p => p.trim()).filter(p => p !== "");
        let list = pairs.map((p, i) => {
            let teams = p.split('-').map(t => t.trim());
            return { id: i+1, t1: teams[0], t2: teams[1] };
        });
        tickerRef.child('nextMatchList').set(list);
        document.getElementById('matchInput').value = "";
    }

    tickerRef.child('nextMatchList').on('value', snap => {
        const div = document.getElementById('displayList');
        div.innerHTML = "";
        const data = snap.val() || [];
        data.forEach(m => {
            div.innerHTML += `
                <div class="match-list-item">
                    <span class="match-text">${m.t1} VS ${m.t2}</span>
                    <button class="set-btn" onclick="setLive('${m.t1}', '${m.t2}')">Set Live</button>
                </div>`;
        });
    });

    // ਜਦੋਂ "Set Live" ਦੱਬੋਗੇ, ਇਹ ਸਕੋਰਬੋਰਡ ਦੇ ਬਾਕਸਾਂ ਨੂੰ ਵੀ ਅਪਡੇਟ ਕਰੇਗਾ
    function setLive(t1, t2) {
        if(confirm(`Set ${t1} VS ${t2} to Scoreboard?`)) {
            matchRef.update({ 
                nameA: t1, 
                nameB: t2, 
                scoreA: 0, 
                scoreB: 0, 
                scoreVisible: true 
            });
            tickerRef.update({ currentMatchTie: t1 + " VS " + t2 });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function updateTicker() {
        tickerRef.update({ 
            tournamentName: document.getElementById('tourName').value, 
            nextProgram: document.getElementById('nextProg').value 
        });
    }

    // Sync from Firebase
    matchRef.on("value", (snap) => {
        const data = snap.val() || {};
        curA = data.scoreA || 0; curB = data.scoreB || 0;
        sVis = !!data.scoreVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = data.nameA || "";
        document.getElementById('nameB').value = data.nameB || "";
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });

    tickerRef.on("value", snap => {
        const d = snap.val() || {};
        document.getElementById('tourName').value = d.tournamentName || "";
        document.getElementById('nextProg').value = d.nextProgram || "";
    });
</script>
</body>
</html>
