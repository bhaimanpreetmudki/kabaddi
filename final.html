<div class="card">
    <div class="header" style="background: #1a73e8;">TEAM MANAGEMENT & LISTS</div>
    <div class="content">
        <textarea id="bulkTeams" class="std-input" style="height: 60px; background:#121212; border:1px solid #333;" placeholder="ਟੀਮਾਂ ਪਾਓ (e.g. 1-2, 3-4)"></textarea>
        <button class="btn btn-add" style="background: #28a745; margin-bottom: 20px;" onclick="addBulkTeams()">Add Teams</button>
        
        <div class="grid-2">
            <div>
                <span class="label-title">PLAYING</span>
                <div id="playingList" class="box-list" style="background: transparent; border:none; padding:0;">
                    </div>
            </div>
            <div>
                <span class="label-title">WINNERS</span>
                <div id="winnerList" class="box-list" style="background: #0b0e14; border: 1px solid #333;">
                    </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* ਟੀਮ ਲਿਸਟ ਨੂੰ ਸੁੰਦਰ ਬਣਾਉਣ ਲਈ ਨਵਾਂ ਸਟਾਈਲ */
    .team-card {
        background: #1c222d;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 12px;
        border-left: 5px solid #1a73e8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .team-info {
        display: flex;
        flex-direction: column;
    }
    .match-no {
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        margin-bottom: 4px;
    }
    .team-names {
        font-size: 16px;
        font-weight: bold;
        color: #fff;
    }
    .win-check {
        background: #ffc107;
        color: #000;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        border: none;
    }
    .winner-item {
        padding: 10px;
        border-bottom: 1px solid #333;
        color: #28a745;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
    }
</style>

<script>
    // ਲਿਸਟ ਰੈਂਡਰ ਕਰਨ ਵਾਲਾ ਸਹੀ ਫੰਕਸ਼ਨ
    function renderLists(teamList, winnerList) {
        const pList = document.getElementById('playingList');
        const wList = document.getElementById('winnerList');
        pList.innerHTML = ""; 
        wList.innerHTML = "";
        
        let opts = `<option value="">Select Team</option>`;
        let matchCounter = 1; // ਨੰਬਰਿੰਗ 1 ਤੋਂ ਸ਼ੁਰੂ ਕਰਨ ਲਈ

        if(teamList) {
            Object.values(teamList).forEach(t => {
                pList.innerHTML += `
                    <div class="team-card">
                        <div class="team-info">
                            <span class="match-no">Match ${matchCounter}</span>
                            <span class="team-names">${t.name}</span>
                        </div>
                        <button class="win-check" onclick="moveToWin('${t.id}', '${t.name}')">✔</button>
                    </div>
                `;
                matchCounter++;
            });
        }

        if(winnerList) {
            Object.values(winnerList).forEach(w => {
                wList.innerHTML += `
                    <div class="winner-item">
                        <span>${w.name}</span>
                        <span>★</span>
                    </div>
                `;
                opts += `<option value="${w.name}">${w.name}</option>`;
            });
        }
        
        // Match Tie ਵਾਲੇ Select Boxes ਨੂੰ ਅਪਡੇਟ ਕਰੋ
        if(document.getElementById('tie1')) {
            document.getElementById('tie1').innerHTML = opts;
            document.getElementById('tie2').innerHTML = opts;
        }
    }

    function moveToWin(id, name) {
        if(confirm("ਕੀ " + name + " ਜਿੱਤ ਗਈ ਹੈ?")) {
            db.child('teamList').child(id).remove();
            db.child('winnerList').push().set({ name: name });
        }
    }
</script>
