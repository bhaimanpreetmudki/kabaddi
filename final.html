<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Sukhdeep TV - Final Fixed Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --arrow-width: 20px;
            --arrow-height: 50px;
            --label-padding: 25px;
            --main-red: #cc0000;
            --pure-white: #ffffff;
            --pure-black: #000000;
            --container-width: 610px;
        }

        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: transparent; }

        /* --- Scoreboard --- */
        #scoreboard-wrapper { position: absolute; top: 25px; left: 20px; display: flex; flex-direction: column; gap: 2px; z-index: 100; }
        #scoreboard-main-row { display: flex; align-items: flex-start; }
        #scoreboard-container { display: flex; width: var(--container-width); border: 3px solid var(--pure-white); border-radius: 6px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.6); background: var(--pure-black); }
        .jersey-strip { width: 12px; height: 60px; flex-shrink: 0; }
        .score-unit { display: flex; height: 60px; align-items: center; flex-grow: 1; position: relative; }
        .team-display { flex-grow: 1; padding: 0 15px; font-size: 36px; font-weight: 900; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
        .score-box { width: 75px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; flex-shrink: 0; }
        
        .card-indicator { width: 15px; height: 22px; border-radius: 2px; display: none; position: absolute; bottom: 5px; border: 1px solid rgba(0,0,0,0.3); }
        #cardA { right: 10px; }
        #cardB { left: 10px; }
        .yellow-card { background: #ffd700; display: block; }
        .red-card { background: #ff0000; display: block; }

        .side-a { background: var(--main-red); color: var(--pure-white); border-right: 2px solid white; }
        .side-b { background: var(--pure-white); color: var(--main-red); }

        #match-timer-box { background: var(--main-red); color: white; height: 60px; display: none; align-items: center; padding: 0 15px; font-size: 32px; font-weight: 900; border: 3px solid white; border-left: none; border-radius: 0 6px 6px 0; }

        #match-details { display: flex; justify-content: space-between; padding: 0 5px; color: var(--pure-white); font-size: 26px; font-weight: 700; text-shadow: 2px 2px 4px #000; text-transform: uppercase; width: var(--container-width); }

        /* --- Penalty --- */
        #penalty-shots-container { display: none; justify-content: space-between; align-items: center; background: var(--main-red); padding: 10px; border: 3px solid white; border-radius: 8px; margin-top: 5px; width: var(--container-width); box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: white; }
        .team-shots { display: flex; gap: 3px; }
        .ball { width: 25px; height: 25px; border-radius: 50%; background: #fff; border: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #000; }
        .ball.goal { background: #00ff00; color: #000; border-color: #fff; }
        .ball.miss { background: #000000; color: #fff; border-color: #fff; }

        /* --- Overlays --- */
        #goal-overlay, #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: none; justify-content: center; align-items: center; z-index: 5000; pointer-events: none; }
        .flash-text { font-size: 120px; color: #fff; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 30px rgba(0,0,0,0.8); animation: flashAnim 0.5s infinite alternate; }
        @keyframes flashAnim { from { transform: scale(0.9); } to { transform: scale(1.1); } }
        .yellow-text { color: #ffd700; text-shadow: 0 0 30px #ffd700; }
        .red-text { color: #ff0000; text-shadow: 0 0 30px #ff0000; }

        #watermark { position: fixed; color: #FFFFFF; font-size: 35px; font-weight: 900; z-index: 9999; text-shadow: 2px 2px 0px #000; text-transform: uppercase; }

        /* --- Ticker --- */
        #master-footer { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; flex-direction: column; gap: 4px; padding: 0 10px; z-index: 999; }
        .bar { display: flex; height: var(--arrow-height); width: 100%; overflow: hidden; position: relative; border: 2px solid var(--main-red); border-radius: 4px; }
        .top-bg { background: var(--pure-white); }
        .bottom-bg { background: var(--main-red); }
        marquee { width: 100%; font-size: 36px; font-weight: 900; text-transform: uppercase; padding-left: 130px; }
        .txt-red { color: var(--main-red); }
        .txt-white { color: var(--pure-white); }
        .clock-area { position: absolute; right: 0; background: var(--pure-white); color: var(--main-red); min-width: 140px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; z-index: 110; border-left: 2px solid var(--main-red); }
    </style>
</head>
<body>

    <div id="goal-overlay"><div class="flash-text" style="color:white; text-shadow: 0 0 20px red;">GOAL !!!</div></div>
    <div id="card-overlay"><div id="card-flash-text" class="flash-text">CARD</div></div>

    <div id="watermark">SUKHDEEP TV</div>

    <div id="scoreboard-wrapper">
        <div id="scoreboard-main-row">
            <div id="scoreboard-container">
                <div id="jA" class="jersey-strip"></div>
                <div class="score-unit side-a">
                    <div class="score-box" id="scoreA">0</div>
                    <div class="team-display" id="nameA">TEAM A</div>
                    <div id="cardA" class="card-indicator"></div>
                </div>
                <div class="score-unit side-b">
                    <div id="cardB" class="card-indicator"></div>
                    <div class="team-display" id="nameB" style="text-align: right;">TEAM B</div>
                    <div class="score-box" id="scoreB">0</div>
                </div>
                <div id="jB" class="jersey-strip"></div>
            </div>
            <div id="match-timer-box">00:00</div>
        </div>
        <div id="match-details">
            <span id="round-detail">ROUND: 1</span>
            <span id="half-detail">FIRST HALF</span>
        </div>
        <div id="penalty-shots-container">
            <div class="team-shots" id="shotsA">
                <div class="ball" id="a1">1</div><div class="ball" id="a2">2</div><div class="ball" id="a3">3</div><div class="ball" id="a4">4</div><div class="ball" id="a5">5</div>
            </div>
            <div style="color: white; font-weight: 900;">PENALTY</div>
            <div class="team-shots" id="shotsB">
                <div class="ball" id="b1">1</div><div class="ball" id="b2">2</div><div class="ball" id="b3">3</div><div class="ball" id="b4">4</div><div class="ball" id="b5">5</div>
            </div>
        </div>
    </div>

    <div id="master-footer">
        <div class="bar top-bg">
            <marquee id="tour-name" class="txt-red">TOURNAMENT</marquee>
        </div>
        <div class="bar bottom-bg">
            <marquee id="scroll-bot" class="txt-white">LIVE COVERAGE</marquee>
            <div class="clock-area" id="live-clock">00:00 AM</div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const clientID = urlParams.get('id');

    let lastA = 0, lastB = 0;
    let localMatchTime = 0;
    let timerInterval = null;

    db.ref("users/" + clientID + "/matchData").on("value", (snap) => {
        const d = snap.val() || {};

        // 1. Goal Animation
        if (d.scoreA > lastA || d.scoreB > lastB) { triggerFlash('goal-overlay'); }
        lastA = d.scoreA || 0; lastB = d.scoreB || 0;

        // 2. Fixed Card Logic
        if (d.cardsA && d.cardsA !== "") {
            triggerCardFlash(d.cardsA, d.playerNameA, d.nameA || "Team A", "A");
        }
        if (d.cardsB && d.cardsB !== "") {
            triggerCardFlash(d.cardsB, d.playerNameB, d.nameB || "Team B", "B");
        }

        // 3. Independent Timer Logic (Syncs but counts locally)
        let mTime = d.matchTime || "00:00";
        const parts = mTime.split(':');
        const remoteSecs = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        
        // Sync if difference is more than 2 seconds
        if (Math.abs(remoteSecs - localMatchTime) > 2) { localMatchTime = remoteSecs; }

        if (d.timerRunning === true) {
            if (!timerInterval) {
                timerInterval = setInterval(() => { localMatchTime++; updateTimerUI(); }, 1000);
            }
        } else {
            clearInterval(timerInterval);
            timerInterval = null;
            updateTimerUI();
        }

        // UI Updates
        document.getElementById('nameA').innerText = (d.nameA || "TEAM A").toUpperCase();
        document.getElementById('nameB').innerText = (d.nameB || "TEAM B").toUpperCase();
        document.getElementById('scoreA').innerText = d.scoreA || "0";
        document.getElementById('scoreB').innerText = d.scoreB || "0";
        document.getElementById('round-detail').innerText = "ROUND: " + (d.matchRound || "1");
        document.getElementById('half-detail').innerText = (d.round || "FIRST HALF").toUpperCase();
        document.getElementById('jA').style.backgroundColor = d.colorA || "#cc0000";
        document.getElementById('jB').style.backgroundColor = d.colorB || "#ffffff";
        
        updateSmallCards('cardA', d.cardsA);
        updateSmallCards('cardB', d.cardsB);

        for (let i = 1; i <= 5; i++) {
            updatePenaltyBall('a', i, d.penaltyA);
            updatePenaltyBall('b', i, d.penaltyB);
        }
        document.getElementById('penalty-shots-container').style.display = (d.penaltyVisible === true) ? 'flex' : 'none';
        document.getElementById('scoreboard-wrapper').style.display = (d.scoreVisible === false) ? 'none' : 'flex';
    });

    function triggerCardFlash(type, playerNum, teamName, teamKey) {
        const overlay = document.getElementById('card-overlay');
        const text = document.getElementById('card-flash-text');
        text.className = "flash-text " + (type === "yellow" ? "yellow-text" : "red-text");
        let displayNo = playerNum ? (" - " + playerNum) : "";
        text.innerText = teamName.toUpperCase() + ": " + type.toUpperCase() + " CARD" + displayNo;
        overlay.style.display = 'flex';
        setTimeout(() => { 
            overlay.style.display = 'none'; 
            db.ref("users/" + clientID + "/matchData/cards" + teamKey).set(""); 
        }, 4000);
    }

    function updateTimerUI() {
        const mins = Math.floor(localMatchTime / 60);
        const secs = localMatchTime % 60;
        const fmt = (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
        const box = document.getElementById('match-timer-box');
        box.innerText = fmt;
        box.style.display = (fmt === "00:00") ? "none" : "flex";
    }

    function updateSmallCards(id, type) {
        let el = document.getElementById(id);
        el.className = "card-indicator";
        if (type === "yellow") el.classList.add("yellow-card");
        else if (type === "red") el.classList.add("red-card");
    }

    function updatePenaltyBall(team, index, penaltyString) {
        let ball = document.getElementById(team + index);
        let symbols = penaltyString ? Array.from(penaltyString) : [];
        let s = symbols[index-1];
        if (s === "✅") { ball.className = "ball goal"; ball.innerText = "●"; }
        else if (s === "❌") { ball.className = "ball miss"; ball.innerText = "X"; }
        else { ball.className = "ball"; ball.innerText = index; }
    }

    function triggerFlash(id) {
        const el = document.getElementById(id);
        el.style.display = 'flex';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    db.ref("users/" + clientID + "/tickerData").on("value", (snap) => {
        const d = snap.val() || {};
        document.getElementById('tour-name').innerText = (d.tournamentName || "TOURNAMENT").toUpperCase();
        document.getElementById('scroll-bot').innerText = (d.nextProgram || "LIVE COVERAGE").toUpperCase();
        document.getElementById('watermark').innerText = (d.watermarkText || "SUKHDEEP TV").toUpperCase();
        document.getElementById('master-footer').style.display = (d.tickerVis === false) ? 'none' : 'flex';
    });

    setInterval(() => {
        const clockEl = document.getElementById('live-clock');
        const now = new Date();
        clockEl.innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);

    setInterval(() => {
        const wm = document.getElementById('watermark');
        const maxX = window.innerWidth - 200;
        const maxY = window.innerHeight - 200;
        wm.style.left = Math.random() * maxX + 'px';
        wm.style.top = (Math.random() * (maxY - 150) + 150) + 'px';
    }, 7000);
</script>
</body>
</html>
