<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manpreet Team Control Panel</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #00e676; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-update { background: var(--accent); color: #000; }
        .btn-reset { background: #ff5252; color: white; }
        #timerShow { font-size: 2em; text-align: center; background: #000; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid var(--accent); }
        .full-width { grid-column: span 2; }
        @media (max-width: 600px) { .panel-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ਮਨਪ੍ਰੀਤ ਟੀਮ ਕੰਟਰੋਲ ਪੈਨਲ</h2>
    </div>

    <div class="panel-grid">
        <!-- ਟੀਮਾਂ ਦੀ ਜਾਣਕਾਰੀ -->
        <div class="card">
            <h3>ਟੀਮਾਂ ਦੀ ਸੈਟਿੰਗ</h3>
            <label>ਟੀਮ A ਨਾਮ</label>
            <input type="text" id="nameA" placeholder="Team A Name" oninput="updateMatchDB()">
            <input type="color" id="colorA" value="#ff0000" oninput="updateMatchDB()">
            
            <label>ਟੀਮ B ਨਾਮ</label>
            <input type="text" id="nameB" placeholder="Team B Name" oninput="updateMatchDB()">
            <input type="color" id="colorB" value="#0000ff" oninput="updateMatchDB()">
        </div>

        <!-- ਟਾਈਮਰ ਅਤੇ ਸਕੋਰ -->
        <div class="card">
            <h3>ਮੈਚ ਟਾਈਮਰ</h3>
            <div id="timerShow">00:00</div>
            <div class="btn-row">
                <button class="btn-update" onclick="startTimer()">ਸਟਾਰਟ</button>
                <button style="background:#ff9800;" onclick="stopTimer()">ਸਟਾਪ</button>
                <button class="btn-reset" onclick="resetTimer()">ਰੀਸੈੱਟ</button>
            </div>
            <input type="number" id="matchDuration" placeholder="ਮੈਚ ਦਾ ਸਮਾਂ (ਮਿੰਟ)" value="10" oninput="updateMatchDB()">
        </div>

        <!-- ਪੈਨਲਟੀ ਅਤੇ ਰਾਊਂਡ -->
        <div class="card">
            <h3>ਰਾਊਂਡ ਅਤੇ ਪੈਨਲਟੀ</h3>
            <label>ਰਾਊਂਡ ਦਾ ਨਾਮ (e.g. Semi Final)</label>
            <input type="text" id="matchRound" placeholder="Round Name" oninput="updateMatchDB()">
            <label>ਚੱਲ ਰਿਹਾ ਰਾਊਂਡ</label>
            <input type="text" id="roundInp" placeholder="Round 1" oninput="updateMatchDB()">
            <div class="btn-row">
                <input type="number" id="pA" placeholder="P-A" oninput="updateMatchDB()">
                <input type="number" id="pB" placeholder="P-B" oninput="updateMatchDB()">
            </div>
        </div>

        <!-- ਬਲਕ ਟੀਮ ਐਂਟਰੀ -->
        <div class="card">
            <h3>ਟੀਮਾਂ ਦੀ ਲਿਸਟ (Bulk)</h3>
            <textarea id="bulkTeams" style="width:100%; height:80px; background:#2c2c2c; color:white; border-radius:5px;" placeholder="ਟੀਮਾਂ ਦੇ ਨਾਮ ਕੋਮਾ (,) ਪਾ ਕੇ ਲਿਖੋ..."></textarea>
            <button class="btn-update" onclick="addBulkTeams()" style="margin-top:10px;">ਟੀਮਾਂ ਐਡ ਕਰੋ</button>
        </div>

        <!-- ਫਲੈਸ਼ ਨਿਊਜ਼ / ਟਿੱਕਰ -->
        <div class="card full-width">
            <h3>ਨਿਊਜ਼ ਟਿੱਕਰ (Flash)</h3>
            <input type="text" id="eventInp" placeholder="ਚੱਲ ਰਹੀ ਖਬਰ ਜਾਂ ਇਵੈਂਟ ਲਿਖੋ..." oninput="updateMatchDB()">
            <button class="btn-reset" onclick="clearDB()" style="width: auto; float: right; margin-top: 10px;">Clear All Data</button>
        </div>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = { 
        databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const matchRef = db.ref("matchData");
    const tickerRef = db.ref("tickerData");

    let seconds = 0;
    let timerInterval = null;

    // ਡੇਟਾਬੇਸ ਅਪਡੇਟ ਫੰਕਸ਼ਨ
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value,
            colorA: document.getElementById('colorA').value,
            colorB: document.getElementById('colorB').value,
            penaltyA: document.getElementById('pA').value,
            penaltyB: document.getElementById('pB').value,
            lastEvent: document.getElementById('eventInp').value,
            matchRound: document.getElementById('matchRound').value,
            round: document.getElementById('roundInp').value,
            duration: document.getElementById('matchDuration').value,
            matchTime: document.getElementById('timerShow').innerText
        });
    }

    // ਟਾਈਮਰ ਫੰਕਸ਼ਨ
    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            let timeStr = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            document.getElementById('timerShow').innerText = timeStr;
            matchRef.child('matchTime').set(timeStr);
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function resetTimer() {
        stopTimer();
        seconds = 0;
        document.getElementById('timerShow').innerText = "00:00";
        matchRef.child('matchTime').set("00:00");
    }

    // ਬਲਕ ਟੀਮਾਂ ਐਡ ਕਰਨਾ
    function addBulkTeams() {
        const input = document.getElementById('bulkTeams').value;
        if(!input.trim()) return;
        
        const teams = input.split(',');
        teams.forEach(t => {
            if(t.trim()) {
                tickerRef.child('teamList').push({
                    name: t.trim(),
                    timestamp: Date.now()
                });
            }
        });
        document.getElementById('bulkTeams').value = "";
        alert("ਟੀਮਾਂ ਸਫਲਤਾਪੂਰਵਕ ਐਡ ਹੋ ਗਈਆਂ ਹਨ!");
    }

    function clearDB() {
        if(confirm("ਕੀ ਤੁਸੀਂ ਸਾਰਾ ਡੇਟਾ ਡਿਲੀਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            matchRef.set({});
            tickerRef.set({});
            location.reload();
        }
    }
</script>

</body>
</html>
