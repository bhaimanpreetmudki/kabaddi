<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Match Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 450px; border-radius: 10px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; }
        .header { background: #238636; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        
        .teams-container { display: flex; padding: 15px; gap: 10px; background: #0d1117; align-items: center; justify-content: center; }
        .team-box { flex: 1; text-align: center; }
        .score-val { font-size: 45px; font-weight: 900; color: #2ecc71; margin: 5px 0; }
        
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; }
        
        .btn-pm { border: none; color: white; padding: 8px; border-radius: 5px; font-size: 20px; cursor: pointer; width: 45%; }
        .card-btn { padding: 8px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 11px; }

        .match-item { background: #1c2128; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 5px solid #1f6feb; display: flex; justify-content: space-between; align-items: center; }
        .match-info { flex: 1; }
        .match-name { font-weight: bold; font-size: 15px; color: #58a6ff; }
        .match-no { color: #8b949e; font-size: 12px; display: block; }
    </style>
</head>
<body>

    <!-- 1. LIVE SCORE BOARD -->
    <div class="card">
        <div class="header">Live Match Score</div>
        <div class="teams-container">
            <div class="team-box">
                <input type="text" id="nameA" class="std-input" placeholder="Team 1" oninput="updateMatchDB()" style="text-align:center;">
                <div class="score-val" id="dispA">0</div>
                <div style="display:flex; justify-content: space-around;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
                </div>
            </div>
            
            <div style="font-weight:bold; font-size:20px; color:#30363d;">VS</div>

            <div class="team-box">
                <input type="text" id="nameB" class="std-input" placeholder="Team 2" oninput="updateMatchDB()" style="text-align:center;">
                <div class="score-val" id="dispB">0</div>
                <div style="display:flex; justify-content: space-around;">
                    <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                    <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
                </div>
            </div>
        </div>
        <div style="padding: 10px; background: #161b22; text-align: center;">
            <button id="visBtn" class="card-btn" style="background:#238636; width: 80px;" onclick="toggleVis()">SHOW</button>
            <button class="card-btn" style="background:#333; width: 80px;" onclick="resetScore()">RESET</button>
        </div>
    </div>

    <!-- 2. MATCH SCHEDULER -->
    <div class="card">
        <div class="header" style="background: #1f6feb;">Match Schedule (2 Team/Match)</div>
        <div style="padding: 15px;">
            <label style="font-size: 11px; color: #8b949e;">Format: Team1-Team2, Team3-Team4</label>
            <textarea id="matchInput" class="std-input" style="height: 70px;" placeholder="Mudki-Gill, Fzr-Fdk..."></textarea>
            <button class="btn-update" onclick="saveMatches()">Save Match List</button>
            
            <div id="matchList" style="margin-top: 15px;">
                <!-- Matches will appear here -->
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true;

    // --- SAVE MATCHES (2 TEAMS PER MATCH) ---
    function saveMatches() {
        const input = document.getElementById('matchInput').value;
        if(!input) return;

        // ਕੌਮੇ (,) ਨਾਲ ਮੈਚਾਂ ਨੂੰ ਵੱਖ ਕਰੋ
        let matchPairs = input.split(',').map(m => m.trim()).filter(m => m !== "");
        let finalMatches = [];

        matchPairs.forEach((pair, index) => {
            // ਡੈਸ਼ (-) ਨਾਲ 2 ਟੀਮਾਂ ਨੂੰ ਵੱਖ ਕਰੋ
            let teams = pair.split('-').map(t => t.trim());
            let t1 = teams[0] || "Team A";
            let t2 = teams[1] || "Team B";

            finalMatches.push({
                id: index + 1,
                display: t1 + " VS " + t2,
                team1: t1,
                team2: t2
            });
        });

        tickerRef.child('nextMatchList').set(finalMatches);
        document.getElementById('matchInput').value = "";
    }

    // --- DISPLAY LIST ---
    tickerRef.child('nextMatchList').on('value', (snap) => {
        const listDiv = document.getElementById('matchList');
        listDiv.innerHTML = "";
        const data = snap.val() || [];
        
        data.forEach(m => {
            listDiv.innerHTML += `
                <div class="match-item">
                    <div class="match-info">
                        <span class="match-no">Match #${m.id}</span>
                        <span class="match-name">${m.display}</span>
                    </div>
                    <button class="card-btn" style="background:#238636;" onclick="setLive('${m.team1}', '${m.team2}')">SET LIVE</button>
                </div>`;
        });
    });

    // --- SET MATCH LIVE ---
    function setLive(t1, t2) {
        if(confirm("ਕੀ ਇਹ ਮੈਚ ਲਾਈਵ ਕਰਨਾ ਹੈ?")) {
            matchRef.update({
                nameA: t1,
                nameB: t2,
                scoreA: 0,
                scoreB: 0,
                scoreVisible: true
            });
            tickerRef.update({ currentMatchTie: t1 + " VS " + t2 });
        }
    }

    // --- CORE SCOREBOARD FUNCTIONS ---
    function updateMatchDB() {
        matchRef.update({
            nameA: document.getElementById('nameA').value,
            nameB: document.getElementById('nameB').value
        });
    }

    function changeScore(team, val) {
        let current = (team === 'scoreA' ? curA : curB);
        matchRef.update({ [team]: Math.max(0, current + val) });
    }

    function toggleVis() { matchRef.child('scoreVisible').set(!sVis); }
    function resetScore() { if(confirm("Reset Score?")) matchRef.update({ scoreA: 0, scoreB: 0 }); }

    // --- FIREBASE SYNC ---
    matchRef.on("value", (snap) => {
        const d = snap.val() || {};
        curA = d.scoreA || 0; curB = d.scoreB || 0; sVis = !!d.scoreVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });
</script>
</body>
</html>
