<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        /* Big Box Styling */
        .big-next-match { background: linear-gradient(145deg, #1e252e, #161b22); border: 2px solid #1a73e8; padding: 15px; text-align: center; }
        .big-title { color: #1a73e8; font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .vs-text { font-size: 20px; font-weight: 900; color: #f1c40f; margin: 0 10px; }

        .teams-container { display: flex; padding: 10px; gap: 5px; background: #0d1117; align-items: center; }
        .team-box { flex: 2; text-align: center; padding: 10px; border-radius: 8px; background: #161b22; border-top: 4px solid #fff; }
        .mid-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .score-val { font-size: 38px; font-weight: 900; color: #2ecc71; margin: 2px 0; }
        
        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .label-text { font-size: 10px; color: #8b949e; display: block; margin-top: 5px; text-align: left; text-transform: uppercase; font-weight: bold; }

        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; width: 100%; }

        .match-list-item { display: flex; justify-content: space-between; align-items: center; background: #1c2128; margin-bottom: 5px; padding: 8px; border-radius: 5px; border-left: 4px solid #1a73e8; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">
    
    <!-- 1. SCOREBOARD -->
    <div class="card">
        <div class="header">Scoreboard</div>
        <div class="teams-container">
            <div class="team-box" id="boxA">
                <input type="text" id="nameA" class="std-input" placeholder="Team A" oninput="updateMatchDB()">
                <div class="score-val" id="dispA">0</div>
                <button class="card-btn" style="background:#238636; margin-top:5px;" onclick="changeScore('scoreA', 1)">+</button>
            </div>
            <div class="mid-controls">
                <button id="visBtn" class="card-btn" style="background:#238636;" onclick="toggleVis('scoreVisible')">SHOW</button>
                <div style="font-weight:bold; color:#444;">VS</div>
            </div>
            <div class="team-box" id="boxB">
                <input type="text" id="nameB" class="std-input" placeholder="Team B" oninput="updateMatchDB()">
                <div class="score-val" id="dispB">0</div>
                <button class="card-btn" style="background:#238636; margin-top:5px;" onclick="changeScore('scoreB', 1)">+</button>
            </div>
        </div>
    </div>

    <!-- *** BIG NEXT MATCH BOX *** -->
    <div class="card big-next-match">
        <span class="big-title"><i class="fas fa-star"></i> Highlighted Next Match</span>
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
            <input type="text" id="bigNextA" class="std-input" placeholder="Team 1" style="margin:0; text-align:center; font-weight:bold; font-size:16px; border-color:#1a73e8;">
            <span class="vs-text">VS</span>
            <input type="text" id="bigNextB" class="std-input" placeholder="Team 2" style="margin:0; text-align:center; font-weight:bold; font-size:16px; border-color:#1a73e8;">
        </div>
        <button class="btn-update" onclick="updateBigMatch()" style="background:#f1c40f; color:#000;">
            <i class="fas fa-sync-alt"></i> Update Big Match Box
        </button>
    </div>

    <!-- 2. SCHEDULE LIST (Add Multiple) -->
    <div class="card">
        <div class="header" style="background: #1a73e8;">Add To Schedule List</div>
        <div style="padding: 15px;">
            <div class="grid-2">
                <input type="text" id="schTeamA" class="std-input" placeholder="ਟੀਮ A">
                <input type="text" id="schTeamB" class="std-input" placeholder="ਟੀਮ B">
            </div>
            <button class="btn-update" onclick="saveMatches()" style="margin-top:5px;">Add to List</button>
            <div id="displayList" style="margin-top:10px; max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const matchRef = firebase.database().ref("matchData");
    const tickerRef = firebase.database().ref("tickerData");

    // Big Match Box Update
    function updateBigMatch() {
        const t1 = document.getElementById('bigNextA').value;
        const t2 = document.getElementById('bigNextB').value;
        if(!t1 || !t2) return alert("Fill names!");
        
        tickerRef.update({
            bigNextMatch: t1 + " VS " + t2
        }).then(() => alert("Big Match Updated!"));
    }

    // Normal Schedule List
    function saveMatches() {
        const t1 = document.getElementById('schTeamA').value;
        const t2 = document.getElementById('schTeamB').value;
        if(!t1 || !t2) return;
        tickerRef.child('nextMatchList').once('value', snap => {
            let list = snap.val() || [];
            list.push({ t1, t2 });
            tickerRef.child('nextMatchList').set(list);
            document.getElementById('schTeamA').value = "";
            document.getElementById('schTeamB').value = "";
        });
    }

    tickerRef.child('nextMatchList').on('value', snap => {
        const div = document.getElementById('displayList');
        div.innerHTML = "";
        const data = snap.val() || [];
        data.forEach((m, i) => {
            div.innerHTML += `
                <div class="match-list-item">
                    <span class="match-text">${m.t1} VS ${m.t2}</span>
                    <button class="card-btn" style="background:#238636; width:50px; flex:none;" onclick="setLive('${m.t1}', '${m.t2}')">Set</button>
                </div>`;
        });
    });

    function setLive(t1, t2) {
        matchRef.update({ nameA: t1, nameB: t2, scoreA: 0, scoreB: 0 });
    }

    // Scoreboard Sync
    function changeScore(team, val) {
        matchRef.child(team).transaction(c => (c || 0) + val);
    }

    matchRef.on("value", snap => {
        const d = snap.val() || {};
        document.getElementById('dispA').innerText = d.scoreA || 0;
        document.getElementById('dispB').innerText = d.scoreB || 0;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
    });

    tickerRef.on("value", snap => {
        const d = snap.val() || {};
        const bigMatch = d.bigNextMatch || " VS ";
        const parts = bigMatch.split(" VS ");
        document.getElementById('bigNextA').value = parts[0] || "";
        document.getElementById('bigNextB').value = parts[1] || "";
    });
</script>
</body>
</html>
