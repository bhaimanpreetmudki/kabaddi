<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Admin - Score & Ticker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 500px; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; box-sizing: border-box; }
        .header { background: #238636; color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        /* Big Next Match Box */
        .big-next-card { background: linear-gradient(135deg, #1e252e 0%, #0d1117 100%); border: 2px solid #f1c40f; text-align: center; padding: 15px; }
        .big-title { color: #f1c40f; font-size: 16px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .vs-divider { font-size: 24px; font-weight: 900; color: #e74c3c; margin: 0 10px; }

        .std-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; font-size: 13px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border-radius: 6px; border:none; cursor:pointer; width:100%; font-weight:bold; }
        .card-btn { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 9px; flex: 1; }

        /* Brackets / Taiyan Styling */
        .bracket-item { background: #1c2128; margin-bottom: 8px; padding: 10px; border-radius: 8px; border-left: 5px solid #f1c40f; display: flex; justify-content: space-between; align-items: center; }
        .bracket-teams { display: flex; flex-direction: column; gap: 2px; }
        .team-tag { font-size: 13px; font-weight: bold; color: #fff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

<div id="main-content" style="width: 100%; max-width: 500px;">

    <!-- 1. BIG NEXT MATCH BOX (HIGHLIGHTED) -->
    <div class="card big-next-card">
        <span class="big-title"><i class="fas fa-star"></i> Next Match (ਅਗਲਾ ਮੁਕਾਬਲਾ)</span>
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
            <input type="text" id="bigNextA" class="std-input" placeholder="Team 1" style="text-align:center; font-size:16px; border-color:#f1c40f; margin:0;">
            <span class="vs-divider">VS</span>
            <input type="text" id="bigNextB" class="std-input" placeholder="Team 2" style="text-align:center; font-size:16px; border-color:#f1c40f; margin:0;">
        </div>
        <button class="btn-update" onclick="updateBigMatch()" style="background:#f1c40f; color:#000;">
            <i class="fas fa-sync-alt"></i> Update Big Match Overlay
        </button>
    </div>

    <!-- 2. TOURNAMENT BRACKETS (TAIYAN) -->
    <div class="card">
        <div class="header" style="background: #1a73e8;"><i class="fas fa-sitemap"></i> Match Brackets (ਟਾਈਆਂ)</div>
        <div style="padding: 15px;">
            <div class="grid-2">
                <input type="text" id="taiA" class="std-input" placeholder="ਟੀਮ 1">
                <input type="text" id="taiB" class="std-input" placeholder="ਟੀਮ 2">
            </div>
            <button class="btn-update" onclick="addBracket()">Add to Brackets</button>
            
            <div id="bracketList" style="margin-top:15px; max-height: 250px; overflow-y: auto;">
                <!-- Brackets will load here -->
            </div>
        </div>
    </div>

    <!-- 3. RESET -->
    <div class="card" style="border:none; background:transparent;">
        <button class="card-btn" style="background:#da3633; padding:12px; width:100%; font-size:12px;" onclick="fullReset()">RESET SYSTEM</button>
    </div>

</div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const tickerRef = firebase.database().ref("tickerData");

    // Big Match Update
    function updateBigMatch() {
        const t1 = document.getElementById('bigNextA').value;
        const t2 = document.getElementById('bigNextB').value;
        if(!t1 || !t2) return alert("Please enter both teams!");
        
        tickerRef.update({
            bigNextMatch: t1 + " VS " + t2
        }).then(() => alert("Big Match Updated Successfully!"));
    }

    // Add Brackets (Taiyan)
    function addBracket() {
        const t1 = document.getElementById('taiA').value;
        const t2 = document.getElementById('taiB').value;
        if(!t1 || !t2) return alert("Enter team names!");

        tickerRef.child('taiList').once('value', snap => {
            let list = snap.val() || [];
            list.push({ t1, t2 });
            tickerRef.child('taiList').set(list);
            document.getElementById('taiA').value = "";
            document.getElementById('taiB').value = "";
        });
    }

    // Load Brackets
    tickerRef.child('taiList').on('value', snap => {
        const div = document.getElementById('bracketList');
        div.innerHTML = "";
        const data = snap.val() || [];
        data.forEach((m, i) => {
            div.innerHTML += `
                <div class="bracket-item">
                    <div class="bracket-teams">
                        <span class="team-tag">${m.t1}</span>
                        <span style="color:#555; font-size:10px;">V/S</span>
                        <span class="team-tag">${m.t2}</span>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="card-btn" style="background:#238636;" onclick="moveToBig('${m.t1}', '${m.t2}')">SELECT</button>
                        <button class="card-btn" style="background:#da3633;" onclick="deleteBracket(${i})">X</button>
                    </div>
                </div>`;
        });
    });

    // Move from list to Big Box
    function moveToBig(t1, t2) {
        document.getElementById('bigNextA').value = t1;
        document.getElementById('bigNextB').value = t2;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteBracket(index) {
        tickerRef.child('taiList').once('value', snap => {
            let list = snap.val() || [];
            list.splice(index, 1);
            tickerRef.child('taiList').set(list);
        });
    }

    function fullReset() {
        if(confirm("Are you sure? This will clear brackets.")) {
            tickerRef.child('taiList').set(null);
            tickerRef.update({ bigNextMatch: "" });
            document.getElementById('bigNextA').value = "";
            document.getElementById('bigNextB').value = "";
        }
    }

    // Sync Big Box from DB
    tickerRef.on("value", snap => {
        const d = snap.val() || {};
        if(d.bigNextMatch) {
            const parts = d.bigNextMatch.split(" VS ");
            document.getElementById('bigNextA').value = parts[0] || "";
            document.getElementById('bigNextB').value = parts[1] || "";
        }
    });
</script>

</body>
</html>
