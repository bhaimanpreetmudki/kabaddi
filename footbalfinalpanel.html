<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manpreet Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0b0d0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #161b22; width: 100%; max-width: 450px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; overflow: hidden; }
        .header { background: #238636; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }
        .std-input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-update { background: #1a73e8; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
        .team-row { display: flex; padding: 15px; gap: 10px; align-items: center; background: #0d1117; }
        .score-box { flex: 1; text-align: center; }
        .score-num { font-size: 40px; font-weight: bold; color: #2ecc71; margin: 5px 0; }
        .btn-pm { width: 45%; padding: 10px; border: none; border-radius: 5px; color: white; font-size: 18px; cursor: pointer; }
        .match-list-item { background: #1c2128; padding: 10px; margin: 8px; border-radius: 6px; border-left: 4px solid #1a73e8; display: flex; justify-content: space-between; align-items: center; }
        .set-btn { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <!-- SCOREBOARD -->
    <div class="card">
        <div class="header">LIVE SCORE CONTROL</div>
        <div class="team-row">
            <div class="score-box">
                <input type="text" id="nameA" class="std-input" placeholder="Team 1" oninput="updateDB()">
                <div class="score-num" id="dispA">0</div>
                <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreA', -1)">-</button>
                <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreA', 1)">+</button>
            </div>
            <div style="font-weight:bold; color:#333;">VS</div>
            <div class="score-box">
                <input type="text" id="nameB" class="std-input" placeholder="Team 2" oninput="updateDB()">
                <div class="score-num" id="dispB">0</div>
                <button class="btn-pm" style="background:#da3633;" onclick="changeScore('scoreB', -1)">-</button>
                <button class="btn-pm" style="background:#238636;" onclick="changeScore('scoreB', 1)">+</button>
            </div>
        </div>
        <div style="padding:10px; text-align:center;">
            <button id="visBtn" style="padding:8px 20px; border-radius:5px; border:none; cursor:pointer; color:white;" onclick="toggleVis()">SHOW</button>
        </div>
    </div>

    <!-- MATCH SCHEDULER -->
    <div class="card">
        <div class="header" style="background:#1a73e8;">NEXT MATCHES (Format: 1-2, 3-4)</div>
        <div style="padding:15px;">
            <textarea id="matchInput" class="std-input" style="height:70px;" placeholder="Mudki-Gill, Fzr-Fdk, Moga-Ajitwal..."></textarea>
            <button class="btn-update" onclick="saveMatches()">SAVE MATCH LIST</button>
            <div id="displayList" style="margin-top:10px;"></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const mRef = firebase.database().ref("matchData");
    const tRef = firebase.database().ref("tickerData");

    let curA = 0, curB = 0, sVis = true;

    // --- 2 TEAM 1 MATCH LOGIC ---
    function saveMatches() {
        const val = document.getElementById('matchInput').value;
        if(!val) return;

        let pairs = val.split(',').map(p => p.trim()).filter(p => p !== "");
        let list = [];

        pairs.forEach((p, i) => {
            let teams = p.split('-').map(t => t.trim());
            list.push({ id: i+1, t1: teams[0] || "T1", t2: teams[1] || "T2" });
        });

        tRef.child('nextMatchList').set(list);
        document.getElementById('matchInput').value = "";
    }

    tRef.child('nextMatchList').on('value', snap => {
        const div = document.getElementById('displayList');
        div.innerHTML = "";
        const data = snap.val() || [];
        data.forEach(m => {
            div.innerHTML += `
                <div class="match-list-item">
                    <span><b>${m.id}.</b> ${m.t1} VS ${m.t2}</span>
                    <button class="set-btn" onclick="setLive('${m.t1}', '${m.t2}')">SET LIVE</button>
                </div>`;
        });
    });

    function setLive(t1, t2) {
        if(confirm("ਇਹ ਮੈਚ ਲਾਈਵ ਕਰੀਏ?")) {
            mRef.update({ nameA: t1, nameB: t2, scoreA: 0, scoreB: 0, scoreVisible: true });
            tRef.update({ currentMatchTie: t1 + " VS " + t2 });
        }
    }

    // --- SCORE CONTROL ---
    function updateDB() {
        mRef.update({ nameA: document.getElementById('nameA').value, nameB: document.getElementById('nameB').value });
    }

    function changeScore(team, v) {
        let old = (team === 'scoreA' ? curA : curB);
        mRef.update({ [team]: Math.max(0, old + v) });
    }

    function toggleVis() { mRef.child('scoreVisible').set(!sVis); }

    mRef.on("value", snap => {
        const d = snap.val() || {};
        curA = d.scoreA || 0; curB = d.scoreB || 0; sVis = !!d.scoreVisible;
        document.getElementById('dispA').innerText = curA;
        document.getElementById('dispB').innerText = curB;
        document.getElementById('nameA').value = d.nameA || "";
        document.getElementById('nameB').value = d.nameB || "";
        document.getElementById('visBtn').innerText = sVis ? "HIDE" : "SHOW";
        document.getElementById('visBtn').style.background = sVis ? "#da3633" : "#238636";
    });
</script>
</body>
</html>
