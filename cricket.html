<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricBest - Match Setup & Scoring</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #2dd4bf;
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 600px; }

        /* Setup Form Styles */
        .setup-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 { color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .section-title { font-size: 14px; color: #94a3b8; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        label { display: block; font-size: 12px; margin-bottom: 5px; color: #cbd5e1; }

        input, select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .toss-options { display: flex; gap: 10px; margin-top: 10px; }

        .btn-toggle {
            flex: 1;
            padding: 10px;
            background: #334155;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-toggle.active { background: var(--accent); color: #0f172a; font-weight: bold; }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: #0f172a;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 30px;
            cursor: pointer;
        }

        /* Scoring Dashboard Styles (Hidden initially) */
        #scoringPage { display: none; text-align: center; }

        .score-display { font-size: 48px; font-weight: bold; margin: 20px 0; }
        
        .score-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .run-btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: white;
            padding: 20px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        .run-btn:active { background: var(--accent); color: black; }

        .out-btn { background: #ef4444; border: none; color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="setupPage" class="setup-card">
        <h2>Setup Match #1</h2>

        <div class="section-title"><span>1</span> Match Settings</div>
        <div class="input-grid">
            <div class="form-group">
                <label>Total Overs</label>
                <input type="number" id="overs" value="8">
            </div>
            <div class="form-group">
                <label>Match Type</label>
                <select id="type">
                    <option>Group Stage</option>
                    <option>Final</option>
                </select>
            </div>
        </div>

        <div class="section-title"><span>2</span> Select Playing Teams</div>
        <div class="input-grid">
            <input type="text" id="teamA" placeholder="Team A Name">
            <input type="text" id="teamB" placeholder="Team B Name">
        </div>

        <div class="section-title"><span>3</span> Toss Configuration</div>
        <label>Who won the toss?</label>
        <div class="toss-options">
            <button class="btn-toggle active" onclick="setToss('A')" id="tossA">Team A</button>
            <button class="btn-toggle" onclick="setToss('B')" id="tossB">Team B</button>
        </div>

        <button class="btn-main" onclick="startMatch()">INITIALIZE MATCH</button>
    </div>

    <div id="scoringPage">
        <div class="setup-card">
            <h3 id="displayMatch">TEAM A vs TEAM B</h3>
            <div id="tossResult" style="font-size: 12px; color: var(--accent);">GILL WON THE TOSS AND ELECTED TO BAT</div>
            
            <div class="score-display">
                <span id="runs">0</span> / <span id="wickets">0</span>
                <div style="font-size: 16px; color: #94a3b8;">(0.0 / <span id="maxOvers">8</span>)</div>
            </div>

            <div class="score-grid">
                <button class="run-btn" onclick="addRuns(0)">0</button>
                <button class="run-btn" onclick="addRuns(1)">1</button>
                <button class="run-btn" onclick="addRuns(2)">2</button>
                <button class="run-btn" onclick="addRuns(4)">4</button>
                <button class="run-btn" onclick="addRuns(6)">6</button>
                <button class="run-btn out-btn" onclick="addWicket()">OUT</button>
            </div>
            
            <button class="btn-main" style="background: #334155; color: white; margin-top: 20px;" onclick="location.reload()">Reset Match</button>
        </div>
    </div>

</div>

<script>
    let tossWinner = 'A';

    function setToss(team) {
        tossWinner = team;
        document.getElementById('tossA').classList.toggle('active', team === 'A');
        document.getElementById('tossB').classList.toggle('active', team === 'B');
    }

    function startMatch() {
        const teamA = document.getElementById('teamA').value || "Team A";
        const teamB = document.getElementById('teamB').value || "Team B";
        const maxOvers = document.getElementById('overs').value;

        // UI ਬਦਲੋ
        document.getElementById('setupPage').classList.add('hidden');
        document.getElementById('scoringPage').style.display = 'block';

        // ਡਾਟਾ ਸੈੱਟ ਕਰੋ
        document.getElementById('displayMatch').innerText = `${teamA} vs ${teamB}`;
        document.getElementById('maxOvers').innerText = maxOvers;
        
        let winnerName = (tossWinner === 'A') ? teamA : teamB;
        document.getElementById('tossResult').innerText = `${winnerName.toUpperCase()} WON THE TOSS AND ELECTED TO BAT`;
    }

    // ਬੁਨਿਆਦੀ ਸਕੋਰਿੰਗ ਫੰਕਸ਼ਨ
    let totalRuns = 0;
    let totalWickets = 0;

    function addRuns(r) {
        totalRuns += r;
        document.getElementById('runs').innerText = totalRuns;
    }

    function addWicket() {
        if(totalWickets < 10) {
            totalWickets++;
            document.getElementById('wickets').innerText = totalWickets;
        }
    }
</script>

</body>
</html>
