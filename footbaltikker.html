<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Admin - Professional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 10px; margin: 0; }
        .card { background: #fff; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { background: #1a73e8; color: white; padding: 12px; text-align: center; font-weight: bold; border-top-left-radius: 12px; border-top-right-radius: 12px; text-transform: uppercase; }
        .content { padding: 15px; }
        
        .std-input { width: 100%; padding: 12px; border: 1px solid #bbb; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; font-size: 14px; }
        
        .btn-add { background: #28a745; color: white; margin-bottom: 15px; }
        .btn-update { background: #1a73e8; color: white; }
        .btn-declare { background: #ff5722; color: white; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #d84315; }
        .btn-declare:active { transform: translateY(3px); box-shadow: none; }
        
        .btn-win-circle { background: #ffc107; color: #000; border-radius: 50%; width: 36px; height: 36px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box-list { background: #fafafa; border: 1px solid #ddd; border-radius: 8px; min-height: 150px; padding: 8px; max-height: 300px; overflow-y: auto; }
        
        .team-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 17px; background: #fff; margin-bottom: 5px; border-radius: 5px; }
        .idx-num { color: #1a73e8; font-weight: bold; margin-right: 8px; }

        .label-title { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; display: block; }
        .select-win { height: 50px; border: 2px solid #ff5722; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; color: #d84315; }
        
        .status-bar { background: #fffde7; padding: 10px; border-radius: 8px; border: 1px solid #fff59d; text-align: center; margin-top: 10px; font-weight: bold; color: #f57f17; }
    </style>
</head>
<body>

    <!-- 1. ਟੀਮਾਂ ਦੀ ਲਿਸਟ (Playing List) -->
    <div class="card">
        <div class="header">1. Team Entry & Playing List</div>
        <div class="content">
            <textarea id="bulkTeams" class="std-input" style="height: 60px;" placeholder="ਟੀਮਾਂ ਲਿਖੋ (Mudki-Gill, Fzr-Fdk)"></textarea>
            <button class="btn btn-add" onclick="addBulkTeams()">Add to List</button>
            
            <div class="grid-2">
                <div>
                    <span class="label-title">Playing List</span>
                    <div id="playingList" class="box-list"></div>
                </div>
                <div>
                    <span class="label-title">Winners Box</span>
                    <div id="winnerList" class="box-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. ਰਿਜ਼ਲਟ ਐਲਾਨਣ ਵਾਲਾ ਵੱਖਰਾ ਬਟਨ (Declare Result) -->
    <div class="card" style="border: 2px solid #ff5722;">
        <div class="header" style="background: #ff5722;">2. Declare Final Result</div>
        <div class="content">
            <span class="label-title">ਜੇਤੂ ਟੀਮ ਚੁਣੋ</span>
            <select id="winnerSelect" class="select-win"></select>
            <button class="btn btn-declare" onclick="declareFinalResult()">📢 Declare Result Now</button>
            
            <div id="lastWinner" class="status-bar">No Result Announced</div>
        </div>
    </div>

    <!-- 3. ਤਾਈਆਂ ਅਤੇ ਟਿੱਕਰ (Ties & Ticker) -->
    <div class="card">
        <div class="header" style="background: #444;">3. Scoreboard & Ticker Info</div>
        <div class="content">
            <span class="label-title">Match Tie For Scoreboard</span>
            <div class="grid-2" style="margin-bottom:10px;">
                <select id="tie1" class="std-input" style="margin:0;"></select>
                <select id="tie2" class="std-input" style="margin:0;"></select>
            </div>
            <button class="btn btn-update" onclick="updateTie()">Set Live Match</button>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <input type="text" id="tourName" class="std-input" placeholder="Tournament Name">
            <input type="text" id="nextEvents" class="std-input" placeholder="Next Events Info">
            <button class="btn btn-update" style="background: #333;" onclick="saveTicker()">Save Ticker Info</button>
        </div>
    </div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://manpreetteam-a86e9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("tickerData");

    // ਟੀਮਾਂ ਐਡ ਕਰਨਾ
    function addBulkTeams() {
        const input = document.getElementById('bulkTeams').value;
        if(!input) return;
        db.child('teamList').once('value', (snap) => {
            let count = snap.numChildren();
            input.split(',').forEach(p => {
                const name = p.trim().replace('-', ' vs ');
                if(name) {
                    count++;
                    const ref = db.child('teamList').push();
                    ref.set({ id: ref.key, name: name, idx: count });
                }
            });
        });
        document.getElementById('bulkTeams').value = "";
    }

    // ਫਾਈਨਲ ਰਿਜ਼ਲਟ ਐਲਾਨਣਾ
    function declareFinalResult() {
        const winner = document.getElementById('winnerSelect').value;
        if(!winner) return alert("ਪਹਿਲਾਂ ਜੇਤੂ ਟੀਮ ਚੁਣੋ!");
        
        if(confirm(`ਕੀ ਤੁਸੀਂ ${winner} ਨੂੰ ਜੇਤੂ ਘੋਸ਼ਿਤ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?`)) {
            db.update({ finalWinner: winner });
            alert("Result Declared!");
        }
    }

    // ਸਕੋਰਬੋਰਡ ਲਈ ਤਾਈਆਂ
    function updateTie() {
        const t1 = document.getElementById('tie1').value;
        const t2 = document.getElementById('tie2').value;
        if (t1 && t2) {
            db.update({ currentMatchTie: t1 + " VS " + t2 });
            alert("Scoreboard Updated!");
        }
    }

    // ਟਿੱਕਰ ਸੇਵ ਕਰਨਾ
    function saveTicker() {
        db.update({ 
            tournamentName: document.getElementById('tourName').value, 
            externalEvents: document.getElementById('nextEvents').value 
        });
        alert("Ticker Info Saved!");
    }

    // ਡਾਟਾ ਰੀਡ ਕਰਨਾ
    db.on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById('tourName').value = data.tournamentName || "";
        document.getElementById('nextEvents').value = data.externalEvents || "";
        document.getElementById('lastWinner').innerText = data.finalWinner ? "WINNER: " + data.finalWinner : "No Result Announced";
        
        renderUI(data.teamList, data.winnerList);
    });

    function moveToWin(id, name, idx) {
        if (confirm(`${name} ਨੂੰ Winners Box ਵਿੱਚ ਭੇਜਣਾ ਹੈ?`)) {
            db.child('teamList').child(id).remove();
            db.child('winnerList').push().set({ name: name, idx: idx });
        }
    }

    function renderUI(teamList, winnerList) {
        const pList = document.getElementById('playingList');
        const wList = document.getElementById('winnerList');
        const wSelect = document.getElementById('winnerSelect');
        const tie1 = document.getElementById('tie1');
        const tie2 = document.getElementById('tie2');

        pList.innerHTML = ""; wList.innerHTML = "";
        let opts = `<option value="">Select Team</option>`;

        if(teamList) Object.values(teamList).forEach(t => {
            pList.innerHTML += `<div class="team-item"><span><span class="idx-num">${t.idx}.</span> ${t.name}</span><button class="btn-win-circle" onclick="moveToWin('${t.id}', '${t.name}', ${t.idx})">✔</button></div>`;
        });

        if(winnerList) Object.values(winnerList).forEach(w => {
            wList.innerHTML += `<div class="team-item"><span><span class="idx-num">${w.idx}.</span> ${w.name}</span><span style="color:green; font-weight:bold;">★</span></div>`;
            opts += `<option value="${w.name}">${w.name}</option>`;
        });
        
        wSelect.innerHTML = opts;
        tie1.innerHTML = opts;
        tie2.innerHTML = opts;
    }
</script>
</body>
</html>
